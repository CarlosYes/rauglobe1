<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v219 - PRECISION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.9); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none; backdrop-filter: blur(5px);
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.9); padding: 5px 12px; border-radius: 4px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 8px;
            border: 1px solid #39ff14; color: #39ff14; white-space: nowrap;
        }
        .flag { width: 18px; height: 12px; }
        .d-rau { width: 12px; height: 12px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 15px #39ff14; animation: p 1.5s infinite; margin-top: 5px; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status">ESTABELECENDO CONEXÃO DE PRECISÃO...</div>
</div>

<div id="globeViz"></div>

<script>
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.countryCode ? `<img src="https://flagcdn.com/w40/${d.countryCode.toLowerCase()}.png" class="flag">` : '';
            el.innerHTML = `<div class="l-rau">${flag} <span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = -1.2;

    async function getPreciseLocation() {
        try {
            // 1. Tenta primeiro o seu nó do Cloudflare
            const response = await fetch('https://globorau.carlos2022yes.workers.dev/');
            const data = await response.json();
            
            // 2. Se o Cloudflare der uma cidade genérica, tentamos o GPS do navegador para precisão total
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        // Se o GPS responder, usamos os dados reais do dispositivo
                        render(pos.coords.latitude, pos.coords.longitude, "LOCALIZAÇÃO REAL", data.countryCode);
                    },
                    () => {
                        // Se o usuário negar o GPS, usamos o Cloudflare mesmo (Mechelen ou similar)
                        render(data.lat, data.lon, data.city, data.countryCode);
                    },
                    { timeout: 5000 }
                );
            } else {
                render(data.lat, data.lon, data.city, data.countryCode);
            }
        } catch (e) {
            document.getElementById('status').innerText = "ERRO NO UPLINK PRIVADO";
        }
    }

    function render(lat, lon, city, country) {
        document.getElementById('onlineCount').innerText = "1";
        document.getElementById('status').innerText = "SINAL IDENTIFICADO EM: " + city.toUpperCase();
        
        const point = { lat: parseFloat(lat), lng: parseFloat(lon), city: city, countryCode: country };
        world.htmlElementsData([point]);
        world.pointOfView({ lat: point.lat, lng: point.lng, altitude: 2 }, 2500);
        setTimeout(() => { world.controls().autoRotateSpeed = -0.3; }, 2600);
    }

    window.onload = getPreciseLocation;
</script>
</body>
</html>
