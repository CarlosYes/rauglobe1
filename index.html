<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v195.0 - REALTIME HUD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; user-select: none; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
            backdrop-filter: blur(10px);
        }
        .monitor-display { background: rgba(0, 0, 0, 0.9); border: 1px solid #1a1a1a; padding: 12px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; text-transform: uppercase; }
        #mon-status { font-size: 10px; color: #39ff14; opacity: 0.8; margin-top: 8px; border-top: 1px solid #39ff1444; padding-top: 8px; white-space: pre-line; line-height: 1.4; }
        
        /* Label de Cidade e Bandeira */
        .visitor-tag {
            position: absolute; pointer-events: none;
            background: rgba(0, 20, 0, 0.85); border: 1px solid #39ff14;
            color: #fff; padding: 5px 10px; font-size: 13px; font-weight: bold;
            border-radius: 4px; display: flex; align-items: center; gap: 10px;
            white-space: nowrap; transform: translate(-50%, -140%);
            z-index: 100; box-shadow: 0 0 15px rgba(0,255,0,0.2);
        }
        .flag-img { width: 24px; height: 16px; border: 1px solid #444; object-fit: cover; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; outline: none; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
        <div id="led" style="width: 10px; height: 10px; border-radius: 50%; background: #39ff14; box-shadow: 0 0 10px #39ff14; animation: blink 1s infinite;"></div>
        <span style="font-size: 11px; letter-spacing: 1px;">RAU CORE v195 | LIVE NODES</span>
    </div>
    <div class="monitor-display">
        <span id="mon-city">SCANNING...</span>
        <div id="mon-status">A aguardar telemetria de rede...</div>
    </div>
</div>

<div id="hud-container" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index: 100;"></div>

<script>
    const RAU_SYSTEM = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000),
        renderer: new THREE.WebGLRenderer({ antialias: true }),
        controls: null, globe: null, markers: new THREE.Group(),
        currentIP: null, activeNode: null,

        init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(this.renderer.domElement);

            this.scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 0.7);
            sun.position.set(5, 3, 5);
            this.scene.add(sun);

            const geo = new THREE.SphereGeometry(1, 64, 64);
            const mat = new THREE.MeshPhongMaterial({ color: 0x1a1a1a, shininess: 25 });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            this.globe.add(this.markers);

            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.enableDamping = true;
            this.controls.dampingFactor = 0.05;
            this.controls.autoRotate = true;
            this.controls.autoRotateSpeed = 0.5;
            this.camera.position.z = 3.6;

            this.loadTexture();
            this.animate();
            this.scan();
            setInterval(() => this.scan(), 8000);
        },

        loadTexture() {
            new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.needsUpdate = true;
            });
        },

        async scan() {
            try {
                const res = await fetch(`https://ipapi.co/json/?nocache=${Date.now()}`);
                const data = await res.json();
                if (data.ip && data.ip !== this.currentIP) {
                    this.currentIP = data.ip;
                    this.deployVisitor(data);
                }
            } catch (e) {
                document.getElementById('mon-status').innerText = "Ligação instável...";
            }
        },

        deployVisitor(data) {
            document.getElementById('mon-city').innerText = (data.city || "NODE ATIVO").toUpperCase();
            document.getElementById('mon-status').innerText = `IP: ${data.ip}\nLOCAL: ${data.country_name}\nISP: ${data.org}\nSTATUS: TRACKING LIVE`;

            this.markers.clear();
            const hud = document.getElementById('hud-container');
            hud.innerHTML = '';

            const phi = (90 - data.latitude) * (Math.PI / 180);
            const theta = (data.longitude + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.02);

            // Marcador LED 3D
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.035, 20, 20), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
            dot.position.copy(pos);
            this.markers.add(dot);

            // Dados para o HUD
            this.activeNode = {
                mesh: dot,
                city: data.city || "Desconhecido",
                country: data.country_code.toLowerCase()
            };

            // Criar Tag HTML (Cidade + Bandeira)
            const tag = document.createElement('div');
            tag.className = 'visitor-tag';
            tag.id = 'live-tag';
            tag.innerHTML = `
                <img src="https://flagcdn.com/w40/${this.activeNode.country}.png" class="flag-img">
                <span>${this.activeNode.city}</span>
            `;
            hud.appendChild(tag);

            // Focar suavemente no ponto detectado
            this.camera.position.lerp(pos.clone().multiplyScalar(3.5), 0.05);
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update();

            // Sincronizar TAG HTML com o Globo 3D
            if (this.activeNode && this.activeNode.mesh) {
                const vector = this.activeNode.mesh.getWorldPosition(new THREE.Vector3());
                vector.project(this.camera);

                const x = (vector.x * .5 + .5) * window.innerWidth;
                const y = (vector.y * -.5 + .5) * window.innerHeight;
                
                const tag = document.getElementById('live-tag');
                if (tag) {
                    // Esconder se estiver atrás do globo (oclusão)
                    if (vector.z > 1) { tag.style.display = 'none'; } 
                    else { 
                        tag.style.display = 'flex';
                        tag.style.left = `${x}px`;
                        tag.style.top = `${y}px`;
                    }
                }
            }
            this.renderer.render(this.scene, this.camera);
        }
    };

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    window.onload = () => RAU_SYSTEM.init();
</script>
</body>
</html>
