<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v55 - MIRROR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 25px; left: 25px; z-index: 1000;
            background: rgba(0, 0, 0, 0.95); border: 2px solid #39ff14;
            padding: 20px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 30px #39ff1488;
        }
        .count { font-size: 80px; font-weight: 900; color: #fff; line-height: 0.8; letter-spacing: -5px; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 4px 10px; border-radius: 2px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            white-space: nowrap; border: 1px solid #fff;
        }
        .l-rau img { width: 20px; height: 13px; object-fit: cover; }
        .d-rau { width: 12px; height: 12px; background: #fff; border-radius: 50%; margin-top: 5px; border: 2px solid #39ff14; animation: p 0.7s infinite alternate; }
        @keyframes p { from { transform: scale(1); opacity: 1; } to { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 4px;">RAU MIRROR SYSTEM</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 11px; color: #fff; margin-top: 10px; font-family: monospace;">A ESPELHAR SINAL...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'MIRROR-' + Math.random().toString(36).substr(2, 6);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    // MÉTODO MIRROR: Usa o sinal da Amazon/Cloudflare para extrair dados
    async function mirrorLoc() {
        try {
            // Passo 1: Extrair IP via Cloudflare (Inbloqueável)
            const cf = await fetch('https://1.1.1.1/cdn-cgi/trace').then(r => r.text());
            const ip = cf.split('\n').find(l => l.startsWith('ip=')).split('=')[1];

            // Passo 2: Mirroring via IPWhois (JSONP para evitar trancas de segurança)
            return new Promise((resolve) => {
                const s = document.createElement('script');
                const cb = 'mirror_' + Date.now();
                s.src = `https://ipwho.is/${ip}?callback=${cb}`;
                window[cb] = (d) => {
                    resolve({
                        lat: d.latitude, lng: d.longitude,
                        city: (d.city || d.region || "ONLINE").toUpperCase(),
                        country: d.country_code.toLowerCase()
                    });
                    delete window[cb];
                    document.body.removeChild(s);
                };
                document.body.appendChild(s);
            });
        } catch (e) { return null; }
    }

    async function init() {
        const geo = await mirrorLoc();
        
        if (!geo) {
            document.getElementById('status').innerText = "SINAL BLOQUEADO PELA REDE";
            return;
        }

        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('rau-live-radar');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `FIXADO: ${geo.city}`;
            channel.presence.enter(geo);

            const update = () => {
                channel.presence.get((err, members) => {
                    if (!err) {
                        const nodes = members.map(m => m.data).filter(x => x && x.lat);
                        document.getElementById('count').innerText = nodes.length;
                        world.htmlElementsData(nodes);
                    }
                });
            };
            channel.presence.subscribe(['enter', 'leave', 'present', 'update'], update);
            update();
        });

        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.2 }, 2000);
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    window.onload = init;
</script>
</body>
</html>
