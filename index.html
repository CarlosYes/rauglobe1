<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v216.5 - HYBRID CORE</title>
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; }
        
        /* Interface UI do v216 */
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
        }
        .monitor-display { background: #000; border: 1px solid #1a1a1a; padding: 10px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; text-transform: uppercase; }
        
        /* Tag de Identificação "VOCÊ" */
        #visitor-tag {
            position: absolute; display: none; align-items: center; gap: 8px;
            background: rgba(0, 0, 0, 0.9); border: 1px solid #39ff14;
            padding: 5px 12px; color: #fff; font-size: 11px; font-weight: bold;
            z-index: 500; transform: translate(-50%, -150%);
            border-radius: 2px;
        }
        .flag-icon { width: 18px; height: 12px; border: 1px solid #333; }
        
        #globeViz { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div style="margin-bottom: 8px; font-size: 10px; font-weight: bold; letter-spacing: 2px;">RAU CORE v216.5 // HYBRID</div>
    <div class="monitor-display">
        <span id="mon-city">SINCRONIZANDO...</span>
        <div id="mon-status" style="font-size: 9px; opacity: 0.7; margin-top: 4px;">Uplink: Ativo</div>
        <div id="mon-listeners" style="font-size: 10px; color: #39ff14; margin-top: 6px; font-weight: bold;">OUVINTES: 0</div>
    </div>
</div>

<div id="visitor-tag">
    <img id="tag-flag" src="" class="flag-icon">
    <span id="tag-city">CARREGANDO...</span>
</div>

<div id="globeViz"></div>

<script>
    // Configurações Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        authDomain: "radiodosamigosunidos-aadda.firebaseapp.com",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda",
        storageBucket: "radiodosamigosunidos-aadda.firebasestorage.app",
        messagingSenderId: "451945612071",
        appId: "1:451945612071:web:383c551ca22744f6845f02"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const listenersRef = db.ref('listeners');

    let myId = null;
    let myCoords = { lat: 0, lng: 0 };

    // Inicializar o Globo (Estilo rauglobe1)
    const world = Globe()
        (document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
        .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .pointColor(d => d.isMe ? '#39ff14' : '#00ffff')
        .pointAltitude(0.08)
        .pointRadius(0.25)
        .pointsMerge(false);

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    // Conectar e Monitorar
    async function initNetwork() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            myCoords = { lat: data.latitude, lng: data.longitude };
            const userRef = listenersRef.push();
            myId = userRef.key;

            userRef.set({
                lat: data.latitude,
                lng: data.longitude,
                city: data.city,
                country: data.country_code.toLowerCase(),
                timestamp: Date.now()
            });
            userRef.onDisconnect().remove();

            document.getElementById('mon-city').innerText = data.city.toUpperCase();
            document.getElementById('mon-status').innerText = "IP: " + data.ip;
            document.getElementById('tag-city').innerText = "VOCÊ: " + data.city;
            document.getElementById('tag-flag').src = `https://flagcdn.com/w40/${data.country_code.toLowerCase()}.png`;
            document.getElementById('visitor-tag').style.display = 'flex';

            // Ouvir todos os ouvintes
            listenersRef.on('value', snap => {
                const val = snap.val() || {};
                const entries = Object.entries(val);
                document.getElementById('mon-listeners').innerText = `OUVINTES: ${entries.length}`;

                const points = entries.map(([id, info]) => ({
                    lat: info.lat,
                    lng: info.lng,
                    isMe: id === myId
                }));
                world.pointsData(points);
            });

        } catch (e) { console.error("Falha na conexão."); }
    }

    // Lógica da Tag Flutuante (segue o ponto no globo)
    function updateTag() {
        const pos = world.getCoords(myCoords.lat, myCoords.lng);
        const vector = new THREE.Vector3(pos.x, pos.y, pos.z);
        
        // Converter coordenadas 3D para 2D (ecrã)
        vector.project(world.camera());
        
        const tag = document.getElementById('visitor-tag');
        const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
        const y = (vector.y * -0.5 + 0.5) * window.innerHeight;
        
        tag.style.left = `${x}px`;
        tag.style.top = `${y}px`;
        
        // Esconder se o ponto estiver atrás do globo
        const cameraPos = world.camera().position;
        const dist = cameraPos.distanceTo(new THREE.Vector3(0,0,0));
        const dotDist = cameraPos.distanceTo(new THREE.Vector3(pos.x, pos.y, pos.z));
        tag.style.opacity = dotDist > dist ? "0" : "1";

        requestAnimationFrame(updateTag);
    }

    initNetwork();
    updateTag();

    window.addEventListener('resize', () => {
        world.width(window.innerWidth);
        world.height(window.innerHeight);
    });
</script>

</body>
</html>
