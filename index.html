<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v122 - FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); border-left: 5px solid #39ff14;
            padding: 20px; color: #fff; pointer-events: none;
        }
        .count-on { font-size: 70px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        .status-msg { font-size: 11px; margin-top: 10px; font-family: monospace; color: #39ff14; text-transform: uppercase; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #000; padding: 5px 12px; border-radius: 2px;
            font-size: 12px; font-weight: 900; border: 1.5px solid #39ff14; color: #39ff14; 
            white-space: nowrap; box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
        }
        .d-rau { width: 12px; height: 12px; background: #39ff14; border-radius: 50%; margin-top: 5px; box-shadow: 0 0 20px #39ff14; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status" class="status-msg">A filtrar sinal de rede...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'NODE-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    const visitors = new Map();

    // MEMÓRIA DE UTILIZADOR (Volume e Autoplay)
    const settings = {
        volume: localStorage.getItem('rau_volume') || 0.5,
        autoplay: localStorage.getItem('rau_autoplay') === 'true'
    };

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000').showAtmosphere(true).atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = `m-rau`;
            el.innerHTML = `<div class="l-rau">${d.city}</div><div class="d-rau"></div>`;
            return el;
        });

    // FILTRO INTELIGENTE ANTI-BÉLGICA
    async function getFilteredGeo() {
        const providers = ['https://ipwho.is/', 'https://ipapi.co/json/'];
        
        for (let url of providers) {
            try {
                const r = await fetch(url);
                const d = await r.json();
                const city = (d.city || "").toUpperCase();
                const country = (d.country_code || d.country || "").toUpperCase();

                // Se o sinal vier da Bélgica, ignoramos e tentamos o próximo
                if (country !== "BE" && city !== "ZEEBRUGGE" && city !== "OOSTENDE") {
                    return {
                        lat: parseFloat(d.latitude || d.lat),
                        lng: parseFloat(d.longitude || d.lon),
                        city: city || "SINAL ATIVO"
                    };
                }
            } catch (e) { continue; }
        }
        // Fallback genérico se tudo for Bélgica
        return { lat: 39.5, lng: -8.0, city: "SINAL ESTIMADO" };
    }

    async function start() {
        const geo = await getFilteredGeo();
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('rau-final-v122');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `SINAL FIXADO: ${geo.city}`;
            channel.presence.enter(geo);
            
            channel.presence.subscribe(['enter', 'present', 'update'], (m) => {
                if(m.data && m.data.lat) {
                    visitors.set(m.clientId, m.data);
                    sync();
                }
            });
            channel.presence.subscribe('leave', (m) => {
                visitors.delete(m.clientId);
                sync();
            });
        });
        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.2 }, 2000);
    }

    function sync() {
        const data = Array.from(visitors.values());
        document.getElementById('onlineCount').innerText = data.length;
        world.htmlElementsData(data);
    }

    world.controls().autoRotate = true;
    window.onload = start;

    // Função para salvar preferências (Chama isto quando alterares volume no teu player)
    function savePrefs(vol, auto) {
        localStorage.setItem('rau_volume', vol);
        localStorage.setItem('rau_autoplay', auto);
    }
</script>
</body>
</html>
