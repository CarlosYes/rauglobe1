<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v104 - COMPATIBILIDADE TOTAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        
        .hud {
            position: absolute; top: 25px; left: 25px; z-index: 1000;
            background: rgba(0, 15, 30, 0.9); border-left: 6px solid #00ffff;
            padding: 20px; color: #fff; pointer-events: none;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
        }
        .count-on { font-size: 55px; font-weight: 900; color: #00ffff; line-height: 0.9; }
        .status-msg { font-size: 10px; margin-top: 10px; font-family: monospace; color: #00ffff; letter-spacing: 1px; }

        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0, 255, 255, 0.1); padding: 5px 12px; border-radius: 2px;
            font-size: 11px; font-weight: 900; border: 1px solid #00ffff; color: #00ffff; 
            white-space: nowrap; backdrop-filter: blur(4px);
        }
        .d-rau { 
            width: 10px; height: 10px; background: #00ffff; border-radius: 50%; 
            margin-top: 4px; box-shadow: 0 0 15px #00ffff; 
            animation: pulse-cyan 1.5s infinite; 
        }

        @keyframes pulse-cyan {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">--</div>
    <div id="status" class="status-msg">A SINCRONIZAR FLUXO...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'RAU-V104-' + Math.random().toString(36).substr(2, 4).toUpperCase();
    const visitors = new Map();

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000').showAtmosphere(true).atmosphereColor('#00ffff')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = `m-rau`;
            el.innerHTML = `<div class="l-rau">${d.city}</div><div class="d-rau"></div>`;
            return el;
        });

    // SISTEMA DE DETECÇÃO POR CALLBACK (Ignora bloqueios de CORS do navegador)
    function getGeoData() {
        return new Promise((resolve) => {
            const script = document.createElement('script');
            // Usando o serviço ipinfo que é extremamente estável
            script.src = 'https://ipinfo.io/?callback=callbackGeo';
            document.body.appendChild(script);

            window.callbackGeo = function(data) {
                const loc = data.loc.split(',');
                resolve({
                    lat: parseFloat(loc[0]),
                    lng: parseFloat(loc[1]),
                    city: data.city.toUpperCase(),
                    country: data.country
                });
                document.body.removeChild(script);
            };

            // Caso o serviço demore muito, ativa o bypass
            setTimeout(() => {
                if (!window.geoActive) resolve({ lat: 39.5, lng: -8.0, city: "SINAL MANUAL", country: "PT" });
            }, 4000);
        });
    }

    async function start() {
        window.geoActive = false;
        const geo = await getGeoData();
        window.geoActive = true;

        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('rau-global-v104');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `SINAL ESTÁVEL: ${geo.city}`;
            channel.presence.enter(geo);
            
            channel.presence.subscribe(['enter', 'present', 'update'], (m) => {
                if(m.data && m.data.lat) {
                    visitors.set(m.clientId, m.data);
                    sync();
                }
            });
            
            channel.presence.subscribe('leave', (m) => {
                visitors.delete(m.clientId);
                sync();
            });
        });

        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.3 }, 2000);
    }

    function sync() {
        const data = Array.from(visitors.values());
        document.getElementById('onlineCount').innerText = data.length.toString().padStart(2, '0');
        world.htmlElementsData(data);
    }

    world.controls().autoRotate = true;
    window.onload = start;
</script>
</body>
</html>
