<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU MONITOR v237.0 - REAL TIME</title>
    
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; background: #000; color: #39ff14; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        .interface {
            position: absolute; z-index: 100;
            background: rgb(7, 20, 45);
            border: 1px solid #39ff14;
            padding: 10px; border-radius: 4px;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
        }
        #status-hud { top: 20px; left: 20px; width: 220px; border-left: 4px solid #39ff14; }
        
        /* Botão de Precisão Real */
        #geo-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 101; background: #39ff14; color: #000;
            border: none; padding: 12px 20px; font-weight: bold; cursor: pointer;
            border-radius: 50px; box-shadow: 0 0 20px #39ff14;
        }
        #geo-btn:hover { background: #fff; transform: translateX(-50%) scale(1.05); }

        .label-style {
            background: rgba(0,0,0,0.85); border: 1px solid #39ff14;
            color: #39ff14; padding: 4px 8px; font-size: 11px;
            display: flex; align-items: center; gap: 6px; border-radius: 3px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="status-hud" class="interface">
    <div style="font-size: 9px; opacity: 0.7; letter-spacing: 1px;">RADAR DE PRESENÇA REAL</div>
    <div id="my-loc" style="font-size: 16px; font-weight: bold; color: #fff;">SISTEMA ATIVO</div>
    <div style="font-size: 13px; margin-top:5px;">LIGAÇÕES ATIVAS: <span id="real-count" style="color:#39ff14; font-weight: 900;">0</span></div>
</div>

<button id="geo-btn">CORRIGIR MINHA POSIÇÃO (GPS)</button>

<div id="globeViz"></div>

<script>
    const config = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        authDomain: "radiodosamigosunidos-aadda.firebaseapp.com",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda",
        storageBucket: "radiodosamigosunidos-aadda.firebasestorage.app",
        messagingSenderId: "451945612071",
        appId: "1:451945612071:web:383c551ca22744f6845f02"
    };

    firebase.initializeApp(config);
    const db = firebase.database();
    const presenceRef = db.ref('rau_live_presence');

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .pointColor(() => '#39ff14')
        .pointRadius(0.8)
        .pointAltitude(0.1)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'label-style';
            el.innerHTML = `<img src="https://flagcdn.com/w20/${d.iso}.png" width="16"> <b>${d.city}</b>`;
            return el;
        });

    let mySessionRef;

    async function initRealTime() {
        // Passo 1: Localização inicial via IP
        const res = await fetch('https://ipwho.is/').catch(() => ({}));
        const d = await (res.json ? res.json() : {});
        
        const myData = {
            lat: d.latitude || 41.15,
            lng: d.longitude || -8.62,
            city: d.city || "Ouvinte",
            iso: (d.country_code || "pt").toLowerCase(),
            ts: Date.now()
        };

        // Passo 2: Criar nó de presença REAL (onDisconnect limpa o mapa imediatamente)
        mySessionRef = presenceRef.push();
        mySessionRef.set(myData);
        mySessionRef.onDisconnect().remove();

        // Passo 3: Escutar a "Verdade" (Snapshots sem cache)
        presenceRef.on('value', snap => {
            const val = snap.val() || {};
            const users = Object.values(val);
            
            // Atualiza o contador e os pontos no globo
            document.getElementById('real-count').innerText = users.length;
            world.pointsData(users);
            world.htmlElementsData(users);
        });
    }

    // Função de GPS REAL (Para não depender do IP do provedor)
    document.getElementById('geo-btn').onclick = () => {
        navigator.geolocation.getCurrentPosition(pos => {
            const update = {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                city: "Localização GPS"
            };
            mySessionRef.update(update);
            document.getElementById('my-loc').innerText = "GPS ATIVO";
        }, (err) => alert("Por favor, autorize o GPS no seu navegador para calibrar o ponto."));
    };

    window.addEventListener('resize', () => { world.width(window.innerWidth); world.height(window.innerHeight); });
    window.onload = initRealTime;
</script>
</body>
</html>
