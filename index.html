<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR - PRECISE v60</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; transition: background 1s; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 25px; left: 25px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); border: 2px solid #39ff14;
            padding: 20px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 35px #39ff1466; border-radius: 4px;
        }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 4px 10px; border-radius: 2px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            white-space: nowrap; border: 1px solid #fff; box-shadow: 0 0 10px #39ff14;
        }
        .d-rau { 
            width: 12px; height: 12px; background: #fff; border-radius: 50%; 
            margin-top: 5px; border: 2px solid #39ff14; 
            animation: p 0.8s infinite alternate; 
        }
        @keyframes p { from { transform: scale(1); opacity: 1; } to { transform: scale(3.5); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 5px;">RAU SYSTEM</div>
    <div id="status" style="font-size: 14px; color: #fff; margin-top: 10px; font-family: monospace;">A RASTREAR...</div>
</div>

<div id="globeViz"></div>

<script>
    // 1. CONFIGURAÇÃO DE DIA/NOITE PERANTE A HORA (13:10 = DIA)
    const hora = new Date().getHours();
    const eDia = hora >= 7 && hora < 19;
    const corFundo = eDia ? '#87CEEB' : '#000000';
    const imgTerra = eDia 
        ? '//unpkg.com/three-globe/example/img/earth-blue-marble.jpg' 
        : '//unpkg.com/three-globe/example/img/earth-night.jpg';
    
    document.body.style.background = corFundo;

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl(imgTerra)
        .backgroundColor(corFundo)
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            // Converte o código do país em bandeira emoji
            const flag = String.fromCodePoint(...[...d.countryCode.toUpperCase()].map(c => c.charCodeAt() + 127397));
            el.innerHTML = `<div class="l-rau"><span>${flag} ${d.city.toUpperCase()}</span></div><div class="d-rau"></div>`;
            return el;
        });

    async function init() {
        try {
            // USANDO O MOTOR DO TEU GLOBE2 (ip-api.com) - O MAIS PRECISO
            const res = await fetch('http://ip-api.com/json/');
            const d = await res.json();

            document.getElementById('status').innerText = `FIXADO: ${d.city.toUpperCase()}`;

            // Mapeia os dados para o formato que o Globo espera
            const dataPoint = {
                lat: d.lat,
                lng: d.lon,
                city: d.city,
                countryCode: d.countryCode
            };

            world.htmlElementsData([dataPoint]);
            world.pointOfView({ lat: d.lat, lng: d.lon, altitude: 1.8 }, 2000);

        } catch (e) {
            // Se o HTTP falhar (por ser inseguro), tentamos a ipapi.co como backup
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            const dataPoint = { lat: d.latitude, lng: d.longitude, city: d.city, countryCode: d.country_code };
            world.htmlElementsData([dataPoint]);
            world.pointOfView({ lat: d.latitude, lng: d.longitude, altitude: 1.8 }, 2000);
        }
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    window.onload = init;
</script>
</body>
</html>
