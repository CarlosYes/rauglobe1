<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v216.0 - LIVE NETWORK</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
        }
        .monitor-display { background: #000; border: 1px solid #1a1a1a; padding: 10px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; text-transform: uppercase; }
        #visitor-tag {
            position: absolute; display: none; align-items: center; gap: 8px;
            background: rgba(0, 0, 0, 0.9); border: 1px solid #39ff14;
            padding: 5px 12px; color: #fff; font-size: 11px; font-weight: bold;
            z-index: 500; transform: translate(-50%, -150%);
        }
        .flag-icon { width: 18px; height: 12px; border: 1px solid #333; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; outline: none; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div style="margin-bottom: 8px; font-size: 10px; font-weight: bold; letter-spacing: 2px;">RAU CORE v216.0 // LIVE</div>
    <div class="monitor-display">
        <span id="mon-city">CONECTANDO...</span>
        <div id="mon-status" style="font-size: 9px; opacity: 0.7; margin-top: 4px;">Rede: Sincronizando</div>
        <div id="mon-listeners" style="font-size: 10px; color: #39ff14; margin-top: 6px; font-weight: bold;">OUVINTES: 0</div>
    </div>
</div>

<div id="visitor-tag">
    <img id="tag-flag" src="" class="flag-icon">
    <span id="tag-city">VOCÊ</span>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
  authDomain: "radiodosamigosunidos-aadda.firebaseapp.com",
  databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "radiodosamigosunidos-aadda",
  storageBucket: "radiodosamigosunidos-aadda.firebasestorage.app",
  messagingSenderId: "451945612071",
  appId: "1:451945612071:web:383c551ca22744f6845f02"
};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const listenersRef = db.ref('listeners');

    const RAU = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000),
        renderer: new THREE.WebGLRenderer({ antialias: true, alpha: true }),
        controls: null, globe: null, markers: new THREE.Group(),
        myId: null,

        init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(this.renderer.domElement);

            this.scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(5, 3, 5);
            this.scene.add(sun);

            this.stars();

            const geo = new THREE.SphereGeometry(1, 64, 64);
            const mat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 5 });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            this.globe.add(this.markers);

            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.autoRotate = true;
            this.camera.position.z = 3.5;

            this.loadTexture();
            this.connectLive();
            this.animate();
        },

        stars() {
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for (let i = 0; i < 2000; i++) {
                pos.push((Math.random() - 0.5) * 1200, (Math.random() - 0.5) * 1200, (Math.random() - 0.5) * 1200);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            this.scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x444444, size: 0.8 })));
        },

        loadTexture() {
            new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.needsUpdate = true;
            });
        },

        getCoords(lat, lng) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.01);
        },

        async connectLive() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                
                // 1. Criar ID único para esta sessão
                const userRef = listenersRef.push();
                this.myId = userRef.key;

                // 2. Registrar no banco e remover ao sair (onDisconnect)
                userRef.set({
                    lat: data.latitude,
                    lng: data.longitude,
                    city: data.city,
                    country: data.country_code.toLowerCase(),
                    timestamp: Date.now()
                });
                userRef.onDisconnect().remove();

                document.getElementById('mon-city').innerText = data.city.toUpperCase();
                document.getElementById('mon-status').innerText = "Online como: " + data.ip;

                // 3. Ouvir mudanças em tempo real no banco
                listenersRef.on('value', (snapshot) => {
                    this.updateNetwork(snapshot.val());
                });

            } catch (e) { console.error("Falha no Uplink."); }
        },

        updateNetwork(allListeners) {
            this.markers.clear();
            if (!allListeners) return;

            const entries = Object.entries(allListeners);
            document.getElementById('mon-listeners').innerText = `OUVINTES: ${entries.length}`;

            entries.forEach(([id, info]) => {
                const pos = this.getCoords(info.lat, info.lng);
                const isMe = id === this.myId;

                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(isMe ? 0.02 : 0.012, 12, 12),
                    new THREE.MeshBasicMaterial({ color: isMe ? 0x39ff14 : 0x00ffff })
                );
                dot.position.copy(pos);
                this.markers.add(dot);

                if (isMe) {
                    this.activeNode = { mesh: dot, city: info.city, country: info.country };
                    document.getElementById('tag-flag').src = `https://flagcdn.com/w40/${info.country}.png`;
                    document.getElementById('visitor-tag').style.display = 'flex';
                }
            });
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update();
            if (this.activeNode) {
                const v = new THREE.Vector3();
                this.activeNode.mesh.getWorldPosition(v);
                v.project(this.camera);
                const tag = document.getElementById('visitor-tag');
                tag.style.left = `${(v.x * 0.5 + 0.5) * window.innerWidth}px`;
                tag.style.top = `${(v.y * -0.5 + 0.5) * window.innerHeight}px`;
                tag.style.opacity = v.z > 1 ? "0" : "1";
            }
            this.renderer.render(this.scene, this.camera);
        }
    };
    window.onload = () => RAU.init();
</script>
</body>
</html>
