<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - APEX v11.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #rau-v11 {
            position: absolute; top: 40px; left: 40px; z-index: 1000;
            background: rgba(0, 15, 0, 0.95); color: #39ff14; padding: 25px;
            border: 2px solid #39ff14; box-shadow: 0 0 40px rgba(57, 255, 20, 0.2);
            pointer-events: none; border-radius: 2px;
        }
        .header { font-weight: 900; letter-spacing: 4px; border-bottom: 1px solid #39ff14; padding-bottom: 5px; }
        .stats { margin-top: 15px; font-size: 0.9em; color: #fff; }
        .live-dot { color: #ff0000; animation: blink 0.5s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        canvas { cursor: move; }
    </style>
</head>
<body>

<div id="rau-v11">
    <div class="header">RAU APEX v11.0</div>
    <div class="stats">
        <span class="live-dot">●</span> LINK: <span id="node-city">SINCRO...</span><br>
        OUVINTES ATIVOS: <span id="count" style="font-size: 1.5em; color: #39ff14;">0</span>
    </div>
</div>

<script>
    // 1. FIREBASE CORE BLINDADO
    const _k = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
    const cfg = { apiKey: atob(_k[0]), authDomain: atob(_k[1]), projectId: atob(_k[2]), appId: atob(_k[3]) };
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    const db = firebase.firestore();
    const sessionKey = "APEX_" + Math.random().toString(36).substr(2, 6);

    // 2. ENGINE DE ALTA PERFORMANCE
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const world = new THREE.Group(); 
    scene.add(world);

    const earth = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshPhongMaterial({
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 12
        })
    );
    world.add(earth);
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    camera.position.z = 3.6;

    // 3. CACHE DE MEMÓRIA VIVA (Sincronização Atómica)
    const markerPool = new Map();

    function sync(data) {
        const ids = new Set(data.map(d => d.id));

        data.forEach(u => {
            if (!markerPool.has(u.id)) {
                const phi = (90 - u.lat) * (Math.PI / 180);
                const theta = (u.lng + 180) * (Math.PI / 180);
                const pos = new THREE.Vector3().setFromSphericalCoords(1.02, phi, theta);

                const group = new THREE.Group();
                const dot = new THREE.Mesh(new THREE.SphereGeometry(0.015, 12, 12), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
                dot.position.copy(pos);
                group.add(dot);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 300; canvas.height = 100;
                ctx.fillStyle = 'rgba(0,30,0,0.9)'; ctx.fillRect(0,0,300,100);
                ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 4; ctx.strokeRect(0,0,300,100);
                ctx.font = 'bold 32px Courier New'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                ctx.fillText(u.city.toUpperCase(), 150, 60);

                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), depthTest: true }));
                sprite.position.copy(pos.clone().multiplyScalar(1.15));
                sprite.scale.set(0.5, 0.15, 1);
                group.add(sprite);

                world.add(group);
                markerPool.set(u.id, group);
            }
        });

        markerPool.forEach((obj, id) => {
            if (!ids.has(id)) {
                world.remove(obj);
                markerPool.delete(id);
            }
        });
    }

    // 4. FISICA DE ROTAÇÃO (Prioridade Zero-Lag)
    let isDrag = false, lastX, lastY;
    document.addEventListener('mousedown', (e) => { isDrag = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', () => isDrag = false);
    window.addEventListener('mousemove', (e) => {
        if (isDrag) {
            world.rotation.y += (e.clientX - lastX) * 0.006;
            world.rotation.x += (e.clientY - lastY) * 0.006;
            lastX = e.clientX; lastY = e.clientY;
        }
    });

    // 5. UPLINK CRÍTICO
    async function powerUp() {
        const ip = await fetch("https://ipinfo.io/json?token=e392744f6845f0").then(r => r.json());
        document.getElementById('node-city').innerText = ip.city.toUpperCase();
        const [lat, lng] = ip.loc.split(',').map(Number);

        const up = () => db.collection('RAU_APEX').doc(sessionKey).set({ lat, lng, city: ip.city, ts: firebase.firestore.FieldValue.serverTimestamp() });
        up(); setInterval(up, 25000);

        db.collection('RAU_APEX').where('ts', '>', new Date(Date.now() - 60000)).onSnapshot(snap => {
            const list = [];
            snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
            sync(list);
            document.getElementById('count').innerText = snap.size;
        });
    }

    function render() {
        requestAnimationFrame(render);
        if (!isDrag) world.rotation.y += 0.0015;
        renderer.render(scene, camera);
    }

    powerUp(); render();
</script>
</body>
</html>
