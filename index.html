<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - GLOBO INTERATIVO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.8); color: #fff; padding: 12px;
            border: 1px solid #39ff14; border-radius: 5px; pointer-events: none;
        }

        /* Marcador Verde Neon */
        .dot {
            position: absolute; width: 10px; height: 10px; background: #39ff14;
            border-radius: 50%; box-shadow: 0 0 15px #39ff14, 0 0 30px #39ff14;
            z-index: 19; transform: translate(-50%, -50%);
        }

        .label {
            position: absolute; color: #39ff14; font-size: 12px; font-weight: bold;
            background: rgba(0, 0, 0, 0.8); padding: 2px 8px; border-radius: 4px;
            border: 1px solid #39ff14; pointer-events: none; white-space: nowrap;
            z-index: 20; transform: translate(12px, -12px); text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="hud">
        <b style="color: #39ff14;">RADIO AMIGOS UNIDOS</b><br>
        <span style="font-size: 11px;">OUVINTES ONLINE:</span> <span id="user-count">1</span>
    </div>

    <div id="canvas-container"></div>

    <script>
        // Configuração Firebase
        const _k = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
        const config = { apiKey: atob(_k[0]), authDomain: atob(_k[1]), projectId: atob(_k[2]), appId: atob(_k[3]) };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        const myId = "RAU_" + Math.random().toString(36).substr(2, 7);

        // --- CENA 3D ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Globo Realista
        const loader = new THREE.TextureLoader();
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        const earth = new THREE.Mesh(
            new THREE.SphereGeometry(1, 64, 64),
            new THREE.MeshPhongMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'),
                specularMap: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg'),
                shininess: 8
            })
        );
        earthGroup.add(earth);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0x555555));
        camera.position.z = 3;

        // --- INTERATIVIDADE (RATO) ---
        let isDragging = false;
        let mouseX = 0, mouseY = 0;

        document.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                earthGroup.rotation.y += e.movementX * 0.005;
                earthGroup.rotation.x += e.movementY * 0.005;
            }
        });

        // --- GESTÃO DE MARCADORES ---
        let markers = [];
        function addMarker(lat, lng, city) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            const anchor = new THREE.Object3D();
            anchor.position.set(-Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
            earthGroup.add(anchor);

            const dot = document.createElement('div'); dot.className = 'dot';
            const label = document.createElement('div'); label.className = 'label';
            label.innerText = city;

            document.body.appendChild(dot);
            document.body.appendChild(label);
            markers.push({ anchor, dot, label });
        }

        async function init() {
            try {
                const res = await fetch("https://ipapi.co/json/");
                const data = await res.json();
                
                const update = () => db.collection('rau_final').doc(myId).set({
                    lat: data.latitude, lng: data.longitude, city: data.city,
                    ts: firebase.firestore.FieldValue.serverTimestamp()
                });
                update(); setInterval(update, 25000);

                db.collection('rau_final').where('ts', '>', new Date(Date.now() - 50000)).onSnapshot(snap => {
                    markers.forEach(m => { m.dot.remove(); m.label.remove(); });
                    markers = [];
                    // Limpar âncoras antigas do grupo
                    for(let i = earthGroup.children.length - 1; i >= 0; i--) {
                        if (earthGroup.children[i].type === "Object3D") earthGroup.remove(earthGroup.children[i]);
                    }
                    snap.forEach(doc => {
                        const d = doc.data();
                        addMarker(d.lat, d.lng, d.city);
                    });
                    document.getElementById('user-count').innerText = snap.size;
                });
            } catch(e) { console.error("Erro GPS"); }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isDragging) earthGroup.rotation.y += 0.0015;

            markers.forEach(m => {
                const vec = new THREE.Vector3();
                m.anchor.getWorldPosition(vec);
                const dist = camera.position.distanceTo(vec);
                vec.project(camera);

                if (dist < 3 && vec.z < 1) {
                    m.dot.style.display = m.label.style.display = 'block';
                    m.dot.style.left = (vec.x * 0.5 + 0.5) * window.innerWidth + 'px';
                    m.dot.style.top = (-vec.y * 0.5 + 0.5) * window.innerHeight + 'px';
                    m.label.style.left = m.dot.style.left;
                    m.label.style.top = m.dot.style.top;
                } else {
                    m.dot.style.display = m.label.style.display = 'none';
                }
            });
            renderer.render(scene, camera);
        }

        init(); animate();
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
