<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v203</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.95); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none;
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.95); padding: 4px 10px; border-radius: 3px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            border: 1px solid #39ff14; color: #39ff14; white-space: nowrap;
        }
        .d-rau { width: 8px; height: 8px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 15px #39ff14; animation: p 1.2s infinite; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status" style="font-size: 10px; margin-top: 10px; font-family: monospace; color: #ff3131;">SINAL: RASTREANDO VIA IMAGEM...</div>
</div>

<div id="globeViz"></div>

<script>
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            el.innerHTML = `<div class="l-rau"><span>SINAL ATIVO</span></div><div class="d-rau"></div>`;
            return el;
        });

    // Função disparada quando a "imagem" de dados responde
    window.finalSignal = function(data) {
        if (data && data.latitude) {
            const p = {
                lat: parseFloat(data.latitude),
                lng: parseFloat(data.longitude),
                city: (data.city || "LOCAL").toUpperCase()
            };

            document.getElementById('onlineCount').innerText = "1";
            document.getElementById('status').innerText = `SINAL: ${p.city}`;
            document.getElementById('status').style.color = "#39ff14";

            world.htmlElementsData([p]);
            world.pointOfView({ lat: p.lat, lng: p.lng, altitude: 2.0 }, 2000);
        }
    };

    function startPixel() {
        // Usamos injeção de script disfarçado de recurso (Método JSONP)
        // É a forma que o FlagCounter usa para carregar dados sem que o browser bloqueie
        const imgScript = document.createElement('script');
        imgScript.src = 'https://ipapi.co/jsonp/?callback=finalSignal';
        
        imgScript.onerror = () => {
            // Backup instantâneo via Geoplugin se o primeiro falhar
            const backup = document.createElement('script');
            backup.src = 'https://www.geoplugin.net/javascript.gp?callback=finalSignalGP';
            document.body.appendChild(backup);
        };

        document.body.appendChild(imgScript);
    }

    // Adaptador para o motor secundário
    window.finalSignalGP = function(d) {
        window.finalSignal({
            latitude: d.geoplugin_latitude,
            longitude: d.geoplugin_longitude,
            city: d.geoplugin_city
        });
    };

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    window.onload = startPixel;
</script>
</body>
</html>
