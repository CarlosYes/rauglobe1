<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - BLACK OPS v8.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #rau-interface {
            position: absolute; top: 30px; left: 30px; z-index: 99;
            background: rgba(0, 15, 0, 0.95); color: #39ff14; padding: 25px;
            border-left: 4px solid #39ff14; pointer-events: none;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }
        .pulse { color: #ff0000; animation: p 1.5s infinite; }
        @keyframes p { 50% { opacity: 0.1; } }
        canvas { cursor: move; }
    </style>
</head>
<body>

<div id="rau-interface">
    <div style="letter-spacing: 3px; font-weight: bold;">RAU COMMAND v8.0</div>
    <div style="font-size: 0.8em; margin-top: 5px;">
        <span class="pulse">●</span> LINK ATIVO: <span id="city" style="color:#fff">---</span><br>
        UNIDADES: <span id="count" style="font-size: 1.6em; color:#fff; font-weight: 900;">0</span>
    </div>
</div>

<script>
    // 1. CORE CONFIG
    const _v = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
    const config = { apiKey: atob(_v[0]), authDomain: atob(_v[1]), projectId: atob(_v[2]), appId: atob(_v[3]) };
    firebase.initializeApp(config);
    const db = firebase.firestore();
    const myId = "OP_" + Math.random().toString(36).substr(2, 4);

    // 2. SCENE SETUP (Engine Ultra)
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const worldGroup = new THREE.Group();
    scene.add(worldGroup);

    const earth = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshPhongMaterial({
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 15
        })
    );
    worldGroup.add(earth);
    scene.add(new THREE.AmbientLight(0xffffff, 0.85));
    camera.position.z = 3.5;

    // 3. SISTEMA DE RECICLAGEM (O Segredo do v8.0)
    const unitPool = new Map();

    function updateUnits(dataArray) {
        const activeIds = new Set(dataArray.map(d => d.id));

        // Adicionar ou Manter
        dataArray.forEach(data => {
            if (!unitPool.has(data.id)) {
                const phi = (90 - data.lat) * (Math.PI / 180);
                const theta = (data.lng + 180) * (Math.PI / 180);
                const pos = new THREE.Vector3().setFromSphericalCoords(1.02, phi, theta);

                const group = new THREE.Group();
                const dot = new THREE.Mesh(new THREE.SphereGeometry(0.015, 8, 8), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
                dot.position.copy(pos);
                group.add(dot);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 256; canvas.height = 64;
                ctx.fillStyle = 'rgba(0,20,0,0.8)'; ctx.fillRect(0,0,256,64);
                ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 4; ctx.strokeRect(0,0,256,64);
                ctx.font = 'bold 24px monospace'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                ctx.fillText(data.city.toUpperCase(), 128, 40);

                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), depthTest: true }));
                sprite.position.copy(pos.clone().multiplyScalar(1.1));
                sprite.scale.set(0.4, 0.1, 1);
                group.add(sprite);

                worldGroup.add(group);
                unitPool.set(data.id, group);
            }
        });

        // Remover apenas quem saiu de cena
        unitPool.forEach((obj, id) => {
            if (!activeIds.has(id)) {
                worldGroup.remove(obj);
                unitPool.delete(id);
            }
        });
    }

    // 4. INTERATIVIDADE INERCIAL
    let dragging = false, lastM = { x: 0, y: 0 };
    document.addEventListener('mousedown', (e) => { dragging = true; lastM = { x: e.clientX, y: e.clientY }; });
    window.addEventListener('mouseup', () => dragging = false);
    window.addEventListener('mousemove', (e) => {
        if (dragging) {
            worldGroup.rotation.y += (e.clientX - lastM.x) * 0.007;
            worldGroup.rotation.x += (e.clientY - lastM.y) * 0.007;
            lastM = { x: e.clientX, y: e.clientY };
        }
    });

    // 5. UPLINK REAL-TIME
    async function start() {
        const ip = await fetch("https://ipinfo.io/json?token=e392744f6845f0").then(r => r.json());
        document.getElementById('city').innerText = ip.city.toUpperCase();
        const [lat, lng] = ip.loc.split(',').map(Number);

        const up = () => db.collection('RAU_V8').doc(myId).set({ lat, lng, city: ip.city, ts: firebase.firestore.FieldValue.serverTimestamp() });
        up(); setInterval(up, 25000);

        db.collection('RAU_V8').where('ts', '>', new Date(Date.now() - 60000)).onSnapshot(snap => {
            const list = [];
            snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
            updateUnits(list);
            document.getElementById('count').innerText = snap.size;
        });
    }

    function loop() {
        requestAnimationFrame(loop);
        if (!dragging) worldGroup.rotation.y += 0.0015;
        renderer.render(scene, camera);
    }

    start(); loop();
</script>
</body>
</html>
