<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v205</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.9); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none;
            backdrop-filter: blur(4px);
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        
        /* Marcador Customizado */
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.9); padding: 5px 10px; border-radius: 4px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 8px;
            border: 1px solid #39ff14; color: #39ff14; white-space: nowrap;
            transform: translateY(-10px);
        }
        .flag { width: 16px; height: 11px; border-radius: 1px; object-fit: cover; }
        .d-rau { width: 10px; height: 10px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 15px #39ff14; animation: p 1.5s infinite; }
        
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status" style="font-size: 10px; margin-top: 10px; font-family: monospace; color: #ff3131;">SINAL: BUSCANDO SATÉLITE...</div>
</div>

<div id="globeViz"></div>

<script>
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.countryCode ? `<img src="https://flagcdn.com/w40/${d.countryCode.toLowerCase()}.png" class="flag">` : '';
            el.innerHTML = `<div class="l-rau">${flag} <span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    // Função Unificada de Renderização
    window.renderSignal = function(data) {
        if (!data || (!data.latitude && !data.lat)) return;
        
        const lat = data.latitude || data.lat || data.geoplugin_latitude;
        const lng = data.longitude || data.lon || data.geoplugin_longitude;
        const city = (data.city || data.geoplugin_city || "DESCONHECIDO").toUpperCase();
        const country = data.country_code || data.countryCode || data.geoplugin_countryCode || "";

        const point = { lat: parseFloat(lat), lng: parseFloat(lng), city: city, countryCode: country };

        document.getElementById('onlineCount').innerText = "1";
        document.getElementById('status').innerText = `SINAL: ${city} [${country}]`;
        document.getElementById('status').style.color = "#39ff14";

        world.htmlElementsData([point]);
        world.pointOfView({ lat: point.lat, lng: point.lng, altitude: 2 }, 2000);
        world.controls().autoRotate = false;
    };

    // Adaptadores para diferentes APIs
    window.finalSignal = (d) => window.renderSignal(d);
    window.finalSignalGP = (d) => window.renderSignal(d);

    async function startTracking() {
        // TENTATIVA 1: IPAPI (JSONP)
        const s1 = document.createElement('script');
        s1.src = 'https://ipapi.co/jsonp/?callback=finalSignal';
        document.body.appendChild(s1);

        // TENTATIVA 2: Backup após 2 segundos se o contador ainda for 0
        setTimeout(async () => {
            if (document.getElementById('onlineCount').innerText === "0") {
                console.log("Tentando Backup 1...");
                const s2 = document.createElement('script');
                s2.src = 'https://www.geoplugin.net/javascript.gp?callback=finalSignalGP';
                document.body.appendChild(s2);
            }
        }, 2000);

        // TENTATIVA 3: Backup via IP-API (Fetch)
        setTimeout(async () => {
            if (document.getElementById('onlineCount').innerText === "0") {
                console.log("Tentando Backup 2...");
                try {
                    const response = await fetch('https://ip-api.com/json/');
                    const data = await response.json();
                    window.renderSignal(data);
                } catch (e) {
                    document.getElementById('status').innerText = "ERRO: LIMITE DE REQUISIÇÕES EXCEDIDO";
                }
            }
        }, 4000);
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    window.onload = startTracking;
</script>
</body>
</html>
