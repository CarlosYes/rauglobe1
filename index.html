<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v19 - SECURE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 20, 0, 0.85); border-left: 3px solid #39ff14;
            padding: 15px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 15px rgba(57,255,20,0.2);
        }
        .count { font-size: 50px; font-weight: 900; color: #fff; line-height: 1; }
        .label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }

        /* Marcador Visual */
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 2px 8px; border-radius: 2px;
            font-size: 10px; font-weight: bold; display: flex; align-items: center; gap: 5px;
            white-space: nowrap;
        }
        .l-rau img { width: 14px; height: 10px; object-fit: cover; }
        .d-rau { 
            width: 8px; height: 8px; background: #fff; border-radius: 50%; 
            margin-top: 3px; border: 1.5px solid #39ff14; animation: pulse 1.5s infinite; 
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="hud">
    <div class="label">RAU RADAR v19</div>
    <div id="count" class="count">0</div>
    <div id="status" class="label" style="color:#fff; opacity:0.6;">A CONECTAR...</div>
</div>

<div id="globeViz"></div>

<script>
    // Chave Ably e ID único
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const CLIENT_ID = 'U' + Math.random().toString(36).substr(2, 5);

    // Inicialização do Globo
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.country ? `<img src="https://flagcdn.com/w20/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    async function start() {
        let myData = { id: CLIENT_ID, lat: 0, lng: 0, city: 'ONLINE', country: 'PT' };

        try {
            // Tenta a API mais rápida do mundo (Cloudflare) para evitar erro de rede
            const trace = await fetch('https://www.cloudflare.com/cdn-cgi/trace').then(r => r.text());
            const ip = trace.split('\n').find(l => l.startsWith('ip=')).split('=')[1];
            
            // Agora usa o IP para pegar a localização (Sem limites de quota severos)
            const geo = await fetch(`https://ipwho.is/${ip}`).then(r => r.json());
            
            myData.lat = geo.latitude;
            myData.lng = geo.longitude;
            myData.city = geo.city.toUpperCase();
            myData.country = geo.country_code;

        } catch (e) {
            console.log("Usando localização padrão via IP-API...");
            try {
                const geoBackup = await fetch('https://ipapi.co/json/').then(r => r.json());
                myData.lat = geoBackup.latitude;
                myData.lng = geoBackup.longitude;
                myData.city = geoBackup.city.toUpperCase();
                myData.country = geoBackup.country_code;
            } catch(e2) {
                document.getElementById('status').innerText = "MODO OFFLINE (GEO)";
            }
        }

        // Conexão Ably
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: CLIENT_ID });
        const channel = ably.channels.get('rau-live-radar');
        let visitors = new Map();

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `RADAR ON: ${myData.city}`;
            channel.presence.enter(myData);

            // Escuta quem entra
            channel.presence.subscribe(['enter', 'present', 'update'], m => {
                visitors.set(m.clientId, m.data);
                refresh();
            });

            // Escuta quem sai
            channel.presence.subscribe('leave', m => {
                visitors.delete(m.clientId);
                refresh();
            });

            // Carrega quem já está lá
            channel.presence.get((err, members) => {
                if(!err) members.forEach(m => visitors.set(m.clientId, m.data));
                refresh();
            });
        });

        function refresh() {
            const arr = Array.from(visitors.values());
            document.getElementById('count').innerText = arr.length;
            world.htmlElementsData(arr);
        }

        world.pointOfView({ lat: myData.lat, lng: myData.lng, altitude: 2.5 }, 2000);
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    window.onload = start;
</script>
</body>
</html>
