<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v176.0 - ATMOS RECOVERY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; user-select: none; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.85); border-left: 3px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
            backdrop-filter: blur(5px);
        }
        .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        #led { width: 10px; height: 10px; border-radius: 50%; background: #39ff14; box-shadow: 0 0 10px #39ff14; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .monitor-display { background: rgba(5, 5, 5, 0.5); border: 1px solid #1a1a1a; padding: 12px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; }
        #mon-flag-ui { height: 18px; margin-right: 8px; vertical-align: middle; display: none; }
        #mon-status { font-size: 10px; color: #39ff14; opacity: 0.7; margin-top: 8px; border-top: 1px solid #1a1a1a; padding-top: 8px; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="rau-ui">
    <div class="status-row">
        <div id="led"></div>
        <span style="font-size: 11px; letter-spacing: 1px;">CORE v176.0 | ATMOS-SYNC</span>
    </div>
    <div class="monitor-display">
        <div style="display: flex; align-items: center;">
            <img id="mon-flag-ui" src="">
            <span id="mon-city">SYNCING...</span>
        </div>
        <div id="mon-status">Iniciando sensores ambientais...</div>
    </div>
</div>

<script>
    const RAU_SYSTEM = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000),
        renderer: new THREE.WebGLRenderer({ antialias: true }),
        controls: null, globe: null, markers: new THREE.Group(), 
        stars: null, currentIP: null, isNight: false,

        init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(this.renderer.domElement);

            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.enableDamping = true;
            this.controls.autoRotate = true;
            this.controls.autoRotateSpeed = 0.4;
            this.camera.position.z = 3.5;

            // 1. Globo
            const geo = new THREE.SphereGeometry(1, 64, 64);
            const mat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 15 });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            this.scene.add(this.markers);

            // 2. Iluminação Base
            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            this.scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 3, 5);
            this.scene.add(sun);

            // 3. Texturas do Globo
            new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.needsUpdate = true;
            });

            this.updateEnvironment(); 
            this.animate();
            this.checkNetwork();
            setInterval(() => this.checkNetwork(), 10000);
        },

        updateEnvironment() {
            const hour = new Date().getHours();
            this.isNight = (hour < 6 || hour > 18);

            if (this.isNight) {
                // Modo Noite: Espaço com Estrelas
                this.scene.background = new THREE.Color(0x000005);
                this.createStars();
                document.getElementById('mon-status').innerText = "ATMOS: NIGHT MODE // STARS ACTIVE";
            } else {
                // Modo Dia: Céu Atmosférico
                if (this.stars) this.scene.remove(this.stars);
                this.scene.background = new THREE.Color(0x87CEEB); // Azul céu
                // Gradiente para horizonte
                this.scene.fog = new THREE.FogExp2(0x87CEEB, 0.15);
                document.getElementById('mon-status').innerText = "ATMOS: DAY MODE // CLEAR SKY";
            }
        },

        createStars() {
            if (this.stars) return;
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for (let i = 0; i < 5000; i++) {
                starCoords.push((Math.random() - 0.5) * 1000, (Math.random() - 0.5) * 1000, (Math.random() - 0.5) * 1000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 });
            this.stars = new THREE.Points(starGeo, starMat);
            this.scene.add(this.stars);
        },

        async checkNetwork() {
            try {
                const res = await fetch(`https://ipapi.co/json/`);
                const data = await res.json();
                if (data.ip !== this.currentIP) {
                    this.currentIP = data.ip;
                    this.deployMarkers(data);
                    this.updateEnvironment(); // Re-checar ambiente ao conectar
                }
            } catch (e) { 
                console.log("Sensor lag..."); 
            }
        },

        deployMarkers(data) {
            const { latitude: lat, longitude: lon, city, country_code: iso } = data;
            const cityUpper = (city || "DETECTED").toUpperCase();
            const isoLower = iso.toLowerCase();

            document.getElementById('mon-city').innerText = cityUpper;
            const flagUi = document.getElementById('mon-flag-ui');
            flagUi.src = `https://flagcdn.com/w80/${isoLower}.png`;
            flagUi.style.display = 'inline-block';

            this.markers.clear();
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.02);

            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.02, 12, 12), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
            dot.position.copy(pos);
            this.markers.add(dot);

            // Nome da Cidade
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.fillStyle = '#39ff14'; ctx.font = 'bold 48px Courier New';
            ctx.textAlign = 'center'; ctx.fillText(cityUpper, 256, 80);
            const label = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            label.position.copy(pos.clone().multiplyScalar(1.25));
            label.scale.set(0.6, 0.15, 1);
            this.markers.add(label);
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update();
            this.renderer.render(this.scene, this.camera);
        }
    };

    window.onload = () => RAU_SYSTEM.init();
    window.onresize = () => {
        RAU_SYSTEM.camera.aspect = window.innerWidth / window.innerHeight;
        RAU_SYSTEM.camera.updateProjectionMatrix();
        RAU_SYSTEM.renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
