<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - OVERDRIVE v9.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #rau-v9 {
            position: absolute; top: 30px; left: 30px; z-index: 100;
            background: rgba(0, 10, 0, 0.9); color: #39ff14; padding: 25px;
            border-left: 5px solid #39ff14; pointer-events: none;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.2);
        }
        .ping { color: #ff0000; animation: blink 0.8s infinite; font-size: 0.8em; }
        @keyframes blink { 50% { opacity: 0.1; } }
        canvas { cursor: crosshair; }
    </style>
</head>
<body>

<div id="rau-v9">
    <div style="font-weight: 900; letter-spacing: 4px;">RAU COMMAND CENTER v9.0</div>
    <div style="margin-top: 10px; opacity: 0.9;">
        <span class="ping">●</span> UPLINK: <span id="loc" style="color:#fff">SINCRO...</span><br>
        UNIDADES EM ESCUTA: <span id="count" style="font-size: 1.8em; color:#fff; font-weight: 900;">0</span>
    </div>
</div>

<script>
    // 1. DATA CORE
    const _k = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
    const cfg = { apiKey: atob(_k[0]), authDomain: atob(_k[1]), projectId: atob(_k[2]), appId: atob(_k[3]) };
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    const db = firebase.firestore();
    const myID = "X_" + Math.random().toString(36).substr(2, 4);

    // 2. GPU ENGINE
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const world = new THREE.Group(); 
    scene.add(world);

    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshPhongMaterial({
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 12
        })
    );
    world.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    camera.position.z = 3.5;

    // 3. CACHE DE ALTA VELOCIDADE
    const markerStore = new Map();

    function updateRadar(units) {
        const liveIds = new Set(units.map(u => u.id));

        units.forEach(u => {
            if (!markerStore.has(u.id)) {
                const phi = (90 - u.lat) * (Math.PI / 180);
                const theta = (u.lng + 180) * (Math.PI / 180);
                const pos = new THREE.Vector3().setFromSphericalCoords(1.02, phi, theta);

                const container = new THREE.Group();
                const dot = new THREE.Mesh(new THREE.SphereGeometry(0.015, 8, 8), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
                dot.position.copy(pos);
                container.add(dot);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 300; canvas.height = 80;
                ctx.fillStyle = 'rgba(0,15,0,0.85)'; ctx.fillRect(0,0,300,80);
                ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 4; ctx.strokeRect(0,0,300,80);
                ctx.font = 'bold 32px monospace'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                ctx.fillText(u.city.toUpperCase(), 150, 52);

                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), depthTest: true }));
                sprite.position.copy(pos.clone().multiplyScalar(1.15));
                sprite.scale.set(0.4, 0.1, 1);
                container.add(sprite);

                world.add(container);
                markerStore.set(u.id, container);
            }
        });

        markerStore.forEach((obj, id) => {
            if (!liveIds.has(id)) {
                world.remove(obj);
                markerStore.delete(id);
            }
        });
    }

    // 4. FISICA DE ROTAÇÃO (Zero Lag)
    let isDrag = false, lastM = { x: 0, y: 0 };
    document.addEventListener('mousedown', (e) => { isDrag = true; lastM = { x: e.clientX, y: e.clientY }; });
    window.addEventListener('mouseup', () => isDrag = false);
    window.addEventListener('mousemove', (e) => {
        if (isDrag) {
            world.rotation.y += (e.clientX - lastM.x) * 0.007;
            world.rotation.x += (e.clientY - lastM.y) * 0.007;
            lastM = { x: e.clientX, y: e.clientY };
        }
    });

    // 5. UPLINK MASTER
    async function powerUp() {
        const ip = await fetch("https://ipinfo.io/json?token=e392744f6845f0").then(r => r.json());
        document.getElementById('loc').innerText = ip.city.toUpperCase();
        const [lat, lng] = ip.loc.split(',').map(Number);

        const report = () => db.collection('RAU_V9').doc(myID).set({ lat, lng, city: ip.city, ts: firebase.firestore.FieldValue.serverTimestamp() });
        report(); setInterval(report, 25000);

        db.collection('RAU_V9').where('ts', '>', new Date(Date.now() - 60000)).onSnapshot(snap => {
            const batch = [];
            snap.forEach(doc => batch.push({ id: doc.id, ...doc.data() }));
            updateRadar(batch);
            document.getElementById('count').innerText = snap.size;
        });
    }

    function loop() {
        requestAnimationFrame(loop);
        if (!isDrag) world.rotation.y += 0.0018;
        renderer.render(scene, camera);
    }

    powerUp(); loop();
</script>
</body>
</html>
