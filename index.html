<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v52 - GHOST</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 25px; left: 25px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); border: 2px solid #39ff14;
            padding: 20px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.5); border-radius: 4px;
        }
        .count { font-size: 80px; font-weight: 900; color: #fff; line-height: 0.8; letter-spacing: -4px; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 5px 12px; border-radius: 2px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 8px;
            white-space: nowrap; border: 1px solid #fff;
        }
        .l-rau img { width: 20px; height: 13px; object-fit: cover; }
        .d-rau { width: 12px; height: 12px; background: #fff; border-radius: 50%; margin-top: 5px; border: 2px solid #39ff14; animation: p 0.8s infinite alternate; }
        @keyframes p { from { transform: scale(1); opacity: 1; } to { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 4px; opacity: 0.7;">RAU-RADAR-GHOST</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 11px; color: #fff; margin-top: 10px; font-family: monospace;">A FURAR BLOQUEIO...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'GHOST-' + Math.random().toString(36).substr(2, 8);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    // MÉTODO GHOST: Usa JSONP mas com um sistema de limpeza automática
    function ghostLoc() {
        return new Promise((resolve) => {
            const script = document.createElement('script');
            const cbName = 'rau_ghost_' + Math.floor(Math.random() * 1000);
            script.src = `https://ipwho.is/?callback=${cbName}&_=${Date.now()}`;
            
            window[cbName] = (d) => {
                if(d.success) {
                    resolve({
                        lat: d.latitude, lng: d.longitude,
                        city: d.city.toUpperCase(), country: d.country_code.toLowerCase()
                    });
                }
                delete window[cbName];
                document.body.removeChild(script);
            };
            
            document.body.appendChild(script);
            setTimeout(() => resolve(null), 7000);
        });
    }

    async function init() {
        const geo = await ghostLoc();
        
        if (!geo) {
            // Última esperança: API secundária sem callback se o navegador travar o JSONP
            try {
                const r = await fetch('https://ipapi.co/json/');
                const d = await r.json();
                connect({ lat: d.latitude, lng: d.longitude, city: d.city.toUpperCase(), country: d.country_code.toLowerCase() });
            } catch(e) {
                document.getElementById('status').innerText = "ERRO CRÍTICO: REDE PROTEGIDA";
            }
            return;
        }

        connect(geo);
    }

    function connect(geo) {
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('rau-live-radar');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `RADAR ON: ${geo.city}`;
            channel.presence.enter(geo);

            const update = () => {
                channel.presence.get((err, members) => {
                    if (!err) {
                        const nodes = members.map(m => m.data).filter(x => x && x.lat);
                        document.getElementById('count').innerText = nodes.length;
                        world.htmlElementsData(nodes);
                    }
                });
            };
            channel.presence.subscribe(['enter', 'leave', 'present', 'update'], update);
            update();
        });

        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.2 }, 2000);
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    window.onload = init;
</script>
</body>
</html>
