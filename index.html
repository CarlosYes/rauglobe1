<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU MONITOR v237.0 - REAL TIME</title>
    
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; background: #000; color: #39ff14; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        .interface {
            position: absolute; z-index: 100;
            background: rgb(7, 20, 45);
            border: 1px solid #39ff14;
            padding: 10px; border-radius: 4px;
        }
        #status-hud { top: 20px; left: 20px; width: 220px; border-left: 4px solid #39ff14; }
        
        /* Botão de Precisão Real */
        #geo-btn {
            bottom: 20px; left: 20px; background: #39ff14; color: #000;
            border: none; padding: 10px 15px; font-weight: bold; cursor: pointer;
            border-radius: 3px; pointer-events: auto;
        }
        #geo-btn:hover { background: #fff; }

        .label-style {
            background: rgba(0,0,0,0.8); border: 1px solid #39ff14;
            color: #39ff14; padding: 2px 6px; font-size: 11px;
            display: flex; align-items: center; gap: 5px; border-radius: 2px;
        }
    </style>
</head>
<body>

<div id="status-hud" class="interface">
    <div style="font-size: 9px; opacity: 0.7;">VERIFICAÇÃO DE PRESENÇA REAL</div>
    <div id="my-loc" style="font-size: 16px; font-weight: bold; color: #fff;">A VALIDAR...</div>
    <div style="font-size: 13px; margin-top:5px;">CONEXÕES ATIVAS: <span id="real-count" style="color:#39ff14">0</span></div>
</div>

<button id="geo-btn">CORRIGIR MINHA POSIÇÃO (GPS)</button>

<div id="globeViz"></div>

<script>
    const config = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        authDomain: "radiodosamigosunidos-aadda.firebaseapp.com",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda",
        storageBucket: "radiodosamigosunidos-aadda.firebasestorage.app",
        messagingSenderId: "451945612071",
        appId: "1:451945612071:web:383c551ca22744f6845f02"
    };

    firebase.initializeApp(config);
    const db = firebase.database();
    const presenceRef = db.ref('presence');

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .pointColor(() => '#39ff14')
        .pointRadius(0.8)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'label-style';
            el.innerHTML = `<img src="https://flagcdn.com/w20/${d.iso}.png" width="16"> ${d.city}`;
            return el;
        });

    let mySessionRef;

    async function initRealTime() {
        // Passo 1: Obter dados iniciais (IP)
        const res = await fetch('https://ipwho.is/');
        const d = await res.json();
        
        const myData = {
            lat: d.latitude,
            lng: d.longitude,
            city: d.city,
            iso: d.country_code.toLowerCase(),
            online: true
        };

        // Passo 2: Criar nó de presença que se auto-destrói
        mySessionRef = presenceRef.push();
        mySessionRef.set(myData);
        mySessionRef.onDisconnect().remove();

        document.getElementById('my-loc').innerText = d.city.toUpperCase();

        // Passo 3: Escutar a "Verdade" (Snapshot em tempo real)
        presenceRef.on('value', snap => {
            const val = snap.val() || {};
            const users = Object.values(val);
            document.getElementById('real-count').innerText = users.length;
            world.pointsData(users);
            world.htmlElementsData(users);
        });
    }

    // Função de GPS REAL (Para não depender do provedor de internet)
    document.getElementById('geo-btn').onclick = () => {
        navigator.geolocation.getCurrentPosition(pos => {
            const update = {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                city: "Localização GPS"
            };
            mySessionRef.update(update);
            document.getElementById('my-loc').innerText = "GPS ATIVO";
        });
    };

    window.onload = initRealTime;
</script>
</body>
</html>
