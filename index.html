<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - UNIVERSAL v14.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #rau-hud {
            position: absolute; top: 30px; left: 30px; z-index: 1000;
            background: rgba(0, 20, 0, 0.95); color: #39ff14; padding: 25px;
            border: 2px solid #39ff14; box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
            pointer-events: none; border-radius: 4px;
        }
        #system-log { 
            position: absolute; bottom: 20px; left: 20px; 
            color: #39ff14; font-size: 11px; opacity: 0.8; max-width: 300px;
        }
        .live { color: #ff0000; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.2; } }
        canvas { cursor: crosshair; }
    </style>
</head>
<body>

<div id="rau-hud">
    <b style="letter-spacing: 3px;">RAU COMMAND v14.0</b><br>
    <div style="margin-top: 10px; font-size: 0.9em;">
        <span class="live">●</span> RADAR: <span id="status" style="color:#fff">CONNECTING...</span><br>
        LOC: <span id="city" style="color:#fff">---</span><br>
        <hr style="border:0; border-top:1px solid #39ff14; margin:10px 0; opacity: 0.3;">
        UNIDADES: <span id="count" style="font-size: 1.6em; font-weight: 900; color:#fff">0</span>
    </div>
</div>

<div id="system-log">LOG: Iniciando sequência...</div>

<script>
    const log = (m) => { document.getElementById('system-log').innerText = "LOG: " + m; console.log(m); };

    // 1. FIREBASE CONFIG
    const _k = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
    const config = { apiKey: atob(_k[0]), authDomain: atob(_k[1]), projectId: atob(_k[2]), appId: atob(_k[3]) };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.firestore();
    const sessionID = "U_" + Math.random().toString(36).substr(2, 5);

    // 2. ENGINE 3D (Otimizada)
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const world = new THREE.Group(); 
    scene.add(world);

    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshPhongMaterial({
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 8
        })
    );
    world.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 1.1));
    camera.position.z = 3.5;

    // 3. CACHE DINÂMICA
    const markerCache = new Map();

    function updatePoints(nodes) {
        const activeIds = new Set(nodes.map(n => n.id));

        nodes.forEach(n => {
            if (!markerCache.has(n.id)) {
                const phi = (90 - n.lat) * (Math.PI / 180);
                const theta = (n.lng + 180) * (Math.PI / 180);
                const pos = new THREE.Vector3().setFromSphericalCoords(1.02, phi, theta);

                const group = new THREE.Group();
                const dot = new THREE.Mesh(new THREE.SphereGeometry(0.015, 12, 12), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
                dot.position.copy(pos);
                group.add(dot);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 256; canvas.height = 64;
                ctx.fillStyle = 'rgba(0,30,0,0.9)'; ctx.fillRect(0,0,256,64);
                ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 4; ctx.strokeRect(0,0,256,64);
                ctx.font = 'bold 22px Courier New'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                ctx.fillText(n.city.toUpperCase(), 128, 40);

                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), depthTest: true }));
                sprite.position.copy(pos.clone().multiplyScalar(1.15));
                sprite.scale.set(0.4, 0.1, 1);
                group.add(sprite);

                world.add(group);
                markerCache.set(n.id, group);
            }
        });

        markerCache.forEach((obj, id) => {
            if (!activeIds.has(id)) { world.remove(obj); markerCache.delete(id); }
        });
    }

    // 4. INTERATIVIDADE
    let isDown = false, lastX, lastY;
    document.addEventListener('mousedown', (e) => { isDown = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', () => isDown = false);
    window.addEventListener('mousemove', (e) => {
        if (isDown) {
            world.rotation.y += (e.clientX - lastX) * 0.007;
            world.rotation.x += (e.clientY - lastY) * 0.007;
            lastX = e.clientX; lastY = e.clientY;
        }
    });

    // 5. UPLINK (A Solução)
    async function init() {
        try {
            log("A obter localização...");
            const res = await fetch("https://ipinfo.io/json?token=e392744f6845f0").then(r => r.json());
            document.getElementById('city').innerText = res.city.toUpperCase();
            const [lat, lng] = res.loc.split(',').map(Number);

            log("A tentar escrever no Firebase...");
            const push = () => db.collection('RAU_LIVE_GLOBAL').doc(sessionID).set({
                lat, lng, city: res.city, ts: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('status').innerText = "ONLINE";
                log("Uplink OK. Aguardando nós...");
            }).catch(e => {
                log("ERRO FIREBASE: " + e.message);
                document.getElementById('status').innerText = "FIREBASE BLOCKED";
            });

            push(); setInterval(push, 25000);

            // Ouvinte em tempo real
            db.collection('RAU_LIVE_GLOBAL').where('ts', '>', new Date(Date.now() - 70000))
              .onSnapshot(snap => {
                  log("Recebidos: " + snap.size + " ouvintes");
                  const list = [];
                  snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                  updatePoints(list);
                  document.getElementById('count').innerText = snap.size;
              }, err => log("Erro no Snapshot: " + err.message));

        } catch (e) { log("Erro Crítico: " + e.message); }
    }

    function loop() {
        requestAnimationFrame(loop);
        if (!isDown) world.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    init(); loop();
</script>
</body>
</html>
