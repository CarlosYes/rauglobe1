<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR - VISUAL PRECISION</title>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        #globeViz { width: 100vw; height: 100vh; }
        
        /* Painel Superior */
        .hud-rau {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 15, 5, 0.9); border: 2px solid #39ff14;
            padding: 15px; border-radius: 5px; color: #fff; pointer-events: none;
        }
        .count-big { font-size: 45px; font-weight: 900; color: #39ff14; line-height: 1; }

        /* Marcadores no Globo (O que faltava) */
        .rau-marker { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .rau-label {
            background: rgba(0, 0, 0, 0.85); border: 1px solid #39ff14;
            color: #fff; padding: 5px 10px; border-radius: 4px;
            font-size: 12px; font-weight: bold; white-space: nowrap;
            display: flex; align-items: center; gap: 8px; /* Espaço para a bandeira */
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
            margin-bottom: 5px; text-transform: uppercase;
        }
        .rau-label img { width: 18px; height: auto; border-radius: 2px; } /* Estilo da Bandeira */
        .rau-dot { 
            width: 12px; height: 12px; background: #fff; border-radius: 50%; 
            box-shadow: 0 0 20px #39ff14; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="hud-rau">
    <div style="font-size: 10px; letter-spacing: 2px; opacity: 0.8;">OUVINTES ONLINE</div>
    <div id="count" class="count-big">0</div>
    <div id="status" style="font-size: 11px; color: #39ff14; margin-top: 5px;">A SINTONIZAR...</div>
</div>

<div id="globeViz"></div>

<script>
    const fbConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.database();
    const radarRef = db.ref('RADAR_FINAL_VISUAL');

    const myID = "RAU_" + Math.random().toString(36).substr(2, 6);
    const myNode = radarRef.child(myID);

    // Configuração do Globo com Marcadores HTML (Cidade + Bandeira)
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .htmlElement(d => {
            const container = document.createElement('div');
            container.className = 'rau-marker';
            
            // Link da bandeira usando o código do país (ex: pt, br, fr)
            const flagImg = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            
            container.innerHTML = `
                <div class="rau-label">
                    ${flagImg}
                    <span>${d.city}</span>
                </div>
                <div class="rau-dot"></div>
            `;
            return container;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    async function start() {
        try {
            // API de IP que traz o código do país para a bandeira
            const res = await fetch('https://ipwho.is/');
            const data = await res.json();
            
            if (data.success) {
                const payload = {
                    id: myID,
                    lat: parseFloat(data.latitude),
                    lng: parseFloat(data.longitude),
                    city: data.city || "Desconhecido",
                    country: data.country_code, // EX: "PT"
                    ts: Date.now()
                };

                myNode.set(payload);
                myNode.onDisconnect().remove();

                world.pointOfView({ lat: payload.lat, lng: payload.lng, altitude: 2 }, 2000);
                document.getElementById('status').innerText = "ONLINE EM: " + payload.city.toUpperCase();
            }
        } catch (e) {
            document.getElementById('status').innerText = "ERRO DE RASTREIO";
        }
    }

    // Sincronização Real-Time
    radarRef.on('value', snap => {
        const data = snap.val() || {};
        const now = Date.now();
        const active = Object.values(data).filter(u => (now - u.ts < 60000) && u.lat);
        
        document.getElementById('count').innerText = active.length;
        world.htmlElementsData(active);
    });

    setInterval(() => myNode.update({ ts: Date.now() }), 15000);

    window.onload = start;
</script>
</body>
</html>
