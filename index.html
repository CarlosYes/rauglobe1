<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v87</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; touch-action: none; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.85); border-left: 4px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none;
            border-radius: 0 4px 4px 0; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .count-main { font-size: 55px; font-weight: 900; line-height: 0.8; color: #39ff14; margin: 5px 0; }
        .count-sub { font-size: 12px; font-weight: 900; opacity: 0.7; letter-spacing: 1px; }
        
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0, 0, 0, 0.9); padding: 3px 7px; border-radius: 3px;
            font-size: 10px; font-weight: 900; display: flex; align-items: center; gap: 4px;
            white-space: nowrap; border: 1px solid transparent;
        }
        .m-rau.online .l-rau { color: #39ff14; border-color: #39ff14; box-shadow: 0 0 10px rgba(57,255,20,0.3); }
        .m-rau.offline .l-rau { color: #8b0000; border-color: #8b0000; opacity: 0.6; }
        
        .l-rau img { width: 14px; height: 10px; object-fit: cover; border-radius: 1px; }
        .d-rau { width: 6px; height: 6px; border-radius: 50%; margin-top: 2px; }
        
        .m-rau.online .d-rau { background: #39ff14; box-shadow: 0 0 12px #39ff14; animation: p 1.2s infinite; }
        .m-rau.offline .d-rau { background: #8b0000; }
        
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div class="count-sub">ONLINE AGORA</div>
    <div id="countOnline" class="count-main">0</div>
    <div id="countTotal" style="font-size: 11px; font-weight: 900; margin-top: 2px;">TOTAL GLOBO: 0</div>
    <div id="debug" style="font-size: 9px; color: #39ff14; margin-top: 10px; font-family: monospace; opacity: 0.8;">SYNCING...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'NODE-' + Math.random().toString(36).substr(2, 7);
    const PERSIST = 5 * 60 * 1000;
    let visitors = new Map();

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#ffffff')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = `m-rau ${d.status}`;
            const flag = d.country ? `<img src="https://flagcdn.com/w20/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    async function fetchGeo() {
        // Método de Contingência para Mobile (Cloudflare e IP-API)
        try {
            // Tentativa 1: Cloudflare (Mais rápido e menos bloqueado em mobile)
            const r1 = await fetch('https://www.cloudflare.com/cdn-cgi/trace');
            const t1 = await r1.text();
            const ip = t1.match(/ip=(.*)/)[1];
            
            const r2 = await fetch(`https://ipapi.co/${ip}/json/`);
            const d = await r2.json();
            if(d.latitude) return { lat: d.latitude, lng: d.longitude, city: d.city.toUpperCase(), country: d.country_code };
        } catch(e) {
            // Tentativa 2: Fallback Direto
            try {
                const r3 = await fetch('https://ipwho.is/');
                const d3 = await r3.json();
                if(d3.success) return { lat: d3.latitude, lng: d3.longitude, city: d3.city.toUpperCase(), country: d3.country_code };
            } catch(e2) { return null; }
        }
        return null;
    }

    async function init() {
        const geo = await fetchGeo();
        if(!geo) {
            document.getElementById('debug').innerText = "SINAL RESTRITO (VERIFIQUE VPN)";
            return;
        }

        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('rau-stream-v87');

        ably.connection.on('connected', () => {
            document.getElementById('debug').innerText = `LOCALIZADO: ${geo.city}`;
            channel.presence.enter({...geo, status: 'online'});
            
            channel.presence.subscribe(['enter', 'present', 'update'], (m) => {
                if(m.data && m.data.lat) {
                    visitors.set(m.clientId || m.id, { ...m.data, status: 'online', ts: Date.now() });
                    update();
                }
            });

            channel.presence.subscribe('leave', (m) => {
                const id = m.clientId || m.id;
                if (visitors.has(id)) {
                    visitors.set(id, { ...visitors.get(id), status: 'offline', ts: Date.now() });
                    update();
                }
            });

            setInterval(clean, 10000);
        });

        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.2 }, 2000);
    }

    function clean() {
        const now = Date.now();
        let up = false;
        for (let [id, d] of visitors) {
            if (d.status === 'offline' && (now - d.ts > PERSIST)) {
                visitors.delete(id);
                up = true;
            }
        }
        if (up) update();
    }

    function update() {
        const arr = Array.from(visitors.values());
        document.getElementById('countOnline').innerText = arr.filter(v => v.status === 'online').length;
        document.getElementById('countTotal').innerText = `TOTAL GLOBO: ${arr.length}`;
        world.htmlElementsData(arr);
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.7;
    window.onload = init;
</script>
</body>
</html>
