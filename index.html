<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v259.0 - ILIMITADO</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        .interface-rau {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 10, 30, 0.95); border: 2px solid #39ff14;
            padding: 15px; border-radius: 4px; color: #fff;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4); pointer-events: none;
        }
        .count-num { font-size: 50px; font-weight: bold; color: #39ff14; display: block; line-height: 1; }
        
        .rau-tag {
            display: flex; align-items: center; gap: 8px;
            background: rgba(0, 0, 0, 0.85); border: 1px solid #39ff14;
            color: #fff; padding: 5px 10px; border-radius: 3px;
            font-size: 13px; font-weight: bold;
        }
        .rau-tag img { width: 20px; border-radius: 2px; }
        .is-me { border: 2px solid #fff !important; background: #39ff14 !important; color: #000 !important; }
    </style>
</head>
<body>

<div class="interface-rau">
    <div style="font-size: 10px; letter-spacing: 2px; opacity: 0.8;">OUVINTES EM DIRETO</div>
    <div id="live-total" class="count-num">0</div>
    <div id="status-msg" style="font-size: 11px; margin-top: 10px; color: #39ff14;">RADAR ATIVO</div>
</div>

<div id="globeViz"></div>

<script>
    const fbConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.database();
    const radarRef = db.ref('rau_radar_unlimited_v1');

    const myID = "R_" + Math.random().toString(36).substr(2, 6);
    let myNode = radarRef.child(myID);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .pointColor(d => d.id === myID ? '#ffffff' : '#39ff14')
        .pointRadius(d => d.id === myID ? 3.0 : 1.2)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'rau-tag' + (d.id === myID ? ' is-me' : '');
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `${flag} <span>${d.city || 'Ouvinte'}</span>`;
            return el;
        });

    async function getSafeLocation() {
        try {
            // Passo 1: Obter dados rápidos via Cloudflare (Ilimitado)
            const cf = await fetch('https://www.cloudflare.com/cdn-cgi/trace').then(r => r.text());
            const dataArr = cf.split('\n').reduce((obj, line) => {
                const [key, val] = line.split('=');
                if(key) obj[key] = val;
                return obj;
            }, {});

            const countryCode = dataArr.loc; // Código do país (ex: PT, BR)

            // Passo 2: Usar o Zippopotam ou similar para coordenadas básicas sem limites
            // Para ser 100% livre de bloqueios, usamos o IPAPI sem chave como backup imediato
            const res = await fetch(`https://ipapi.co/json/`);
            const d = await res.json();
            
            if (d.latitude) {
                const myData = {
                    id: myID,
                    lat: d.latitude,
                    lng: d.longitude,
                    city: d.city,
                    country: d.country_code,
                    ts: Date.now()
                };
                myNode.set(myData);
                myNode.onDisconnect().remove();
                document.getElementById('status-msg').innerText = "ONLINE: " + d.city.toUpperCase();
            }
        } catch (e) {
            document.getElementById('status-msg').innerText = "ERRO DE LIGAÇÃO";
        }
    }

    function start() {
        getSafeLocation();

        radarRef.on('value', snap => {
            const now = Date.now();
            const raw = Object.values(snap.val() || {}).filter(u => (now - u.ts < 35000));
            document.getElementById('live-total').innerText = raw.length;
            world.pointsData(raw.filter(u => u.lat));
            world.htmlElementsData(raw.filter(u => u.lat));
        });

        setInterval(() => myNode.update({ ts: Date.now() }), 15000);
    }

    window.onload = start;
    window.onresize = () => { world.width(window.innerWidth); world.height(window.innerHeight); };
</script>
</body>
</html>
