<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v187.0 - PERSISTENT NODES</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; user-select: none; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 10, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
            backdrop-filter: blur(10px); border-radius: 0 4px 4px 0;
        }
        .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        #led { width: 10px; height: 10px; border-radius: 50%; background: #39ff14; box-shadow: 0 0 10px #39ff14; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .monitor-display { background: rgba(0, 5, 0, 0.95); border: 1px solid #1a1a1a; padding: 12px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; text-transform: uppercase; }
        #mon-status { font-size: 10px; color: #39ff14; opacity: 0.8; margin-top: 8px; border-top: 1px solid #39ff1444; padding-top: 8px; white-space: pre-line; line-height: 1.4; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; outline: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="rau-ui">
    <div class="status-row">
        <div id="led"></div>
        <span style="font-size: 11px; letter-spacing: 1px;">CORE v187.0 | PERSISTENCE ACTIVE</span>
    </div>
    <div class="monitor-display">
        <span id="mon-city">Aguardando...</span>
        <div id="mon-status">Localizando telemetria de nó...</div>
    </div>
</div>

<script>
    const RAU_SYSTEM = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000),
        renderer: new THREE.WebGLRenderer({ antialias: true }),
        controls: null, globe: null, currentIP: null,

        init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(this.renderer.domElement);

            // Controles com Damping (Suavidade de giro)
            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.enableDamping = true;
            this.controls.dampingFactor = 0.05;
            this.controls.autoRotate = true;
            this.controls.autoRotateSpeed = 0.5;
            this.camera.position.set(0, 0, 3.8);

            // Iluminação
            this.scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const sun = new THREE.DirectionalLight(0xffffff, 0.7);
            sun.position.set(5, 3, 5);
            this.scene.add(sun);

            // Globo Base
            const geo = new THREE.SphereGeometry(1, 64, 64);
            const mat = new THREE.MeshPhongMaterial({ color: 0x151515, shininess: 20 });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);

            // Estrelas
            this.addStars();

            // Carregar Textura
            new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.needsUpdate = true;
            });

            this.animate();
            this.track();
            setInterval(() => this.track(), 10000);
        },

        addStars() {
            const starGeo = new THREE.BufferGeometry();
            const coords = [];
            for (let i = 0; i < 6000; i++) {
                coords.push((Math.random() - 0.5) * 1600, (Math.random() - 0.5) * 1600, (Math.random() - 0.5) * 1600);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(coords, 3));
            this.scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.8 })));
        },

        async track() {
            try {
                const res = await fetch(`https://ipapi.co/json/?nocache=${Date.now()}`);
                const data = await res.json();
                
                if (data.ip && data.ip !== this.currentIP) {
                    this.currentIP = data.ip;
                    this.updateNode(data);
                }
            } catch (e) {
                document.getElementById('mon-status').innerText = "LINK LAGGING...\nRE-SCANNING NODES";
            }
        },

        updateNode(data) {
            // UI Update
            document.getElementById('mon-city').innerText = data.city || "RAU-NODE";
            document.getElementById('mon-status').innerText = `IP: ${data.ip}\nPAÍS: ${data.country_name}\nISP: ${data.org}\nSTATUS: MONITORANDO`;

            // Remover marcadores antigos do GLOBO (para girarem juntos)
            this.globe.children.filter(c => c.isMarker).forEach(c => this.globe.remove(c));

            // Converter Coordenadas
            const phi = (90 - data.latitude) * (Math.PI / 180);
            const theta = (data.longitude + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.01);

            // Marcador LED (Ponto Verde)
            const dot = new THREE.Mesh(
                new THREE.SphereGeometry(0.03, 20, 20),
                new THREE.MeshBasicMaterial({ color: 0x39ff14 })
            );
            dot.position.copy(pos);
            dot.isMarker = true;
            this.globe.add(dot);

            // Efeito de Radar (Anel pulsante)
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32),
                new THREE.MeshBasicMaterial({ color: 0x39ff14, side: THREE.DoubleSide, transparent: true, opacity: 0.7 })
            );
            ring.position.copy(pos.clone().multiplyScalar(1.005));
            ring.lookAt(new THREE.Vector3(0,0,0));
            ring.isMarker = true;
            this.globe.add(ring);

            // Focar suavemente (Giro da câmera)
            const targetPos = pos.clone().multiplyScalar(3.8);
            this.camera.position.lerp(targetPos, 0.05);
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update();
            this.renderer.render(this.scene, this.camera);
        }
    };

    window.onload = () => RAU_SYSTEM.init();
</script>
</body>
</html>
