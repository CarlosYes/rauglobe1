<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v266.0 - IP GEO-TRACKER</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; }
        
        /* Painel HUD */
        .hud-rau {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 10, 20, 0.9); border: 1px solid #39ff14;
            padding: 20px; border-radius: 5px; color: #fff; pointer-events: none;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
        }
        .count-big { font-size: 50px; font-weight: 900; color: #39ff14; display: block; line-height: 1; }
        .status-text { font-size: 11px; color: #39ff14; margin-top: 10px; letter-spacing: 1px; }
        
        /* Marcadores no Globo */
        .marker-container { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .city-tag {
            background: rgba(0, 0, 0, 0.8); border: 1px solid #39ff14;
            color: #fff; padding: 3px 8px; border-radius: 3px;
            font-size: 12px; font-weight: bold; white-space: nowrap;
            display: flex; align-items: center; gap: 6px;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .city-tag img { width: 16px; height: 11px; }
        .pulse-point { 
            width: 10px; height: 10px; background: #39ff14; 
            border-radius: 50%; margin-top: 4px; 
            box-shadow: 0 0 15px #39ff14;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Destaque para o utilizador local */
        .is-me .pulse-point { background: #fff; box-shadow: 0 0 15px #fff; }
        .is-me .city-tag { border-color: #fff; color: #39ff14; }
    </style>
</head>
<body>

<div class="hud-rau">
    <div style="font-size: 10px; opacity: 0.6; letter-spacing: 2px;">RADAR DE OUVINTES</div>
    <div id="live-total" class="count-big">0</div>
    <div id="status-msg" class="status-text">A RASTREAR SINAL...</div>
</div>

<div id="globeViz"></div>

<script>
    // Configuração do Firebase (RTDB)
    const fbConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.database();
    const radarRef = db.ref('rau_radar_active_users');

    // Gerar um ID temporário para esta visita
    const myID = "NODE_" + Math.random().toString(36).substr(2, 6);
    let myNode = radarRef.child(myID);

    // Inicialização do Globo 3D
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .htmlElement(d => {
            const container = document.createElement('div');
            container.className = 'marker-container' + (d.id === myID ? ' is-me' : '');
            
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            container.innerHTML = `
                <div class="city-tag">${flag} <span>${d.city.toUpperCase()}</span></div>
                <div class="pulse-point"></div>
            `;
            return container;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    /**
     * FUNÇÃO PRINCIPAL: Rastreio por IP
     * Captura os dados geográficos sem pedir permissão ao utilizador.
     */
    async function startIpTracking() {
        try {
            // Usando ipwho.is (Mesma lógica de precisão do FlagCounter)
            const response = await fetch('https://ipwho.is/');
            const data = await response.json();
            
            if (data.success) {
                const userData = {
                    id: myID,
                    lat: data.latitude,
                    lng: data.longitude,
                    city: data.city || "Desconhecido",
                    country: data.country_code || "PT",
                    ts: Date.now() // Timestamp para saber se o utilizador ainda está online
                };

                // 1. Enviar para o Firebase
                myNode.set(userData);
                
                // 2. Configurar remoção automática ao fechar o site
                myNode.onDisconnect().remove();

                // 3. Atualizar HUD Local
                document.getElementById('status-msg').innerText = `LOCALIZADO: ${data.city.toUpperCase()}`;
            }
        } catch (error) {
            console.error("Erro ao rastrear IP:", error);
            document.getElementById('status-msg').innerText = "ERRO DE RASTREIO";
        }
    }

    // Sincronização em tempo real com todos os ouvintes
    function syncGlobalRadar() {
        radarRef.on('value', snap => {
            const data = snap.val() || {};
            const now = Date.now();
            
            // Filtra utilizadores que enviaram sinal nos últimos 60 segundos
            // Isso evita que o mapa fique cheio de "fantasmas" que já saíram do site
            const activeUsers = Object.values(data).filter(u => (now - u.ts < 60000));
            
            // Atualiza contador e marcadores no globo
            document.getElementById('live-total').innerText = activeUsers.length;
            world.htmlElementsData(activeUsers);
        });

        // "Heartbeat": Atualiza o timestamp a cada 20s para manter o marcador ativo
        setInterval(() => {
            myNode.update({ ts: Date.now() });
        }, 20000);
    }

    window.onload = () => {
        startIpTracking();
        syncGlobalRadar();
    };
</script>
</body>
</html>
