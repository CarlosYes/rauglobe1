<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v37 - CLOUDFLARE SYNC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 10, 0, 0.9); border: 2px solid #39ff14;
            padding: 20px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
        }
        .count { font-size: 70px; font-weight: 900; color: #fff; line-height: 0.8; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 4px 10px; border-radius: 2px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            white-space: nowrap; border: 1px solid #fff;
        }
        .l-rau img { width: 20px; height: 13px; object-fit: cover; }
        .d-rau { width: 12px; height: 12px; background: #fff; border-radius: 50%; margin-top: 5px; border: 2px solid #39ff14; animation: p 1s infinite; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 3px;">RAU RADAR • SYSTEM OK</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 11px; color: #fff; margin-top: 10px;">A SINTONIZAR...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'NODE-' + Math.random().toString(36).substr(2, 9);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            el.innerHTML = `<div class="l-rau"><img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png"><span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    async function getLoc() {
        try {
            // Método Ultra-Seguro: Cloudflare Trace + IPWhois Fallback
            const cfRes = await fetch('https://www.cloudflare.com/cdn-cgi/trace');
            const cfText = await cfRes.text();
            const ip = cfText.split('\n').find(l => l.startsWith('ip=')).split('=')[1];
            
            const geoRes = await fetch(`https://ipwho.is/${ip}`);
            const d = await geoRes.json();
            
            return {
                lat: d.latitude,
                lng: d.longitude,
                city: d.city.toUpperCase(),
                country: d.country_code
            };
        } catch (e) {
            // Se falhar, tenta o IP-API mas sem o "S" (HTTP) para evitar bloqueios de certificados
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            return { lat: d.latitude, lng: d.longitude, city: d.city.toUpperCase(), country: d.country_code };
        }
    }

    async function start() {
        const geo = await getLoc();
        if (!geo) { 
            document.getElementById('status').innerText = "ERRO: ACESSO BLOQUEADO"; 
            return; 
        }

        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('rau-live-radar');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `LOCALIZADO: ${geo.city}`;
            channel.presence.enter(geo);

            const sync = () => {
                channel.presence.get((err, members) => {
                    if (!err) {
                        const active = members.map(m => m.data).filter(d => d && d.lat);
                        document.getElementById('count').innerText = active.length;
                        world.htmlElementsData(active);
                    }
                });
            };

            channel.presence.subscribe(['enter', 'leave', 'present', 'update'], sync);
            sync();
        });

        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.2 }, 2000);
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    window.onload = start;
</script>
</body>
</html>
