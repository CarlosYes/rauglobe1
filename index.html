<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v60.0 - OMNI-RECOVERY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 10000;
            background: rgba(0, 15, 0, 0.98); border: 2px solid #39ff14;
            padding: 20px; width: 320px; box-shadow: 0 0 50px rgba(0, 255, 0, 0.6);
        }
        #count { font-size: 3.5em; font-weight: 900; color: #fff; display: block; line-height: 0.8; margin: 10px 0; }
        .label { font-size: 10px; letter-spacing: 1px; font-weight: bold; text-transform: uppercase; }
        .monitor-display { background: #000; border: 1px solid #333; padding: 15px; margin-top: 15px; border-radius: 4px; }
        #mon-city { font-size: 22px; color: #fff; font-weight: bold; display: block; text-shadow: 0 0 10px #39ff14; }
        #mon-status { font-size: 11px; color: #39ff14; opacity: 0.8; margin-top: 10px; border-top: 1px dashed #444; padding-top: 10px; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div class="label">RAU COMMAND v60.0</div>
    <span id="count">0</span>
    <div class="label">SINAIS ACTIVOS</div>

    <div class="monitor-display">
        <div style="display: flex; align-items: center;">
            <span id="mon-city">A SINCRONIZAR...</span>
        </div>
        <div id="mon-status">A AGUARDAR DADOS DO SERVIDOR...</div>
    </div>
</div>

<script>
    // 1. CONFIGURAÇÃO DE REDE (Coloque o link do seu Render aqui)
    const socket = io("https://URL-DO-TEU-SERVIDOR.onrender.com");

    let scene, camera, renderer, controls, globe, globeGroup;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.autoRotate = true; camera.position.z = 3.5;

        globeGroup = new THREE.Group();
        scene.add(globeGroup);

        globe = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshPhongMaterial({ shininess: 8 }));
        globeGroup.add(globe);

        new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
            globe.material.map = tex; globe.material.needsUpdate = true;
        });

        scene.add(new THREE.AmbientLight(0xffffff, 3.0));
        
        animate();
    }

    // 2. SINCRONIA MULTIPLAYER
    socket.on('update-peers', (peers) => {
        const peerList = Object.values(peers);
        document.getElementById('count').innerText = peerList.length;

        // Limpar marcadores antigos (preservar o globo)
        for(let i = globeGroup.children.length - 1; i > 0; i--) globeGroup.remove(globeGroup.children[i]);

        peerList.forEach(p => {
            const isLocal = p.id === socket.id;
            if(isLocal) {
                document.getElementById('mon-city').innerText = p.city.toUpperCase();
                document.getElementById('mon-status').innerText = `SINAL LOCAL FIXADO | PORTA: ${socket.id.substring(0,6)}`;
            }
            renderPeer(p, isLocal);
        });
    });

    function renderPeer(data, isLocal) {
        const phi = (90 - data.lat) * (Math.PI / 180);
        const theta = (data.lon + 180) * (Math.PI / 180);
        const pos = new THREE.Vector3(-(Math.sin(phi)*Math.cos(theta))*1.01, Math.cos(phi)*1.01, (Math.sin(phi)*Math.sin(theta))*1.01);

        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.02, 12, 12), new THREE.MeshBasicMaterial({ color: isLocal ? 0x39ff14 : 0xff3939 }));
        dot.position.copy(pos); globeGroup.add(dot);

        // Bandeira
        new THREE.TextureLoader().load(`https://flagcdn.com/w80/${data.country}.png`, (fTex) => {
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: fTex }));
            sprite.position.copy(pos.clone().multiplyScalar(1.2));
            sprite.scale.set(0.25, 0.15, 1);
            globeGroup.add(sprite);
        });
    }

    // 3. RECUPERAÇÃO DE LOCALIZAÇÃO (O "MASTER SYNC" DA v175)
    socket.on('connect', async () => {
        const ts = Date.now();
        const sources = [`https://ipapi.co/json/?rau=${ts}`, `https://get.geojs.io/v1/ip/geo.json?v=${ts}`];

        for (let url of sources) {
            try {
                const res = await fetch(url);
                const data = await res.json();
                const lat = data.latitude || data.lat;
                const lon = data.longitude || data.lon;
                if (lat) {
                    socket.emit('report-location', {
                        city: data.city || "DESCONHECIDO",
                        lat: parseFloat(lat),
                        lon: parseFloat(lon),
                        country: (data.country_code || data.country || "un").toLowerCase()
                    });
                    break;
                }
            } catch(e) { continue; }
        }
    });

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    window.onload = init;
</script>
</body>
</html>
