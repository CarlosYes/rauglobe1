<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v27 - TOTAL TRACK</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); border: 2px solid #39ff14;
            padding: 15px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 20px #39ff14;
        }
        .count { font-size: 65px; font-weight: 900; color: #fff; line-height: 1; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 4px 10px; border-radius: 2px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            white-space: nowrap; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        .l-rau img { width: 18px; height: 12px; object-fit: cover; border: 1px solid #000; }
        .d-rau { width: 12px; height: 12px; background: #fff; border-radius: 50%; margin-top: 5px; border: 2px solid #39ff14; animation: p 0.8s infinite alternate; }
        @keyframes p { from { transform: scale(1); } to { transform: scale(1.8); } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 2px;">LIVE VISITOR TRACKER</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 11px; color: #fff; margin-top: 5px;">RASTREANDO...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const CLIENT_ID = 'NODE-' + Math.random().toString(36).substr(2, 9);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            // Puxa a bandeira direto do FlagCDN usando o código do país
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    async function init() {
        try {
            // Requisição direta ao IP-API (Sem intermediários que bloqueiam)
            const res = await fetch('https://ipapi.co/json/');
            const geo = await res.json();
            
            // Se não houver cidade, o sistema para aqui para não mostrar dados falsos
            if(!geo.city) throw new Error("Falha no Rastreio");

            const myData = {
                id: CLIENT_ID,
                lat: geo.latitude,
                lng: geo.longitude,
                city: geo.city.toUpperCase(),
                country: geo.country_code
            };

            const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: CLIENT_ID });
            const channel = ably.channels.get('rau-live-radar');

            ably.connection.on('connected', () => {
                document.getElementById('status').innerText = `SINAL: ${myData.city} [${myData.country}]`;
                channel.presence.enter(myData);

                const refresh = () => {
                    channel.presence.get((err, members) => {
                        if(!err) {
                            const active = members.map(m => m.data).filter(d => d && d.lat);
                            document.getElementById('count').innerText = active.length;
                            world.htmlElementsData(active);
                        }
                    });
                };

                channel.presence.subscribe(['enter', 'leave', 'update', 'present'], refresh);
                refresh();
            });

            world.pointOfView({ lat: myData.lat, lng: myData.lng, altitude: 2.0 }, 2000);

        } catch (e) {
            document.getElementById('status').innerText = "SINAL INTERROMPIDO";
            console.error(e);
        }
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    window.onload = init;
</script>
</body>
</html>
