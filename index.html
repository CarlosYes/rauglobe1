<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v215.0 - HARD OVERRIDE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 260px; pointer-events: none;
        }
        .monitor-display { background: #000; border: 1px solid #1a1a1a; padding: 10px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; text-transform: uppercase; }
        #visitor-tag {
            position: absolute; display: none; align-items: center; gap: 8px;
            background: rgba(0, 0, 0, 0.9); border: 1px solid #39ff14;
            padding: 5px 12px; color: #fff; font-size: 13px; font-weight: bold;
            z-index: 500; transform: translate(-50%, -150%);
        }
        .flag-icon { width: 22px; height: 14px; border: 1px solid #333; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; outline: none; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div style="margin-bottom: 8px; font-size: 10px; font-weight: bold; letter-spacing: 2px;">RAU CORE v215.0</div>
    <div class="monitor-display">
        <span id="mon-city">A LOCALIZAR...</span>
        <div id="mon-status" style="font-size: 9px; opacity: 0.7; margin-top: 4px;">Uplink: Ativo</div>
    </div>
</div>

<div id="visitor-tag">
    <img id="tag-flag" src="" class="flag-icon">
    <span id="tag-city">---</span>
</div>

<script>
    const RAU = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000),
        renderer: new THREE.WebGLRenderer({ antialias: true, alpha: true }),
        controls: null, globe: null, markers: new THREE.Group(),
        currentIP: null, activeNode: null,

        init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(this.renderer.domElement);

            // Luzes Forçadas
            this.scene.add(new THREE.AmbientLight(0xffffff, 1.3));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(5, 3, 5);
            this.scene.add(sun);

            // Criar estrelas imediatamente
            this.stars();

            // Criar Globo com Cor de Backup (Caso a textura falhe)
            const geo = new THREE.SphereGeometry(1, 64, 64);
            const mat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 5 });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            this.globe.add(this.markers);

            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.autoRotate = true;
            this.camera.position.z = 3.2;

            this.loadTexture();
            this.track(); // Começa a busca do IP
            
            setInterval(() => this.track(), 30000);
            this.animate();
        },

        stars() {
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for (let i = 0; i < 2000; i++) {
                pos.push((Math.random() - 0.5) * 1000, (Math.random() - 0.5) * 1000, (Math.random() - 0.5) * 1000);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            this.scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x444444, size: 0.8 })));
        },

        loadTexture() {
            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin('anonymous');
            // Fonte ultra-estável
            loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.color.set(0xffffff);
                this.globe.material.needsUpdate = true;
            });
        },

        // Bypass de segurança v215
        async track() {
            try {
                // Usando o endpoint HTTPS mais aceite pelo GitHub
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if (data.ip && data.ip !== this.currentIP) {
                    this.currentIP = data.ip;
                    this.updateVisitor(data);
                }
            } catch (e) { console.warn("Sync delay..."); }
        },

        updateVisitor(data) {
            document.getElementById('mon-city').innerText = (data.city || "RAU NODE").toUpperCase();
            document.getElementById('mon-status').innerText = "IP: " + data.ip;
            
            this.markers.clear();
            const phi = (90 - data.latitude) * (Math.PI / 180);
            const theta = (data.longitude + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.01);

            // BOLINHA VERDE 0.01 (PRECISÃO)
            const dot = new THREE.Mesh(
                new THREE.SphereGeometry(0.01, 12, 12), 
                new THREE.MeshBasicMaterial({ color: 0x39ff14 })
            );
            dot.position.copy(pos);
            this.markers.add(dot);

            this.activeNode = { mesh: dot, city: data.city, country: data.country_code.toLowerCase() };
            const tag = document.getElementById('visitor-tag');
            document.getElementById('tag-flag').src = `https://flagcdn.com/w40/${this.activeNode.country}.png`;
            document.getElementById('tag-city').innerText = this.activeNode.city;
            tag.style.display = 'flex';
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update();
            if (this.activeNode && this.activeNode.mesh) {
                const vector = new THREE.Vector3();
                this.activeNode.mesh.getWorldPosition(vector);
                vector.project(this.camera);
                const tag = document.getElementById('visitor-tag');
                tag.style.left = `${(vector.x * 0.5 + 0.5) * window.innerWidth}px`;
                tag.style.top = `${(vector.y * -0.5 + 0.5) * window.innerHeight}px`;
                tag.style.opacity = vector.z > 1 ? "0" : "1";
            }
            this.renderer.render(this.scene, this.camera);
        }
    };
    window.onload = () => RAU.init();
</script>
</body>
</html>
