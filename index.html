<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v49 - SPEED DEMON</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 25px; left: 25px; z-index: 1000;
            background: rgba(0, 5, 0, 0.95); border: 2px solid #39ff14;
            padding: 20px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.4);
        }
        .count { font-size: 80px; font-weight: 900; color: #fff; line-height: 0.8; letter-spacing: -4px; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 4px 10px; border-radius: 2px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            white-space: nowrap; border: 1px solid #fff;
        }
        .l-rau img { width: 20px; height: 13px; object-fit: cover; }
        .d-rau { width: 12px; height: 12px; background: #fff; border-radius: 50%; margin-top: 5px; border: 2px solid #39ff14; animation: p 1s infinite; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 3px;">RAU RADAR • ULTRA-FAST</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 11px; color: #fff; margin-top: 8px;">A SINTONIZAR...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'RAU-' + Math.random().toString(36).substr(2, 6);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    // SISTEMA DE CORRIDA: Três satélites, o primeiro a chegar ganha.
    function raceLocation() {
        return new Promise((resolve) => {
            let found = false;
            const done = (d) => { if(!found) { found = true; resolve(d); } };

            // Satélite 1: IPWhois
            const s1 = document.createElement('script');
            s1.src = 'https://ipwho.is/?callback=s1';
            window.s1 = (d) => done({lat: d.latitude, lng: d.longitude, city: d.city.toUpperCase(), country: d.country_code.toLowerCase()});
            
            // Satélite 2: IP-API
            const s2 = document.createElement('script');
            s2.src = 'https://ipapi.co/jsonp/';
            window.callback = (d) => done({lat: d.latitude, lng: d.longitude, city: d.city.toUpperCase(), country: d.country_code.toLowerCase()});

            document.body.appendChild(s1);
            document.body.appendChild(s2);

            setTimeout(() => { if(!found) resolve(null); }, 6000);
        });
    }

    async function init() {
        const geo = await raceLocation();
        if (!geo) { document.getElementById('status').innerText = "ERRO DE SINAL"; return; }

        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('rau-live-radar');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `FIXADO: ${geo.city}`;
            channel.presence.enter(geo);

            const sync = () => {
                channel.presence.get((err, members) => {
                    if (!err) {
                        const nodes = members.map(m => m.data).filter(d => d && d.lat);
                        document.getElementById('count').innerText = nodes.length;
                        world.htmlElementsData(nodes);
                    }
                });
            };
            channel.presence.subscribe(['enter', 'leave', 'present', 'update'], sync);
            sync();
        });

        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.2 }, 2000);
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    window.onload = init;
</script>
</body>
</html>
