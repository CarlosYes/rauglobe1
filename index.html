<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU GLOBE v74 - REAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #globeViz { width: 100vw; height: 100vh; }
        .visitor-label {
            background: rgba(0, 242, 255, 0.8); color: #000; padding: 2px 8px;
            font-size: 10px; font-weight: bold; border-radius: 2px; white-space: nowrap;
        }
        .visitor-dot {
            width: 8px; height: 8px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #00f2ff;
        }
    </style>
</head>
<body>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'VISITOR-' + Math.random().toString(36).substr(2, 6);

    // Sistema de localização real via rede
    async function getVisitorData() {
        try {
            const res = await fetch('https://ipwho.is/');
            const d = await res.json();
            return { lat: d.latitude, lng: d.longitude, city: d.city.toUpperCase(), country: d.country_code.toLowerCase() };
        } catch (e) {
            const res2 = await fetch('https://ipapi.co/json/');
            const d2 = await res2.json();
            return { lat: d2.latitude, lng: d2.longitude, city: (d2.city || "ONLINE").toUpperCase(), country: (d2.country_code || "").toLowerCase() };
        }
    }

    async function init() {
        const geo = await getVisitorData();
        
        const world = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundColor('#000000')
            .htmlElement(d => {
                const el = document.createElement('div');
                el.style.display = 'flex';
                el.style.flexDirection = 'column';
                el.style.alignItems = 'center';
                el.innerHTML = `<div class="visitor-label">${d.city}</div><div class="visitor-dot"></div>`;
                return el;
            });

        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('geovisitas-reais');

        ably.connection.on('connected', () => {
            channel.presence.enter(geo);
            
            const updateVisuals = () => {
                channel.presence.get((err, members) => {
                    if (!err) {
                        const points = members.map(m => m.data).filter(x => x && x.lat);
                        world.htmlElementsData(points);
                    }
                });
            };

            channel.presence.subscribe(['enter', 'leave', 'present'], updateVisuals);
            updateVisuals();
        });

        // Focagem inicial no teu sinal real
        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.0 }, 1000);
        world.controls().autoRotate = true;
    }

    init();
</script>
</body>
</html>
