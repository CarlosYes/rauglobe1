<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v35 - FIXED GLOBE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; width: 100vw; height: 100vh; }
        
        /* Contentor fixo para o globo não "fugir" */
        #globe-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: block;
        }

        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 9999;
            background: rgba(0, 20, 0, 0.9); border: 2px solid #39ff14;
            padding: 15px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.5);
        }
        .count { font-size: 60px; font-weight: 900; color: #fff; line-height: 1; }
        
        /* Marcadores */
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 3px 10px; border-radius: 2px;
            font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 6px;
            white-space: nowrap; border: 1px solid #fff;
        }
        .l-rau img { width: 18px; height: 12px; object-fit: cover; }
        .d-rau { width: 10px; height: 10px; background: #fff; border-radius: 50%; margin-top: 4px; border: 2px solid #39ff14; animation: p 1s infinite; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 2px;">GLOBAL NODE TRACKER</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 10px; color: #fff; margin-top: 5px;">ESTABILIZANDO...</div>
</div>

<div id="globe-container"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const ID = 'RAU-' + Math.random().toString(36).substr(2, 5);

    // Inicialização forçada do Globo
    const world = Globe()(document.getElementById('globe-container'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .atmosphereAltitude(0.15)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    async function startSystem() {
        try {
            // Rastreio prioritário
            const res = await fetch('https://ipwho.is/');
            const geo = await res.json();
            
            if (!geo.success) throw new Error("Offline");

            const myData = {
                id: ID,
                lat: geo.latitude,
                lng: geo.longitude,
                city: geo.city.toUpperCase(),
                country: geo.country_code
            };

            const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: ID });
            const channel = ably.channels.get('rau-live-radar');

            ably.connection.on('connected', () => {
                document.getElementById('status').innerText = `SINAL: ${myData.city} [${myData.country}]`;
                channel.presence.enter(myData);

                const sync = () => {
                    channel.presence.get((err, members) => {
                        if (!err) {
                            const nodes = members.map(m => m.data).filter(d => d && d.lat);
                            document.getElementById('count').innerText = nodes.length;
                            world.htmlElementsData(nodes);
                        }
                    });
                };

                channel.presence.subscribe(['enter', 'leave', 'present', 'update'], sync);
                sync();
            });

            world.pointOfView({ lat: myData.lat, lng: myData.lng, altitude: 2.0 }, 2000);

        } catch (e) {
            document.getElementById('status').innerText = "A REPETIR BUSCA...";
            setTimeout(startSystem, 3000);
        }
    }

    // Garante que o globo ocupa o ecrã todo
    function resize() {
        world.width(window.innerWidth);
        world.height(window.innerHeight);
    }
    window.addEventListener('resize', resize);
    
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.6;
    
    window.onload = () => {
        resize();
        startSystem();
    };
</script>
</body>
</html>
