<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v204 - GLOBAL TRACKER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        
        /* HUD Superior */
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.85); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none;
            backdrop-filter: blur(5px);
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        
        /* Marcador no Globo */
        .m-rau { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            user-select: none;
        }
        
        .l-rau {
            background: rgba(0, 0, 0, 0.9);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #39ff14;
            color: #39ff14;
            white-space: nowrap;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
            transform: translateY(-10px);
        }

        .flag-icon {
            width: 18px;
            height: 12px;
            object-fit: cover;
            border-radius: 1px;
        }

        /* Ponto Pulsante */
        .d-rau { 
            width: 10px; 
            height: 10px; 
            background: #39ff14; 
            border-radius: 50%; 
            box-shadow: 0 0 15px #39ff14; 
            animation: p 1.5s infinite; 
        }

        @keyframes p { 
            0% { transform: scale(1); opacity: 1; } 
            100% { transform: scale(4); opacity: 0; } 
        }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status" style="font-size: 10px; margin-top: 10px; font-family: monospace; color: #ff3131;">SINAL: RASTREANDO...</div>
</div>

<div id="globeViz"></div>

<script>
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .atmosphereDaylightAlpha(0.1)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            
            // Gerar URL da bandeira baseada no código do país (ISO 3166-1 alpha-2)
            const flagUrl = d.countryCode ? `https://flagcdn.com/w40/${d.countryCode.toLowerCase()}.png` : '';
            const flagImg = flagUrl ? `<img src="${flagUrl}" class="flag-icon">` : '';

            el.innerHTML = `
                <div class="l-rau">
                    ${flagImg}
                    <span>${d.city}</span>
                </div>
                <div class="d-rau"></div>
            `;
            return el;
        });

    // Processamento do sinal recebido
    window.finalSignal = function(data) {
        if (data && data.latitude) {
            const p = {
                lat: parseFloat(data.latitude),
                lng: parseFloat(data.longitude),
                city: (data.city || "LOCAL").toUpperCase(),
                countryCode: data.country_code || data.geoplugin_countryCode || ""
            };

            document.getElementById('onlineCount').innerText = "1";
            document.getElementById('status').innerText = `SINAL: ${p.city} [${p.countryCode}]`;
            document.getElementById('status').style.color = "#39ff14";

            // Atualiza o marcador e move a câmera
            world.htmlElementsData([p]);
            world.pointOfView({ lat: p.lat, lng: p.lng, altitude: 1.8 }, 2500);
            world.controls().autoRotate = false;
        }
    };

    function startPixel() {
        const imgScript = document.createElement('script');
        // ipapi.co fornece latitude, longitude e country_code
        imgScript.src = 'https://ipapi.co/jsonp/?callback=finalSignal';
        
        imgScript.onerror = () => {
            const backup = document.createElement('script');
            backup.src = 'https://www.geoplugin.net/javascript.gp?callback=finalSignalGP';
            document.body.appendChild(backup);
        };

        document.body.appendChild(imgScript);
    }

    // Adaptador para Geoplugin (Backup)
    window.finalSignalGP = function(d) {
        window.finalSignal({
            latitude: d.geoplugin_latitude,
            longitude: d.geoplugin_longitude,
            city: d.geoplugin_city,
            country_code: d.geoplugin_countryCode
        });
    };

    // Configurações de rotação inicial
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.8;

    window.onload = startPixel;
</script>
</body>
</html>
