<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v243.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 20, 40, 0.9); border: 2px solid #39ff14;
            padding: 15px; border-radius: 4px; color: #fff;
            box-shadow: 0 0 15px #39ff14; pointer-events: none;
        }
        .count-num { font-size: 35px; font-weight: bold; color: #39ff14; display: block; }
        
        .tag {
            background: rgba(0,0,0,0.8); border: 1px solid #39ff14;
            color: #fff; padding: 3px 8px; font-size: 11px;
            display: flex; align-items: center; gap: 6px; border-radius: 2px;
        }
        .me { border: 2px solid #fff !important; background: #39ff14 !important; color: #000 !important; }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; opacity: 0.8; letter-spacing: 1px;">OUVINTES REAIS AGORA</div>
    <div id="live-total" class="count-num">0</div>
    <div id="status" style="font-size: 11px; margin-top: 5px; color: #39ff14;">A INICIAR...</div>
</div>

<div id="globeViz"></div>

<script>
    const fbConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };

    if (!firebase.apps.length) { firebase.initializeApp(fbConfig); }
    const db = firebase.database();
    const radarRef = db.ref('rau_radar_final');

    const myID = "RAU_" + Math.random().toString(36).substr(2, 9);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .pointColor(d => d.id === myID ? '#ffffff' : '#39ff14')
        .pointRadius(d => d.id === myID ? 1.4 : 0.8)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'tag' + (d.id === myID ? ' me' : '');
            el.innerHTML = `<img src="https://flagcdn.com/w20/${d.iso || 'un'}.png" width="16"> ${d.id === myID ? 'VOCÊ' : d.city}`;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    async function bootstrap() {
        const myPoint = radarRef.child(myID);
        
        // 1. Criar ponto imediato (para o contador não ser 0)
        let myData = { id: myID, lat: 0, lng: 0, city: "A localizar...", iso: "un", ts: Date.now() };
        await myPoint.set(myData);
        myPoint.onDisconnect().remove();

        // 2. Tentar obter localização real
        try {
            const res = await fetch('https://ipwho.is/');
            const d = await res.json();
            if(d.success) {
                myData = { ...myData, lat: d.latitude, lng: d.longitude, city: d.city, iso: d.country_code.toLowerCase(), ts: Date.now() };
                await myPoint.update(myData);
                document.getElementById('status').innerText = "CONECTADO: " + d.city.toUpperCase();
            }
        } catch (e) {
            document.getElementById('status').innerText = "ERRO DE LOCALIZAÇÃO (USANDO PADRÃO)";
        }

        // 3. Batimento cardíaco
        setInterval(() => myPoint.update({ ts: Date.now() }), 5000);

        // 4. Sincronização em Tempo Real
        radarRef.on('value', snap => {
            const now = Date.now();
            const data = Object.values(snap.val() || {}).filter(u => now - u.ts < 20000);
            document.getElementById('live-total').innerText = data.length;
            world.pointsData(data);
            world.htmlElementsData(data);
        });
    }

    window.onload = bootstrap;
    window.onresize = () => { world.width(window.innerWidth); world.height(window.innerHeight); };
</script>
</body>
</html>
