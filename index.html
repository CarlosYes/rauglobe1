<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v31</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.85); border-left: 4px solid #39ff14;
            padding: 20px; color: #39ff14; pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 0 4px 4px 0;
        }
        .count { font-size: 70px; font-weight: 900; color: #fff; line-height: 1; text-shadow: 0 0 15px #39ff14; }
        .status-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; opacity: 0.8; }

        /* Marcadores Dinâmicos */
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 5px 12px; border-radius: 3px;
            font-size: 12px; font-weight: 900; display: flex; align-items: center; gap: 8px;
            white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.7); border: 1px solid #fff;
        }
        .l-rau img { width: 20px; height: 13px; object-fit: cover; border: 1px solid rgba(0,0,0,0.2); }
        .d-rau { 
            width: 12px; height: 12px; background: #fff; border-radius: 50%; 
            margin-top: 5px; border: 2px solid #39ff14; 
            animation: pulse-ring 1.2s cubic-bezier(0.24, 0, 0.38, 1) infinite; 
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(3.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="hud">
    <div class="status-tag">RAU RADAR ACTIVE</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 11px; color: #fff; margin-top: 8px; font-family: monospace;">A CONECTAR À REDE...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const CLIENT_ID = 'NODE-' + Math.random().toString(36).substr(2, 9);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .atmosphereAltitude(0.2)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            // FlagCDN para garantir que as bandeiras aparecem sempre
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    async function initRadar() {
        try {
            // Passo 1: Obter Localização via IPWHOIS (Mais estável que ipapi)
            const res = await fetch('https://ipwho.is/');
            const geo = await res.json();
            
            if (!geo.success) throw new Error("Falha Geo");

            const myData = {
                id: CLIENT_ID,
                lat: geo.latitude,
                lng: geo.longitude,
                city: geo.city.toUpperCase(),
                country: geo.country_code
            };

            // Passo 2: Ligar ao Ably
            const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: CLIENT_ID });
            const channel = ably.channels.get('rau-live-radar');

            ably.connection.on('connected', () => {
                document.getElementById('status').innerText = `FIXADO: ${myData.city} (${myData.country})`;
                channel.presence.enter(myData);

                const sync = () => {
                    channel.presence.get((err, members) => {
                        if (!err) {
                            const active = members.map(m => m.data).filter(d => d && d.lat);
                            document.getElementById('count').innerText = active.length;
                            world.htmlElementsData(active);
                        }
                    });
                };

                channel.presence.subscribe(['enter', 'leave', 'present', 'update'], sync);
                sync();
            });

            // Focar na posição detetada
            world.pointOfView({ lat: myData.lat, lng: myData.lng, altitude: 2.2 }, 2500);

        } catch (e) {
            document.getElementById('status').innerText = "ERRO DE SINCRONIZAÇÃO";
            console.error("Radar Error:", e);
        }
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    window.onload = initRadar;

    // Correção de redimensionamento
    window.onresize = () => {
        world.width(window.innerWidth);
        world.height(window.innerHeight);
    };
</script>
</body>
</html>
