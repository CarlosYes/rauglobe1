<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v263.0 - PRECISION</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; }
        
        .hud-rau {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 5, 20, 0.9); border: 1px solid #39ff14;
            padding: 15px; border-radius: 4px; color: #fff; pointer-events: none;
        }
        .count-big { font-size: 48px; font-weight: bold; color: #39ff14; display: block; }
        
        .rau-label { display: flex; flex-direction: column; align-items: center; gap: 2px; pointer-events: none; }
        .rau-city-box {
            background: rgba(0, 0, 0, 0.85); border: 1px solid #39ff14;
            color: white; padding: 3px 7px; border-radius: 3px;
            font-size: 11px; white-space: nowrap; display: flex; align-items: center; gap: 5px;
        }
        .rau-city-box img { width: 16px; height: 11px; }
        .dot { width: 10px; height: 10px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 12px #39ff14; }
        .is-me .dot { background: #fff; box-shadow: 0 0 12px #fff; }
        .is-me .rau-city-box { border-color: #fff; color: #39ff14; font-weight: bold; }
    </style>
</head>
<body>

<div class="hud-rau">
    <div style="font-size: 10px; opacity: 0.7; letter-spacing: 1px;">OUVINTES EM DIRETO</div>
    <div id="live-total" class="count-big">1</div>
    <div id="status-msg" style="font-size: 10px; color: #39ff14;">A CALIBRAR SINAL...</div>
</div>

<div id="globeViz"></div>

<script>
    const fbConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.database();
    const radarRef = db.ref('rau_radar_precision_v1');

    const myID = "RAU_" + Math.random().toString(36).substr(2, 5);
    let myNode = radarRef.child(myID);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .htmlElement(d => {
            const container = document.createElement('div');
            container.className = 'rau-label' + (d.id === myID ? ' is-me' : '');
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            container.innerHTML = `
                <div class="rau-city-box">${flag} <span>${d.city || 'A LOCALIZAR...'}</span></div>
                <div class="dot"></div>
            `;
            return container;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.6;

    async function catchMe() {
        // Primeiro: Tenta IP para ter algo rápido
        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            if (d.latitude) {
                updateFirebase(d.latitude, d.longitude, d.city, d.country_code);
            }
        } catch (e) { console.log("Erro IP"); }

        // Segundo: Tenta GPS Real (se o utilizador permitir, corrige o erro do IP/Bruges)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                // Reverse Geocoding simples para pegar a cidade real do GPS
                try {
                    const rev = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                    const r = await rev.json();
                    const city = r.address.city || r.address.town || r.address.village || "Minha Localização";
                    updateFirebase(latitude, longitude, city, r.address.country_code);
                } catch(e) {
                    updateFirebase(latitude, longitude, "Localização Real", "PT");
                }
            }, null, { enableHighAccuracy: true });
        }
    }

    function updateFirebase(lat, lng, city, country) {
        myNode.set({ id: myID, lat, lng, city, country, ts: Date.now() });
        myNode.onDisconnect().remove();
        document.getElementById('status-msg').innerText = "SINAL: " + city.toUpperCase();
    }

    function init() {
        catchMe();
        radarRef.on('value', snap => {
            const now = Date.now();
            const users = Object.values(snap.val() || {}).filter(u => (now - u.ts < 35000));
            document.getElementById('live-total').innerText = Math.max(1, users.length);
            world.htmlElementsData(users.filter(u => u.lat));
        });
        setInterval(() => myNode.update({ ts: Date.now() }), 10000);
    }

    window.onload = init;
</script>
</body>
</html>
