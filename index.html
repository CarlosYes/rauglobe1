<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - TITANIUM MEMORY v29.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #rau-dashboard {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.9); color: #39ff14; padding: 25px;
            border: 2px solid #39ff14; border-radius: 15px; pointer-events: none;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.2);
        }
        #count { font-size: 3.5em; font-weight: 900; color: #fff; display: block; margin: 5px 0; }
        .pref-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        #status-light { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #ff3333; margin-right: 5px; }
        canvas { cursor: grab; }
    </style>
</head>
<body>

<div id="rau-dashboard">
    <b style="letter-spacing: 2px;">RAU COMMAND v29.0</b><br><br>
    
    <span class="pref-label">Unidades Online</span>
    <span id="count">0</span>
    
    <div style="margin-top: 15px; border-top: 1px solid rgba(57,255,20,0.2); padding-top: 10px;">
        <span class="pref-label">Configuração de Som</span><br>
        <span style="color:#fff; font-size: 13px;">🔈 VOL: <span id="v-val">--</span> | 🔄 AUTO: <span id="a-val">--</span></span>
    </div>

    <div style="margin-top: 15px; font-size: 11px;">
        <div id="status-light"></div> <span id="status-text">DESCONECTADO</span>
    </div>
</div>

<script>
    // 1. SISTEMA DE MEMÓRIA (Volume e Autoplay)
    const rauPrefs = {
        save: (v, a) => {
            localStorage.setItem('rau_volume', v);
            localStorage.setItem('rau_autoplay', a);
        },
        load: () => ({
            v: localStorage.getItem('rau_volume') || "0.80",
            a: localStorage.getItem('rau_autoplay') || "true"
        })
    };

    const myPrefs = rauPrefs.load();
    document.getElementById('v-val').innerText = Math.round(myPrefs.v * 100) + "%";
    document.getElementById('a-val').innerText = myPrefs.a === "true" ? "ON" : "OFF";

    // 2. FIREBASE (RAU_V29)
    const _k = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
    const cfg = { apiKey: atob(_k[0]), authDomain: atob(_k[1]), projectId: atob(_k[2]), appId: atob(_k[3]) };
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    const db = firebase.firestore();
    const nodeID = "OP_" + Math.random().toString(36).substr(2, 5);

    // 3. ENGINE 3D
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const world = new THREE.Group(); scene.add(world);
    const globe = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshPhongMaterial({
        map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
        shininess: 5
    }));
    world.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 1.3));
    camera.position.z = 3.5;

    const markers = new Map();
    function sync(data) {
        const ids = new Set(data.map(d => d.id));
        data.forEach(d => {
            if (!markers.has(d.id)) {
                const phi = (90-d.lat)*(Math.PI/180), theta = (d.lng+180)*(Math.PI/180);
                const pos = new THREE.Vector3().setFromSphericalCoords(1.02, phi, theta);
                const g = new THREE.Group();
                g.add(new THREE.Mesh(new THREE.SphereGeometry(0.015,12,12), new THREE.MeshBasicMaterial({color: 0x39ff14})));
                const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                canvas.width = 160; canvas.height = 50; ctx.fillStyle = 'rgba(0,30,0,0.95)'; ctx.fillRect(0,0,160,50);
                ctx.font = 'bold 14px Courier New'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                ctx.fillText(d.city.toUpperCase(), 80, 30);
                const s = new THREE.Sprite(new THREE.SpriteMaterial({map: new THREE.CanvasTexture(canvas)}));
                s.position.copy(pos.clone().multiplyScalar(1.15)); s.scale.set(0.4, 0.12, 1);
                g.add(s); world.add(g); markers.set(d.id, g);
            }
        });
        markers.forEach((obj, id) => { if (!ids.has(id)) { world.remove(obj); markers.delete(id); } });
    }

    // 4. MOVIMENTO
    let down = false, lx, ly;
    window.addEventListener('mousedown', (e) => { down = true; lx = e.clientX; ly = e.clientY; });
    window.addEventListener('mouseup', () => down = false);
    window.addEventListener('mousemove', (e) => { if (down) { world.rotation.y += (e.clientX-lx)*0.007; world.rotation.x += (e.clientY-ly)*0.007; lx=e.clientX; ly=e.clientY; } });

    // 5. LIGAÇÃO
    async function start() {
        try {
            const res = await fetch("https://ipinfo.io/json?token=e392744f6845f0").then(r => r.json());
            const [lat, lng] = res.loc.split(',').map(Number);
            
            const up = () => db.collection('RAU_V29').doc(nodeID).set({
                lat, lng, city: res.city, ts: firebase.firestore.FieldValue.serverTimestamp(),
                v: myPrefs.v, a: myPrefs.a
            }).then(() => {
                document.getElementById('status-light').style.background = "#39ff14";
                document.getElementById('status-text').innerText = "SATÉLITE ONLINE";
            }).catch(e => {
                document.getElementById('status-text').innerText = "ERRO NAS REGRAS";
            });

            up(); setInterval(up, 25000);

            db.collection('RAU_V29').where('ts', '>', new Date(Date.now() - 75000)).onSnapshot(snap => {
                const list = []; snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                sync(list); document.getElementById('count').innerText = snap.size;
            });
        } catch (e) { document.getElementById('status-text').innerText = "ERRO DE REDE"; }
    }

    function loop() { requestAnimationFrame(loop); if(!down) world.rotation.y += 0.0015; renderer.render(scene, camera); }
    start(); loop();

    // EXPOSTO: window.saveRau(0.5, "true")
    window.saveRau = (v, a) => {
        rauPrefs.save(v, a);
        location.reload();
    };
</script>
</body>
</html>
