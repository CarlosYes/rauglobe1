<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v197.0 - RADAR MODE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 20, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
            backdrop-filter: blur(5px);
        }
        .monitor-display { background: rgba(0, 0, 0, 0.9); border: 1px solid #1a1a1a; padding: 10px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; }
        
        /* HUD de Visitas */
        #visitor-tag {
            position: absolute; display: none; align-items: center; gap: 8px;
            background: rgba(0, 30, 0, 0.9); border: 1px solid #39ff14;
            padding: 5px 10px; border-radius: 3px; color: #fff;
            font-size: 13px; z-index: 500; transform: translate(-50%, -140%);
        }
        .flag { width: 22px; height: 14px; border: 1px solid #39ff14; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
        <div style="width: 10px; height: 10px; border-radius: 50%; background: #39ff14; box-shadow: 0 0 10px #39ff14;"></div>
        <span style="font-size: 11px; font-weight: bold;">RAU CORE v197.0</span>
    </div>
    <div class="monitor-display">
        <span id="mon-city">SCANNING...</span>
        <div id="mon-status" style="font-size: 10px; margin-top: 5px; opacity: 0.8;">A detetar coordenadas...</div>
    </div>
</div>

<div id="visitor-tag">
    <img id="tag-flag" src="" class="flag">
    <span id="tag-city">---</span>
</div>

<script>
    const SYSTEM = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000),
        renderer: new THREE.WebGLRenderer({ antialias: true }),
        controls: null, globe: null, markers: new THREE.Group(), node: null,

        init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(this.renderer.domElement);

            // Luzes
            this.scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const light = new THREE.PointLight(0xffffff, 1);
            light.position.set(10, 10, 10);
            this.scene.add(light);

            // Criar Globo Tecnológico (Garante que nunca fica preto)
            const geo = new THREE.SphereGeometry(1, 40, 40);
            const mat = new THREE.MeshPhongMaterial({ 
                color: 0x001100, 
                wireframe: false,
                emissive: 0x002200 
            });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            this.globe.add(this.markers);

            // Adicionar grelha de radar (estética tecnológica)
            const wireMat = new THREE.MeshBasicMaterial({ color: 0x39ff14, wireframe: true, transparent: true, opacity: 0.1 });
            const wireGlobe = new THREE.Mesh(geo, wireMat);
            wireGlobe.scale.set(1.001, 1.001, 1.001);
            this.globe.add(wireGlobe);

            // Controles Suaves
            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.enableDamping = true;
            this.controls.dampingFactor = 0.05;
            this.controls.autoRotate = true;
            this.camera.position.z = 3.5;

            this.animate();
            this.loadTexture();
            this.track();
            setInterval(() => this.track(), 10000);
        },

        loadTexture() {
            const loader = new THREE.TextureLoader();
            loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.emissive.set(0x000000);
                this.globe.material.needsUpdate = true;
            });
        },

        async track() {
            try {
                const res = await fetch(`https://ipapi.co/json/?nocache=${Date.now()}`);
                const data = await res.json();
                if (data.ip) this.updateHUD(data);
            } catch (e) { console.error("API offline"); }
        },

        updateHUD(data) {
            document.getElementById('mon-city').innerText = (data.city || "NODE").toUpperCase();
            document.getElementById('mon-status').innerText = `IP: ${data.ip}\nCOUNTRY: ${data.country_code}`;

            this.markers.clear();
            const phi = (90 - data.latitude) * (Math.PI / 180);
            const theta = (data.longitude + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.02);

            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.03, 12, 12), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
            dot.position.copy(pos);
            this.markers.add(dot);

            this.node = { mesh: dot, city: data.city, country: data.country_code.toLowerCase() };
            
            const tag = document.getElementById('visitor-tag');
            document.getElementById('tag-flag').src = `https://flagcdn.com/w40/${this.node.country}.png`;
            document.getElementById('tag-city').innerText = this.node.city;
            tag.style.display = 'flex';
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update();

            if (this.node) {
                const v = this.node.mesh.getWorldPosition(new THREE.Vector3());
                v.project(this.camera);
                const tag = document.getElementById('visitor-tag');
                if (v.z > 1) { tag.style.opacity = '0'; } 
                else { 
                    tag.style.opacity = '1';
                    tag.style.left = `${(v.x * .5 + .5) * window.innerWidth}px`;
                    tag.style.top = `${(v.y * -.5 + .5) * window.innerHeight}px`;
                }
            }
            this.renderer.render(this.scene, this.camera);
        }
    };

    window.onload = () => SYSTEM.init();
</script>
</body>
</html>
