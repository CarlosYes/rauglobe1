<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU GEOMONITOR - SISTEMA DE VISITAS</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; }
        
        /* Contentor do Globo GIF */
        #globe-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vh; height: 80vh; max-width: 90vw;
            display: flex; align-items: center; justify-content: center;
        }
        
        #globe-gif {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0, 255, 0, 0.2));
            opacity: 0.8;
        }

        /* Interface de Monitorização */
        #rau-ui {
            position: absolute; top: 30px; left: 30px; z-index: 100;
            background: rgba(0, 15, 0, 0.9); border-left: 4px solid #39ff14;
            padding: 20px; width: 280px; box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .display-unit { background: #000; border: 1px solid #1a1a1a; padding: 12px; margin-bottom: 10px; }
        .label { font-size: 10px; color: #39ff14; letter-spacing: 2px; font-weight: bold; display: block; margin-bottom: 5px; }
        .counter { font-size: 28px; color: #fff; font-weight: 900; font-family: sans-serif; }
        
        #status-bar { font-size: 9px; opacity: 0.5; text-transform: uppercase; }
        
        /* Ponto de Localização (Simulado sobre o GIF) */
        #user-node {
            position: absolute; width: 12px; height: 12px; background: #39ff14;
            border-radius: 50%; box-shadow: 0 0 15px #39ff14;
            display: none; z-index: 50;
        }
    </style>
</head>
<body>

<div id="rau-ui">
    <div style="font-size: 11px; margin-bottom: 15px; font-weight: bold;">RAU NETWORK MONITOR // v221</div>
    
    <div class="display-unit">
        <span class="label">TOTAL DE ACESSOS</span>
        <span id="total-count" class="counter">0000</span>
    </div>

    <div class="display-unit">
        <span class="label">CONEXÕES EM DIRETO</span>
        <span id="live-count" class="counter" style="color: #00ffff;">00</span>
    </div>

    <div id="status-bar">Firebase Uplink: Ativo</div>
</div>

<div id="globe-container">
    <img id="globe-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJpbnI2ZmxidXNidXNidXNidXNidXNidXNidXNidXNidXNidXNidSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKMGpxPucV5z7sk/giphy.gif" alt="RAU Globe">
    <div id="user-node"></div>
</div>

<script>
    // Suas chaves de conexão (Verificadas)
    const firebaseConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        authDomain: "radiodosamigosunidos-aadda.firebaseapp.com",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda",
        storageBucket: "radiodosamigosunidos-aadda.firebasestorage.app",
        messagingSenderId: "451945612071",
        appId: "1:451945612071:web:383c551ca22744f6845f02"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const statsRef = db.ref('geovisitas');

    async function startMonitor() {
        try {
            // 1. Contador Total (Soma 1 a cada entrada)
            statsRef.child('total').transaction(current => (current || 0) + 1);
            statsRef.child('total').on('value', s => {
                document.getElementById('total-count').innerText = String(s.val()).padStart(4, '0');
            });

            // 2. Sistema de Conexões Vivas (Online Now)
            const myConnection = statsRef.child('online').push();
            myConnection.set({ timestamp: Date.now() });
            myConnection.onDisconnect().remove();

            // 3. Atualizar o painel de quem está online
            statsRef.child('online').on('value', snap => {
                const count = snap.numChildren();
                document.getElementById('live-count').innerText = String(count).padStart(2, '0');
            });

            // 4. Detetar Localização básica para o painel
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            if(data.city) {
                document.getElementById('status-bar').innerText = "NODE: " + data.city.toUpperCase() + " // UP";
            }

        } catch (e) {
            document.getElementById('status-bar').innerText = "ERRO DE SINCRONIZAÇÃO";
        }
    }

    window.onload = startMonitor;
</script>

</body>
</html>
