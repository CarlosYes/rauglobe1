<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU MONITOR v225.0 - X-STREAM EDITION</title>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; }

        #globeViz { position: absolute; width: 100vw; height: 100vh; background: #000; z-index: 1; }

        /* Interface Estilo Matrix/Hacker */
        .hud-panel {
            position: absolute; z-index: 1000; padding: 15px;
            background: rgba(0, 10, 0, 0.9); border: 1px solid rgba(57, 255, 20, 0.3);
            pointer-events: none;
        }
        #left-panel { top: 20px; left: 20px; border-left: 4px solid #39ff14; width: 260px; }
        #right-panel { top: 20px; right: 20px; border-right: 4px solid #00ffff; width: 220px; max-height: 80vh; overflow: hidden; }

        .data-box { background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #111; margin-top: 5px; }
        .city-label { font-size: 18px; color: #fff; font-weight: 900; text-transform: uppercase; display: block; }
        
        .entry { 
            font-size: 10px; padding: 6px 0; border-bottom: 1px solid rgba(0, 255, 255, 0.1);
            display: flex; align-items: center; gap: 8px; animation: slide 0.3s ease-out;
        }
        .flag { width: 16px; height: 11px; filter: contrast(1.2); }
        
        @keyframes slide { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div id="left-panel" class="hud-panel">
    <div style="font-size: 9px; letter-spacing: 2px; opacity: 0.6;">RAU_NET_MONITOR_v225</div>
    <div class="data-box">
        <span id="mon-city">A SINCRONIZAR...</span>
        <div id="mon-status" style="font-size: 9px; color: #888; margin-top: 4px;">PROTOCOL: SECURE_VPN</div>
        <div id="mon-count" style="font-size: 11px; color: #39ff14; margin-top: 8px; font-weight: bold;">NODE_ACTIVE: 0</div>
    </div>
</div>

<div id="right-panel" class="hud-panel">
    <div style="font-size: 10px; color: #00ffff; margin-bottom: 8px; font-weight: bold;">LIVE_GLOBAL_FEED</div>
    <div id="traffic-list"></div>
</div>

<div id="globeViz"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        authDomain: "radiodosamigosunidos-aadda.firebaseapp.com",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda",
        storageBucket: "radiodosamigosunidos-aadda.firebasestorage.app",
        messagingSenderId: "451945612071",
        appId: "1:451945612071:web:383c551ca22744f6845f02"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const listenersRef = db.ref('listeners');

    // Inicialização Blindada do Globo
    const world = Globe()
        (document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .pointColor(() => '#39ff14')
        .pointAltitude(0.12)
        .pointRadius(0.4)
        .pointsMerge(false);

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    async function connectNetwork() {
        try {
            // Usamos o IPWHO.IS que é o que mais se aproxima da estabilidade do player da XatRadio em HTTPS
            const res = await fetch('https://ipwho.is/');
            const data = await res.json();
            
            if (!data.success) throw new Error("API Limit");

            const myRef = listenersRef.push();
            const myData = {
                lat: data.latitude,
                lng: data.longitude,
                city: data.city || "VPN Anonymous",
                country: data.country_code.toLowerCase(),
                timestamp: Date.now()
            };

            myRef.set(myData);
            myRef.onDisconnect().remove();

            document.getElementById('mon-city').innerText = myData.city.toUpperCase();
            
            // Sync Real-Time
            listenersRef.on('value', snap => {
                const val = snap.val() || {};
                const nodes = Object.entries(val);
                
                document.getElementById('mon-count').innerText = `NODE_ACTIVE: ${nodes.length}`;
                world.pointsData(nodes.map(([id, info]) => ({ lat: info.lat, lng: info.lng })));

                const list = document.getElementById('traffic-list');
                list.innerHTML = '';
                nodes.sort((a,b) => b[1].timestamp - a[1].timestamp).slice(0, 12).forEach(([id, info]) => {
                    const row = document.createElement('div');
                    row.className = 'entry';
                    row.innerHTML = `<img class="flag" src="https://flagcdn.com/w40/${info.country}.png"><span>${info.city}</span>`;
                    list.appendChild(row);
                });
            });

        } catch (e) {
            document.getElementById('mon-city').innerText = "OFFLINE_MODE";
            console.error("Rede instável.");
        }
    }

    window.addEventListener('resize', () => { world.width(window.innerWidth); world.height(window.innerHeight); });
    window.onload = connectNetwork;
</script>
</body>
</html>
