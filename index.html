<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v105 - GITHUB DEPLOY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); border: 2px solid #39ff14;
            padding: 15px 25px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
        }
        .count-on { font-size: 50px; font-weight: 900; line-height: 1; }
        .status-msg { font-size: 10px; margin-top: 5px; font-family: monospace; color: #39ff14; opacity: 0.8; }

        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 2px;
            font-size: 10px; font-weight: 900; border: 1px solid #39ff14; color: #39ff14; 
            white-space: nowrap; text-transform: uppercase;
        }
        .d-rau { 
            width: 8px; height: 8px; background: #39ff14; border-radius: 50%; 
            margin-top: 4px; box-shadow: 0 0 10px #39ff14; 
            animation: pulse 1.2s infinite; 
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">--</div>
    <div id="status" class="status-msg">SINAL: RASTREANDO...</div>
</div>

<div id="globeViz"></div>

<script>
    // Credenciais e ID de Sessão Único
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'RAU-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    const visitors = new Map();

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = `m-rau`;
            el.innerHTML = `<div class="l-rau">${d.city}</div><div class="d-rau"></div>`;
            return el;
        });

    // Motor de Localização Robusto para GitHub Pages
    async function getDiscovery() {
        try {
            // Tentativa 1: ipapi.co (Mais preciso para evitar Zeebrugge)
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            if (d.latitude) return { lat: d.latitude, lng: d.longitude, city: d.city.toUpperCase() };
        } catch (e) {
            try {
                // Tentativa 2: ip-api.com (Fallback estável)
                const r = await fetch('https://ip-api.com/json/');
                const d = await r.json();
                return { lat: d.lat, lng: d.lon, city: d.city.toUpperCase() };
            } catch (e2) {
                // Emergência: Se tudo travar, não dá erro crítico
                return { lat: 38.7, lng: -9.1, city: "SINAL REGENERADO" };
            }
        }
    }

    async function init() {
        const geo = await getDiscovery();
        
        // Inicialização do Ably Realtime
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('monitor-rau-signal');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `SINAL: ${geo.city} [ONLINE]`;
            channel.presence.enter(geo);
            
            channel.presence.subscribe(['enter', 'present', 'update'], (m) => {
                if(m.data && m.data.lat) {
                    visitors.set(m.clientId, m.data);
                    sync();
                }
            });

            channel.presence.subscribe('leave', (m) => {
                visitors.delete(m.clientId);
                sync();
            });
        });

        // Foca na posição real detectada
        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.0 }, 2000);
    }

    function sync() {
        const nodes = Array.from(visitors.values());
        document.getElementById('onlineCount').innerText = nodes.length.toString().padStart(2, '0');
        world.htmlElementsData(nodes);
    }

    world.controls().autoRotate = true;
    window.onload = init;
</script>
</body>
</html>
