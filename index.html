<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v265.0 - FLAG-DATA PRECISION</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; }
        
        /* HUD - Interface de Comando */
        .hud-rau {
            position: absolute; top: 25px; left: 25px; z-index: 100;
            background: rgba(0, 8, 20, 0.95); border: 1px solid #39ff14;
            padding: 18px; border-radius: 2px; color: #fff; pointer-events: none;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.1);
        }
        .count-num { font-size: 52px; font-weight: 800; color: #39ff14; line-height: 0.9; }
        .label-rau { font-size: 9px; letter-spacing: 3px; opacity: 0.6; margin-bottom: 4px; }
        
        /* Labels Geográficas */
        .rau-marker { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .rau-box {
            background: rgba(0, 0, 0, 0.9); border: 1px solid #39ff14;
            color: #fff; padding: 4px 10px; border-radius: 2px;
            font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .rau-box img { width: 16px; height: auto; border: 1px solid rgba(255,255,255,0.2); }
        .pulse-dot { width: 8px; height: 8px; background: #39ff14; border-radius: 50%; margin-top: 5px; box-shadow: 0 0 10px #39ff14; }
        
        /* Estilo para o utilizador atual */
        .is-me .pulse-dot { background: #fff; box-shadow: 0 0 15px #fff; width: 10px; height: 10px; }
        .is-me .rau-box { border-color: #fff; color: #39ff14; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="hud-rau">
    <div class="label-rau">RADAR DE EMISSÃO</div>
    <div id="live-total" class="count-num">1</div>
    <div id="status-info" style="font-size: 10px; color: #39ff14; margin-top: 10px; border-top: 1px solid rgba(57,255,20,0.2); padding-top: 5px;">
        A RASTREAR IP...
    </div>
</div>

<div id="globeViz"></div>

<script>
    // Configurações do Firebase
    const fbConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.database();
    const radarRef = db.ref('rau_radar_precision_v1');

    const myID = "USER_" + Math.random().toString(36).substr(2, 7);
    let myNode = radarRef.child(myID);

    // Inicializar Globo 3D
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .atmosphereDaylightAlpha(0.15)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'rau-marker' + (d.id === myID ? ' is-me' : '');
            const flagUrl = d.country ? `https://flagcdn.com/w40/${d.country.toLowerCase()}.png` : '';
            el.innerHTML = `
                <div class="rau-box">
                    ${d.country ? `<img src="${flagUrl}">` : ''}
                    <span>${d.city || 'SINAL ATIVO'}</span>
                </div>
                <div class="pulse-dot"></div>
            `;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    /**
     * OBTENÇÃO DE DADOS (Método FlagCounter/IP-Based)
     * Obtém localização exata da cidade sem solicitar permissão de GPS.
     */
    async function trackVisitor() {
        try {
            // API ipwho.is - Rápida e com dados geográficos completos
            const response = await fetch('https://ipwho.is/');
            const data = await response.json();
            
            if (data.success) {
                const payload = {
                    id: myID,
                    lat: data.latitude,
                    lng: data.longitude,
                    city: data.city,
                    country: data.country_code,
                    ts: Date.now()
                };
                
                myNode.set(payload);
                myNode.onDisconnect().remove(); // Remove ao sair
                
                document.getElementById('status-info').innerText = 
                    `SINAL: ${data.city.toUpperCase()} (${data.country_code})`;
            }
        } catch (err) {
            console.error("Falha no rastreio silencioso.");
            document.getElementById('status-info').innerText = "SINAL EM MODO ANÓNIMO";
        }
    }

    function syncRadar() {
        trackVisitor();
        
        // Escuta mudanças no Firebase em tempo real
        radarRef.on('value', snap => {
            const data = snap.val() || {};
            const now = Date.now();
            
            // Filtra apenas utilizadores que enviaram sinal nos últimos 60 segundos
            const activeNodes = Object.values(data).filter(u => (now - u.ts < 60000));
            
            document.getElementById('live-total').innerText = activeNodes.length;
            world.htmlElementsData(activeNodes.filter(u => u.lat));
        });

        // Loop de "batimento cardíaco" para manter o ponto no mapa
        setInterval(() => {
            myNode.update({ ts: Date.now() });
        }, 25000);
    }

    window.onload = syncRadar;
</script>
</body>
</html>
