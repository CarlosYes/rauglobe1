<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - GLOBO RADAR REALTIME</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { width: 100vw; height: 100vh; position: relative; }
        
        /* Contador de Visitas Estilo RevolverMaps */
        .hud { 
            position: absolute; top: 20px; left: 20px; z-index: 10000; 
            background: rgba(0, 30, 0, 0.9); color: #39ff14; padding: 12px 18px; 
            border: 1px solid #39ff14; border-radius: 2px; pointer-events: none;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
        }

        /* Etiquetas das Cidades - Visual de Radar */
        .city-label {
            position: absolute; color: #fff; background: rgba(0, 0, 0, 0.85);
            padding: 4px 12px; border-left: 4px solid #39ff14;
            font-size: 13px; font-weight: bold; pointer-events: none;
            z-index: 5000; text-transform: uppercase; white-space: nowrap;
            display: none; box-shadow: 3px 3px 10px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        /* Ponto de Localização */
        .dot {
            position: absolute; width: 10px; height: 10px; background: #39ff14;
            border-radius: 50%; z-index: 4999; box-shadow: 0 0 15px #39ff14;
            transform: translate(-50%, -50%); border: 1.5px solid #fff; display: none;
        }
    </style>
</head>
<body>

<div class="hud">
    <b style="font-size: 1.2em;">RADAR RADIO AMIGOS UNIDOS</b><br>
    <hr style="border: 0; border-top: 1px solid #39ff14; margin: 10px 0; opacity: 0.5;">
    VISITAS AGORA: <span id="count" style="font-size: 1.6em; font-weight: bold;">1</span>
</div>
<div id="canvas-container"></div>

<script>
    // Configurações Firebase
    const _k = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
    const cfg = { apiKey: atob(_k[0]), authDomain: atob(_k[1]), projectId: atob(_k[2]), appId: atob(_k[3]) };
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    const db = firebase.firestore();
    const myId = "RAU_" + Math.random().toString(36).substr(2, 6);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    // Carregamento de Textura NASA com tratamento de CORS
    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin('anonymous');
    const earth = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshPhongMaterial({ 
            map: loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 15
        })
    );
    globeGroup.add(earth);

    scene.add(new THREE.AmbientLight(0xaaaaaa));
    const light = new THREE.DirectionalLight(0xffffff, 0.8);
    light.position.set(5, 3, 5);
    scene.add(light);
    camera.position.z = 3;

    let isDragging = false;
    document.addEventListener('mousedown', () => isDragging = true);
    document.addEventListener('mouseup', () => isDragging = false);
    document.addEventListener('mousemove', (e) => {
        if(isDragging) {
            globeGroup.rotation.y += e.movementX * 0.005;
            globeGroup.rotation.x += e.movementY * 0.005;
        }
    });

    let markers = [];
    function createMarker(lat, lng, city) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        const anchor = new THREE.Object3D();
        anchor.position.set(-Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
        globeGroup.add(anchor);

        const dot = document.createElement('div'); dot.className = 'dot';
        const label = document.createElement('div'); label.className = 'city-label';
        label.innerText = (city || "Ouvinte").toUpperCase();
        document.body.appendChild(dot);
        document.body.appendChild(label);
        markers.push({ anchor, dot, label });
    }

    async function initRadar() {
        try {
            // Detecção automática de IP para pegar a cidade sem cliques
            const res = await fetch("https://ipinfo.io/json?token=e392744f6845f0");
            const data = await res.json();
            const loc = data.loc.split(',');
            
            const up = () => db.collection('rau_live_v5').doc(myId).set({
                lat: parseFloat(loc[0]), lng: parseFloat(loc[1]), city: data.city,
                ts: firebase.firestore.FieldValue.serverTimestamp()
            });
            up(); setInterval(up, 25000);

            // Monitoramento em tempo real do contador e pontos
            db.collection('rau_live_v5').where('ts', '>', new Date(Date.now() - 60000)).onSnapshot(snap => {
                markers.forEach(m => { if(m.dot.parentNode) m.dot.remove(); if(m.label.parentNode) m.label.remove(); });
                markers = [];
                for(let i = globeGroup.children.length - 1; i >= 0; i--) {
                    if (globeGroup.children[i].type === "Object3D") globeGroup.remove(globeGroup.children[i]);
                }
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.lat) createMarker(d.lat, d.lng, d.city);
                });
                document.getElementById('count').innerText = snap.size;
            });
        } catch(e) { console.error("Erro no Radar."); }
    }

    function animate() {
        requestAnimationFrame(animate);
        if(!isDragging) globeGroup.rotation.y += 0.002;

        markers.forEach(m => {
            const vec = new THREE.Vector3();
            m.anchor.getWorldPosition(vec);
            const dist = camera.position.distanceTo(vec);
            vec.project(camera);
            
            // Só mostra a etiqueta se estiver virada para nós (efeito RevolverMaps)
            if (dist < 3.0) {
                m.dot.style.display = m.label.style.display = 'block';
                const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-vec.y * 0.5 + 0.5) * window.innerHeight;
                m.dot.style.left = x + 'px'; m.dot.style.top = y + 'px';
                m.label.style.left = (x + 12) + 'px'; m.label.style.top = (y - 12) + 'px';
            } else {
                m.dot.style.display = m.label.style.display = 'none';
            }
        });
        renderer.render(scene, camera);
    }
    initRadar(); animate();
</script>
</body>
</html>
