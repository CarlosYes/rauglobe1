<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU REAL GLOBE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #globeViz { width: 100vw; height: 100vh; }
        .label {
            background: #fff; color: #000; padding: 2px 6px;
            font-family: Arial, sans-serif; font-size: 11px; font-weight: bold;
            border-radius: 2px; transform: translateY(-15px);
        }
        .dot { width: 6px; height: 6px; background: #00f2ff; border-radius: 50%; box-shadow: 0 0 10px #00f2ff; }
    </style>
</head>
<body>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'UID-' + Math.random().toString(36).substr(2, 5);

    async function init() {
        // Captura direta de geovisita real
        let geo = { lat: 0, lng: 0, city: "A carregar..." };
        try {
            const res = await fetch('https://ipwho.is/');
            const d = await res.json();
            geo = { lat: d.latitude, lng: d.longitude, city: d.city.toUpperCase() };
        } catch(e) {
            const res2 = await fetch('https://ipapi.co/json/');
            const d2 = await res2.json();
            geo = { lat: d2.latitude, lng: d2.longitude, city: d2.city.toUpperCase() };
        }

        const world = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundColor('#000000')
            .htmlElement(d => {
                const el = document.createElement('div');
                el.style.display = 'flex';
                el.style.flexDirection = 'column';
                el.style.alignItems = 'center';
                el.innerHTML = `<div class="label">${d.city}</div><div class="dot"></div>`;
                return el;
            });

        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('live-visits');

        ably.connection.on('connected', () => {
            channel.presence.enter(geo);
            const sync = () => {
                channel.presence.get((err, members) => {
                    if (!err) {
                        const activePoints = members.map(m => m.data).filter(p => p.lat);
                        world.htmlElementsData(activePoints);
                    }
                });
            };
            channel.presence.subscribe(['enter', 'leave', 'present'], sync);
            sync();
        });

        // Âncora imediata no ponto detetado
        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.5 }, 500);
        world.controls().autoRotate = true;
    }

    init();
</script>
</body>
</html>
