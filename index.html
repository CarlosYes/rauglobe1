<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v44.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 20, 0, 0.9); color: #39ff14; padding: 25px;
            border: 2px solid #39ff14; border-radius: 12px; pointer-events: none;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.2);
        }
        #count { font-size: 3.5em; font-weight: 900; color: #fff; display: block; line-height: 1; margin: 10px 0; }
        #status { font-size: 11px; font-weight: bold; letter-spacing: 1px; }
        .memory-box { font-size: 10px; color: #888; margin-top: 15px; border-top: 1px solid #1a1a1a; padding-top: 10px; }
    </style>
</head>
<body>

<div id="rau-ui">
    <b>RAU COMMAND v44.0</b><br>
    <span id="status" style="color: #39ff14;">🟢 SISTEMA ATIVO</span>
    
    <span id="count">1</span>
    <span style="font-size: 10px; color: #39ff14;">UNIDADES DETETADAS</span>

    <div class="memory-box">
        💾 MEMÓRIA DO PLAYER:<br>
        🔈 <span id="v-mem">--</span> | 🔄 <span id="a-mem">--</span>
    </div>
</div>

<script>
    // 1. GESTÃO DE MEMÓRIA (Volume e Autoplay)
    const rauPrefs = {
        save: (v, a) => { localStorage.setItem('rau_v', v); localStorage.setItem('rau_a', a); },
        load: () => ({ v: localStorage.getItem('rau_v') || "0.8", a: localStorage.getItem('rau_a') || "true" })
    };
    const prefs = rauPrefs.load();
    document.getElementById('v-mem').innerText = "VOL " + Math.round(prefs.v * 100) + "%";
    document.getElementById('a-mem').innerText = "AUTO " + (prefs.a === "true" ? "ON" : "OFF");

    // 2. AMBIENTE 3D
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const world = new THREE.Group(); scene.add(world);
    const globe = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshPhongMaterial({
        map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
        shininess: 5
    }));
    world.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 1.4));
    camera.position.z = 3.5;

    // 3. CIDADES REAIS NO GLOBO
    async function addLocation() {
        try {
            const res = await fetch("https://ipinfo.io/json?token=e392744f6845f0").then(r => r.json());
            const [lat, lng] = res.loc.split(',').map(Number);
            const city = res.city.toUpperCase();

            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3().setFromSphericalCoords(1.03, phi, theta);

            // Marcador
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.018, 12, 12), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
            dot.position.copy(pos);
            world.add(dot);

            // Etiqueta da Cidade
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 80;
            ctx.fillStyle = 'rgba(0, 30, 0, 0.85)';
            ctx.fillRect(0, 0, 256, 80);
            ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 4; ctx.strokeRect(0, 0, 256, 80);
            ctx.font = 'bold 30px Courier New'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
            ctx.fillText(city, 128, 50);

            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            sprite.position.copy(pos.clone().multiplyScalar(1.15));
            sprite.scale.set(0.6, 0.2, 1);
            world.add(sprite);

        } catch (e) { console.log("Erro de Geo"); }
    }

    // 4. CONTADOR SIMULADO (Até ligarmos o P2P final)
    let visitors = Math.floor(Math.random() * 5) + 1;
    document.getElementById('count').innerText = visitors;

    // 5. LOOP DE ANIMAÇÃO
    function loop() {
        requestAnimationFrame(loop);
        world.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    addLocation();
    loop();

    // COMANDO PARA O TEU PLAYER: window.updateRAU(0.5, "true")
    window.updateRAU = (v, a) => {
        rauPrefs.save(v, a);
        location.reload();
    };
</script>
</body>
</html>
