<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v66.0 - GLOBAL CONNECT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.98); border: 2px solid #39ff14;
            padding: 20px; width: 280px; box-shadow: 0 0 50px rgba(0, 255, 0, 0.4);
        }
        #count { font-size: 4.5em; font-weight: 900; color: #fff; display: block; line-height: 0.8; }
        .label { font-size: 10px; font-weight: bold; text-transform: uppercase; opacity: 0.7; }
        #monitor { margin-top: 15px; padding: 12px; background: #001a00; border: 1px solid #1a331a; }
        #city-name { font-size: 20px; color: #fff; font-weight: bold; display: block; }
        #status { font-size: 9px; margin-top: 8px; color: #39ff14; opacity: 0.6; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div class="label">RAU COMMAND v66.0</div>
    <span id="count">0</span>
    <div class="label">SINAIS ACTIVOS</div>
    
    <div id="monitor">
        <span id="city-name">RASTREANDO...</span>
        <div id="status">ESTADO: SINCRONIZANDO GLOBO...</div>
    </div>
</div>

<script>
    // 🔗 CONFIGURAÇÃO DE LIGAÇÃO (PROTOCOLO FIREBASE)
    const firebaseConfig = {
        databaseURL: "https://rau-globe-default-rtdb.firebaseio.com" // Canal público de teste
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const presenceRef = db.ref("presence");
    const myUserRef = presenceRef.push();

    let scene, camera, renderer, controls, globeGroup;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.autoRotate = true; camera.position.z = 3.5;

        globeGroup = new THREE.Group();
        scene.add(globeGroup);

        const globe = new THREE.Mesh(
            new THREE.SphereGeometry(1, 64, 64),
            new THREE.MeshPhongMaterial({
                map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
                shininess: 5
            })
        );
        globeGroup.add(globe);
        scene.add(new THREE.AmbientLight(0xffffff, 2.5));

        animate();
        syncPresence();
    }

    async function syncPresence() {
        try {
            const res = await fetch(`https://get.geojs.io/v1/ip/geo.json`);
            const data = await res.json();
            
            const userData = {
                city: data.city || "RAU-NODE",
                lat: parseFloat(data.latitude),
                lon: parseFloat(data.longitude),
                lastActive: Date.now()
            };

            document.getElementById('city-name').innerText = userData.city.toUpperCase();
            document.getElementById('status').innerText = "ESTADO: SINAL ACTIVADO ✓";

            // Regista entrada e remove ao fechar a página
            myUserRef.set(userData);
            myUserRef.onDisconnect().remove();

        } catch(e) {
            myUserRef.set({ city: "ANÓNIMO", lat: 0, lon: 0, lastActive: Date.now() });
        }

        // Escuta todos os utilizadores online
        presenceRef.on("value", (snapshot) => {
            const allUsers = snapshot.val() || {};
            const userArray = Object.values(allUsers);
            document.getElementById('count').innerText = userArray.length;
            updateMarkers(userArray);
        });
    }

    function updateMarkers(users) {
        // Limpa apenas os pontos
        for(let i = globeGroup.children.length - 1; i > 0; i--) globeGroup.remove(globeGroup.children[i]);

        users.forEach(u => {
            const phi = (90 - u.lat) * (Math.PI / 180);
            const theta = (u.lon + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(-(Math.sin(phi)*Math.cos(theta))*1.02, Math.cos(phi)*1.02, (Math.sin(phi)*Math.sin(theta))*1.02);

            const isMe = (u.lat === parseFloat(myUserRef.lat)); // Simplificação
            const dot = new THREE.Mesh(
                new THREE.SphereGeometry(0.02, 16, 16), 
                new THREE.MeshBasicMaterial({ color: 0x39ff14 })
            );
            dot.position.copy(pos);
            globeGroup.add(dot);
        });
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    init();
</script>
</body>
</html>
