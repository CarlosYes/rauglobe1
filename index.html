<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v118 - SINAL REAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.9); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none;
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        .status-msg { font-size: 10px; margin-top: 10px; font-family: monospace; color: #39ff14; text-transform: uppercase; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.9); padding: 4px 10px; border-radius: 2px;
            font-size: 11px; font-weight: 900; border: 1px solid #39ff14; color: #39ff14; 
            white-space: nowrap;
        }
        .d-rau { width: 8px; height: 8px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 15px #39ff14; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status" class="status-msg">Sincronizando Hardware...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'RAU-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    const visitors = new Map();

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000').showAtmosphere(true).atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = `m-rau`;
            el.innerHTML = `<div class="l-rau">${d.city}</div><div class="d-rau"></div>`;
            return el;
        });

    // SISTEMA DE DESCOBERTA HÍBRIDO (SEM BLOQUEIO)
    async function getDiscovery() {
        return new Promise((resolve) => {
            let found = false;

            // 1. Tentativa via IP Geolocation Direta (Mais rápido)
            fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
                if (!found) {
                    found = true;
                    resolve({ lat: d.latitude, lng: d.longitude, city: (d.city || "SINAL ATIVO").toUpperCase() });
                }
            }).catch(() => {
                // 2. Backup via IPWhois se o primeiro falhar
                fetch('https://ipwho.is/').then(r => r.json()).then(d => {
                    if (!found) {
                        found = true;
                        resolve({ lat: d.latitude, lng: d.longitude, city: (d.city || "SINAL ATIVO").toUpperCase() });
                    }
                });
            });

            // 3. Segurança Máxima (Timeout)
            setTimeout(() => {
                if (!found) {
                    found = true;
                    resolve({ lat: 0, lng: 0, city: "SINAL GLOBAL" });
                }
            }, 5000);
        });
    }

    async function start() {
        const geo = await getDiscovery();
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('rau-realtime-v118');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `SINAL: ${geo.city}`;
            channel.presence.enter(geo);
            
            channel.presence.subscribe(['enter', 'present', 'update'], (m) => {
                if(m.data && m.data.lat !== undefined) {
                    visitors.set(m.clientId, m.data);
                    sync();
                }
            });

            channel.presence.subscribe('leave', (m) => {
                visitors.delete(m.clientId);
                sync();
            });
        });

        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.5 }, 2000);
    }

    function sync() {
        const data = Array.from(visitors.values());
        document.getElementById('onlineCount').innerText = data.length;
        world.htmlElementsData(data);
    }

    world.controls().autoRotate = true;
    window.onload = start;
</script>
</body>
</html>
