<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - RADAR REALTIME</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #canvas-container { width: 100vw; height: 100vh; }
        .hud { 
            position: absolute; top: 20px; left: 20px; z-index: 100; 
            color: #39ff14; background: rgba(0, 10, 0, 0.9); padding: 15px; 
            border: 1px solid #39ff14; pointer-events: none; border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="hud">
    <b style="font-size: 1.2em;">RADAR AMIGOS UNIDOS</b><br>
    <span id="my-loc">A localizar sinal...</span><br>
    <hr style="border:0; border-top:1px solid #39ff14; margin:8px 0; opacity: 0.3;">
    OUVINTES ATIVOS: <span id="count" style="font-size: 1.3em;">1</span>
</div>

<div id="canvas-container"></div>

<script>
    // 1. CONFIGURAÇÃO FIREBASE
    const _k = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
    const cfg = { apiKey: atob(_k[0]), authDomain: atob(_k[1]), projectId: atob(_k[2]), appId: atob(_k[3]) };
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    const db = firebase.firestore();
    const myId = "USER_" + Math.random().toString(36).substr(2, 5);

    // 2. SETUP THREE.JS
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    // Esfera
    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin('anonymous');
    const earth = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshPhongMaterial({
            map: loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 5
        })
    );
    globeGroup.add(earth);

    scene.add(new THREE.AmbientLight(0xbbbbbb));
    const light = new THREE.DirectionalLight(0xffffff, 0.8);
    light.position.set(5, 3, 5);
    scene.add(light);
    camera.position.z = 3;

    // 3. CRIAÇÃO DE ETIQUETA WEBGL (O Pulo do Gato Real)
    function createTextSprite(text) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512; canvas.height = 128;
        
        ctx.fillStyle = 'rgba(0, 30, 0, 0.9)';
        ctx.fillRect(0, 30, 512, 70);
        ctx.strokeStyle = '#39ff14';
        ctx.lineWidth = 4;
        ctx.strokeRect(0, 30, 512, 70);
        
        ctx.font = 'Bold 44px Courier New';
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.fillText(text.toUpperCase(), 256, 80);

        const texture = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, depthTest: true }));
        sprite.scale.set(0.5, 0.12, 1);
        return sprite;
    }

    function addMarker(lat, lng, cityName) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        const pos = new THREE.Vector3(
            -Math.sin(phi) * Math.cos(theta),
            Math.cos(phi),
            Math.sin(phi) * Math.sin(theta)
        );

        const markerGroup = new THREE.Group();
        markerGroup.name = "visitor"; // Para limpeza fácil

        // Ponto verde
        const dot = new THREE.Mesh(
            new THREE.SphereGeometry(0.015, 12, 12),
            new THREE.MeshBasicMaterial({ color: 0x39ff14 })
        );
        dot.position.copy(pos);
        markerGroup.add(dot);

        // Etiqueta
        const label = createTextSprite(cityName || "Ouvinte");
        label.position.copy(pos.clone().multiplyScalar(1.08));
        markerGroup.add(label);

        globeGroup.add(markerGroup);
    }

    // 4. LOGICA DE DADOS
    async function runRadar() {
        try {
            const res = await fetch("https://ipinfo.io/json?token=e392744f6845f0");
            const data = await res.json();
            const [lat, lng] = data.loc.split(',').map(Number);
            document.getElementById('my-loc').innerText = "Tu em: " + data.city;

            const send = () => db.collection('rau_final_v1').doc(myId).set({
                lat, lng, city: data.city, ts: firebase.firestore.FieldValue.serverTimestamp()
            });
            send(); setInterval(send, 25000);

            db.collection('rau_final_v1').where('ts', '>', new Date(Date.now() - 60000)).onSnapshot(snap => {
                // Limpar marcadores antigos
                const toRemove = [];
                globeGroup.traverse(child => { if(child.name === "visitor") toRemove.push(child); });
                toRemove.forEach(c => globeGroup.remove(c));

                snap.forEach(doc => {
                    const d = doc.data();
                    addMarker(d.lat, d.lng, d.city);
                });
                document.getElementById('count').innerText = snap.size;
            });
        } catch(e) { console.error("Erro no Radar"); }
    }

    // 5. ANIMAÇÃO
    function animate() {
        requestAnimationFrame(animate);
        globeGroup.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    runRadar();
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
