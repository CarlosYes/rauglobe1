<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v50.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 10, 0, 0.9); color: #39ff14; padding: 20px;
            border: 1px solid #39ff14; pointer-events: none;
        }
        #count { font-size: 3em; font-weight: 900; color: #fff; display: block; }
        .label { font-size: 10px; letter-spacing: 1px; color: #39ff14; font-weight: bold; text-transform: uppercase; }
        #city-name { color: #fff; font-weight: bold; }
        .mem-info { margin-top: 15px; border-top: 1px solid #222; font-size: 11px; padding-top: 10px; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div class="label">RAU COMMAND v50.0</div>
    <span id="count">1</span>
    <div class="label">LOCAL: <span id="city-name">...</span></div>
    
    <div class="mem-info">
        💾 PLAYER MEMORY:<br>
        <span style="color:#39ff14">🔈 VOL: <span id="v-val">--</span> | 🔄 AUTO: <span id="a-val">--</span></span>
    </div>
</div>

<script>
    // 1. MEMÓRIA DO PLAYER
    const rauStore = {
        save: (v, a) => { localStorage.setItem('rau_v', v); localStorage.setItem('rau_a', a); },
        load: () => ({ v: localStorage.getItem('rau_v') || "0.80", a: localStorage.getItem('rau_a') || "true" })
    };
    const myData = rauStore.load();
    document.getElementById('v-val').innerText = Math.round(myData.v * 100) + "%";
    document.getElementById('a-val').innerText = myData.a === "true" ? "ON" : "OFF";

    // 2. AMBIENTE 3D
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 1.5;
    controls.maxDistance = 8;

    const world = new THREE.Group(); 
    // Rotação inicial para alinhar o mapa (meridiano de Greenwich)
    world.rotation.y = -Math.PI / 2;
    scene.add(world);

    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64), 
        new THREE.MeshPhongMaterial({
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 5
        })
    );
    world.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    camera.position.set(0, 0.5, 3.5);

    // 3. GPS E ETIQUETA (BRUGES FIX)
    async function activateRadar() {
        try {
            const res = await fetch("https://ipapi.co/json/").then(r => r.json());
            const city = (res.city || "BRUGES").toUpperCase();
            document.getElementById('city-name').innerText = city;

            const lat = res.latitude, lng = res.longitude;
            
            // Conversão de Coordenadas Geográficas para 3D (X, Y, Z)
            const radLat = (lat) * (Math.PI / 180);
            const radLng = (lng) * (Math.PI / 180);
            
            const radius = 1.01;
            const x = radius * Math.cos(radLat) * Math.sin(radLng);
            const y = radius * Math.sin(radLat);
            const z = radius * Math.cos(radLat) * Math.cos(radLng);

            // Marcador
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.015, 16, 16), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
            dot.position.set(x, y, z);
            world.add(dot);

            // Etiqueta
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 350; canvas.height = 100;
            ctx.fillStyle = 'rgba(0, 50, 0, 0.9)'; ctx.fillRect(0, 0, 350, 100);
            ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 15; ctx.strokeRect(0, 0, 350, 100);
            ctx.font = 'bold 40px Courier New'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
            ctx.fillText(city, 175, 65);

            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            sprite.position.set(x * 1.2, y * 1.2, z * 1.2);
            sprite.scale.set(0.9, 0.28, 1);
            world.add(sprite);

        } catch (e) { document.getElementById('city-name').innerText = "GEO ERROR"; }
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    activateRadar();
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
