<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v16 - ULTRA SECURE</title>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 0, 0, 0.8); border: 1px solid #39ff14;
            padding: 15px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
        }
        .count { font-size: 48px; font-weight: 900; color: #fff; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 3px 8px; border-radius: 2px;
            font-size: 10px; font-weight: bold; display: flex; align-items: center; gap: 5px;
        }
        .l-rau img { width: 14px; height: auto; }
        .d-rau { 
            width: 8px; height: 8px; background: #fff; border-radius: 50%; 
            margin-top: 4px; border: 2px solid #39ff14; animation: p 1.5s infinite; 
        }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="hud">
    <div style="font-size: 10px; opacity: 0.6;">SISTEMA RAU RADAR v16</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 10px;">A LOCALIZAR...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const CLIENT_ID = 'R-' + Math.random().toString(36).substr(2, 5);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            el.innerHTML = `<div class="l-rau"><img src="https://flagcdn.com/w20/${d.country.toLowerCase()}.png"><span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    // SISTEMA DE LOCALIZAÇÃO INFALÍVEL (Fallback Triplo)
    async function getLocation() {
        // Opção 1: Cloudflare (Melhor e mais rápido)
        try {
            const res = await fetch('https://www.cloudflare.com/cdn-cgi/trace');
            const text = await res.text();
            const data = Object.fromEntries(text.split('\n').map(l => l.split('=')));
            // Nota: Cloudflare dá o país, mas para cidade/lat/long precisamos de um complemento rápido
            const res2 = await fetch(`https://ipapi.co/${data.ip}/json/`);
            return await res2.json();
        } catch (e) {
            // Opção 2: IP-API (Backup)
            try {
                const res = await fetch('https://ip-api.com/json/');
                const data = await res.json();
                return { latitude: data.lat, longitude: data.lon, city: data.city, country_code: data.countryCode };
            } catch (e2) {
                // Opção 3: Estático (Caso tudo falhe)
                return { latitude: 38.7, longitude: -9.1, city: "Lisboa", country_code: "PT" };
            }
        }
    }

    async function start() {
        const geo = await getLocation();
        const myData = {
            id: CLIENT_ID,
            lat: geo.latitude,
            lng: geo.longitude,
            city: (geo.city || "Online").toUpperCase(),
            country: geo.country_code || "PT"
        };

        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: CLIENT_ID });
        const channel = ably.channels.get('rau-live-radar');
        let visitors = new Map();

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `RADAR ATIVO: ${myData.city}`;
            channel.presence.enter(myData);
            
            channel.presence.subscribe(['enter', 'present', 'update'], m => {
                visitors.set(m.clientId, m.data);
                update();
            });

            channel.presence.subscribe('leave', m => {
                visitors.delete(m.clientId);
                update();
            });

            channel.presence.get((err, members) => {
                if(!err) members.forEach(m => visitors.set(m.clientId, m.data));
                update();
            });
        });

        function update() {
            const arr = Array.from(visitors.values());
            document.getElementById('count').innerText = arr.length;
            world.htmlElementsData(arr);
        }

        world.pointOfView({ lat: myData.lat, lng: myData.lng, altitude: 2 }, 2000);
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.8;
    window.onload = start;
</script>
</body>
</html>
