<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v46.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 20, 0, 0.95); color: #39ff14; padding: 25px;
            border: 2px solid #39ff14; border-radius: 4px; pointer-events: none;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.15);
        }
        #count { font-size: 3.2em; font-weight: 900; color: #fff; display: block; line-height: 1; margin: 10px 0; }
        .label { font-size: 10px; letter-spacing: 2px; color: #39ff14; font-weight: bold; text-transform: uppercase; }
        .mem-box { margin-top: 15px; padding-top: 10px; border-top: 1px solid #1a331a; font-size: 11px; }
        #loc { color: #fff; font-weight: bold; background: #003300; padding: 2px 5px; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div class="label">RAU RADAR v46.0</div>
    <span id="count">1</span>
    <div class="label">LOCALIZAÇÃO DETETADA:</div>
    <div id="loc">A RASTREAR...</div>

    <div class="mem-box">
        <span class="label" style="font-size: 9px;">Memória do Player</span><br>
        <span style="color:#39ff14">🔈 VOL: <span id="mv">--</span> | 🔄 AUTO: <span id="ma">--</span></span>
    </div>
</div>

<script>
    // 1. GESTÃO DE MEMÓRIA (O teu pedido principal)
    const rauMemory = {
        save: (v, a) => {
            localStorage.setItem('rau_v', v);
            localStorage.setItem('rau_a', a);
        },
        load: () => ({
            v: localStorage.getItem('rau_v') || "0.80",
            a: localStorage.getItem('rau_a') || "true"
        })
    };

    const current = rauMemory.load();
    document.getElementById('mv').innerText = Math.round(current.v * 100) + "%";
    document.getElementById('ma').innerText = current.a === "true" ? "ON" : "OFF";

    // 2. AMBIENTE 3D
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const world = new THREE.Group(); scene.add(world);
    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64), 
        new THREE.MeshPhongMaterial({
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 5
        })
    );
    world.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 1.4));
    camera.position.z = 3.5;

    // 3. DETEÇÃO E MARCAÇÃO DE CIDADE
    async function initRadar() {
        try {
            // Alternativa robusta para pegar a cidade
            const res = await fetch("https://ipapi.co/json/").then(r => r.json());
            const city = (res.city || "DESCONHECIDO").toUpperCase();
            document.getElementById('loc').innerText = city;

            const lat = res.latitude, lng = res.longitude;
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3().setFromSphericalCoords(1.05, phi, theta);

            // Marcador Físico
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.02, 12, 12), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
            dot.position.copy(pos);
            world.add(dot);

            // Etiqueta Flutuante
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 100;
            ctx.fillStyle = 'rgba(0, 40, 0, 0.9)';
            ctx.fillRect(0, 0, 256, 100);
            ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 8; ctx.strokeRect(0, 0, 256, 100);
            ctx.font = 'bold 36px Courier New'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
            ctx.fillText(city, 128, 60);

            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            sprite.position.copy(pos.clone().multiplyScalar(1.2));
            sprite.scale.set(0.7, 0.28, 1);
            world.add(sprite);

        } catch (e) {
            document.getElementById('loc').innerText = "COORDENADAS OFF";
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        world.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    // COMANDO PARA GUARDAR: window.setRAU(0.5, "true")
    window.setRAU = (v, a) => {
        rauMemory.save(v, a);
        location.reload();
    };

    initRadar();
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
