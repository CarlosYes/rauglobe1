<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v193</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.95); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none;
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.95); padding: 4px 10px; border-radius: 3px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            border: 1px solid #39ff14; color: #39ff14; white-space: nowrap;
        }
        .d-rau { width: 8px; height: 8px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 15px #39ff14; animation: p 1.2s infinite; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status" style="font-size: 10px; margin-top: 10px; font-family: monospace; color: #ff3131;">ESTADO: SINCRONIZANDO SINAL...</div>
</div>

<div id="globeViz"></div>

<script>
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.country ? `<img src="https://flagcdn.com/w20/${d.country.toLowerCase()}.png" style="width:14px">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    // MÉTODO DEFINITIVO: Detecção via Cloudflare (Usado por grandes players)
    async function locate() {
        try {
            // Usamos a CDN da Cloudflare que já contém dados de geolocalização no cabeçalho
            const response = await fetch('https://www.cloudflare.com/cdn-cgi/trace');
            const text = await response.text();
            
            // Se o Cloudflare responder (e ele responde sempre), extraímos o IP e chamamos a localização
            const ipMatch = text.match(/ip=(.*)/);
            if (ipMatch) {
                const ip = ipMatch[1];
                // Agora que temos o IP via Cloudflare, buscamos a posição via JSONP (Método FlagCounter)
                const s = document.createElement('script');
                s.src = `https://ipapi.co/${ip}/jsonp/?callback=drawSignal`;
                document.body.appendChild(s);
            }
        } catch (e) {
            // Backup instantâneo caso o fetch falhe
            const s = document.createElement('script');
            s.src = 'https://www.geoplugin.net/javascript.gp?callback=drawSignalGP';
            document.body.appendChild(s);
        }
    }

    window.drawSignal = function(data) {
        if (!data.latitude) return;
        updateUI(data.latitude, data.longitude, data.city, data.country_code);
    };

    window.drawSignalGP = function(d) {
        updateUI(d.geoplugin_latitude, d.geoplugin_longitude, d.geoplugin_city, d.geoplugin_countryCode);
    };

    function updateUI(lat, lng, city, country) {
        const myLoc = {
            lat: parseFloat(lat),
            lng: parseFloat(lng),
            city: (city || "SINAL").toUpperCase(),
            country: country
        };

        document.getElementById('onlineCount').innerText = "1";
        document.getElementById('status').innerText = `SINAL: ${myLoc.city}`;
        document.getElementById('status').style.color = "#39ff14";

        world.htmlElementsData([myLoc]);
        world.pointOfView({ lat: myLoc.lat, lng: myLoc.lng, altitude: 2.0 }, 2000);
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    window.onload = locate;
</script>
</body>
</html>
