<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - GLOBO REALISTA LIVE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        
        /* Painel HUD */
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.75); color: #fff; padding: 15px;
            border: 1px solid #00f2ff; border-radius: 8px; pointer-events: none;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        /* Etiquetas das Cidades */
        .label {
            position: absolute; color: #fff; font-size: 11px; font-weight: bold;
            background: rgba(0, 242, 255, 0.3); padding: 3px 10px; border-radius: 20px;
            border: 1px solid #00f2ff; pointer-events: none; white-space: nowrap;
            z-index: 20; text-transform: uppercase; transform: translate(12px, -12px);
        }

        /* Ponto Pulsante */
        .dot {
            position: absolute; width: 10px; height: 10px; background: #fff;
            border-radius: 50%; box-shadow: 0 0 15px #00f2ff; z-index: 19;
            transform: translate(-50%, -50%); animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.8); }
            70% { box-shadow: 0 0 0 15px rgba(0, 242, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }
        }
    </style>
</head>
<body>

    <div class="hud">
        <span style="font-size: 10px; opacity: 0.6; letter-spacing: 1px;">RADIO AMIGOS UNIDOS</span><br>
        <b style="font-size: 18px; color: #00f2ff;">MONITOR GLOBAL</b><br>
        <div style="margin-top: 5px;">OUVINTES: <span id="user-count" style="font-size: 22px; color: #fff;">1</span></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // Configuração Firebase (Ofuscada)
        const _k = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
        const config = { apiKey: atob(_k[0]), authDomain: atob(_k[1]), projectId: atob(_k[2]), appId: atob(_k[3]) };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        const myId = "RAU_" + Math.random().toString(36).substr(2, 7);

        // --- CENA 3D REALISTA ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Texturas do Globo Original
        const loader = new THREE.TextureLoader();
        const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'),
            specularMap: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg'),
            shininess: 10
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);

        // Atmosfera (Brilho azul à volta)
        const atmoGeom = new THREE.SphereGeometry(1.02, 64, 64);
        const atmoMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.1, side: THREE.BackSide });
        const atmosphere = new THREE.Mesh(atmoGeom, atmoMat);
        scene.add(atmosphere);

        // Luzes (Sol)
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0x444444));

        camera.position.z = 3;

        let markers = [];

        function addCityMarker(lat, lng, cityName) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            const anchor = new THREE.Object3D();
            anchor.position.set(-Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
            earth.add(anchor);

            const dot = document.createElement('div'); dot.className = 'dot';
            const label = document.createElement('div'); label.className = 'label';
            label.innerText = cityName;

            document.body.appendChild(dot);
            document.body.appendChild(label);
            markers.push({ anchor, dot, label });
        }

        async function init() {
            try {
                const res = await fetch("https://ipapi.co/json/");
                const data = await res.json();
                
                const update = () => db.collection('rau_globe').doc(myId).set({
                    lat: data.latitude, lng: data.longitude, city: data.city,
                    ts: firebase.firestore.FieldValue.serverTimestamp()
                });
                update(); setInterval(update, 25000);

                db.collection('rau_globe').where('ts', '>', new Date(Date.now() - 50000)).onSnapshot(snap => {
                    markers.forEach(m => { m.dot.remove(); m.label.remove(); });
                    markers = [];
                    while(earth.children.length > 0) earth.remove(earth.children[0]);

                    snap.forEach(doc => {
                        const d = doc.data();
                        addCityMarker(d.lat, d.lng, d.city);
                    });
                    document.getElementById('user-count').innerText = snap.size;
                });
            } catch(e) { console.error("Erro de Localização"); }
        }

        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.0015;

            markers.forEach(m => {
                const vec = new THREE.Vector3();
                m.anchor.getWorldPosition(vec);
                const dist = camera.position.distanceTo(vec);
                vec.project(camera);

                if (dist < 3 && vec.z < 1) {
                    m.dot.style.display = m.label.style.display = 'block';
                    m.dot.style.left = (vec.x * 0.5 + 0.5) * window.innerWidth + 'px';
                    m.dot.style.top = (-vec.y * 0.5 + 0.5) * window.innerHeight + 'px';
                    m.label.style.left = m.dot.style.left;
                    m.label.style.top = m.dot.style.top;
                } else {
                    m.dot.style.display = m.label.style.display = 'none';
                }
            });
            renderer.render(scene, camera);
        }

        init(); animate();
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
