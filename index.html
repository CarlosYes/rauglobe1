<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v241.0 - PRECISION</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; }
        
        .revolver-hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(7, 20, 45, 0.9); border: 1px solid #39ff14;
            padding: 15px; border-radius: 4px; color: #fff;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4); pointer-events: none;
        }
        .counter { font-size: 28px; font-weight: bold; color: #39ff14; display: block; }
        
        /* Estilo da Etiqueta */
        .city-tag {
            background: rgba(0, 0, 0, 0.85); border: 1px solid #39ff14;
            color: #39ff14; padding: 4px 8px; font-size: 11px;
            display: flex; align-items: center; gap: 6px; border-radius: 3px;
            white-space: nowrap; font-weight: bold;
        }
        .my-own-point { border-color: #ff3939 !important; color: #ff3939 !important; }
    </style>
</head>
<body>

<div class="revolver-hud">
    <span style="font-size: 10px; text-transform: uppercase; color: #aaa;">Ouvintes em Tempo Real</span>
    <span id="live-count" class="counter">0</span>
    <div id="status-info" style="font-size: 11px; margin-top: 5px;">A LOCALIZAR...</div>
</div>

<div id="globeViz"></div>

<script>
    const fbConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };

    firebase.initializeApp(fbConfig);
    const db = firebase.database();
    const liveRef = db.ref('revolver_live_v2');

    // ID de sessão único para este navegador
    const sessionID = "USER_" + Math.random().toString(36).substring(2, 15);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .pointColor(d => d.id === sessionID ? '#ff3939' : '#39ff14') // O teu ponto é VERMELHO, outros VERDES
        .pointRadius(d => d.id === sessionID ? 1.2 : 0.7)
        .pointAltitude(0.06)
        .htmlElement(d => {
            const div = document.createElement('div');
            div.className = 'city-tag' + (d.id === sessionID ? ' my-own-point' : '');
            div.innerHTML = `<img src="https://flagcdn.com/w20/${d.iso}.png" width="16"> ${d.id === sessionID ? 'TU: ' : ''}${d.city}`;
            return div;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    async function startRadar() {
        try {
            // Tenta obter localização
            const res = await fetch('https://ipwho.is/');
            const d = await res.json();
            
            const myNode = liveRef.child(sessionID);
            const myData = {
                id: sessionID,
                lat: d.latitude,
                lng: d.longitude,
                city: d.city || "Ouvinte",
                iso: (d.country_code || "un").toLowerCase(),
                lastSeen: Date.now()
            };

            // Publica e limpa ao fechar
            myNode.set(myData);
            mySessionRef = myNode;
            myNode.onDisconnect().remove();

            document.getElementById('status-info').innerText = "ONLINE EM: " + myData.city.toUpperCase();

            // Loop de Atualização (Heartbeat)
            setInterval(() => {
                myNode.update({ lastSeen: Date.now() });
            }, 5000);

            // Escuta Geral
            liveRef.on('value', snap => {
                const now = Date.now();
                const all = snap.val() || {};
                const active = Object.values(all).filter(u => now - u.lastSeen < 15000);

                document.getElementById('live-count').innerText = active.length;
                world.pointsData(active);
                world.htmlElementsData(active);
            });

        } catch (e) {
            document.getElementById('status-info').innerText = "ERRO DE SINCRONIZAÇÃO";
        }
    }

    window.addEventListener('resize', () => { world.width(window.innerWidth); world.height(window.innerHeight); });
    window.onload = startRadar;
</script>
</body>
</html>
