<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v227 - DEEP TRACE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.9); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none; backdrop-filter: blur(5px);
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.9); padding: 6px 14px; border-radius: 4px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 8px;
            border: 1px solid #39ff14; color: #39ff14; white-space: nowrap;
        }
        .d-rau { width: 14px; height: 14px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 15px #39ff14; animation: p 1.5s infinite; margin-top: 5px; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status">SINAL: RASTREIO DE ALTA PRECISÃO...</div>
    <div id="debug" style="font-size: 8px; color: rgba(57,255,20,0.4); margin-top: 5px; font-family: monospace;"></div>
</div>

<div id="globeViz"></div>

<script>
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            el.innerHTML = `<div class="l-rau"><span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = -1.3;

    async function deepTrace() {
        try {
            // Em vez de perguntar ao Cloudflare (que te vê em Mechelen), 
            // vamos perguntar à ip-api (via HTTPS/JSON)
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();

            if (data.city) {
                // Se esta API ainda disser Mechelen, significa que para o mundo exterior, 
                // o teu sinal "nasce" lá.
                render(data.latitude, data.longitude, data.city.toUpperCase());
            }
        } catch (e) {
            // Backup silencioso via teu Worker
            const cf = await fetch('https://globorau.carlos2022yes.workers.dev/').then(r => r.json());
            render(cf.lat, cf.lon, cf.city.toUpperCase());
        }
    }

    function render(lat, lon, city) {
        document.getElementById('onlineCount').innerText = "1";
        document.getElementById('status').innerText = "SINAL: " + city;
        
        const point = { lat: parseFloat(lat), lng: parseFloat(lon), city: city };
        world.htmlElementsData([point]);
        world.pointOfView({ lat: point.lat, lng: point.lng, altitude: 1.8 }, 2500);
        setTimeout(() => { world.controls().autoRotateSpeed = -0.25; }, 2600);
    }

    window.onload = deepTrace;
</script>
</body>
</html>
