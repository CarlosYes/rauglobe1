<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v113 - REAL TIME ONLY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.95); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none;
        }
        .count-on { font-size: 65px; font-weight: 900; line-height: 0.8; color: #39ff14; text-shadow: 0 0 20px rgba(57, 255, 20, 0.6); }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.9); padding: 5px 12px; border-radius: 2px;
            font-size: 11px; font-weight: 900; border: 1px solid #39ff14; color: #39ff14; 
            white-space: nowrap; text-transform: uppercase;
        }
        .d-rau { width: 10px; height: 10px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 15px #39ff14; animation: p 1.5s infinite; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status" style="font-size: 10px; margin-top: 12px; font-family: monospace; color: #39ff14; letter-spacing: 1px;">VARREDURA DE REDE ATIVA...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'NODE-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    const visitors = new Map();

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000').showAtmosphere(true).atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = `m-rau`;
            el.innerHTML = `<div class="l-rau">${d.city}</div><div class="d-rau"></div>`;
            return el;
        });

    async function getDiscovery() {
        // Tenta apenas APIs de alta precisão sem cidades fixas no código
        try {
            const r = await fetch('https://ipwho.is/');
            const d = await r.json();
            if (d.success) {
                return { lat: d.latitude, lng: d.longitude, city: d.city.toUpperCase() };
            }
            throw new Error();
        } catch (e) {
            try {
                const r = await fetch('https://ipapi.co/json/');
                const d = await r.json();
                return { lat: d.latitude, lng: d.longitude, city: d.city.toUpperCase() };
            } catch (e2) {
                return null; // Retorna nulo para dar erro real em vez de Lisboa
            }
        }
    }

    async function start() {
        const geo = await getDiscovery();
        
        if (!geo) {
            document.getElementById('status').innerText = "ERRO: FALHA NA DETEÇÃO DE ORIGEM";
            return;
        }

        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('rau-global-live');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `SINAL LOCALIZADO: ${geo.city}`;
            channel.presence.enter(geo);
            
            channel.presence.subscribe(['enter', 'present', 'update'], (m) => {
                if(m.data && m.data.lat) {
                    visitors.set(m.clientId, m.data);
                    sync();
                }
            });

            channel.presence.subscribe('leave', (m) => {
                visitors.delete(m.clientId);
                sync();
            });
        });

        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.2 }, 2000);
    }

    function sync() {
        const data = Array.from(visitors.values());
        document.getElementById('onlineCount').innerText = data.length;
        world.htmlElementsData(data);
    }

    world.controls().autoRotate = true;
    window.onload = start;
</script>
</body>
</html>
