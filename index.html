<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v64.0 - EFFICACY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 10, 0, 0.98); border: 2px solid #39ff14;
            padding: 20px; width: 280px; box-shadow: 0 0 40px rgba(0, 255, 0, 0.5);
        }
        #count { font-size: 4.5em; font-weight: 900; color: #fff; display: block; line-height: 0.8; margin-bottom: 5px; }
        .label { font-size: 10px; font-weight: bold; text-transform: uppercase; opacity: 0.7; }
        #monitor { margin-top: 15px; padding: 12px; background: #001a00; border: 1px solid #1a331a; border-radius: 4px; }
        #city-name { font-size: 20px; color: #fff; font-weight: bold; display: block; text-shadow: 0 0 10px #39ff14; }
        #net-status { font-size: 9px; color: #39ff14; margin-top: 10px; display: block; border-top: 1px solid #1a331a; padding-top: 8px; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div class="label">RAU COMMAND v64.0</div>
    <span id="count">0</span>
    <div class="label">SINAIS ACTIVOS</div>
    
    <div id="monitor">
        <span id="city-name">INICIALIZANDO...</span>
        <span id="net-status">ESTABELECENDO LIGAÇÃO...</span>
    </div>
</div>

<script>
    // 🔗 CONFIGURAÇÃO OBRIGATÓRIA:
    // Se não tens o servidor no Render, este radar continuará em 0.
    const SERVER_URL = "https://TEU-SERVIDOR.onrender.com"; 
    const socket = io(SERVER_URL, { transports: ['websocket'], upgrade: false });

    let scene, camera, renderer, controls, globeGroup;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.autoRotate = true; camera.position.z = 3.5;

        globeGroup = new THREE.Group();
        scene.add(globeGroup);

        const globe = new THREE.Mesh(
            new THREE.SphereGeometry(1, 64, 64),
            new THREE.MeshPhongMaterial({
                map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
                shininess: 5
            })
        );
        globeGroup.add(globe);
        scene.add(new THREE.AmbientLight(0xffffff, 2.5));

        animate();
    }

    // LÓGICA DE REDE EFICAZ
    socket.on('connect', async () => {
        document.getElementById('net-status').innerText = "CONECTADO AO SERVIDOR ✓";
        
        try {
            // Usando GeoJS (Mais estável que ipapi)
            const res = await fetch(`https://get.geojs.io/v1/ip/geo.json?t=${Date.now()}`);
            const data = await res.json();
            
            socket.emit('report-location', {
                city: data.city || "SINAL RAU",
                lat: parseFloat(data.latitude) || 0,
                lon: parseFloat(data.longitude) || 0,
                country: (data.country_code || "un").toLowerCase()
            });
        } catch(e) {
            // Fallback imediato: Se a localização falhar, entra como sinal anónimo (não trava em 0)
            socket.emit('report-location', { city: "ANÓNIMO", lat: 0, lon: 0, country: "un" });
        }
    });

    socket.on('update-peers', (peers) => {
        const peerList = Object.values(peers);
        document.getElementById('count').innerText = peerList.length;

        // Limpar apenas os pontos (manter o globo)
        for(let i = globeGroup.children.length - 1; i > 0; i--) globeGroup.remove(globeGroup.children[i]);

        peerList.forEach(p => {
            const isLocal = p.id === socket.id;
            if(isLocal) document.getElementById('city-name').innerText = p.city.toUpperCase();
            
            const phi = (90 - p.lat) * (Math.PI / 180);
            const theta = (p.lon + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(-(Math.sin(phi)*Math.cos(theta))*1.02, Math.cos(phi)*1.02, (Math.sin(phi)*Math.sin(theta))*1.02);

            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.02, 16, 16), new THREE.MeshBasicMaterial({ color: isLocal ? 0x39ff14 : 0xff3939 }));
            dot.position.copy(pos);
            globeGroup.add(dot);
        });
    });

    socket.on('connect_error', () => {
        document.getElementById('net-status').innerText = "ERRO: SERVIDOR OFFLINE";
        document.getElementById('city-name').innerText = "SEM SINAL";
    });

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    init();
</script>
</body>
</html>
