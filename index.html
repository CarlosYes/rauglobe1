<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v52.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.9); color: #39ff14; padding: 20px;
            border: 1px solid #39ff14; pointer-events: none;
        }
        #count { font-size: 3em; font-weight: 900; color: #fff; display: block; }
        .label { font-size: 10px; letter-spacing: 1px; color: #39ff14; font-weight: bold; text-transform: uppercase; }
        #city-name { color: #fff; font-weight: bold; background: #003300; padding: 2px 8px; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div class="label">RAU COMMAND v52.0</div>
    <span id="count">1</span>
    <div class="label">LOCAL: <span id="city-name">RASTREANDO...</span></div>
    
    <div style="margin-top:15px; border-top:1px solid #1a331a; font-size:11px; padding-top:10px;">
        <span class="label" style="font-size: 9px;">PLAYER MEMORY</span><br>
        <span style="color:#39ff14">🔈 VOL: <span id="v-val">--</span> | 🔄 AUTO: <span id="a-val">--</span></span>
    </div>
</div>

<script>
    // 1. MEMÓRIA
    const rauStore = {
        save: (v, a) => { localStorage.setItem('rau_v', v); localStorage.setItem('rau_a', a); },
        load: () => ({ v: localStorage.getItem('rau_v') || "0.80", a: localStorage.getItem('rau_a') || "true" })
    };
    const myData = rauStore.load();
    document.getElementById('v-val').innerText = Math.round(myData.v * 100) + "%";
    document.getElementById('a-val').innerText = myData.a === "true" ? "ON" : "OFF";

    // 2. SETUP 3D
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 1.8;
    controls.maxDistance = 6;

    const world = new THREE.Group(); 
    scene.add(world);

    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64), 
        new THREE.MeshPhongMaterial({
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 5
        })
    );
    world.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 1.3));
    camera.position.set(0, 0, 3.5);

    // 3. GPS DE ALTA PRECISÃO (BRUGES / BELGIUM)
    async function activateRadar() {
        try {
            const res = await fetch("https://ipapi.co/json/").then(r => r.json());
            const city = (res.city || "BRUGES").toUpperCase();
            document.getElementById('city-name').innerText = city;

            const lat = res.latitude, lon = res.longitude;
            
            // Conversão matemática corrigida para Three.js
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            
            const x = -(Math.sin(phi) * Math.cos(theta));
            const z = Math.sin(phi) * Math.sin(theta);
            const y = Math.cos(phi);

            // Marcador
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.015, 16, 16), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
            dot.position.set(x, y, z);
            world.add(dot);

            // Etiqueta
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 300; canvas.height = 100;
            ctx.fillStyle = 'rgba(0, 40, 0, 0.9)'; ctx.fillRect(0, 0, 300, 100);
            ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 12; ctx.strokeRect(0, 0, 300, 100);
            ctx.font = 'bold 36px Courier New'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
            ctx.fillText(city, 150, 65);

            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            sprite.position.set(x * 1.2, y * 1.2, z * 1.2);
            sprite.scale.set(0.7, 0.22, 1);
            world.add(sprite);

        } catch (e) { document.getElementById('city-name').innerText = "GEO_ERR"; }
    }

    // 4. RENDER LOOP (ONDE A MAGIA ACONTECE)
    function animate() {
        requestAnimationFrame(animate);
        
        // Esta linha faz o globo girar automaticamente
        world.rotation.y += 0.0015; 
        
        controls.update();
        renderer.render(scene, camera);
    }

    activateRadar();
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
