<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - RADAR INTERATIVO FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
        .hud { 
            position: absolute; top: 20px; left: 20px; z-index: 100; 
            color: #39ff14; background: rgba(0, 15, 0, 0.9); padding: 15px; 
            border: 1px solid #39ff14; pointer-events: none; border-radius: 4px;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }
    </style>
</head>
<body>

<div class="hud">
    <b style="font-size: 1.2em;">RADAR RADIO AMIGOS UNIDOS</b><br>
    <span id="my-loc">Sincronizando satélite...</span><br>
    <hr style="border:0; border-top:1px solid #39ff14; margin:8px 0; opacity: 0.3;">
    OUVINTES ONLINE: <span id="count" style="font-size: 1.3em; font-weight: bold;">1</span>
</div>

<div id="canvas-container"></div>

<script>
    // 1. CONFIGURAÇÃO FIREBASE
    const _k = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
    const cfg = { apiKey: atob(_k[0]), authDomain: atob(_k[1]), projectId: atob(_k[2]), appId: atob(_k[3]) };
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    const db = firebase.firestore();
    const myId = "RAU_" + Math.random().toString(36).substr(2, 5);

    // 2. MOTOR GRÁFICO THREE.JS
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const mainGroup = new THREE.Group();
    scene.add(mainGroup);

    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin('anonymous');
    const earth = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshPhongMaterial({
            map: loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 5
        })
    );
    mainGroup.add(earth);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const sun = new THREE.DirectionalLight(0xffffff, 0.4);
    sun.position.set(5, 3, 5);
    scene.add(sun);
    camera.position.z = 3;

    // 3. ETIQUETAS WEBGL (NOMES DAS CIDADES)
    function createLabelSprite(text) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512; canvas.height = 128;
        ctx.fillStyle = 'rgba(0, 30, 0, 0.85)';
        ctx.fillRect(0, 30, 512, 70);
        ctx.strokeStyle = '#39ff14';
        ctx.lineWidth = 4;
        ctx.strokeRect(0, 30, 512, 70);
        ctx.font = 'Bold 42px Courier New';
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.fillText(text.toUpperCase(), 256, 80);

        const texture = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, depthTest: true }));
        sprite.scale.set(0.5, 0.12, 1);
        return sprite;
    }

    function addMarker(lat, lng, cityName) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        const pos = new THREE.Vector3(
            -Math.sin(phi) * Math.cos(theta),
            Math.cos(phi),
            Math.sin(phi) * Math.sin(theta)
        );

        const mGroup = new THREE.Group();
        mGroup.name = "visitor";
        
        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.015, 12, 12), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
        dot.position.copy(pos);
        mGroup.add(dot);

        const label = createLabelSprite(cityName || "Ouvinte");
        label.position.copy(pos.clone().multiplyScalar(1.08));
        mGroup.add(label);

        mainGroup.add(mGroup);
    }

    // 4. INTERATIVIDADE (O GIRO DO RATO)
    let isDragging = false;
    let mouseX = 0, mouseY = 0;

    document.addEventListener('mousedown', (e) => { isDragging = true; mouseX = e.clientX; mouseY = e.clientY; });
    document.addEventListener('mouseup', () => isDragging = false);
    document.addEventListener('mousemove', (e) => {
        if (isDragging) {
            const deltaX = e.clientX - mouseX;
            const deltaY = e.clientY - mouseY;
            mainGroup.rotation.y += deltaX * 0.007;
            mainGroup.rotation.x += deltaY * 0.007;
            mouseX = e.clientX;
            mouseY = e.clientY;
        }
    });

    // 5. SINCRONIZAÇÃO DE DADOS
    async function startRadar() {
        try {
            const res = await fetch("https://ipinfo.io/json?token=e392744f6845f0");
            const data = await res.json();
            document.getElementById('my-loc').innerText = "Tu em: " + data.city;
            const [lat, lng] = data.loc.split(',').map(Number);

            const push = () => db.collection('rau_v10').doc(myId).set({
                lat, lng, city: data.city, ts: firebase.firestore.FieldValue.serverTimestamp()
            });
            push(); setInterval(push, 25000);

            db.collection('rau_v10').where('ts', '>', new Date(Date.now() - 60000)).onSnapshot(snap => {
                const toDelete = [];
                mainGroup.traverse(c => { if(c.name === "visitor") toDelete.push(c); });
                toDelete.forEach(c => mainGroup.remove(c));
                snap.forEach(doc => addMarker(doc.data().lat, doc.data().lng, doc.data().city));
                document.getElementById('count').innerText = snap.size;
            });
        } catch(e) { console.error("Erro GPS"); }
    }

    function animate() {
        requestAnimationFrame(animate);
        if (!isDragging) mainGroup.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    startRadar();
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
