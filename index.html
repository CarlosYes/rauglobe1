<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v205.0 - OVERRIDE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; }
        
        /* UI LATERAL EVOLUÍDA */
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 300px; pointer-events: none;
            backdrop-filter: blur(10px); box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .monitor-display { background: rgba(0, 0, 0, 0.95); border: 1px solid #1a1a1a; padding: 12px; position: relative; }
        #mon-city { font-size: 20px; color: #fff; font-weight: 900; display: block; text-transform: uppercase; letter-spacing: 2px; }
        
        /* LOG DE TELEMETRIA */
        #telemetry-log {
            margin-top: 10px; font-size: 9px; color: #39ff14; opacity: 0.7;
            height: 60px; overflow: hidden; line-height: 1.2;
        }

        #visitor-tag {
            position: absolute; display: none; align-items: center; gap: 10px;
            background: rgba(0, 0, 0, 0.9); border: 1px solid #39ff14;
            padding: 8px 15px; border-radius: 2px; color: #fff;
            font-size: 14px; font-weight: bold; z-index: 500;
            transform: translate(-50%, -150%); pointer-events: none;
        }

        .flag-icon { width: 24px; height: 16px; border: 1px solid #333; object-fit: cover; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; outline: none; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
        <div id="status-led" style="width: 10px; height: 10px; border-radius: 50%; background: #39ff14; box-shadow: 0 0 10px #39ff14; animation: pulse 1.5s infinite;"></div>
        <span style="font-size: 11px; letter-spacing: 2px; font-weight: bold;">RAU CORE v205.0</span>
    </div>
    <div class="monitor-display">
        <span id="mon-city">SCANNING...</span>
        <div id="telemetry-log">
            > INITIALIZING GLOBAL UPLINK...<br>
            > BYPASSING CORS FILTERS...<br>
            > WAITING FOR NODE RESPONSE...
        </div>
    </div>
</div>

<div id="visitor-tag">
    <img id="tag-flag" src="" class="flag-icon">
    <span id="tag-city">---</span>
</div>

<script>
    const RAU = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1500),
        renderer: new THREE.WebGLRenderer({ antialias: true }),
        controls: null, globe: null, markers: new THREE.Group(),
        currentIP: null, activeNode: null,

        init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(this.renderer.domElement);

            this.scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(5, 3, 5);
            this.scene.add(sun);

            // GLOBO PROGRESSIVO (Textura Earth Blue Marble)
            const geo = new THREE.SphereGeometry(1, 64, 64);
            const mat = new THREE.MeshPhongMaterial({ shininess: 10 });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            this.globe.add(this.markers);

            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.enableDamping = true;
            this.controls.autoRotate = true;
            this.controls.autoRotateSpeed = 0.6;
            this.camera.position.z = 3.5;

            this.loadTexture();
            this.track(); 
            
            setInterval(() => this.track(), 25000);
            window.addEventListener('resize', () => this.onResize());
            this.animate();
        },

        loadTexture() {
            new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.needsUpdate = true;
            });
        },

        track() {
            const oldScript = document.getElementById('rau-node');
            if (oldScript) oldScript.remove();
            const script = document.createElement('script');
            script.id = 'rau-node';
            // Progressão: Usando novo endpoint de telemetria
            script.src = `https://www.trackip.net/ip?jsonp=RAU.updateVisitor`; 
            document.body.appendChild(script);
        },

        updateVisitor(data) {
            if (!data || data.ip === this.currentIP) return;
            this.currentIP = data.ip;

            // Log de telemetria progressivo
            const log = document.getElementById('telemetry-log');
            log.innerHTML = `> NODE DETECTED: ${data.ip}<br>> LOC: ${data.lat}, ${data.lon}<br>> CITY: ${data.city}<br>` + log.innerHTML;

            document.getElementById('mon-city').innerText = (data.city || "RAU NODE").toUpperCase();

            this.markers.clear();
            const phi = (90 - data.lat) * (Math.PI / 180);
            const theta = (parseFloat(data.lon) + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.01);

            // MARCADOR v205 (PONTO + RADAR)
            const dot = new THREE.Mesh(
                new THREE.SphereGeometry(0.01, 16, 16), 
                new THREE.MeshBasicMaterial({ color: 0x39ff14 })
            );
            dot.position.copy(pos);
            
            // Efeito Radar (Aro pulsante)
            const ringGeo = new THREE.RingGeometry(0.02, 0.025, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x39ff14, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.copy(pos);
            ring.lookAt(new THREE.Vector3(0,0,0));
            
            this.markers.add(dot);
            this.markers.add(ring);
            this.activeNode = { mesh: dot, ring: ring, city: data.city, country: data.country.toLowerCase(), scale: 1 };

            const tag = document.getElementById('visitor-tag');
            document.getElementById('tag-flag').src = `https://flagcdn.com/w40/${this.activeNode.country}.png`;
            document.getElementById('tag-city').innerText = this.activeNode.city;
            tag.style.display = 'flex';
        },

        onResize() {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update();

            // Animação do Radar v205
            if (this.activeNode && this.activeNode.ring) {
                this.activeNode.scale += 0.02;
                if(this.activeNode.scale > 3) this.activeNode.scale = 1;
                this.activeNode.ring.scale.set(this.activeNode.scale, this.activeNode.scale, 1);
                this.activeNode.ring.material.opacity = 1 - (this.activeNode.scale / 3);

                const vector = new THREE.Vector3();
                this.activeNode.mesh.getWorldPosition(vector);
                vector.project(this.camera);
                const tag = document.getElementById('visitor-tag');
                if (vector.z > 1) { tag.style.opacity = '0'; } 
                else { 
                    tag.style.opacity = '1';
                    tag.style.left = `${(vector.x * 0.5 + 0.5) * window.innerWidth}px`;
                    tag.style.top = `${(vector.y * -0.5 + 0.5) * window.innerHeight}px`;
                }
            }
            this.renderer.render(this.scene, this.camera);
        }
    };

    window.onload = () => RAU.init();
</script>

<style>
@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</body>
</html>
