<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v177.0 - VPN-TRACKER & ATMOS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; user-select: none; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.85); border-left: 3px solid #39ff14;
            padding: 15px; width: 300px; pointer-events: none;
            backdrop-filter: blur(8px);
        }
        .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        #led { width: 10px; height: 10px; border-radius: 50%; background: #39ff14; box-shadow: 0 0 10px #39ff14; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .monitor-display { background: rgba(5, 5, 5, 0.6); border: 1px solid #1a1a1a; padding: 12px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; }
        #mon-flag-ui { height: 18px; margin-right: 8px; vertical-align: middle; display: none; }
        #mon-status { font-size: 10px; color: #39ff14; opacity: 0.8; margin-top: 8px; border-top: 1px solid #39ff1444; padding-top: 8px; line-height: 1.4; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="rau-ui">
    <div class="status-row">
        <div id="led"></div>
        <span style="font-size: 11px; letter-spacing: 1px;">CORE v177.0 | VPN-SENSITIVE</span>
    </div>
    <div class="monitor-display">
        <div style="display: flex; align-items: center;">
            <img id="mon-flag-ui" src="">
            <span id="mon-city">SCANNING...</span>
        </div>
        <div id="mon-status">Rastreando túnel de rede...</div>
    </div>
</div>

<script>
    const RAU_SYSTEM = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000),
        renderer: new THREE.WebGLRenderer({ antialias: true }),
        controls: null, globe: null, markers: new THREE.Group(), 
        stars: null, currentIP: null,

        init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(this.renderer.domElement);

            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.enableDamping = true;
            this.controls.autoRotate = true;
            this.controls.autoRotateSpeed = 0.5;
            this.camera.position.z = 4;

            // 1. Globo e Luzes
            const geo = new THREE.SphereGeometry(1, 64, 64);
            const mat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 15 });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            this.scene.add(this.markers);
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(5, 3, 5);
            this.scene.add(sun);

            new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.needsUpdate = true;
            });

            this.updateEnvironment();
            this.animate();
            
            // Verificação rápida inicial e depois a cada 8 segundos
            this.checkNetwork();
            setInterval(() => this.checkNetwork(), 8000);
        },

        updateEnvironment() {
            const hour = new Date().getHours();
            const isNight = (hour < 6 || hour > 18);

            if (isNight) {
                this.scene.background = new THREE.Color(0x000003);
                this.createStars();
            } else {
                if (this.stars) this.scene.remove(this.stars);
                this.scene.background = new THREE.Color(0x446688);
                this.scene.fog = new THREE.FogExp2(0x446688, 0.1);
            }
        },

        createStars() {
            if (this.stars) return;
            const starGeo = new THREE.BufferGeometry();
            const coords = [];
            for (let i = 0; i < 8000; i++) {
                coords.push((Math.random() - 0.5) * 1500, (Math.random() - 0.5) * 1500, (Math.random() - 0.5) * 1500);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(coords, 3));
            this.stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.8 }));
            this.scene.add(this.stars);
        },

        async checkNetwork() {
            try {
                // Adicionado Cache-Buster v=${Date.now()} para detectar VPN instantaneamente
                const res = await fetch(`https://ipapi.co/json/?nocache=${Date.now()}`);
                const data = await res.json();

                if (data.ip && data.ip !== this.currentIP) {
                    console.log("NOVO IP DETECTADO:", data.ip);
                    this.currentIP = data.ip;
                    this.deployMarkers(data);
                }
            } catch (e) { 
                document.getElementById('mon-status').innerText = "LINK LAGGING... RE-SCANNING";
            }
        },

        deployMarkers(data) {
            const { latitude: lat, longitude: lon, city, country_code: iso, org } = data;
            const cityUpper = (city || "UNKNOWN").toUpperCase();
            const isoLower = iso ? iso.toLowerCase() : "un";

            // UI Update
            document.getElementById('mon-city').innerText = cityUpper;
            const flagUi = document.getElementById('mon-flag-ui');
            flagUi.src = `https://flagcdn.com/w80/${isoLower}.png`;
            flagUi.style.display = 'inline-block';
            document.getElementById('mon-status').innerText = `IP: ${data.ip}\nNODE: ${iso}\nPROVIDER: ${org || 'N/A'}\nSTATUS: TUNNEL ACTIVE`;

            this.markers.clear();
            
            // Lat/Lon para 3D
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.02);

            // LED de localização
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.025, 16, 16), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
            dot.position.copy(pos);
            this.markers.add(dot);

            // Label da Cidade
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.fillStyle = '#39ff14'; ctx.font = 'bold 50px Courier New';
            ctx.textAlign = 'center'; ctx.fillText(cityUpper, 256, 80);
            const label = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            label.position.copy(pos.clone().multiplyScalar(1.3));
            label.scale.set(0.8, 0.2, 1);
            this.markers.add(label);

            // Focar a câmera suavemente no novo ponto
            this.camera.position.lerp(pos.clone().multiplyScalar(4), 0.05);
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update();
            this.renderer.render(this.scene, this.camera);
        }
    };

    window.onload = () => RAU_SYSTEM.init();
    window.onresize = () => {
        RAU_SYSTEM.camera.aspect = window.innerWidth / window.innerHeight;
        RAU_SYSTEM.camera.updateProjectionMatrix();
        RAU_SYSTEM.renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
