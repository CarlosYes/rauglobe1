<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v260.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        .hud-rau {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 10, 30, 0.95); border: 2px solid #39ff14;
            padding: 15px; border-radius: 4px; color: #fff;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4); pointer-events: none;
        }
        .count-big { font-size: 55px; font-weight: bold; color: #39ff14; display: block; line-height: 0.8; }
        
        .tag-rau {
            display: flex; align-items: center; gap: 8px;
            background: rgba(0, 0, 0, 0.9); border: 1px solid #39ff14;
            color: #fff; padding: 5px 10px; border-radius: 3px;
            font-size: 13px; font-weight: bold;
        }
        .tag-rau img { width: 22px; border-radius: 2px; }
        .is-me { border: 2px solid #fff !important; background: #39ff14 !important; color: #000 !important; }
    </style>
</head>
<body>

<div class="hud-rau">
    <div style="font-size: 10px; letter-spacing: 2px; opacity: 0.8; margin-bottom: 5px;">OUVINTES EM DIRETO</div>
    <div id="live-total" class="count-big">1</div>
    <div id="status-msg" style="font-size: 11px; margin-top: 10px; color: #39ff14;">SINAL: OK</div>
</div>

<div id="globeViz"></div>

<script>
    const fbConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.database();
    const radarRef = db.ref('rau_radar_ultra_v260');

    const myID = "R_" + Math.random().toString(36).substr(2, 6);
    let myNode = radarRef.child(myID);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .pointColor(d => d.id === myID ? '#ffffff' : '#39ff14')
        .pointRadius(d => d.id === myID ? 3.0 : 1.2)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'tag-rau' + (d.id === myID ? ' is-me' : '');
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `${flag} <span>${d.city || 'Ouvinte'}</span>`;
            return el;
        });

    async function ligarAgora() {
        // PASSO 1: REGISTO CEGO (Número 1 aparece imediatamente)
        myNode.set({ id: myID, ts: Date.now(), lat: null, lng: null });
        myNode.onDisconnect().remove();

        // PASSO 2: LOCALIZAÇÃO SEM LIMITES
        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            
            if (d.latitude) {
                myNode.update({
                    lat: d.latitude,
                    lng: d.longitude,
                    city: d.city,
                    country: d.country_code,
                    ts: Date.now()
                });
                document.getElementById('status-msg').innerText = "ONLINE: " + d.city.toUpperCase();
            }
        } catch (e) {
            document.getElementById('status-msg').innerText = "ONLINE (REDE)";
        }

        // PASSO 3: SINCRONIZAÇÃO EM TEMPO REAL
        radarRef.on('value', snap => {
            const now = Date.now();
            const data = Object.values(snap.val() || {}).filter(u => (now - u.ts < 30000));
            
            // Força o contador a ser no mínimo 1 (tu)
            document.getElementById('live-total').innerText = Math.max(1, data.length);
            
            // Só desenha quem tem coordenadas (evita África)
            const pts = data.filter(u => u.lat && u.lat !== 0);
            world.pointsData(pts);
            world.htmlElementsData(pts);
        });

        setInterval(() => myNode.update({ ts: Date.now() }), 10000);
    }

    window.onload = ligarAgora;
    window.onresize = () => { world.width(window.innerWidth); world.height(window.innerHeight); };
</script>
</body>
</html>
