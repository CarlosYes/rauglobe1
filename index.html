<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU GLOBAL MONITOR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        
        /* Interface de Monitorização */
        .hud {
            position: absolute; top: 25px; left: 25px; z-index: 1000;
            background: rgba(0, 5, 10, 0.9); border-left: 5px solid #00f2ff;
            padding: 20px; color: #00f2ff; pointer-events: none;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        .count { font-size: 80px; font-weight: 900; color: #fff; line-height: 0.8; letter-spacing: -3px; }
        
        /* Etiquetas de Visitas Reais */
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #fff; color: #000; padding: 4px 10px; border-radius: 2px;
            font-size: 12px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            white-space: nowrap; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .l-rau img { width: 20px; height: 13px; object-fit: cover; }
        
        /* Ponto Pulsante */
        .d-rau { 
            width: 12px; height: 12px; background: #fff; border-radius: 50%; 
            margin-top: 5px; border: 2px solid #00f2ff; 
            animation: pulse 1.2s infinite ease-out; 
        }
        @keyframes pulse { 
            0% { transform: scale(1); opacity: 1; } 
            100% { transform: scale(3.5); opacity: 0; } 
        }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 4px; opacity: 0.7;">SINAIS ATIVOS NA REDE</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 11px; color: #fff; margin-top: 10px; font-family: monospace; text-transform: uppercase;">A estabelecer ligação...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'UID-' + Math.random().toString(36).substr(2, 7);

    // Inicia o Globo Imediatamente
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#00f2ff')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    // Função de Rastreio Real (Sem batotas)
    async function initMonitor() {
        let geo = { lat: 0, lng: 0, city: "VISITANTE", country: "" };
        
        try {
            // Método JSONP para máxima compatibilidade (evita página negra)
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            if (data.latitude) {
                geo = { 
                    lat: data.latitude, 
                    lng: data.longitude, 
                    city: data.city.toUpperCase(),
                    country: data.country_code.toLowerCase()
                };
            }
        } catch (e) { console.log("Erro de rede."); }

        // Ligação ao servidor de Geovisitas
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('real-global-monitor');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `SINAL LOCAL: ${geo.city}`;
            channel.presence.enter(geo);

            const sync = () => {
                channel.presence.get((err, members) => {
                    if (!err) {
                        const active = members.map(m => m.data).filter(d => d && d.lat !== 0);
                        document.getElementById('count').innerText = active.length;
                        world.htmlElementsData(active);
                    }
                });
            };

            channel.presence.subscribe(['enter', 'leave', 'present', 'update'], sync);
            sync();
        });

        // Focagem automática no utilizador
        if (geo.lat !== 0) {
            world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.2 }, 2000);
        }
    }

    window.onload = initMonitor;
</script>
</body>
</html>
