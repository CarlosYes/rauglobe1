 <!DOCTYPE html>
<html lang=pt-PT>
<head>
<title>Radio Amigos Unidos</title>
<meta name="description" content="RAU" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta http-equiv=X-UA-Compatible content="IE=Edge"/>
<meta property="og:title" content="RAU Player" />
<meta property="og:description" content="RAU" />
<link rel="icon" type="image/png" href="https://i.imgur.com/nNh98kV.png" sizes="48x48" />
<link rel="icon" type="image/png" href="https://i.imgur.com/nNh98kV.png" sizes="96x96" />
<link rel="icon" type="image/png" href="https://i.imgur.com/nNh98kV.png" sizes="144x144" />
<link rel="icon" type="image/png" href="https://i.imgur.com/nNh98kV.png" sizes="192x192" />
<link rel="apple-touch-icon" href="https://i.imgur.com/nNh98kV.png" sizes="180x180"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root {
            --neon-green: #39ff14;
            --neon-red: #ff0000;
            --me-color: #1a1a1a;
            --bg: #050505;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; }
        #radar-container { width: 100%; height: 100%; cursor: grab; }
        #radar-container:active { cursor: grabbing; }

        /* HUD Tático */
        .hud {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: rgba(0, 15, 0, 0.9); border: 1px solid var(--neon-green);
            padding: 12px; color: var(--neon-green); font-size: 11px;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); pointer-events: none;
        }

        .dot {
            position: absolute; width: 10px; height: 10px; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 10; pointer-events: none;
        }
        .label {
            position: absolute; font-size: 10px; padding: 2px 5px;
            background: rgba(0,0,0,0.8); transform: translate(-50%, -170%);
            white-space: nowrap; border: 1px solid; pointer-events: none;
        }

        /* Classes de Status */
        .me { background: var(--me-color); border: 1px solid #444; color: #777; }
        .friend { background: var(--neon-green); box-shadow: 0 0 12px var(--neon-green); color: var(--neon-green); border-color: var(--neon-green); }
        .stranger { background: var(--neon-red); box-shadow: 0 0 12px var(--neon-red); color: var(--neon-red); border-color: var(--neon-red); }
    </style>
</head>
<body>

    <div class="hud">
        <b style="font-size: 13px;">[ RADAR TÁTICO - AMIGOS UNIDOS ]</b><br>
        STATUS: ENCRIPTADO E ATIVO<br>
        OUVINTES EM LINHA: <span id="count">0</span><br>
        <div style="margin-top:5px; opacity: 0.8;">
            <span style="color:#777">● TU</span> | 
            <span style="color:var(--neon-green)">● AMIGO</span> | 
            <span style="color:var(--neon-red)">● DESCONHECIDO</span>
        </div>
    </div>

    <div id="radar-container"></div>

    <script>

        const _v = [
            "QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n",
            "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t",
            "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=",
            "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"
        ];

        const firebaseConfig = {
            apiKey: atob(_v[0]),
            authDomain: atob(_v[1]),
            projectId: atob(_v[2]),
            appId: atob(_v[3])
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const userId = "UNIT_" + Math.random().toString(36).substr(2, 5);
        const isFriend = new URLSearchParams(window.location.search).get('ref') === 'amigo';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('radar-container').appendChild(renderer.domElement);

        const globe = new THREE.Mesh(
            new THREE.SphereGeometry(1, 60, 60),
            new THREE.MeshPhongMaterial({ color: 0x001500, wireframe: true, transparent: true, opacity: 0.3 })
        );
        scene.add(globe);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        camera.position.z = 3.2;

        let isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        window.onmousedown = () => isDragging = true;
        window.onmouseup = () => isDragging = false;
        window.onmousemove = (e) => {
            if(isDragging) {
                globe.rotation.y += (e.clientX - prevMouse.x) * 0.005;
                globe.rotation.x += (e.clientY - prevMouse.y) * 0.005;
            }
            prevMouse = { x: e.clientX, y: e.clientY };
        };

        const markers = [];
        function createPoint(lat, lng, name, type) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            
            const obj = new THREE.Object3D();
            obj.position.set(-Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
            globe.add(obj);

            const d = document.createElement('div'); d.className = 'dot ' + type;
            const l = document.createElement('div'); l.className = 'label ' + type;
            l.innerText = name;
            
            document.body.appendChild(d); document.body.appendChild(l);
            markers.push({ obj, d, l });
        }

        async function runRadar() {
            try {
                const res = await fetch("https://ipapi.co/json/");
                const data = await res.json();
                
                const pushData = () => {
                    db.collection('activeUsers').doc(userId).set({
                        lat: data.latitude, lng: data.longitude, name: data.city,
                        isFriend: isFriend, lastPing: firebase.firestore.FieldValue.serverTimestamp()
                    });
                };
                pushData(); setInterval(pushData, 25000);

                db.collection('activeUsers').where('lastPing', '>', new Date(Date.now() - 50000)).onSnapshot(snap => {
                    markers.forEach(m => { m.d.remove(); m.l.remove(); globe.remove(m.obj); });
                    markers.length = 0;
                    snap.forEach(doc => {
                        const d = doc.data();
                        let t = d.isFriend ? 'friend' : 'stranger';
                        if(doc.id === userId) t = 'me';
                        createPoint(d.lat, d.lng, d.name, t);
                    });
                    document.getElementById('count').innerText = snap.size;
                });
                animate();
            } catch (e) { console.warn("Erro de conexão."); }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!isDragging) globe.rotation.y += 0.0015;
            
            markers.forEach(m => {
                const v = new THREE.Vector3();
                m.obj.getWorldPosition(v);
                v.project(camera);
                
                const camDist = camera.position.distanceTo(m.obj.getWorldPosition(new THREE.Vector3()));
                const show = v.z < 1 && camDist < camera.position.distanceTo(globe.position);
                
                m.d.style.display = m.l.style.display = show ? 'block' : 'none';
                if(show) {
                    m.d.style.left = m.l.style.left = (v.x * 0.5 + 0.5) * window.innerWidth + 'px';
                    m.d.style.top = m.l.style.top = (-v.y * 0.5 + 0.5) * window.innerHeight + 'px';
                }
            });
            renderer.render(scene, camera);
        }

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };

        runRadar();
    </script>
<script>

    var message = "©arlos Copyright";

    function clickIE4() {
        if (event.button == 2) {
            alert(message);
            return false;
        }
    }

    function clickNS4(e) {
        if (document.layers || document.getElementById && !document.all) {
            if (e.which == 2 || e.which == 3) {
                alert(message);
                return false;
            }
        }
    }

    if (document.layers) {
        document.captureEvents(Event.MOUSEDOWN);
        document.onmousedown = clickNS4;
    } else if (document.all && !document.getElementById) {
        document.onmousedown = clickIE4;
    }

    document.oncontextmenu = new Function("alert(message);return false")
</script>
<script>

    function disableselect(e) {
        return false
    }
    function reEnable() {
        return true
    }
    document.onselectstart = new Function("return false")
    if (window.sidebar) {
        document.onmousedown = disableselect
        document.onclick = reEnable
    }
</script>
<script>
        window.oncontextmenu = function () {
            console.log("Right Click Disabled");
            return false;
        }
    </script> 
  
</body>
</html>
