<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v93</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.9); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none; border-radius: 0 4px 4px 0;
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        .count-total { font-size: 14px; margin-top: 8px; color: #fff; opacity: 0.8; font-weight: bold; }

        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.9); padding: 4px 10px; border-radius: 3px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            border: 1px solid #39ff14; color: #39ff14; white-space: nowrap;
        }
        .m-rau.offline .l-rau { color: #8b0000; border-color: #8b0000; opacity: 0.6; }
        
        .l-rau img { width: 16px; height: 11px; object-fit: cover; }
        .d-rau { width: 7px; height: 7px; border-radius: 50%; margin-top: 3px; }
        
        .m-rau.online .d-rau { background: #39ff14; box-shadow: 0 0 15px #39ff14; animation: pulse 1.2s infinite; }
        .m-rau.offline .d-rau { background: #8b0000; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 9px; letter-spacing: 3px; color: #39ff14;">SINAL EM DIRETO</div>
    <div id="onlineCount" class="count-on">0</div>
    <div id="totalCount" class="count-total">SINAIS NO GLOBO: 0</div>
    <div id="status" style="font-size: 9px; margin-top: 10px; font-family: monospace; color: #39ff14;">A RASTREAR...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'NODE-' + Math.random().toString(36).substr(2, 7);
    const PERSIST = 5 * 60 * 1000;
    let visitors = new Map();

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true).atmosphereColor('#ffffff')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = `m-rau ${d.status}`;
            const flag = d.country ? `<img src="https://flagcdn.com/w20/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    // SISTEMA CLOUDFLARE (O mais estável para evitar bloqueios)
    async function getGeo() {
        try {
            // Passo 1: Obter o IP através da Cloudflare
            const res = await fetch('https://1.1.1.1/cdn-cgi/trace');
            const text = await res.text();
            const ip = text.match(/ip=(.*)/)[1];
            
            // Passo 2: Obter dados desse IP (Usando proxy para evitar CORS)
            const locRes = await fetch(`https://ipapi.co/${ip}/json/`);
            const d = await locRes.json();
            
            return {
                lat: parseFloat(d.latitude),
                lng: parseFloat(d.longitude),
                city: d.city.toUpperCase(),
                country: d.country_code
            };
        } catch (e) {
            return null;
        }
    }

    async function start() {
        const geo = await getGeo();
        if (!geo) {
            document.getElementById('status').innerText = "ERRO: REFRESH NA PÁGINA";
            return;
        }

        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('rau-stream-v93');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `LOCALIZADO: ${geo.city}`;
            channel.presence.enter({...geo, status: 'online'});
            
            channel.presence.subscribe(['enter', 'present', 'update'], (m) => {
                if(m.data && m.data.lat) {
                    visitors.set(m.clientId || m.id, { ...m.data, status: 'online', ts: Date.now() });
                    render();
                }
            });

            channel.presence.subscribe('leave', (m) => {
                const id = m.clientId || m.id;
                if (visitors.has(id)) {
                    visitors.set(id, { ...visitors.get(id), status: 'offline', ts: Date.now() });
                    render();
                }
            });
            setInterval(clean, 10000);
        });

        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.2 }, 2000);
    }

    function clean() {
        const now = Date.now();
        let changed = false;
        for (let [id, d] of visitors) {
            if (d.status === 'offline' && (now - d.ts > PERSIST)) {
                visitors.delete(id);
                changed = true;
            }
        }
        if (changed) render();
    }

    function render() {
        const arr = Array.from(visitors.values());
        document.getElementById('onlineCount').innerText = arr.filter(v => v.status === 'online').length;
        document.getElementById('totalCount').innerText = `SINAIS NO GLOBO: ${arr.length}`;
        world.htmlElementsData(arr);
    }

    world.controls().autoRotate = true;
    window.onload = start;
</script>
</body>
</html>
