<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Globo Realtime</title>
    <script src="//unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        #globeViz { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="globeViz"></div>

    <script>
        const globe = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
            .pointColor(() => '#ff0000') // Pontos vermelhos para visibilidade
            .pointRadius(0.6)
            .pointLabel(d => `Cidade: ${d.city}`);

        async function atualizar() {
            try {
                // Este é o teu link que já confirmamos que tem dados
                const response = await fetch('https://globorau.carlos2022yes.workers.dev/');
                const data = await response.json();
                
                if(data && data.length > 0) {
                    globe.pointsData(data);
                    
                    // Foca no último ponto (Lisboa)
                    const last = data[data.length - 1];
                    globe.pointOfView({ lat: last.lat, lng: last.lng, altitude: 2 }, 2000);
                }
            } catch (err) {
                console.error("Erro ao ler dados:", err);
            }
        }

        atualizar();
        setInterval(atualizar, 15000);
    </script>
</body>
</html>
