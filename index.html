<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v36 - COUNT FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); border: 2px solid #39ff14;
            padding: 20px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 20px #39ff14;
        }
        .count { font-size: 80px; font-weight: 900; color: #fff; line-height: 0.8; margin: 10px 0; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 4px 10px; border-radius: 2px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            white-space: nowrap; border: 1px solid #fff;
        }
        .l-rau img { width: 20px; height: 13px; object-fit: cover; }
        .d-rau { width: 12px; height: 12px; background: #fff; border-radius: 50%; margin-top: 5px; border: 2px solid #39ff14; animation: p 1s infinite; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 3px;">LIVE RADAR NODES</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 11px; color: #fff;">A RASTREAR...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    // ID de sessão único para garantir que tu contas como 1
    const SESSION_ID = 'NODE-' + Math.random().toString(36).substr(2, 9);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            el.innerHTML = `<div class="l-rau"><img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png"><span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    async function init() {
        try {
            // Rastreio sem permissão (IP-API)
            const res = await fetch('https://ipapi.co/json/');
            const geo = await res.json();
            
            if (!geo.city) throw new Error();

            const myData = {
                id: SESSION_ID,
                lat: geo.latitude,
                lng: geo.longitude,
                city: geo.city.toUpperCase(),
                country: geo.country_code
            };

            // Conexão Ably com CLIENT_ID explícito
            const ably = new Ably.Realtime({ 
                key: ABLY_KEY, 
                clientId: SESSION_ID,
                echoMessages: false 
            });

            const channel = ably.channels.get('rau-live-radar');

            ably.connection.on('connected', () => {
                document.getElementById('status').innerText = "RADAR ONLINE: " + myData.city;
                
                // Força a entrada no canal de presença
                channel.presence.enter(myData, (err) => {
                    if(err) console.error("Erro ao entrar:", err);
                    updateCount();
                });

                // Atualização em tempo real
                const updateCount = () => {
                    channel.presence.get((err, members) => {
                        if(!err) {
                            const active = members.map(m => m.data).filter(d => d && d.lat);
                            document.getElementById('count').innerText = active.length;
                            world.htmlElementsData(active);
                        }
                    });
                };

                channel.presence.subscribe(['enter', 'leave', 'present', 'update'], updateCount);
            });

            world.pointOfView({ lat: geo.latitude, lng: geo.longitude, altitude: 2.0 }, 2000);

        } catch (e) {
            document.getElementById('status').innerText = "ERRO DE RASTREIO";
            // Tenta de novo se falhar
            setTimeout(init, 5000);
        }
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 1.5;
    window.onload = init;
</script>
</body>
</html>
