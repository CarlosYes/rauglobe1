<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - GLOBO OFICIAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: relative; }
        
        .hud { 
            position: absolute; top: 20px; left: 20px; z-index: 10000; 
            background: rgba(0,0,0,0.85); color: #39ff14; padding: 12px; 
            border: 2px solid #39ff14; border-radius: 5px; pointer-events: none;
            box-shadow: 0 0 15px rgba(0,255,0,0.3);
        }

        .city-tag {
            position: absolute; color: #fff; background: rgba(0, 50, 0, 0.9);
            padding: 5px 12px; border: 1px solid #39ff14; border-radius: 4px;
            font-size: 14px; font-weight: 900; pointer-events: none;
            white-space: nowrap; z-index: 9999; text-transform: uppercase;
            box-shadow: 0 0 10px #39ff14; display: none;
        }

        .dot {
            position: absolute; width: 12px; height: 12px; background: #39ff14;
            border-radius: 50%; z-index: 9998; box-shadow: 0 0 15px #39ff14;
            transform: translate(-50%, -50%); border: 2px solid #fff; display: none;
        }
    </style>
</head>
<body>

<div class="hud">
    <b style="font-size: 1.1em;">RADIO AMIGOS UNIDOS</b><br>
    OUVINTES ONLINE: <span id="count">1</span>
</div>
<div id="canvas-container"></div>

<script>
    const _k = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
    const cfg = { apiKey: atob(_k[0]), authDomain: atob(_k[1]), projectId: atob(_k[2]), appId: atob(_k[3]) };
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    const db = firebase.firestore();
    const myId = "RAU_" + Math.random().toString(36).substr(2, 5);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const loader = new THREE.TextureLoader();
    const earth = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshPhongMaterial({ 
            map: loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg') 
        })
    );
    globeGroup.add(earth);

    scene.add(new THREE.AmbientLight(0xaaaaaa));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(5, 3, 5);
    scene.add(sun);
    camera.position.z = 3;

    let isDragging = false;
    document.addEventListener('mousedown', () => isDragging = true);
    document.addEventListener('mouseup', () => isDragging = false);
    document.addEventListener('mousemove', (e) => {
        if(isDragging) {
            globeGroup.rotation.y += e.movementX * 0.007;
            globeGroup.rotation.x += e.movementY * 0.007;
        }
    });

    let markers = [];
    function addMarker(lat, lng, city) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        const anchor = new THREE.Object3D();
        anchor.position.set(-Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
        globeGroup.add(anchor);

        const dot = document.createElement('div'); dot.className = 'dot';
        const tag = document.createElement('div'); tag.className = 'city-tag';
        tag.innerText = (city || "Ouvinte").toUpperCase();
        document.body.appendChild(dot);
        document.body.appendChild(tag);
        markers.push({ anchor, dot, tag });
    }

    async function startAuto() {
        try {
            // Usando ipinfo com token para garantir funcionamento no GitHub
            const res = await fetch("https://ipinfo.io/json?token=e392744f6845f0");
            const data = await res.json();
            const coords = data.loc.split(',');
            
            const up = () => db.collection('rau_final_auto').doc(myId).set({
                lat: parseFloat(coords[0]), lng: parseFloat(coords[1]), city: data.city,
                ts: firebase.firestore.FieldValue.serverTimestamp()
            });
            up(); setInterval(up, 25000);

            db.collection('rau_final_auto').where('ts', '>', new Date(Date.now() - 60000)).onSnapshot(snap => {
                markers.forEach(m => { if(m.dot.parentNode) m.dot.remove(); if(m.tag.parentNode) m.tag.remove(); });
                markers = [];
                for(let i = globeGroup.children.length - 1; i >= 0; i--) {
                    if (globeGroup.children[i].type === "Object3D") globeGroup.remove(globeGroup.children[i]);
                }
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.lat) addMarker(d.lat, d.lng, d.city);
                });
                document.getElementById('count').innerText = snap.size;
            });
        } catch(e) { console.error("Erro na detecção automática."); }
    }

    function animate() {
        requestAnimationFrame(animate);
        if(!isDragging) globeGroup.rotation.y += 0.0015;
        markers.forEach(m => {
            const vec = new THREE.Vector3();
            m.anchor.getWorldPosition(vec);
            const dist = camera.position.distanceTo(vec);
            vec.project(camera);
            if (dist < 3.05) {
                m.dot.style.display = m.tag.style.display = 'block';
                const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-vec.y * 0.5 + 0.5) * window.innerHeight;
                m.dot.style.left = x + 'px'; m.dot.style.top = y + 'px';
                m.tag.style.left = (x + 12) + 'px'; m.tag.style.top = (y - 12) + 'px';
            } else { m.dot.style.display = m.tag.style.display = 'none'; }
        });
        renderer.render(scene, camera);
    }
    startAuto(); animate();
</script>
</body>
</html>
