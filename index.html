<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - MONITOR GLOBAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #radar-viewport { position: absolute; width: 100%; height: 100%; z-index: 1; }
        
        /* Painel de Informações */
        .info-box {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            border-left: 4px solid #00f2ff; padding: 15px; background: rgba(0,10,20,0.85);
            color: #fff; border-radius: 0 5px 5px 0; pointer-events: none;
        }

        /* Etiquetas das Cidades */
        .marker-label {
            position: absolute; color: #00f2ff; font-size: 11px; font-weight: bold;
            pointer-events: none; white-space: nowrap; background: rgba(0,0,0,0.7);
            padding: 2px 8px; border-radius: 10px; border: 1px solid #00f2ff;
            transform: translate(10px, -10px); z-index: 20;
        }

        .marker-dot {
            position: absolute; width: 6px; height: 6px; background: #fff;
            border-radius: 50%; box-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff;
            z-index: 19; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="info-box">
        <span style="font-size: 10px; opacity: 0.6; letter-spacing: 2px;">SISTEMA DE RASTREIO</span><br>
        <b style="font-size: 18px; color: #00f2ff;">AMIGOS UNIDOS</b><br>
        <div style="margin-top: 5px;">ATIVOS AGORA: <span id="user-count" style="font-size: 20px; font-weight: 900;">1</span></div>
    </div>

    <div id="radar-viewport"></div>

    <script>
        // Configuração de Dados
        const _k = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
        const config = { apiKey: atob(_k[0]), authDomain: atob(_k[1]), projectId: atob(_k[2]), appId: atob(_k[3]) };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        const myId = "R_" + Math.random().toString(36).substr(2, 7);

        // --- ENGINE 3D ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('radar-viewport').appendChild(renderer.domElement);

        // Globo Wireframe Azul Ciano
        const globe = new THREE.Mesh(
            new THREE.SphereGeometry(1, 40, 40),
            new THREE.MeshPhongMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.2 })
        );
        scene.add(globe);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        camera.position.z = 3.2;

        let activeMarkers = [];

        function createPoint(lat, lng, city) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            const anchor = new THREE.Object3D();
            anchor.position.set(-Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
            globe.add(anchor);

            const dot = document.createElement('div'); dot.className = 'marker-dot';
            const label = document.createElement('div'); label.className = 'marker-label';
            label.innerText = city.toUpperCase();

            document.body.appendChild(dot);
            document.body.appendChild(label);
            activeMarkers.push({ anchor, dot, label });
        }

        async function initRadar() {
            try {
                const res = await fetch("https://ipapi.co/json/");
                const data = await res.json();
                
                const pushState = () => db.collection('live_map').doc(myId).set({
                    lat: data.latitude, lng: data.longitude, city: data.city,
                    ts: firebase.firestore.FieldValue.serverTimestamp()
                });
                pushState(); setInterval(pushState, 25000);

                db.collection('live_map').where('ts', '>', new Date(Date.now() - 50000)).onSnapshot(snap => {
                    activeMarkers.forEach(m => { m.dot.remove(); m.label.remove(); });
                    activeMarkers = [];
                    while(globe.children.length > 0) globe.remove(globe.children[0]);

                    snap.forEach(doc => {
                        const d = doc.data();
                        createPoint(d.lat, d.lng, d.city);
                    });
                    document.getElementById('user-count').innerText = snap.size;
                });
            } catch(e) { console.log("Erro GPS"); }
        }

        function render() {
            requestAnimationFrame(render);
            globe.rotation.y += 0.0015;

            activeMarkers.forEach(m => {
                const vec = new THREE.Vector3();
                m.anchor.getWorldPosition(vec);
                const distance = camera.position.distanceTo(vec);
                vec.project(camera);

                // Só mostra se o ponto estiver na "frente" do globo
                if (distance < 3.2 && vec.z < 1) {
                    m.dot.style.display = m.label.style.display = 'block';
                    m.dot.style.left = (vec.x * 0.5 + 0.5) * window.innerWidth + 'px';
                    m.dot.style.top = (-vec.y * 0.5 + 0.5) * window.innerHeight + 'px';
                    m.label.style.left = m.dot.style.left;
                    m.label.style.top = m.dot.style.top;
                } else {
                    m.dot.style.display = m.label.style.display = 'none';
                }
            });
            renderer.render(scene, camera);
        }

        initRadar(); render();
        window.onresize = () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
