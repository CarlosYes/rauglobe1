<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v191.0 - STABILITY FORCE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; user-select: none; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 10, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
            backdrop-filter: blur(10px);
        }
        .monitor-display { background: rgba(0, 5, 0, 0.95); border: 1px solid #1a1a1a; padding: 12px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; }
        #mon-status { font-size: 10px; color: #39ff14; opacity: 0.8; margin-top: 8px; border-top: 1px solid #39ff1444; padding-top: 8px; white-space: pre-line; line-height: 1.4; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; outline: none; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
        <div id="led" style="width: 10px; height: 10px; border-radius: 50%; background: #39ff14; box-shadow: 0 0 10px #39ff14;"></div>
        <span style="font-size: 11px; letter-spacing: 1px;">CORE v191.0 | FIXED RENDER</span>
    </div>
    <div class="monitor-display">
        <span id="mon-city">SYNCHRONIZING...</span>
        <div id="mon-status">A aguardar dados do satélite...</div>
    </div>
</div>

<script>
    const RAU_SYSTEM = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000),
        renderer: new THREE.WebGLRenderer({ antialias: true }),
        controls: null, globe: null, markers: new THREE.Group(), currentIP: null,

        init() {
            // 1. Configurar Renderer primeiro
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setClearColor(0x000000, 1);
            document.body.appendChild(this.renderer.domElement);

            // 2. Iluminação potente (Garante que nada fique escuro)
            this.scene.add(new THREE.AmbientLight(0xffffff, 1.3));
            const light = new THREE.DirectionalLight(0xffffff, 0.7);
            light.position.set(5, 3, 5);
            this.scene.add(light);

            // 3. Criar Globo visível instantaneamente (Cor Cinza)
            const geo = new THREE.SphereGeometry(1, 64, 64);
            const mat = new THREE.MeshPhongMaterial({ color: 0x222222, shininess: 15 });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            
            // Vincular marcadores ao globo
            this.globe.add(this.markers);

            // 4. Controles de giro suave
            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.enableDamping = true;
            this.controls.dampingFactor = 0.05;
            this.controls.autoRotate = true;
            this.controls.autoRotateSpeed = 0.5;
            this.camera.position.z = 3.5;

            this.animate();
            this.loadTexture();
            this.track();
            setInterval(() => this.track(), 10000);
        },

        loadTexture() {
            const loader = new THREE.TextureLoader();
            // Usando uma URL alternativa estável
            loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.color.set(0xffffff);
                this.globe.material.needsUpdate = true;
            });
        },

        async track() {
            try {
                const res = await fetch(`https://ipapi.co/json/?nocache=${Date.now()}`);
                const data = await res.json();
                if (data.ip && data.ip !== this.currentIP) {
                    this.currentIP = data.ip;
                    this.updateUI(data);
                }
            } catch (e) {
                document.getElementById('mon-status').innerText = "Erro de conexão...";
            }
        },

        updateUI(data) {
            document.getElementById('mon-city').innerText = (data.city || "RAU NODE").toUpperCase();
            document.getElementById('mon-status').innerText = `IP: ${data.ip}\nPAÍS: ${data.country_code}\nISP: ${data.org}\nSTATUS: ONLINE`;

            this.markers.clear();
            const phi = (90 - data.latitude) * (Math.PI / 180);
            const theta = (data.longitude + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.02);

            // Marcador visível
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.03, 16, 16), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
            dot.position.copy(pos);
            this.markers.add(dot);

            // Focar suavemente
            this.camera.position.lerp(pos.clone().multiplyScalar(3.5), 0.05);
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update();
            this.renderer.render(this.scene, this.camera);
        }
    };

    window.onload = () => RAU_SYSTEM.init();
</script>
</body>
</html>
