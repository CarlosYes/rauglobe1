<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v59.0 - ZERO FREEZE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.95); color: #39ff14; padding: 20px;
            border: 2px solid #39ff14; box-shadow: 0 0 30px rgba(0,255,0,0.2);
        }
        #count { font-size: 3.5em; font-weight: 900; color: #fff; display: block; line-height: 0.8; margin: 10px 0; }
        .label { font-size: 10px; letter-spacing: 1px; font-weight: bold; text-transform: uppercase; }
        #city-tag { color: #fff; background: #004400; padding: 3px 10px; border: 1px solid #39ff14; font-size: 14px; display: inline-block; margin-top: 5px; }
        #net-status { font-size: 9px; color: #39ff14; opacity: 0.6; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div class="label">RAU COMMAND v59.0</div>
    <span id="count">0</span>
    <div class="label">SINAIS ACTIVOS</div>
    <div id="city-tag">INICIALIZANDO...</div>
    <span id="net-status">AGUARDANDO HANDSHAKE...</span>
</div>

<script>
    // URL DO TEU SERVIDOR RENDER (Muda isto!)
    const SERVER_URL = "https://teu-projeto.onrender.com"; 
    const socket = io(SERVER_URL, { reconnection: true });

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.autoRotate = true; camera.position.z = 3.5;

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshPhongMaterial({
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 5
        })
    );
    globeGroup.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 2.0));

    // LÓGICA DE ATUALIZAÇÃO SÍNCRONA
    socket.on('update-peers', (peers) => {
        const peerList = Object.values(peers);
        document.getElementById('count').innerText = peerList.length;
        document.getElementById('net-status').innerText = "LINK ESTÁVEL: " + SERVER_URL;

        // Limpa marcadores e reconstrói
        for(let i = globeGroup.children.length - 1; i > 0; i--) globeGroup.remove(globeGroup.children[i]);
        
        peerList.forEach(p => {
            const isLocal = p.id === socket.id;
            if(isLocal) document.getElementById('city-tag').innerText = p.city;
            renderSignal(p, isLocal);
        });
    });

    function renderSignal(data, isLocal) {
        const phi = (90 - data.lat) * (Math.PI / 180);
        const theta = (data.lon + 180) * (Math.PI / 180);
        const pos = new THREE.Vector3(-(Math.sin(phi)*Math.cos(theta)), Math.cos(phi), (Math.sin(phi)*Math.sin(theta)));

        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.022, 16, 16), new THREE.MeshBasicMaterial({ color: isLocal ? 0x39ff14 : 0xff3939 }));
        dot.position.copy(pos);
        globeGroup.add(dot);

        // Bandeira e Texto
        new THREE.TextureLoader().load(`https://flagcdn.com/w80/${data.country}.png`, (fTex) => {
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: fTex }));
            sprite.position.copy(pos.clone().multiplyScalar(1.15));
            sprite.scale.set(0.2, 0.12, 1);
            globeGroup.add(sprite);
        });

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512; canvas.height = 128;
        ctx.fillStyle = isLocal ? '#39ff14' : '#ff3939';
        ctx.font = 'bold 44px Courier New'; ctx.textAlign = 'center';
        ctx.fillText(data.city.toUpperCase(), 256, 80);
        const label = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
        label.position.copy(pos.clone().multiplyScalar(1.3));
        label.scale.set(0.7, 0.18, 1);
        globeGroup.add(label);
    }

    // DISPARO DE SINAL COM TIMEOUT (IMPEDE O TRAVAMENTO "A RASTREAR")
    socket.on('connect', () => {
        document.getElementById('city-tag').innerText = "LOCALIZANDO...";
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 4000); // Se demorar +4s, cancela e usa default

        fetch(`https://ipapi.co/json/?rau=${Date.now()}`, { signal: controller.signal })
            .then(res => res.json())
            .then(data => {
                clearTimeout(timeoutId);
                socket.emit('report-location', {
                    city: data.city || "DESCONHECIDO",
                    lat: data.latitude || 0,
                    lon: data.longitude || 0,
                    country: (data.country_code || "un").toLowerCase()
                });
            })
            .catch(() => {
                // FALLBACK: Se o IPAPI falhar, envia sinal genérico para não ficar em 0
                socket.emit('report-location', { city: "SINAL OCULTO", lat: 0, lon: 0, country: "un" });
            });
    });

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    animate();
</script>
</body>
</html>
