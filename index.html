<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v91</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.95); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none; border-radius: 0 4px 4px 0;
        }
        .count-on { font-size: 55px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.9); padding: 3px 8px; border-radius: 2px;
            font-size: 10px; font-weight: 900; display: flex; align-items: center; gap: 5px;
            white-space: nowrap; border: 1px solid #39ff14; color: #39ff14;
        }
        .m-rau.offline .l-rau { color: #8b0000; border-color: #8b0000; opacity: 0.6; }
        .l-rau img { width: 14px; height: 10px; }
        .d-rau { width: 6px; height: 6px; border-radius: 50%; margin-top: 2px; }
        .m-rau.online .d-rau { background: #39ff14; box-shadow: 0 0 10px #39ff14; animation: p 1.2s infinite; }
        .m-rau.offline .d-rau { background: #8b0000; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }
        #btn-start { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            z-index: 2000; padding: 15px 30px; background: #39ff14; color: #000;
            border: none; font-weight: 900; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px #39ff14;
        }
    </style>
</head>
<body>

<div id="setup-screen">
    <button id="btn-start">ATIVAR MONITORIZAÇÃO</button>
</div>

<div class="hud">
    <div id="onCount" class="count-on">0</div>
    <div id="totCount" style="font-size: 11px; margin-top: 5px; opacity: 0.8;">TOTAL GLOBO: 0</div>
    <div id="status" style="font-size: 9px; margin-top: 10px; font-family: monospace;">AGUARDANDO PERMISSÃO...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'UID-' + Math.random().toString(36).substr(2, 7);
    const visitors = new Map();

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true).atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = `m-rau ${d.status}`;
            el.innerHTML = `<div class="l-rau"><span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    document.getElementById('btn-start').onclick = function() {
        this.style.display = 'none';
        startWithGPS();
    };

    function startWithGPS() {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const geo = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    city: "SINAL LOCAL",
                    status: 'online'
                };
                initAbly(geo);
            }, (err) => {
                document.getElementById('status').innerText = "ERRO: PERMISSÃO NEGADA";
            }, { enableHighAccuracy: true });
        }
    }

    async function initAbly(geo) {
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('rau-final-v91');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `SINAL: ATIVO`;
            channel.presence.enter(geo);
            
            channel.presence.subscribe(['enter', 'present', 'update'], (m) => {
                if(m.data && m.data.lat) {
                    visitors.set(m.clientId || m.id, { ...m.data, status: 'online', ts: Date.now() });
                    render();
                }
            });

            channel.presence.subscribe('leave', (m) => {
                const id = m.clientId || m.id;
                if (visitors.has(id)) {
                    visitors.set(id, { ...visitors.get(id), status: 'offline', ts: Date.now() });
                    render();
                }
            });
            setInterval(clean, 10000);
        });

        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.2 }, 2000);
    }

    function clean() {
        const now = Date.now();
        let up = false;
        for (let [id, d] of visitors) {
            if (d.status === 'offline' && (now - d.ts > 300000)) {
                visitors.delete(id);
                up = true;
            }
        }
        if (up) render();
    }

    function render() {
        const arr = Array.from(visitors.values());
        document.getElementById('onCount').innerText = arr.filter(v => v.status === 'online').length;
        document.getElementById('totCount').innerText = `TOTAL GLOBO: ${arr.length}`;
        world.htmlElementsData(arr);
    }

    world.controls().autoRotate = true;
</script>
</body>
</html>
