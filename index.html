<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - DEEP SPACE v15.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #rau-master-ui {
            position: absolute; top: 30px; left: 30px; z-index: 1000;
            background: rgba(0, 10, 0, 0.95); color: #39ff14; padding: 25px;
            border-left: 5px solid #39ff14; box-shadow: 0 0 30px rgba(0,255,0,0.2);
            pointer-events: none;
        }
        #system-alert { 
            position: absolute; bottom: 20px; right: 20px; 
            color: #ff0000; font-size: 11px; font-weight: bold;
        }
        .pulse { animation: p 1s infinite; }
        @keyframes p { 50% { opacity: 0.3; } }
        canvas { cursor: move; }
    </style>
</head>
<body>

<div id="rau-master-ui">
    <div style="font-weight: 900; letter-spacing: 3px;">RAU COMMAND v15.0</div>
    <div style="margin-top: 10px; font-size: 0.9em;">
        STATUS: <span id="conn" class="pulse">A LIGAR...</span><br>
        NÓ ATIVO: <span id="city" style="color:#fff">---</span><br>
        <hr style="border:0; border-top:1px solid #39ff14; margin:10px 0; opacity: 0.3;">
        OPERATIVOS ONLINE: <span id="count" style="font-size: 2em; color:#fff; font-weight: 900;">0</span>
    </div>
</div>

<div id="system-alert"></div>

<script>
    const alertUser = (m) => { document.getElementById('system-alert').innerText = "ALERTA: " + m; };

    // 1. FIREBASE CORE (Nova Coleção RAU_ULTIMATE)
    const _v = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
    const config = { apiKey: atob(_v[0]), authDomain: atob(_v[1]), projectId: atob(_v[2]), appId: atob(_v[3]) };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.firestore();
    const sessionToken = "NODE_" + Math.random().toString(36).substr(2, 5);

    // 2. ENGINE 3D (Otimização de Geometria)
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const world = new THREE.Group(); scene.add(world);

    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshPhongMaterial({
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 10
        })
    );
    world.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    camera.position.z = 3.5;

    // 3. GESTÃO DE MARCADORES (Persistent Pool)
    const nodeCache = new Map();

    function updateGlobe(nodes) {
        const activeIds = new Set(nodes.map(n => n.id));

        nodes.forEach(n => {
            if (!nodeCache.has(n.id)) {
                const phi = (90 - n.lat) * (Math.PI / 180);
                const theta = (n.lng + 180) * (Math.PI / 180);
                const pos = new THREE.Vector3().setFromSphericalCoords(1.02, phi, theta);

                const group = new THREE.Group();
                const dot = new THREE.Mesh(new THREE.SphereGeometry(0.015, 12, 12), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
                dot.position.copy(pos);
                group.add(dot);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 256; canvas.height = 64;
                ctx.fillStyle = 'rgba(0,30,0,0.9)'; ctx.fillRect(0,0,256,64);
                ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 4; ctx.strokeRect(0,0,256,64);
                ctx.font = 'bold 22px Courier New'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                ctx.fillText(n.city.toUpperCase(), 128, 40);

                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), depthTest: true }));
                sprite.position.copy(pos.clone().multiplyScalar(1.15));
                sprite.scale.set(0.4, 0.1, 1);
                group.add(sprite);

                world.add(group);
                nodeCache.set(n.id, group);
            }
        });

        nodeCache.forEach((obj, id) => {
            if (!activeIds.has(id)) { world.remove(obj); nodeCache.delete(id); }
        });
    }

    // 4. CONTROLOS INERCIAIS
    let drag = false, lastX, lastY;
    document.addEventListener('mousedown', (e) => { drag = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', () => drag = false);
    window.addEventListener('mousemove', (e) => {
        if (drag) {
            world.rotation.y += (e.clientX - lastX) * 0.007;
            world.rotation.x += (e.clientY - lastY) * 0.007;
            lastX = e.clientX; lastY = e.clientY;
        }
    });

    // 5. UPLINK MASTER (A Solução Real)
    async function start() {
        try {
            const res = await fetch("https://ipinfo.io/json?token=e392744f6845f0").then(r => r.json());
            document.getElementById('city').innerText = res.city.toUpperCase();
            const [lat, lng] = res.loc.split(',').map(Number);

            const push = () => db.collection('RAU_ULTIMATE').doc(sessionToken).set({
                lat, lng, city: res.city, ts: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('conn').innerText = "ONLINE";
                document.getElementById('conn').style.color = "#39ff14";
            }).catch(e => {
                alertUser("ACESSO NEGADO: VERIFICA AS REGRAS DO FIREBASE");
                console.error(e);
            });

            push(); setInterval(push, 20000);

            // Ouvinte de dados (Real-Time)
            db.collection('RAU_ULTIMATE').where('ts', '>', new Date(Date.now() - 60000))
              .onSnapshot(snap => {
                  const list = [];
                  snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                  updateGlobe(list);
                  document.getElementById('count').innerText = snap.size;
              }, err => alertUser("ERRO DE SNAPSHOT: " + err.message));

        } catch (e) { alertUser("ERRO CRÍTICO DE REDE"); }
    }

    function loop() {
        requestAnimationFrame(loop);
        if (!drag) world.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    start(); loop();
</script>
</body>
</html>
