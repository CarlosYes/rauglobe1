<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v255.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; }
        
        .hud-rau {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 5, 20, 0.95); border: 2px solid #39ff14;
            padding: 15px; border-radius: 4px; color: #fff;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.5); pointer-events: none;
        }
        .count-value { font-size: 55px; font-weight: bold; color: #39ff14; display: block; line-height: 0.8; }
        
        .tag {
            background: rgba(0,0,0,0.85); border: 1px solid #39ff14;
            color: #fff; padding: 4px 8px; font-size: 11px;
            display: flex; align-items: center; gap: 6px; border-radius: 2px;
        }
        .me { border: 2px solid #fff !important; background: #39ff14 !important; color: #000 !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="hud-rau">
    <div style="font-size: 10px; opacity: 0.8; letter-spacing: 1px; margin-bottom: 8px;">OUVINTES REAIS AGORA</div>
    <div id="live-counter" class="count-value">0</div>
    <div id="status-text" style="font-size: 11px; margin-top: 10px; color: #39ff14;">SINAL: A CONECTAR...</div>
</div>

<div id="globeViz"></div>

<script>
    const fbConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.database();
    const radarRef = db.ref('rau_radar_v255');

    const myID = "RAU_" + Math.random().toString(36).substr(2, 6);
    let myNode = radarRef.child(myID);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .pointColor(d => d.id === myID ? '#ffffff' : '#39ff14')
        .pointRadius(d => d.id === myID ? 2.5 : 0.8)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'tag' + (d.id === myID ? ' me' : '');
            el.innerHTML = `<span>${d.id === myID ? 'VOCÊ' : 'OUVINTE'}</span>`;
            return el;
        });

    async function bootstrap() {
        // 1. REGISTO IMEDIATO (Mesmo sem localização, para o contador ser 1)
        myNode.set({ id: myID, lat: null, lng: null, ts: Date.now() });
        myNode.onDisconnect().remove();

        // 2. TENTAR LOCALIZAÇÃO (IP)
        try {
            const res = await fetch('https://ipwho.is/');
            const d = await res.json();
            if (d.success && d.latitude !== 0) {
                myNode.update({ lat: d.latitude, lng: d.longitude, ts: Date.now() });
                document.getElementById('status-text').innerText = "SINAL: " + d.city.toUpperCase();
            }
        } catch(e) { 
            document.getElementById('status-text').innerText = "SINAL: REDE LIMITADA";
        }

        // 3. SINCRONIZAÇÃO TOTAL
        radarRef.on('value', snap => {
            const now = Date.now();
            const rawData = Object.values(snap.val() || {});
            // Conta todos os que entraram nos últimos 30 segundos
            const active = rawData.filter(u => (now - u.ts < 30000));
            // Mas só desenha no mapa quem tem coordenadas válidas (evita África)
            const points = active.filter(u => u.lat !== null && u.lat !== 0);
            
            document.getElementById('live-counter').innerText = active.length;
            world.pointsData(points);
            world.htmlElementsData(points);
        });

        // Batimento cardíaco constante
        setInterval(() => myNode.update({ ts: Date.now() }), 10000);
    }

    window.onload = bootstrap;
    window.onresize = () => { world.width(window.innerWidth); world.height(window.innerHeight); };
</script>
</body>
</html>
