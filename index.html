<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v195</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.95); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none;
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.95); padding: 4px 10px; border-radius: 3px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            border: 1px solid #39ff14; color: #39ff14; white-space: nowrap;
        }
        .d-rau { width: 8px; height: 8px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 15px #39ff14; animation: p 1.2s infinite; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status" style="font-size: 10px; margin-top: 10px; font-family: monospace; color: #ff3131;">SINAL: PROCURANDO...</div>
</div>

<div id="globeViz"></div>

<script>
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.countryCode ? `<img src="https://flagcdn.com/w20/${d.countryCode.toLowerCase()}.png" style="width:14px">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    // Esta função recebe o sinal real do IP
    window.getSignal = function(data) {
        if (!data || data.status !== "success") return;

        const loc = {
            lat: parseFloat(data.lat),
            lng: parseFloat(data.lon),
            city: (data.city || "SINAL").toUpperCase(),
            countryCode: data.countryCode
        };

        // Só atualiza o contador aqui
        document.getElementById('onlineCount').innerText = "1";
        document.getElementById('status').innerText = `SINAL: ${loc.city}`;
        document.getElementById('status').style.color = "#39ff14";

        world.htmlElementsData([loc]);
        world.pointOfView({ lat: loc.lat, lng: loc.lng, altitude: 2.0 }, 2000);
    };

    function start() {
        // Usamos injeção de script para evitar erros de CORS (bloqueio de rede)
        const s = document.createElement('script');
        s.src = 'https://extreme-ip-lookup.com/json/?callback=getSignal';
        document.body.appendChild(s);
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    window.onload = start;
</script>
</body>
</html>
