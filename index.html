<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v42.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 20, 0, 0.9); color: #39ff14; padding: 20px;
            border: 2px solid #39ff14; border-radius: 10px; pointer-events: none;
        }
        #count { font-size: 3.5em; font-weight: 900; color: #fff; display: block; }
        #diag { font-size: 11px; margin-top: 10px; font-weight: bold; }
        .mem-data { font-size: 10px; color: #888; margin-top: 10px; border-top: 1px dotted #333; padding-top: 10px; }
    </style>
</head>
<body>

<div id="rau-ui">
    <b>RAU COMMAND v42.0</b><br><br>
    UNIDADES NO MAPA:
    <span id="count">1</span>
    <div id="diag" style="color: #39ff14;">🟢 RADAR ATIVO</div>
    
    <div class="mem-data">
        💾 MEMÓRIA GUARDADA:<br>
        🔈 VOL: <span id="mv">--</span> | 🔄 AUTO: <span id="ma">--</span>
    </div>
</div>

<script>
    // 1. GESTÃO DE MEMÓRIA (Volume e Autoplay)
    const rauMemory = {
        save: (v, a) => {
            localStorage.setItem('rau_volume', v);
            localStorage.setItem('rau_autoplay', a);
        },
        load: () => ({
            v: localStorage.getItem('rau_volume') || "0.8",
            a: localStorage.getItem('rau_autoplay') || "true"
        })
    };

    const myPrefs = rauMemory.load();
    document.getElementById('mv').innerText = Math.round(myPrefs.v * 100) + "%";
    document.getElementById('ma').innerText = myPrefs.a === "true" ? "ON" : "OFF";

    // 2. AMBIENTE 3D
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const world = new THREE.Group(); scene.add(world);
    const globe = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshPhongMaterial({
        map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
        shininess: 5
    }));
    world.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    camera.position.z = 3.5;

    // 3. IDENTIFICAÇÃO DE CIDADE REAL
    async function addLiveLocation() {
        try {
            const res = await fetch("https://ipinfo.io/json?token=e392744f6845f0").then(r => r.json());
            const [lat, lng] = res.loc.split(',').map(Number);
            const city = res.city.toUpperCase();

            // Converter coordenadas para o Globo
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3().setFromSphericalCoords(1.05, phi, theta);

            // Criar Marcador Visual
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.02, 12, 12), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
            dot.position.copy(pos);
            world.add(dot);

            // Criar Etiqueta com Nome da Cidade
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            ctx.fillStyle = 'rgba(0, 40, 0, 0.8)';
            ctx.fillRect(0, 0, 256, 64);
            ctx.font = 'bold 28px Courier New';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText(city, 128, 42);

            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            sprite.position.copy(pos.clone().multiplyScalar(1.1));
            sprite.scale.set(0.6, 0.15, 1);
            world.add(sprite);

        } catch (e) { console.log("Erro ao localizar"); }
    }

    // 4. MOVIMENTO E RENDER
    let dragging = false;
    window.addEventListener('mousedown', () => dragging = true);
    window.addEventListener('mouseup', () => dragging = false);
    window.addEventListener('mousemove', (e) => {
        if(dragging) {
            world.rotation.y += e.movementX * 0.005;
            world.rotation.x += e.movementY * 0.005;
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        if(!dragging) world.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    addLiveLocation();
    animate();

    // COMANDO PARA O PLAYER: window.rauSet(0.5, "true")
    window.rauSet = (v, a) => {
        rauMemory.save(v, a);
        location.reload();
    };
</script>
</body>
</html>
