<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR - PRECISION v10</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; }
        
        .hud-rau {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 10, 30, 0.95); border: 2px solid #39ff14;
            padding: 15px; border-radius: 5px; color: #fff; pointer-events: none;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
        }
        .count-big { font-size: 52px; font-weight: 900; color: #39ff14; line-height: 1; }
        
        /* Marcadores HTML */
        .marker-rau { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .label-rau {
            background: #39ff14; color: #000; padding: 4px 10px; border-radius: 3px;
            font-size: 13px; font-weight: 900; margin-bottom: 5px; white-space: nowrap;
            text-transform: uppercase; box-shadow: 0 0 15px #39ff14;
        }
        .dot-rau { 
            width: 14px; height: 14px; background: #fff; border-radius: 50%; 
            box-shadow: 0 0 20px #39ff14; animation: pulse 1.2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.5); opacity: 0.6; } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="hud-rau">
    <div style="font-size: 10px; font-weight: bold; letter-spacing: 2px; opacity: 0.8;">SISTEMA RADAR</div>
    <div id="live-total" class="count-big">0</div>
    <div id="debug-info" style="font-size: 10px; color: #39ff14; margin-top: 5px; border-top: 1px solid #39ff14; padding-top: 5px;">A SINCRONIZAR...</div>
</div>

<div id="globeViz"></div>

<script>
    // Configurações do Firebase
    const fbConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.database();
    const radarRef = db.ref('rau_radar_live_v10');

    const myID = "USER_" + Math.random().toString(36).substr(2, 5);
    const myNode = radarRef.child(myID);

    // Inicialização Robusta do Globo
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'marker-rau';
            el.innerHTML = `<div class="label-rau">${d.city}</div><div class="dot-rau"></div>`;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.4;

    async function startRadar() {
        let lat, lng, city;
        
        try {
            // Tentativa de localização silenciosa via IP
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            if (data.latitude) {
                lat = data.latitude;
                lng = data.longitude;
                city = data.city || "Ouvinte";
            }
        } catch (e) {
            // Fallback se a API falhar (Lisboa como base para teste)
            lat = 38.7223; lng = -9.1393; city = "Sinal Manual";
        }

        const myData = {
            id: myID,
            lat: parseFloat(lat),
            lng: parseFloat(lng),
            city: city.toUpperCase(),
            ts: Date.now()
        };

        // Grava no Firebase com callback de erro
        myNode.set(myData, (error) => {
            if (error) {
                document.getElementById('debug-info').innerText = "ERRO FIREBASE: VERIFICA REGRAS";
            } else {
                document.getElementById('debug-info').innerText = "SINAL ATIVO: " + myData.city;
                world.pointOfView({ lat: myData.lat, lng: myData.lng, altitude: 2 }, 2000);
            }
        });

        myNode.onDisconnect().remove();

        // Escuta o Firebase em tempo real
        radarRef.on('value', snap => {
            const data = snap.val() || {};
            const now = Date.now();
            const activeUsers = Object.values(data).filter(u => (now - u.ts < 60000) && u.lat);
            
            document.getElementById('live-total').innerText = activeUsers.length;
            world.htmlElementsData(activeUsers);
        });

        // Heartbeat para manter o ponto vivo
        setInterval(() => myNode.update({ ts: Date.now() }), 15000);
    }

    window.onload = startRadar;
</script>
</body>
</html>
