<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR - DEFINITIVE FIX</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; }
        
        .hud-rau {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 5, 20, 0.95); border: 2px solid #39ff14;
            padding: 20px; border-radius: 5px; color: #fff; pointer-events: none;
        }
        .count-big { font-size: 52px; font-weight: 900; color: #39ff14; line-height: 1; }
        
        .marker-rau { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .label-rau {
            background: #39ff14; color: #000; padding: 4px 10px; border-radius: 3px;
            font-size: 14px; font-weight: 900; margin-bottom: 5px; white-space: nowrap;
            text-transform: uppercase; box-shadow: 0 0 15px #39ff14;
        }
        .dot-rau { 
            width: 16px; height: 16px; background: #fff; border-radius: 50%; 
            box-shadow: 0 0 25px #39ff14; animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="hud-rau">
    <div style="font-size: 11px; font-weight: bold; letter-spacing: 2px;">STATUS: <span id="sys-status" style="color:#ff0000">OFFLINE</span></div>
    <div id="live-total" class="count-big">0</div>
    <div id="city-display" style="font-size: 12px; color: #39ff14; margin-top: 5px; font-weight: bold;">---</div>
</div>

<div id="globeViz"></div>

<script>
    const fbConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.database();
    const radarRef = db.ref('RAU_GLOBAL_LIVE');

    const myID = "NODE_" + Math.random().toString(36).substr(2, 5);
    const myNode = radarRef.child(myID);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'marker-rau';
            el.innerHTML = `<div class="label-rau">${d.city}</div><div class="dot-rau"></div>`;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    async function init() {
        let lat = 0, lng = 0, city = "Ouvinte Online";
        
        // Tenta buscar dados de localização (Múltiplas APIs)
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            if(data.latitude) {
                lat = data.latitude; lng = data.longitude; city = data.city;
            }
        } catch (e) {
            console.log("Falha API 1, tentando API 2...");
            try {
                const res2 = await fetch('https://ipwho.is/');
                const data2 = await res2.json();
                lat = data2.latitude; lng = data2.longitude; city = data2.city;
            } catch (e2) { city = "Sinal Estático"; }
        }

        const myData = { 
            id: myID, 
            lat: parseFloat(lat) || 0, 
            lng: parseFloat(lng) || 0, 
            city: city.toUpperCase(), 
            ts: Date.now() 
        };

        // Força o envio e ativa o radar
        myNode.set(myData).then(() => {
            document.getElementById('sys-status').innerText = "ONLINE";
            document.getElementById('sys-status').style.color = "#39ff14";
            document.getElementById('city-display').innerText = city.toUpperCase();
            
            // Move a câmara para o ponto
            world.pointOfView({ lat: myData.lat, lng: myData.lng, altitude: 2 }, 2000);
            
            // Começa a ouvir os outros
            radarRef.on('value', snap => {
                const rawData = snap.val() || {};
                const now = Date.now();
                const active = Object.values(rawData).filter(u => (now - u.ts < 60000));
                
                document.getElementById('live-total').innerText = active.length;
                world.htmlElementsData(active);
            });
        });

        myNode.onDisconnect().remove();
        setInterval(() => myNode.update({ ts: Date.now() }), 15000);
    }

    window.onload = init;
</script>
</body>
</html>
