<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v267.0 - LIVE TRACKER</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; }
        
        .hud-rau {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 5, 15, 0.9); border: 1px solid #39ff14;
            padding: 15px; border-radius: 4px; color: #fff; pointer-events: none;
        }
        .count-big { font-size: 44px; font-weight: bold; color: #39ff14; line-height: 1; }
        
        /* Estilo dos Marcadores */
        .marker-rau { display: flex; flex-direction: column; align-items: center; }
        .label-city {
            background: rgba(0, 20, 0, 0.9); border: 1px solid #39ff14;
            color: #39ff14; padding: 2px 8px; border-radius: 2px;
            font-size: 11px; font-weight: bold; text-transform: uppercase;
            white-space: nowrap; margin-bottom: 4px;
        }
        .dot-signal {
            width: 12px; height: 12px; background: #39ff14;
            border-radius: 50%; box-shadow: 0 0 15px #39ff14;
        }
        /* Cor diferente para o utilizador atual */
        .is-me .dot-signal { background: #fff; box-shadow: 0 0 15px #fff; }
        .is-me .label-city { border-color: #fff; color: #fff; }
    </style>
</head>
<body>

<div class="hud-rau">
    <div style="font-size: 9px; opacity: 0.7; letter-spacing: 2px;">OUVINTES ATIVOS</div>
    <div id="live-total" class="count-big">0</div>
    <div id="status-msg" style="font-size: 10px; color: #39ff14; margin-top: 5px;">A SINTONIZAR...</div>
</div>

<div id="globeViz"></div>

<script>
    const fbConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.database();
    const radarRef = db.ref('rau_radar_v2');

    const myID = "RAU_" + Math.random().toString(36).substr(2, 5);
    const myNode = radarRef.child(myID);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'marker-rau' + (d.id === myID ? ' is-me' : '');
            el.innerHTML = `
                <div class="label-city">${d.city}</div>
                <div class="dot-signal"></div>
            `;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.4;

    async function catchIP() {
        try {
            // API ipwho.is para localização silenciosa
            const res = await fetch('https://ipwho.is/');
            const data = await res.json();
            
            if (data.success) {
                const myLocation = {
                    id: myID,
                    lat: data.latitude,
                    lng: data.longitude,
                    city: data.city || "Desconhecido",
                    ts: Date.now()
                };

                // Envia para o Firebase
                myNode.set(myLocation);
                myNode.onDisconnect().remove();

                // Faz o globo focar em ti assim que entras
                world.pointOfView({ lat: data.latitude, lng: data.longitude, altitude: 2 }, 2000);
                document.getElementById('status-msg').innerText = "ONLINE: " + data.city.toUpperCase();
            }
        } catch (e) {
            document.getElementById('status-msg').innerText = "ERRO NO SINAL";
        }
    }

    function initRadar() {
        catchIP();
        
        radarRef.on('value', snap => {
            const data = snap.val() || {};
            const now = Date.now();
            
            // Filtra quem está ativo (últimos 60 segundos)
            const activeUsers = Object.values(data).filter(u => (now - u.ts < 60000) && u.lat);
            
            document.getElementById('live-total').innerText = activeUsers.length;
            
            // Atualiza os marcadores no globo
            world.htmlElementsData(activeUsers);
        });

        // Mantém o sinal vivo
        setInterval(() => myNode.update({ ts: Date.now() }), 20000);
    }

    window.onload = initRadar;
</script>
</body>
</html>
