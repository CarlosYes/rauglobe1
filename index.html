<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v175.0 - GEO-SYNC ENGINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; user-select: none; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.95); border-left: 3px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
        }
        .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        #led { width: 10px; height: 10px; border-radius: 50%; background: #39ff14; box-shadow: 0 0 10px #39ff14; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .monitor-display { background: #050505; border: 1px solid #1a1a1a; padding: 12px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; }
        #mon-flag-ui { height: 18px; margin-right: 8px; vertical-align: middle; display: none; }
        #mon-status { font-size: 10px; color: #39ff14; opacity: 0.7; margin-top: 8px; border-top: 1px solid #1a1a1a; padding-top: 8px; }
        canvas { display: block; outline: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="rau-ui">
    <div class="status-row">
        <div id="led"></div>
        <span style="font-size: 11px; letter-spacing: 1px;">CORE v175.0 | GEO-SYNC</span>
    </div>
    <div class="monitor-display">
        <div style="display: flex; align-items: center;">
            <img id="mon-flag-ui" src="">
            <span id="mon-city">SCANNING...</span>
        </div>
        <div id="mon-status">Aguardando telemetria...</div>
    </div>
</div>

<script>
    const RAU_SYSTEM = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000),
        renderer: new THREE.WebGLRenderer({ antialias: true, alpha: true }),
        controls: null, globe: null, markers: new THREE.Group(), currentIP: null,

        init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(this.renderer.domElement);

            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.enableDamping = true;
            this.controls.autoRotate = true;
            this.controls.autoRotateSpeed = 0.5;
            this.camera.position.z = 3.5;

            // Construção do Globo
            const geo = new THREE.SphereGeometry(1, 64, 64);
            const mat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 5 });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            this.scene.add(this.markers);

            // Carregar textura do mapa
            new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.color.set(0xffffff);
                this.globe.material.needsUpdate = true;
            });

            this.scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            this.animate();
            this.pulse();
            setInterval(() => this.pulse(), 4000);
        },

        async pulse() {
            try {
                const res = await fetch(`https://ipapi.co/json/?nocache=${Date.now()}`);
                const data = await res.json();
                if (data.ip !== this.currentIP) {
                    this.currentIP = data.ip;
                    this.updateUplink(data);
                }
            } catch (e) { console.log("Signal lost..."); }
        },

        async updateUplink(data) {
            const { latitude: lat, longitude: lon, city, country_code: iso } = data;
            const cityUpper = (city || "UNKNOWN").toUpperCase();
            const isoLower = iso.toLowerCase();

            // Atualiza UI
            document.getElementById('mon-city').innerText = cityUpper;
            const flagUi = document.getElementById('mon-flag-ui');
            flagUi.src = `https://flagcdn.com/w80/${isoLower}.png`;
            flagUi.style.display = 'inline-block';
            document.getElementById('mon-status').innerText = `IP: ${data.ip} | NODE: ${iso} | LIVE`;

            // Limpa apenas após ter os novos dados
            this.markers.clear();

            // Coordenadas
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.02);

            // 1. LED Verde
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.02, 12, 12), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
            dot.position.copy(pos);
            this.markers.add(dot);

            // 2. Bandeira (Sprite)
            const flagTex = await new Promise(resolve => {
                new THREE.TextureLoader().load(`https://flagcdn.com/w160/${isoLower}.png`, resolve);
            });
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: flagTex }));
            sprite.position.copy(pos.clone().multiplyScalar(1.15));
            sprite.scale.set(0.28, 0.16, 1);
            this.markers.add(sprite);

            // 3. Nome da Cidade (Canvas)
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.fillStyle = '#39ff14'; ctx.font = 'bold 54px Courier New';
            ctx.textAlign = 'center'; ctx.fillText(cityUpper, 256, 80);
            const label = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            label.position.copy(pos.clone().multiplyScalar(1.32));
            label.scale.set(0.7, 0.18, 1);
            this.markers.add(label);

            // Fly-to suave
            const camTarget = pos.clone().multiplyScalar(3.5);
            this.camera.position.lerp(camTarget, 0.1);
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            this.controls.update();
            this.renderer.render(this.scene, this.camera);
        }
    };

    window.onload = () => RAU_SYSTEM.init();
    window.onresize = () => {
        RAU_SYSTEM.camera.aspect = window.innerWidth / window.innerHeight;
        RAU_SYSTEM.camera.updateProjectionMatrix();
        RAU_SYSTEM.renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
