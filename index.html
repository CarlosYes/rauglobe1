<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU GEOMONITOR - LIVE VISITS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* UI Estilo Scanner */
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 20, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 240px; pointer-events: none;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        .display { background: #050505; border: 1px solid #1a1a1a; padding: 10px; margin-top: 5px; }
        .label { font-size: 9px; color: #39ff14; letter-spacing: 1px; font-weight: bold; }
        .count { font-size: 22px; color: #fff; font-weight: 900; display: block; }
        
        #tag {
            position: absolute; display: none; background: rgba(0,0,0,0.8);
            border: 1px solid #39ff14; padding: 4px 10px; color: #fff;
            font-size: 10px; z-index: 500; transform: translate(-50%, -140%);
        }
        canvas { display: block; outline: none; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div class="label">RAU GEOMONITOR v220</div>
    <div class="display">
        <span class="label">VISITAS TOTAIS</span>
        <span id="total-val" class="count">0000</span>
    </div>
    <div class="display">
        <span class="label">ONLINE AGORA</span>
        <span id="live-val" class="count" style="color: #00ffff;">00</span>
    </div>
    <div id="status" style="font-size: 8px; color: #39ff14; margin-top: 5px; opacity: 0.5;">SINCRONIZADO COM FIREBASE</div>
</div>

<div id="tag"><span id="tag-city">---</span></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        authDomain: "radiodosamigosunidos-aadda.firebaseapp.com",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda",
        storageBucket: "radiodosamigosunidos-aadda.firebasestorage.app",
        messagingSenderId: "451945612071",
        appId: "1:451945612071:web:383c551ca22744f6845f02"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const liveRef = db.ref('geovisitas/live');
    const totalRef = db.ref('geovisitas/total');

    const RAU = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000),
        renderer: new THREE.WebGLRenderer({ antialias: true }),
        controls: null, globe: new THREE.Group(), dots: new THREE.Group(),
        myId: null, myMesh: null,

        async init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(this.renderer.domElement);
            
            this.camera.position.z = 3.5;
            this.scene.add(new THREE.AmbientLight(0xffffff, 1));

            // Globo Estilizado (Grelha de Alta Definição)
            const geo = new THREE.SphereGeometry(1, 48, 48);
            const matGrid = new THREE.MeshBasicMaterial({ color: 0x11ff22, wireframe: true, transparent: true, opacity: 0.15 });
            const core = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x000000 }));
            
            this.globe.add(core);
            this.globe.add(new THREE.Mesh(geo, matGrid));
            this.scene.add(this.globe);
            this.globe.add(this.dots);

            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.autoRotate = true;

            await this.startTracking();
            this.animate();
        },

        async startTracking() {
            // 1. Incrementar Visitas Totais
            totalRef.transaction(v => (v || 0) + 1);
            totalRef.on('value', s => document.getElementById('total-val').innerText = s.val());

            // 2. Obter Georeferência
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();

                // 3. Entrar no "Live"
                const user = liveRef.push();
                this.myId = user.key;
                user.set({ lat: data.latitude, lng: data.longitude, city: data.city });
                user.onDisconnect().remove();

                // 4. Ouvir quem está online
                liveRef.on('value', snap => this.updateDots(snap.val()));

            } catch(e) { console.log("Erro de rede."); }
        },

        updateDots(users) {
            this.dots.clear();
            if(!users) return;
            const entries = Object.entries(users);
            document.getElementById('live-val').innerText = entries.length;

            entries.forEach(([id, u]) => {
                const pos = this.calcPos(u.lat, u.lng);
                const isMe = id === this.myId;
                
                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(isMe ? 0.03 : 0.02, 16, 16),
                    new THREE.MeshBasicMaterial({ color: isMe ? 0x39ff14 : 0x00ffff })
                );
                dot.position.copy(pos);
                this.dots.add(dot);
                if(isMe) this.myMesh = dot;
            });
        },

        calcPos(lat, lng) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            return new THREE.Vector3(-(Math.sin(phi)*Math.cos(theta)), Math.cos(phi), (Math.sin(phi)*Math.sin(theta))).multiplyScalar(1.01);
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            this.controls.update();
            if(this.myMesh) {
                const v = new THREE.Vector3();
                this.myMesh.getWorldPosition(v);
                v.project(this.camera);
                const tag = document.getElementById('tag');
                tag.style.display = 'block';
                tag.style.left = `${(v.x * 0.5 + 0.5) * window.innerWidth}px`;
                tag.style.top = `${(v.y * -0.5 + 0.5) * window.innerHeight}px`;
                tag.style.opacity = v.z > 1 ? "0" : "1";
            }
            this.renderer.render(this.scene, this.camera);
        }
    };

    RAU.init();
</script>
</body>
</html>
