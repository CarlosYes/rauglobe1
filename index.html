<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v107 - RADAR ATIVO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); border: 2px solid #39ff14;
            padding: 15px 25px; color: #39ff14; pointer-events: none;
        }
        .count-on { font-size: 50px; font-weight: 900; line-height: 1; }
        .status-msg { font-size: 10px; margin-top: 5px; font-family: monospace; color: #39ff14; }

        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; padding: 3px 10px; border-radius: 2px;
            font-size: 10px; font-weight: 900; color: #000; white-space: nowrap;
        }
        .d-rau { width: 8px; height: 8px; background: #39ff14; border-radius: 50%; margin-top: 4px; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">--</div>
    <div id="status" class="status-msg">RASTREAMENTO...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'NODE-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    const visitors = new Map();

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000').showAtmosphere(true).atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = `m-rau`;
            el.innerHTML = `<div class="l-rau">${d.city}</div><div class="d-rau"></div>`;
            return el;
        });

    async function getDiscovery() {
        // Tenta GPS REAL primeiro
        return new Promise((resolve) => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (p) => {
                    const lat = p.coords.latitude;
                    const lng = p.coords.longitude;
                    try {
                        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                        const d = await r.json();
                        const city = d.address.city || d.address.town || "LOCAL REAL";
                        resolve({ lat, lng, city: city.toUpperCase(), mode: 'PRECISO' });
                    } catch { resolve({ lat, lng, city: "GPS ATIVO", mode: 'COORDENADA' }); }
                }, async () => {
                    // Fallback se GPS falhar: Tenta IP (ipwho.is é bom para evitar Bruges)
                    try {
                        const r = await fetch('https://ipwho.is/');
                        const d = await r.json();
                        resolve({ lat: d.latitude, lng: d.longitude, city: d.city.toUpperCase(), mode: 'IP-SCAN' });
                    } catch {
                        // Se TUDO falhar: Sinal Regenerado
                        resolve({ lat: 38.7, lng: -9.1, city: "SINAL REGENERADO", mode: 'EMERGÊNCIA' });
                    }
                }, { timeout: 4000 });
            }
        });
    }

    async function init() {
        const geo = await getDiscovery();
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('monitor-rau-core');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `MODO: ${geo.mode} | CIDADE: ${geo.city}`;
            channel.presence.enter(geo);
            channel.presence.subscribe(['enter', 'present', 'update'], (m) => {
                if(m.data && m.data.lat) {
                    visitors.set(m.clientId, m.data);
                    const nodes = Array.from(visitors.values());
                    document.getElementById('onlineCount').innerText = nodes.length.toString().padStart(2, '0');
                    world.htmlElementsData(nodes);
                }
            });
        });
        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.0 }, 2000);
    }

    world.controls().autoRotate = true;
    window.onload = init;
</script>
</body>
</html>
