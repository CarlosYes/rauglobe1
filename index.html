<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v217.0 - RECOVERY</title>
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
        }
        .monitor-display { background: #000; border: 1px solid #1a1a1a; padding: 10px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; text-transform: uppercase; }
        #error-log { color: #ff3333; font-size: 10px; margin-top: 5px; display: none; }
        #globeViz { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div style="margin-bottom: 8px; font-size: 10px; font-weight: bold; letter-spacing: 2px;">RAU CORE v217.0 // STABLE</div>
    <div class="monitor-display">
        <span id="mon-city">A INICIALIZAR...</span>
        <div id="mon-status" style="font-size: 9px; opacity: 0.7; margin-top: 4px;">Sistema: Ativo</div>
        <div id="mon-listeners" style="font-size: 10px; color: #39ff14; margin-top: 6px; font-weight: bold;">OUVINTES: 0</div>
        <div id="error-log">ERRO: FALHA NA BASE DE DADOS</div>
    </div>
</div>

<div id="globeViz"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        authDomain: "radiodosamigosunidos-aadda.firebaseapp.com",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda",
        storageBucket: "radiodosamigosunidos-aadda.firebasestorage.app",
        messagingSenderId: "451945612071",
        appId: "1:451945612071:web:383c551ca22744f6845f02"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const listenersRef = db.ref('listeners');

    // Inicializar Globo com proteção de "Ecrã Preto"
    const world = Globe()
        (document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000') // Garante que o fundo é preto se a imagem falhar
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .pointColor(() => '#39ff14')
        .pointAltitude(0.1)
        .pointRadius(0.3);

    world.controls().autoRotate = true;
    world.camera().position.z = 300; // Garante que a câmara não está dentro da terra

    async function startSystem() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            const userRef = listenersRef.push();
            userRef.set({
                lat: data.latitude,
                lng: data.longitude,
                city: data.city || "Desconhecido",
                country: (data.country_code || "un").toLowerCase(),
                timestamp: Date.now()
            }).catch(err => {
                // Se chegar aqui, as regras do Firebase expiraram!
                document.getElementById('error-log').style.display = 'block';
                document.getElementById('error-log').innerText = "ERRO: REGRAS FIREBASE EXPIRADAS";
            });

            userRef.onDisconnect().remove();
            document.getElementById('mon-city').innerText = (data.city || "ONLINE").toUpperCase();

            listenersRef.on('value', snap => {
                const val = snap.val() || {};
                const entries = Object.entries(val);
                document.getElementById('mon-listeners').innerText = `OUVINTES: ${entries.length}`;

                const points = entries.map(([id, info]) => ({
                    lat: info.lat,
                    lng: info.lng
                }));
                world.pointsData(points);
            });

        } catch (e) {
            document.getElementById('mon-city').innerText = "ERRO DE REDE";
        }
    }

    startSystem();

    window.addEventListener('resize', () => {
        world.width(window.innerWidth);
        world.height(window.innerHeight);
    });
</script>
</body>
</html>
