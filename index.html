<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v54.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.9); color: #39ff14; padding: 20px;
            border: 1px solid #39ff14; border-radius: 2px; pointer-events: none;
        }
        #count { font-size: 3em; font-weight: 900; color: #fff; display: block; line-height: 1; margin: 10px 0; }
        .label { font-size: 10px; letter-spacing: 1px; color: #39ff14; font-weight: bold; text-transform: uppercase; }
        #city-tag { color: #fff; font-weight: bold; background: #003300; padding: 2px 10px; border: 1px solid #39ff14; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div class="label">RAU COMMAND v54.0</div>
    <span id="count">1</span>
    <div class="label">LOCALIZAÇÃO ATIVA:</div>
    <div id="city-tag">A RASTREAR...</div>
    
    <div style="margin-top:20px; border-top:1px solid #1a331a; font-size:11px; padding-top:10px;">
        <span class="label" style="font-size: 9px;">DADOS DA MEMÓRIA</span><br>
        <span style="color:#39ff14">🔈 VOL: <span id="mv">--</span> | 🔄 AUTO: <span id="ma">--</span></span>
    </div>
</div>

<script>
    // 1. GESTÃO DE MEMÓRIA (Volume e Autoplay)
    const rauStorage = {
        save: (v, a) => { localStorage.setItem('rau_v', v); localStorage.setItem('rau_a', a); },
        load: () => ({ v: localStorage.getItem('rau_v') || "0.80", a: localStorage.getItem('rau_a') || "true" })
    };
    const prefs = rauStorage.load();
    document.getElementById('mv').innerText = Math.round(prefs.v * 100) + "%";
    document.getElementById('ma').innerText = prefs.a === "true" ? "ON" : "OFF";

    // 2. AMBIENTE 3D
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true; // GIRA SOZINHO
    controls.autoRotateSpeed = 1.2;
    controls.minDistance = 1.8;
    controls.maxDistance = 6;

    const world = new THREE.Group(); scene.add(world);

    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64), 
        new THREE.MeshPhongMaterial({
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 5
        })
    );
    world.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 1.4));
    camera.position.set(0, 0, 3.5);

    // 3. FUNÇÃO DE PRECISÃO (BELGIUM TARGET)
    async function deployRadar() {
        let city = "BRUGES";
        let lat = 51.2093, lon = 3.2247; // Coordenadas REAIS de Bruges

        try {
            const res = await fetch("https://ipapi.co/json/").then(r => r.json());
            if(res.city) {
                city = res.city.toUpperCase();
                lat = res.latitude;
                lon = res.longitude;
            }
        } catch (e) { console.log("Usando Fallback: Bruges"); }

        document.getElementById('city-tag').innerText = city;

        // MATEMÁTICA DE POSICIONAMENTO
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        
        const x = -(Math.sin(phi) * Math.cos(theta));
        const z = Math.sin(phi) * Math.sin(theta);
        const y = Math.cos(phi);

        // Criar Marcador Verde
        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.015, 16, 16), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
        dot.position.set(x, y, z);
        world.add(dot);

        // Criar Etiqueta Flutuante
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 300; canvas.height = 100;
        ctx.fillStyle = 'rgba(0, 30, 0, 0.9)'; ctx.fillRect(0, 0, 300, 100);
        ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 10; ctx.strokeRect(0, 0, 300, 100);
        ctx.font = 'bold 36px Courier New'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
        ctx.fillText(city, 150, 65);

        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
        sprite.position.set(x * 1.2, y * 1.2, z * 1.2);
        sprite.scale.set(0.7, 0.22, 1);
        world.add(sprite);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    deployRadar();
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
