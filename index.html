<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v20 - REAL-TIME SYNC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); border: 2px solid #39ff14;
            padding: 20px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
        }
        .count { font-size: 65px; font-weight: 900; color: #fff; line-height: 1; text-shadow: 0 0 10px #39ff14; }
        .radar-label { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 5px; }

        /* Marcadores Dinâmicos */
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 4px 10px; border-radius: 2px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            white-space: nowrap; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        .l-rau img { width: 18px; height: 12px; object-fit: cover; }
        .d-rau { 
            width: 10px; height: 10px; background: #fff; border-radius: 50%; 
            margin-top: 5px; border: 2px solid #39ff14; animation: pulse 1s infinite alternate; 
        }
        @keyframes pulse { from { transform: scale(0.8); opacity: 0.6; } to { transform: scale(1.4); opacity: 1; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="hud">
    <div class="radar-label">RAU LIVE TRACKER</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 11px; color: #fff; margin-top: 10px;">SINCRONIZANDO NODOS...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const CLIENT_ID = 'NODE-' + Math.random().toString(36).substr(2, 9);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    async function initRadar() {
        try {
            // Localização Direta e Rápida (IPWHOIS)
            const geo = await fetch('https://ipwho.is/').then(r => r.json());
            
            const myData = {
                id: CLIENT_ID,
                lat: geo.latitude || 0,
                lng: geo.longitude || 0,
                city: (geo.city || "Sinal Ativo").toUpperCase(),
                country: geo.country_code || "PT"
            };

            const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: CLIENT_ID });
            const channel = ably.channels.get('rau-live-radar');
            let visitors = new Map();

            ably.connection.on('connected', () => {
                document.getElementById('status').innerText = "RADAR ONLINE: " + myData.city;
                
                // ENTRADA NO CANAL
                channel.presence.enter(myData);

                // ATUALIZAÇÃO EM TEMPO REAL (ESCUTA TUDO)
                channel.presence.subscribe(['enter', 'present', 'update', 'leave'], () => {
                    // Sempre que algo mudar, pedimos a lista completa e oficial ao Ably
                    channel.presence.get((err, members) => {
                        if(!err) {
                            visitors.clear();
                            members.forEach(m => {
                                if(m.data) visitors.set(m.clientId, m.data);
                            });
                            refresh();
                        }
                    });
                });

                // CARREGAMENTO INICIAL
                channel.presence.get((err, members) => {
                    if(!err) {
                        members.forEach(m => visitors.set(m.clientId, m.data));
                        refresh();
                    }
                });
            });

            function refresh() {
                const data = Array.from(visitors.values());
                document.getElementById('count').innerText = data.length;
                world.htmlElementsData(data);
            }

            world.pointOfView({ lat: myData.lat, lng: myData.lng, altitude: 2.2 }, 2500);

        } catch (e) {
            document.getElementById('status').innerText = "ERRO DE CONEXÃO";
        }
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    window.onload = initRadar;
</script>
</body>
</html>
