<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v26 - FINAL STAGE</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 40, 0, 0.9); border: 2px solid #39ff14;
            padding: 20px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.5);
        }
        .count { font-size: 70px; font-weight: 900; color: #fff; line-height: 0.8; margin: 10px 0; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 3px 10px; border-radius: 2px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            box-shadow: 0 0 10px #39ff14;
        }
        .l-rau img { width: 16px; border: 1px solid #000; }
        .d-rau { width: 10px; height: 10px; background: #fff; border-radius: 50%; margin-top: 5px; border: 2px solid #39ff14; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); opacity: 1; } to { transform: scale(2); opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 3px;">SYSTEM STATUS: ACTIVE</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 11px; color: #fff;">SINCRONIZANDO...</div>
</div>

<div id="globeViz"></div>

<script>
    // Configurações Hardcoded
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'NODE-' + Math.random().toString(36).substr(2, 6);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.country ? `<img src="https://flagcdn.com/w20/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    async function start() {
        let geoData = { lat: 38.7, lng: -9.1, city: "Lisboa", country: "PT" };

        // Tenta buscar geolocalização com timeout para não travar a rede
        try {
            const controller = new AbortController();
            setTimeout(() => controller.abort(), 4000);
            const res = await fetch('https://ipwho.is/', { signal: controller.signal });
            const d = await res.json();
            if (d.success) {
                geoData = { lat: d.latitude, lng: d.longitude, city: d.city, country: d.country_code };
            }
        } catch (e) {
            console.warn("Geo-IP falhou, usando padrão.");
        }

        // Conexão Ably com Re-try automático
        const ably = new Ably.Realtime({ 
            key: ABLY_KEY, 
            clientId: SESSION_ID,
            recover: true 
        });

        const channel = ably.channels.get('rau-live-radar');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = "ONLINE: " + geoData.city.toUpperCase();
            channel.presence.enter(geoData);

            const refresh = () => {
                channel.presence.get((err, members) => {
                    if(!err) {
                        const active = members.map(m => m.data).filter(d => d && d.lat);
                        document.getElementById('count').innerText = active.length;
                        world.htmlElementsData(active);
                    }
                });
            };

            channel.presence.subscribe(['enter', 'leave', 'update', 'present'], refresh);
            refresh();
        });

        // Se falhar a rede do Ably
        ably.connection.on('failed', () => {
            document.getElementById('status').innerText = "ERRO DE REDE ABLY";
        });

        world.pointOfView({ lat: geoData.lat, lng: geoData.lng, altitude: 2.2 }, 2000);
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    window.onload = start;
</script>
</body>
</html>
