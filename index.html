<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - RADAR SYSTEM v5.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #canvas-container { width: 100vw; height: 100vh; }
        .hud { 
            position: absolute; top: 20px; left: 20px; z-index: 100; 
            color: #39ff14; background: rgba(0,20,0,0.9); padding: 15px; 
            border: 1px solid #39ff14; pointer-events: none;
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="hud">
    <b>RAU Radar Interface</b><br>
    <small id="city-display">A localizar...</small><br>
    <hr style="border:0; border-top:1px solid #39ff14; margin:8px 0;">
    Ouvintes: <span id="count">0</span>
</div>

<div id="canvas-container"></div>

<script>
    // --- Configuração Firebase ---
    const _k = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
    const cfg = { apiKey: atob(_k[0]), authDomain: atob(_k[1]), projectId: atob(_k[2]), appId: atob(_k[3]) };
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    const db = firebase.firestore();
    const myId = "RAU_" + Math.random().toString(36).substr(2, 6);

    // --- Motor 3D ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const globe = new THREE.Group();
    scene.add(globe);

    // Textura de Alta Resolução
    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin('anonymous');
    const earth = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshPhongMaterial({
            map: loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 5
        })
    );
    globe.add(earth);

    scene.add(new THREE.AmbientLight(0x404040, 2));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 3, 5);
    scene.add(light);
    camera.position.z = 3;

    // --- Função de Renderização de Texto (WebGL Sprite) ---
    function makeTextSprite(message) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512; canvas.height = 128;
        
        ctx.fillStyle = 'rgba(0, 40, 0, 0.8)';
        ctx.fillRect(0, 0, 512, 128);
        ctx.strokeStyle = '#39ff14';
        ctx.lineWidth = 6;
        ctx.strokeRect(0, 0, 512, 128);
        
        ctx.font = 'Bold 50px Courier New';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.fillText(message.toUpperCase(), 256, 80);

        const texture = new THREE.CanvasTexture(canvas);
        const spriteMaterial = new THREE.SpriteMaterial({ map: texture, depthTest: true });
        const sprite = new THREE.Sprite(spriteMaterial);
        sprite.scale.set(0.6, 0.15, 1);
        return sprite;
    }

    function addVisitor(lat, lng, cityName) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        const pos = new THREE.Vector3(
            -Math.sin(phi) * Math.cos(theta),
            Math.cos(phi),
            Math.sin(phi) * Math.sin(theta)
        );

        const group = new THREE.Group();
        
        // Ponto Verde
        const dot = new THREE.Mesh(
            new THREE.SphereGeometry(0.015, 12, 12),
            new THREE.MeshBasicMaterial({ color: 0x39ff14 })
        );
        dot.position.copy(pos);
        group.add(dot);

        // Etiqueta WebGL
        const label = makeTextSprite(cityName || "Ouvinte");
        label.position.copy(pos.clone().multiplyScalar(1.1));
        group.add(label);

        globe.add(group);
    }

    // --- Lógica de Localização ---
    async function init() {
        try {
            const res = await fetch("https://ipinfo.io/json?token=e392744f6845f0");
            const data = await res.json();
            document.getElementById('city-display').innerText = data.city + ", " + data.country;
            
            const [lat, lng] = data.loc.split(',').map(Number);
            const save = () => db.collection('rau_v5').doc(myId).set({
                lat, lng, city: data.city, ts: firebase.firestore.FieldValue.serverTimestamp()
            });
            save(); setInterval(save, 25000);

            db.collection('rau_v5').where('ts', '>', new Date(Date.now() - 60000)).onSnapshot(snap => {
                for(let i = globe.children.length - 1; i >= 0; i--) {
                    if (globe.children[i].type === "Group") globe.remove(globe.children[i]);
                }
                snap.forEach(doc => {
                    const d = doc.data();
                    addVisitor(d.lat, d.lng, d.city);
                });
                document.getElementById('count').innerText = snap.size;
            });
        } catch(e) { console.error("Erro no radar."); }
    }

    // --- Animação ---
    function animate() {
        requestAnimationFrame(animate);
        globe.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    init();
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
