<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v216.5 - LIVE NETWORK</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
        }
        .monitor-display { background: #000; border: 1px solid #1a1a1a; padding: 10px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; text-transform: uppercase; }
        #visitor-tag {
            position: absolute; display: none; align-items: center; gap: 8px;
            background: rgba(0, 0, 0, 0.9); border: 1px solid #39ff14;
            padding: 5px 12px; color: #fff; font-size: 11px; font-weight: bold;
            z-index: 500; transform: translate(-50%, -150%);
        }
        .flag-icon { width: 18px; height: 12px; border: 1px solid #333; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; outline: none; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div style="margin-bottom: 8px; font-size: 10px; font-weight: bold; letter-spacing: 2px;">RAU CORE v216.5 // LIVE</div>
    <div class="monitor-display">
        <span id="mon-city">A SINCRONIZAR...</span>
        <div id="mon-status" style="font-size: 9px; opacity: 0.7; margin-top: 4px;">Uplink: Ativo</div>
        <div id="mon-listeners" style="font-size: 10px; color: #39ff14; margin-top: 6px; font-weight: bold;">OUVINTES: 0</div>
    </div>
</div>

<div id="visitor-tag">
    <img id="tag-flag" src="" class="flag-icon">
    <span id="tag-city">---</span>
</div>

<script>
    // Configuração oficial do seu projeto Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        authDomain: "radiodosamigosunidos-aadda.firebaseapp.com",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda",
        storageBucket: "radiodosamigosunidos-aadda.firebasestorage.app",
        messagingSenderId: "451945612071",
        appId: "1:451945612071:web:383c551ca22744f6845f02"
    };

    // Inicialização do Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const listenersRef = db.ref('listeners');

    const RAU = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000),
        renderer: new THREE.WebGLRenderer({ antialias: true, alpha: true }),
        controls: null, globe: null, markers: new THREE.Group(),
        myId: null, activeNode: null,

        init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(this.renderer.domElement);

            // Iluminação
            this.scene.add(new THREE.AmbientLight(0xffffff, 1.1));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(5, 3, 5);
            this.scene.add(sun);

            this.stars();

            // Globo 3D
            const geo = new THREE.SphereGeometry(1, 64, 64);
            const mat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 15 });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            this.globe.add(this.markers);

            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.autoRotate = true;
            this.controls.autoRotateSpeed = 0.6;
            this.camera.position.z = 3.5;

            this.loadTexture();
            this.connectLive();
            this.animate();

            window.addEventListener('resize', () => {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            });
        },

        stars() {
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for (let i = 0; i < 2500; i++) {
                pos.push((Math.random() - 0.5) * 1500, (Math.random() - 0.5) * 1500, (Math.random() - 0.5) * 1500);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            this.scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x666666, size: 0.7 })));
        },

        loadTexture() {
            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin('anonymous');
            loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.color.set(0xffffff);
                this.globe.material.needsUpdate = true;
            });
        },

        getCoords(lat, lng) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.01);
        },

        async connectLive() {
            try {
                // Obter localização via IP
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                
                if(!data.latitude) throw new Error("Localização indisponível");

                // Gerar ID e registar no Firebase
                const userRef = listenersRef.push();
                this.myId = userRef.key;

                userRef.set({
                    lat: data.latitude,
                    lng: data.longitude,
                    city: data.city || "Desconhecido",
                    country: (data.country_code || "un").toLowerCase(),
                    lastSeen: Date.now()
                });

                // Remover automaticamente ao desconectar
                userRef.onDisconnect().remove();

                document.getElementById('mon-city').innerText = (data.city || "RAU NODE").toUpperCase();
                document.getElementById('mon-status').innerText = "IP: " + data.ip;

                // Monitorizar rede em tempo real
                listenersRef.on('value', (snapshot) => {
                    this.renderNetwork(snapshot.val());
                });

            } catch (e) { 
                console.error("Erro no Uplink:", e);
                document.getElementById('mon-city').innerText = "ERRO DE REDE";
            }
        },

        renderNetwork(allUsers) {
            this.markers.clear();
            if (!allUsers) return;

            const entries = Object.entries(allUsers);
            document.getElementById('mon-listeners').innerText = `OUVINTES: ${entries.length}`;

            entries.forEach(([id, info]) => {
                const pos = this.getCoords(info.lat, info.lng);
                const isMe = (id === this.myId);

                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(isMe ? 0.025 : 0.015, 16, 16),
                    new THREE.MeshBasicMaterial({ 
                        color: isMe ? 0x39ff14 : 0x00ffff,
                        transparent: true,
                        opacity: 0.9
                    })
                );
                dot.position.copy(pos);
                this.markers.add(dot);

                if (isMe) {
                    this.activeNode = { mesh: dot, city: info.city, country: info.country };
                    document.getElementById('tag-flag').src = `https://flagcdn.com/w40/${info.country}.png`;
                    document.getElementById('tag-city').innerText = info.city;
                    document.getElementById('visitor-tag').style.display = 'flex';
                }
            });
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update();
            
            if (this.activeNode && this.activeNode.mesh) {
                const vector = new THREE.Vector3();
                this.activeNode.mesh.getWorldPosition(vector);
                vector.project(this.camera);
                
                const tag = document.getElementById('visitor-tag');
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (vector.y * -0.5 + 0.5) * window.innerHeight;
                
                tag.style.left = `${x}px`;
                tag.style.top = `${y}px`;
                tag.style.opacity = vector.z > 1 ? "0" : "1";
            }
            this.renderer.render(this.scene, this.camera);
        }
    };

    window.onload = () => RAU.init();
</script>
</body>
</html>
