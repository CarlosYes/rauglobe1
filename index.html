<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v221 - PRECISION TARGET</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.9); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none;
            backdrop-filter: blur(5px);
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.95); padding: 6px 14px; border-radius: 4px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 8px;
            border: 1px solid #39ff14; color: #39ff14; white-space: nowrap;
            transform: translateY(-10px);
        }
        .flag { width: 18px; height: 12px; border: 0.5px solid #39ff14; }
        .d-rau { width: 14px; height: 14px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 15px #39ff14; animation: p 1.5s infinite; margin-top: 5px; }
        
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status" style="font-size: 10px; margin-top: 10px; font-family: monospace; color: #39ff14;">SINAL: RASTREANDO COORDENADAS REAIS...</div>
</div>

<div id="globeViz"></div>

<script>
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const code = (d.countryCode || "un").toLowerCase();
            el.innerHTML = `
                <div class="l-rau">
                    <img src="https://flagcdn.com/w40/${code}.png" class="flag" onerror="this.src='https://flagcdn.com/w40/un.png'">
                    <span>${d.city}</span>
                </div>
                <div class="d-rau"></div>
            `;
            return el;
        });

    // Rotação inicial para a esquerda
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = -1.5;

    async function getEliteLocation() {
        // Tenta obter a localização exata do dispositivo (Hardware)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    // Se o utilizador permitir, usamos a latitude/longitude exata
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    
                    // Tentamos descobrir o nome da cidade real via Reverse Geocoding leve
                    let cityName = "SINAL LOCALIZADO";
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                        const geo = await res.json();
                        cityName = (geo.address.city || geo.address.town || geo.address.village || "SINAL LOCALIZADO").toUpperCase();
                    } catch(e) {}

                    render(lat, lng, cityName, "pt"); // Assume Portugal ou código local
                },
                () => {
                    // Se o utilizador negar, usamos o Cloudflare como última opção
                    fallbackToCloudflare();
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        } else {
            fallbackToCloudflare();
        }
    }

    async function fallbackToCloudflare() {
        try {
            const response = await fetch('https://globorau.carlos2022yes.workers.dev/');
            const data = await response.json();
            render(data.lat, data.lon, data.city, data.countryCode);
        } catch (e) {
            document.getElementById('status').innerText = "ERRO DE SINCRONIZAÇÃO";
        }
    }

    function render(lat, lon, city, country) {
        document.getElementById('onlineCount').innerText = "1";
        document.getElementById('status').innerText = `SINAL: ${city.toUpperCase()}`;
        
        const point = { lat: parseFloat(lat), lng: parseFloat(lon), city: city, countryCode: country };
        world.htmlElementsData([point]);
        world.pointOfView({ lat: point.lat, lng: point.lng, altitude: 2 }, 3000);
        
        setTimeout(() => { world.controls().autoRotateSpeed = -0.3; }, 3100);
    }

    window.onload = getEliteLocation;
</script>
</body>
</html>
