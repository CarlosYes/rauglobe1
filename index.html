<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - SUPERNOVA v10.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #interface-v10 {
            position: absolute; top: 40px; left: 40px; z-index: 1000;
            background: linear-gradient(180deg, rgba(0,25,0,0.9) 0%, rgba(0,5,0,0.95) 100%);
            color: #39ff14; padding: 30px; border-left: 6px solid #39ff14;
            box-shadow: 0 0 40px rgba(0,0,0,1); pointer-events: none;
        }
        .v-tag { font-weight: 900; letter-spacing: 5px; font-size: 1.2em; text-shadow: 0 0 10px #39ff14; }
        .data-stream { color: #fff; font-size: 0.9em; margin-top: 15px; }
        .blink { color: #ff0000; animation: blinker 0.6s step-start infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        canvas { cursor: all-scroll; }
    </style>
</head>
<body>

<div id="interface-v10">
    <div class="v-tag">RAU SYSTEM v10.0</div>
    <div class="data-stream">
        <span class="blink">●</span> RADAR: <span id="my-loc">SINCRO...</span><br>
        <hr style="border:0; border-top:1px solid rgba(57,255,20,0.3); margin:15px 0;">
        OPERATIVOS ATIVOS: <span id="count" style="font-size: 1.8em; font-weight: 900;">0</span>
    </div>
</div>

<script>
    // 1. FIREBASE ULTRA-CORE
    const _s = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
    const firebaseConfig = { apiKey: atob(_s[0]), authDomain: atob(_s[1]), projectId: atob(_s[2]), appId: atob(_s[3]) };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const sessionToken = "V10_" + Math.random().toString(36).substr(2, 6);

    // 2. RENDERING ENGINE (GPU Optimized)
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const anchor = new THREE.Group(); 
    scene.add(anchor);

    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshPhongMaterial({
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 10
        })
    );
    anchor.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 0.95));
    camera.position.z = 3.8;

    // 3. OMNI-SYNC POOL (Zero Flicker)
    const activeUnits = new Map();

    function syncRadar(data) {
        const incomingIds = new Set(data.map(d => d.id));

        data.forEach(unit => {
            if (!activeUnits.has(unit.id)) {
                const phi = (90 - unit.lat) * (Math.PI / 180);
                const theta = (unit.lng + 180) * (Math.PI / 180);
                const pos = new THREE.Vector3().setFromSphericalCoords(1.02, phi, theta);

                const group = new THREE.Group();
                const dot = new THREE.Mesh(new THREE.SphereGeometry(0.015, 12, 12), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
                dot.position.copy(pos);
                group.add(dot);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 256; canvas.height = 64;
                ctx.fillStyle = 'rgba(0,30,0,0.9)'; ctx.fillRect(0,0,256,64);
                ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 4; ctx.strokeRect(0,0,256,64);
                ctx.font = 'bold 26px Courier New'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                ctx.fillText(unit.city.toUpperCase(), 128, 42);

                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), depthTest: true }));
                sprite.position.copy(pos.clone().multiplyScalar(1.15));
                sprite.scale.set(0.45, 0.12, 1);
                group.add(sprite);

                anchor.add(group);
                activeUnits.set(unit.id, group);
            }
        });

        activeUnits.forEach((obj, id) => {
            if (!incomingIds.has(id)) {
                anchor.remove(obj);
                activeUnits.delete(id);
            }
        });
    }

    // 4. CONTROLOS DE ALTA PRECISÃO
    let drag = false, prevM = { x: 0, y: 0 };
    document.addEventListener('mousedown', (e) => { drag = true; prevM = { x: e.clientX, y: e.clientY }; });
    window.addEventListener('mouseup', () => drag = false);
    window.addEventListener('mousemove', (e) => {
        if (drag) {
            anchor.rotation.y += (e.clientX - prevM.x) * 0.006;
            anchor.rotation.x += (e.clientY - prevM.y) * 0.006;
            prevM = { x: e.clientX, y: e.clientY };
            anchor.updateMatrixWorld(); // Sincronia forçada
        }
    });

    // 5. UPLINK CRÍTICO
    async function activate() {
        try {
            const ip = await fetch("https://ipinfo.io/json?token=e392744f6845f0").then(r => r.json());
            document.getElementById('my-loc').innerText = ip.city.toUpperCase();
            const [lat, lng] = ip.loc.split(',').map(Number);

            const up = () => db.collection('RAU_V10').doc(sessionToken).set({ lat, lng, city: ip.city, ts: firebase.firestore.FieldValue.serverTimestamp() });
            up(); setInterval(up, 25000);

            db.collection('RAU_V10').where('ts', '>', new Date(Date.now() - 60000)).onSnapshot(snap => {
                const results = [];
                snap.forEach(doc => results.push({ id: doc.id, ...doc.data() }));
                syncRadar(results);
                document.getElementById('count').innerText = snap.size;
            });
        } catch(e) { console.error("LINK ERROR"); }
    }

    function loop() {
        requestAnimationFrame(loop);
        if (!drag) anchor.rotation.y += 0.0012;
        renderer.render(scene, camera);
    }

    activate(); loop();
</script>
</body>
</html>
