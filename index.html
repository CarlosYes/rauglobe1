<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v185.0 - ABSOLUTE RECOVERY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; user-select: none; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 10, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
            backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(0,255,0,0.1);
        }
        .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        #led { width: 10px; height: 10px; border-radius: 50%; background: #39ff14; box-shadow: 0 0 10px #39ff14; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .monitor-display { background: rgba(0, 5, 0, 0.95); border: 1px solid #1a1a1a; padding: 12px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; }
        #mon-status { font-size: 10px; color: #39ff14; opacity: 0.8; margin-top: 8px; border-top: 1px solid #39ff1444; padding-top: 8px; white-space: pre-line; line-height: 1.4; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; outline: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="rau-ui">
    <div class="status-row">
        <div id="led"></div>
        <span style="font-size: 11px; letter-spacing: 1px;">CORE v185.0 | SYSTEM SECURED</span>
    </div>
    <div class="monitor-display">
        <span id="mon-city">AQUIRING...</span>
        <div id="mon-status">Iniciando varredura global...</div>
    </div>
</div>

<script>
    const RAU_SYSTEM = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000),
        renderer: new THREE.WebGLRenderer({ antialias: true, alpha: false }),
        controls: null, globe: null, markers: new THREE.Group(), currentIP: null,

        init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setClearColor(0x000000, 1);
            document.body.appendChild(this.renderer.domElement);

            // Orbit suave
            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.enableDamping = true;
            this.controls.dampingFactor = 0.05;
            this.controls.autoRotate = true;
            this.controls.autoRotateSpeed = 0.5;
            this.camera.position.set(0, 0, 3.5);

            // Iluminação - Configuração de 3 pontos para garantir visibilidade
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const l1 = new THREE.DirectionalLight(0xffffff, 0.8);
            l1.position.set(5, 3, 5);
            this.scene.add(l1);
            const l2 = new THREE.PointLight(0x39ff14, 0.5);
            l2.position.set(-5, -3, -5);
            this.scene.add(l2);

            // Globo de Emergência (Cinza Metal)
            const geo = new THREE.SphereGeometry(1, 64, 64);
            const mat = new THREE.MeshPhongMaterial({ 
                color: 0x151515, 
                shininess: 20,
                emissive: 0x111111 
            });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            this.scene.add(this.markers);

            // Estrelas
            this.addStars();

            // Carregamento Assíncrono da Textura
            const loader = new THREE.TextureLoader();
            loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.emissive.set(0x000000);
                this.globe.material.needsUpdate = true;
            });

            this.animate();
            this.scan();
            setInterval(() => this.scan(), 10000);
        },

        addStars() {
            const starGeo = new THREE.BufferGeometry();
            const coords = [];
            for (let i = 0; i < 8000; i++) {
                coords.push((Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(coords, 3));
            this.scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 })));
        },

        async scan() {
            try {
                const res = await fetch(`https://ipapi.co/json/?v=${Date.now()}`);
                const data = await res.json();
                
                if (data.ip && data.ip !== this.currentIP) {
                    this.currentIP = data.ip;
                    this.mark(data);
                }
            } catch (e) {
                document.getElementById('mon-status').innerText = "LINK LAGGING... SCANNING";
            }
        },

        mark(data) {
            const { latitude: lat, longitude: lon, city, country_code: iso, org } = data;
            
            // UI Update
            document.getElementById('mon-city').innerText = (city || "ACTIVE NODE").toUpperCase();
            document.getElementById('mon-status').innerText = `IP: ${data.ip}\nNODE: ${iso}\nPROVIDER: ${org}\nSTATUS: TUNNEL DETECTED`;

            this.markers.clear();

            // Lat/Lon para 3D
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.02);

            // Ponto de Visita (Neon)
            const dot = new THREE.Mesh(
                new THREE.SphereGeometry(0.04, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0x39ff14 })
            );
            dot.position.copy(pos);
            this.markers.add(dot);

            // Halo de impacto
            const halo = new THREE.Mesh(
                new THREE.RingGeometry(0.05, 0.07, 32),
                new THREE.MeshBasicMaterial({ color: 0x39ff14, side: THREE.DoubleSide, transparent: true, opacity: 0.6 })
            );
            halo.position.copy(pos.clone().multiplyScalar(1.01));
            halo.lookAt(new THREE.Vector3(0,0,0));
            this.markers.add(halo);

            // Giro Suave da Câmera
            const target = pos.clone().multiplyScalar(3.5);
            this.camera.position.lerp(target, 0.05);
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update();
            this.renderer.render(this.scene, this.camera);
        }
    };

    window.onload = () => RAU_SYSTEM.init();
</script>
</body>
</html>
