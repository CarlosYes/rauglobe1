<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v101 - PRECISÃO REAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        
        /* Interface HUD */
        .hud {
            position: absolute; top: 25px; left: 25px; z-index: 1000;
            background: rgba(0, 8, 15, 0.95); border-left: 4px solid #ff3e3e;
            padding: 20px; color: #fff; pointer-events: none;
            box-shadow: 0 0 30px rgba(255, 62, 62, 0.1);
        }
        .count-on { font-size: 55px; font-weight: 900; color: #ff3e3e; line-height: 1; }
        .status-msg { font-size: 10px; margin-top: 10px; font-family: monospace; color: #ff3e3e; opacity: 0.8; }

        /* Marcadores Dinâmicos */
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.9); padding: 6px 14px; border-radius: 4px;
            font-size: 11px; font-weight: 800; display: flex; align-items: center; gap: 8px;
            border: 1px solid #ff3e3e; color: #fff; white-space: nowrap;
        }
        .d-rau { 
            width: 12px; height: 12px; background: #ff3e3e; border-radius: 50%; 
            margin-top: 5px; box-shadow: 0 0 20px #ff3e3e; 
            animation: pulse-red 2s infinite; 
        }

        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0px #ff3e3e; }
            70% { transform: scale(3); opacity: 0; box-shadow: 0 0 20px #ff3e3e; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">00</div>
    <div id="status" class="status-msg">SINAL: AGUARDANDO PRECISÃO...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'NODE-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    const visitors = new Map();

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#ff3e3e')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = `m-rau`;
            const flag = d.country ? `<img src="https://flagcdn.com/w20/${d.country.toLowerCase()}.png" style="width:14px">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    // SISTEMA DE PRECISÃO REAL (GPS > IP)
    async function getTrueLocation() {
        return new Promise((resolve) => {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    // Se o usuário permitir GPS, pegamos a cidade via Reverse Geocoding suave
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                        const data = await res.json();
                        const city = data.address.city || data.address.town || data.address.village || "LOCAL DESCONHECIDO";
                        resolve({ lat, lng, city: city.toUpperCase(), country: data.address.country_code.toUpperCase() });
                    } catch {
                        resolve(fetchFallbackIP());
                    }
                }, () => resolve(fetchFallbackIP()), { timeout: 5000 });
            } else {
                resolve(fetchFallbackIP());
            }
        });
    }

    async function fetchFallbackIP() {
        try {
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            return { lat: d.latitude, lng: d.longitude, city: d.city.toUpperCase(), country: d.country_code };
        } catch { return null; }
    }

    async function start() {
        const geo = await getTrueLocation();
        if (!geo) {
            document.getElementById('status').innerText = "SINAL BLOQUEADO";
            return;
        }

        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('rau-signal-v101');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `SINAL REAL: ${geo.city}`;
            channel.presence.enter(geo);
            
            channel.presence.subscribe(['enter', 'present', 'update'], (m) => {
                if(m.data && m.data.lat) {
                    visitors.set(m.clientId, m.data);
                    updateDisplay();
                }
            });
        });

        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.2 }, 2500);
    }

    function updateDisplay() {
        const data = Array.from(visitors.values());
        document.getElementById('onlineCount').innerText = data.length.toString().padStart(2, '0');
        world.htmlElementsData(data);
    }

    world.controls().autoRotate = true;
    window.onload = start;
</script>
</body>
</html>
