<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v200</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.95); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none;
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.95); padding: 4px 10px; border-radius: 3px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            border: 1px solid #39ff14; color: #39ff14; white-space: nowrap;
        }
        .d-rau { width: 8px; height: 8px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 15px #39ff14; animation: p 1.2s infinite; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status" style="font-size: 10px; margin-top: 10px; font-family: monospace; color: #ff3131;">SINAL: LENDO IP...</div>
</div>

<div id="globeViz"></div>

<script>
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            el.innerHTML = `<div class="l-rau"><span>SINAL ATIVO</span></div><div class="d-rau"></div>`;
            return el;
        });

    async function catchSignal() {
        try {
            // Usamos o serviço de trace da Cloudflare (Impossível de bloquear)
            const response = await fetch('https://www.cloudflare.com/cdn-cgi/trace');
            const data = await response.text();
            
            // Extraímos o código do país que a Cloudflare já deteta automaticamente
            const locLine = data.split('\n').find(line => line.startsWith('loc='));
            const countryCode = locLine ? locLine.split('=')[1] : 'PT';

            // Base de dados interna simplificada para não depender de APIs externas
            const countryCoords = {
                'PT': { lat: 39.3999, lng: -8.2245, city: 'PORTUGAL' },
                'BR': { lat: -14.2350, lng: -51.9253, city: 'BRASIL' },
                'FR': { lat: 46.2276, lng: 2.2137, city: 'FRANÇA' },
                'CH': { lat: 46.8182, lng: 8.2275, city: 'SUÍÇA' }
            };

            const myLoc = countryCoords[countryCode] || countryCoords['PT'];

            // O contador só muda de 0 para 1 AQUI
            document.getElementById('onlineCount').innerText = "1";
            document.getElementById('status').innerText = `SINAL: ${myLoc.city} (via CDN)`;
            document.getElementById('status').style.color = "#39ff14";

            world.htmlElementsData([myLoc]);
            world.pointOfView({ lat: myLoc.lat, lng: myLoc.lng, altitude: 2.5 }, 2000);

        } catch (err) {
            document.getElementById('status').innerText = "ERRO: SEM RESPOSTA CDN";
        }
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    window.onload = catchSignal;
</script>
</body>
</html>
