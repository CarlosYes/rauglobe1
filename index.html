<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v60 - FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; transition: background 1s; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 25px; left: 25px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); border: 2px solid #39ff14;
            padding: 20px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 35px #39ff1466; border-radius: 4px;
        }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 4px 10px; border-radius: 2px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 8px;
            white-space: nowrap; border: 1px solid #fff; box-shadow: 0 0 10px #39ff14;
        }
        .l-rau img { width: 22px; height: 15px; object-fit: cover; border: 1px solid #000; }
        .d-rau { 
            width: 12px; height: 12px; background: #fff; border-radius: 50%; 
            margin-top: 5px; border: 2px solid #39ff14; 
            animation: p 0.8s infinite alternate; 
        }
        @keyframes p { from { transform: scale(1); opacity: 1; } to { transform: scale(3.5); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 5px;">RAU SYSTEM v60</div>
    <div id="status" style="font-size: 14px; color: #fff; margin-top: 10px; font-family: monospace;">A RASTREAR...</div>
</div>

<div id="globeViz"></div>

<script>
    // 1. Configuração Dia/Noite (Azul agora às 13:17)
    const hora = new Date().getHours();
    const eDia = hora >= 7 && hora < 19;
    const corFundo = eDia ? '#87CEEB' : '#000000';
    const imgTerra = eDia 
        ? '//unpkg.com/three-globe/example/img/earth-blue-marble.jpg' 
        : '//unpkg.com/three-globe/example/img/earth-night.jpg';
    
    document.body.style.background = corFundo;

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl(imgTerra)
        .backgroundColor(corFundo)
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flagUrl = `https://flagcdn.com/w40/${d.countryCode.toLowerCase()}.png`;
            el.innerHTML = `
                <div class="l-rau">
                    <img src="${flagUrl}">
                    <span>${d.city.toUpperCase()}</span>
                </div>
                <div class="d-rau"></div>`;
            return el;
        });

    async function init() {
        try {
            // Usando ipapi.co que é HTTPS e não bloqueia o GitHub
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();

            if (d.city) {
                document.getElementById('status').innerText = `FIXADO: ${d.city.toUpperCase()}`;
                
                const dataPoint = {
                    lat: d.latitude,
                    lng: d.longitude,
                    city: d.city,
                    countryCode: d.country_code
                };

                world.htmlElementsData([dataPoint]);
                world.pointOfView({ lat: d.latitude, lng: d.longitude, altitude: 1.8 }, 2000);
            }
        } catch (e) {
            document.getElementById('status').innerText = "ERRO: CONTACTE O SUPORTE";
        }
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    window.onload = init;
</script>
</body>
</html>
