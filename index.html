<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR REAL-TIME</title>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; color: #39ff14; font-family: monospace; }
        #globeViz { width: 100vw; height: 100vh; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0,20,0,0.8); border: 1px solid #39ff14; padding: 15px;
        }
        .big { font-size: 40px; font-weight: bold; }
    </style>
</head>
<body>

<div class="hud">
    <div>SINAL RADAR RAU</div>
    <div id="count" class="big">0</div>
    <div id="msg">A RASTREAR...</div>
</div>

<div id="globeViz"></div>

<script>
    // Configurações do Firebase
    const config = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    const radarRef = db.ref('RADAR_REALTIME_FINAL');

    const myID = "U_" + Math.random().toString(36).substr(2, 9);
    
    // Inicializa o Globo com Pontos Nativos (Mais estável que HTML)
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .pointColor(() => '#39ff14')
        .pointRadius(0.5)
        .pointAltitude(0.1)
        .pointsMerge(false)
        .pointLabel(d => `CIDADE: ${d.city}`);

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.8;

    async function start() {
        try {
            // Obtém localização real pelo IP
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            if (data.latitude) {
                const myData = {
                    id: myID,
                    lat: parseFloat(data.latitude),
                    lng: parseFloat(data.longitude),
                    city: data.city || "Ouvinte",
                    ts: Date.now()
                };

                // Grava no Firebase
                radarRef.child(myID).set(myData);
                radarRef.child(myID).onDisconnect().remove();

                // Foca a câmara no teu ponto
                world.pointOfView({ lat: myData.lat, lng: myData.lng, altitude: 2 }, 2000);
                document.getElementById('msg').innerText = "ONLINE: " + myData.city;
            }
        } catch (e) {
            document.getElementById('msg').innerText = "ERRO DE CONEXÃO";
        }
    }

    // Sincronização em tempo real (Ouve a base de dados)
    radarRef.on('value', snap => {
        const val = snap.val() || {};
        const now = Date.now();
        // Filtra quem enviou sinal nos últimos 60 segundos
        const activeNodes = Object.values(val).filter(u => (now - u.ts < 60000));
        
        document.getElementById('count').innerText = activeNodes.length;
        
        // Desenha os pontos no globo (Sem usar HTML instável)
        world.pointsData(activeNodes);
    });

    // Mantém o sinal ativo
    setInterval(() => radarRef.child(myID).update({ ts: Date.now() }), 15000);

    start();
</script>
</body>
</html>
