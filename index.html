<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v229 - ULTIMATE TRACE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.9); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none; backdrop-filter: blur(5px);
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.95); padding: 6px 14px; border-radius: 4px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 8px;
            border: 1px solid #39ff14; color: #39ff14; white-space: nowrap;
        }
        .flag { width: 20px; height: 14px; object-fit: cover; border: 0.5px solid #39ff14; }
        .d-rau { width: 14px; height: 14px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 15px #39ff14; animation: p 1.5s infinite; margin-top: 5px; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status">SINAL: RASTREIO DE REDE...</div>
</div>

<div id="globeViz"></div>

<script>
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const countryCode = (d.countryCode || "un").toLowerCase();
            el.innerHTML = `
                <div class="l-rau">
                    <img src="https://flagcdn.com/w40/${countryCode}.png" class="flag" onerror="this.src='https://flagcdn.com/w40/un.png'">
                    <span>${d.city}</span>
                </div>
                <div class="d-rau"></div>
            `;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = -1.3;

    async function startTrace() {
        try {
            // Usamos a ipwhois.io que tem servidores espalhados e costuma ser mais precisa que a ipapi
            const response = await fetch('https://ipwho.is/');
            const data = await response.json();

            if (data.success) {
                render(data.latitude, data.longitude, data.city.toUpperCase(), data.country_code);
            } else {
                throw new Error("Falha no rastreio");
            }
        } catch (e) {
            // Se falhar, volta ao Cloudflare
            const cfRes = await fetch('https://globorau.carlos2022yes.workers.dev/');
            const cf = await cfRes.json();
            render(cf.lat, cf.lon, cf.city.toUpperCase(), cf.countryCode);
        }
    }

    function render(lat, lon, city, countryCode) {
        document.getElementById('onlineCount').innerText = "1";
        document.getElementById('status').innerText = "SINAL: " + city;
        
        world.htmlElementsData([{ lat: parseFloat(lat), lng: parseFloat(lon), city, countryCode }]);
        world.pointOfView({ lat: parseFloat(lat), lng: parseFloat(lon), altitude: 1.8 }, 2500);
        setTimeout(() => { world.controls().autoRotateSpeed = -0.25; }, 2600);
    }

    window.onload = startTrace;
</script>
</body>
</html>
