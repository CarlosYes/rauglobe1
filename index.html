<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU MONITOR v227.0 - ULTIMATE SHIELD</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        /* CSS de Bloqueio de Fuga (Garante que o globo apareça) */
        html, body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background: #000; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        #globeViz { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 1; display: block;
        }

        /* Interface Estilo XatRadio (Modernizada) */
        .hud {
            position: absolute; z-index: 100; padding: 20px;
            background: rgba(7, 20, 45, 0.85); /* Cor azul escura do código que enviaste */
            border: 1px solid rgba(169, 169, 169, 0.3);
            border-radius: 8px; color: #eff1f9; pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #hud-left { top: 20px; left: 20px; width: 280px; border-left: 5px solid #39ff14; }
        #hud-right { top: 20px; right: 20px; width: 220px; max-height: 80vh; overflow-y: auto; }

        .title { font-size: 14px; font-weight: bold; color: #39ff14; margin-bottom: 5px; text-transform: uppercase; }
        .city-main { font-size: 22px; font-weight: 900; display: block; margin-bottom: 2px; }
        .details { font-size: 11px; color: #d9d9d9; opacity: 0.8; }

        .entry { 
            display: flex; align-items: center; gap: 10px; padding: 8px;
            background: rgba(0,0,0,0.3); margin-bottom: 4px; border-radius: 4px;
            font-size: 12px; animation: fadeIn 0.5s ease;
        }
        .flag { width: 20px; height: 14px; border-radius: 2px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="hud-left" class="hud">
    <div class="title">Monitor de Rede RAU</div>
    <span id="mon-city" class="city-main">CONECTANDO...</span>
    <div class="details">
        STATUS: <span style="color:#39ff14">PROTEÇÃO ATIVA (VPN)</span><br>
        UPLINK: SECURE_CHANNEL_v227
    </div>
    <div id="mon-count" style="margin-top:15px; font-size:18px; font-weight:bold;">OUVINTES: 0</div>
</div>

<div id="hud-right" class="hud">
    <div class="title" style="color: #00ffff;">Tráfego em Tempo Real</div>
    <div id="traffic-list"></div>
</div>

<div id="globeViz"></div>

<script>
    // Configuração do teu Firebase (Mantida)
    const firebaseConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        authDomain: "radiodosamigosunidos-aadda.firebaseapp.com",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda",
        storageBucket: "radiodosamigosunidos-aadda.firebasestorage.app",
        messagingSenderId: "451945612071",
        appId: "1:451945612071:web:383c551ca22744f6845f02"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const listenersRef = db.ref('listeners');

    // Inicialização do Globo com correção de redimensionamento
    const world = Globe()
        (document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .pointColor(() => '#39ff14')
        .pointAltitude(0.1)
        .pointRadius(0.6)
        .pointsMerge(true);

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.6;

    async function initSystem() {
        try {
            // IPWHO.IS - Melhor para furar bloqueios de VPN e CORS
            const response = await fetch('https://ipwho.is/');
            const data = await response.json();

            if (!data.success) throw new Error("Falha na Geolocation");

            const myNode = listenersRef.push();
            const payload = {
                lat: data.latitude,
                lng: data.longitude,
                city: data.city || "Nó Anónimo",
                country: data.country_code.toLowerCase(),
                time: Date.now()
            };

            myNode.set(payload);
            myNode.onDisconnect().remove();

            document.getElementById('mon-city').innerText = payload.city.toUpperCase();

            // Escuta em tempo real (Firebase)
            listenersRef.on('value', snap => {
                const rawData = snap.val() || {};
                const list = Object.values(rawData);
                
                document.getElementById('mon-count').innerText = `OUVINTES: ${list.length}`;
                world.pointsData(list);

                const listUI = document.getElementById('traffic-list');
                listUI.innerHTML = '';
                list.sort((a,b) => b.time - a.time).slice(0, 8).forEach(user => {
                    const el = document.createElement('div');
                    el.className = 'entry';
                    el.innerHTML = `
                        <img class="flag" src="https://flagcdn.com/w40/${user.country}.png">
                        <span>${user.city}</span>
                    `;
                    listUI.appendChild(el);
                });
            });

        } catch (err) {
            console.error("Erro de Conexão:", err);
            document.getElementById('mon-city').innerText = "SISTEMA OFFLINE";
        }
    }

    // Garante que o globo ocupa sempre o ecrã todo
    function resize() {
        world.width(window.innerWidth);
        world.height(window.innerHeight);
    }
    window.addEventListener('resize', resize);
    window.onload = () => { resize(); initSystem(); };
</script>
</body>
</html>
