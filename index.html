<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v127 - SINAL REAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.95); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none;
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.95); padding: 4px 10px; border-radius: 3px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            border: 1px solid #39ff14; color: #39ff14; white-space: nowrap;
        }
        .d-rau { width: 8px; height: 8px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 15px #39ff14; animation: p 1.2s infinite; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status" style="font-size: 10px; margin-top: 10px; font-family: monospace; color: #39ff14;">RASTREANDO POSIÇÃO REAL...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'RAU-' + Math.random().toString(36).substr(2, 5).toUpperCase();
    const visitors = new Map();

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000').showAtmosphere(true)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = `m-rau`;
            // CIDADE + BANDEIRA conforme pediste originalmente
            const flag = d.country ? `<img src="https://flagcdn.com/w20/${d.country.toLowerCase()}.png" style="width:14px">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    async function getPreciseLocation() {
        // Lista de serviços para cruzar dados e evitar a Bélgica
        const services = [
            'https://ipwho.is/',
            'https://ipapi.co/json/',
            'https://extreme-ip-lookup.com/json/'
        ];

        for (let url of services) {
            try {
                const r = await fetch(url);
                const d = await r.json();
                const countryCode = (d.country_code || d.countryCode || "").toUpperCase();
                
                // Ignora se o sinal estiver a vir de um datacenter belga
                if (countryCode === "BE") continue;

                const lat = d.latitude || d.lat;
                const lng = d.longitude || d.lon;
                const city = d.city || d.cityName;

                if (lat && lng && city) {
                    return { 
                        lat: parseFloat(lat), 
                        lng: parseFloat(lng), 
                        city: city.toUpperCase(), 
                        country: countryCode 
                    };
                }
            } catch (e) { continue; }
        }
        // Se tudo falhar, tenta o GPS do browser (última linha de defesa para precisão)
        return new Promise((resolve) => {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, city: "LOCALIZAÇÃO REAL", country: "" });
            }, () => {
                resolve({ lat: 0, lng: 0, city: "OFFLINE", country: "" });
            });
        });
    }

    async function start() {
        const geo = await getPreciseLocation();
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('rau-final-v127');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `SINAL: ${geo.city}`;
            channel.presence.enter(geo);
            
            channel.presence.subscribe(['enter', 'present', 'update'], (m) => {
                if(m.data && m.data.lat) {
                    visitors.set(m.clientId || m.id, m.data);
                    update();
                }
            });
            channel.presence.subscribe('leave', (m) => {
                visitors.delete(m.clientId || m.id);
                update();
            });
        });

        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.0 }, 2000);
    }

    function update() {
        const arr = Array.from(visitors.values());
        document.getElementById('onlineCount').innerText = arr.length;
        world.htmlElementsData(arr);
    }

    world.controls().autoRotate = true;
    window.onload = start;
</script>
</body>
</html>
