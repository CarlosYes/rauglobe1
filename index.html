<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v109 - SINAL FORÇADO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); border: 2px solid #ff3e3e;
            padding: 20px; color: #ff3e3e; pointer-events: none;
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 1; text-shadow: 0 0 15px #ff3e3e; }
        .status-msg { font-size: 11px; margin-top: 8px; font-family: monospace; font-weight: bold; background: #ff3e3e; color: #000; padding: 2px 5px; }

        /* Marcador Real */
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #ff3e3e; padding: 4px 12px; border-radius: 2px;
            font-size: 11px; font-weight: 900; color: #fff; white-space: nowrap;
        }
        .d-rau { width: 12px; height: 12px; background: #ff3e3e; border-radius: 50%; margin-top: 5px; box-shadow: 0 0 20px #ff3e3e; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }

        /* Botão de Ajuste Manual se tudo falhar */
        #manualBtn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1001; background: #ff3e3e; color: #fff; border: none;
            padding: 15px 30px; font-weight: 900; cursor: pointer; border-radius: 5px;
            display: none; box-shadow: 0 0 20px rgba(255, 62, 62, 0.5);
        }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">--</div>
    <div id="status" class="status-msg">RASTREAMENTO SATÉLITE...</div>
</div>

<button id="manualBtn" onclick="forceManual()">AJUSTAR POSIÇÃO MANUALMENTE</button>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'NODE-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    let channel;
    const visitors = new Map();

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000').showAtmosphere(true).atmosphereColor('#ff3e3e')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = `m-rau`;
            el.innerHTML = `<div class="l-rau">${d.city}</div><div class="d-rau"></div>`;
            return el;
        });

    // SISTEMA DE PRECISÃO ABSOLUTA
    async function getTrueLocation() {
        return new Promise((resolve) => {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    // REVERSE GEOCODING para pegar a cidade real pelo GPS
                    try {
                        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                        const d = await r.json();
                        const city = d.address.city || d.address.town || d.address.village || "LOCALIZAÇÃO REAL";
                        resolve({ lat: latitude, lng: longitude, city: city.toUpperCase(), source: "GPS" });
                    } catch {
                        resolve({ lat: latitude, lng: longitude, city: "SINAL GPS", source: "GPS" });
                    }
                }, () => {
                    // Se falhar, mostra o botão manual em vez de chutar Bruges
                    document.getElementById('manualBtn').style.display = 'block';
                    document.getElementById('status').innerText = "ERRO GPS: AGUARDANDO AJUSTE MANUAL";
                }, { enableHighAccuracy: true, timeout: 8000 });
            }
        });
    }

    async function init() {
        const geo = await getTrueLocation();
        if(geo) connect(geo);
    }

    function connect(geo) {
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        channel = ably.channels.get('rau-signal-v109');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `SINAL FIXADO: ${geo.city} (${geo.source})`;
            channel.presence.enter(geo);
            
            channel.presence.subscribe(['enter', 'present', 'update'], (m) => {
                if(m.data && m.data.lat) {
                    visitors.set(m.clientId, m.data);
                    updateNodes();
                }
            });
        });
        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.0 }, 2000);
    }

    function updateNodes() {
        const data = Array.from(visitors.values());
        document.getElementById('onlineCount').innerText = data.length.toString().padStart(2, '0');
        world.htmlElementsData(data);
    }

    // AJUSTE MANUAL: Clique no globo para definir sua localização se o GPS falhar
    function forceManual() {
        document.getElementById('status').innerText = "CLIQUE NO GLOBO ONDE VOCÊ ESTÁ";
        document.getElementById('manualBtn').innerText = "CLIQUE NO MAPA AGORA";
        
        world.onGlobeClick(({ lat, lng }) => {
            const manualGeo = { lat, lng, city: "POSIÇÃO MANUAL", source: "USER" };
            document.getElementById('manualBtn').style.display = 'none';
            if(!channel) connect(manualGeo);
            else channel.presence.update(manualGeo);
            world.pointOfView({ lat, lng, altitude: 2.0 }, 1000);
            world.onGlobeClick(null); // Desativa o clique após definir
        });
    }

    world.controls().autoRotate = true;
    window.onload = init;
</script>
</body>
</html>
