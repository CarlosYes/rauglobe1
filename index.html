<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAU MONITOR v108 - FIX DEPLOY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.95); border: 2px solid #00f2ff;
            padding: 15px 25px; color: #00f2ff; pointer-events: none;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }
        .count-on { font-size: 50px; font-weight: 900; line-height: 1; text-shadow: 0 0 10px #00f2ff; }
        .status-msg { font-size: 10px; margin-top: 5px; font-family: monospace; text-transform: uppercase; }

        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0, 242, 255, 0.2); padding: 4px 10px; border-radius: 2px;
            font-size: 10px; font-weight: 900; border: 1px solid #00f2ff; color: #fff; 
            white-space: nowrap; backdrop-filter: blur(5px);
        }
        .d-rau { width: 10px; height: 10px; background: #00f2ff; border-radius: 50%; margin-top: 4px; box-shadow: 0 0 15px #00f2ff; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">--</div>
    <div id="status" class="status-msg">Iniciando Varredura...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'NODE-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    const visitors = new Map();

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000').showAtmosphere(true).atmosphereColor('#00f2ff')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = `m-rau`;
            el.innerHTML = `<div class="l-rau">${d.city}</div><div class="d-rau"></div>`;
            return el;
        });

    async function getDiscovery() {
        return new Promise((resolve) => {
            let found = false;

            // Tentativa 1: GPS (Timeout de 4 segundos para não travar)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (p) => {
                    if(found) return; found = true;
                    resolve({ lat: p.coords.latitude, lng: p.coords.longitude, city: "GPS REAL", mode: "PRECISO" });
                }, () => {}, { timeout: 4000 });
            }

            // Tentativa 2: IP de Alta Precisão (ipwho.is é melhor que ipapi para evitar Bruges)
            setTimeout(async () => {
                if(found) return;
                try {
                    const r = await fetch('https://ipwho.is/');
                    const d = await r.json();
                    found = true;
                    resolve({ lat: d.latitude, lng: d.longitude, city: d.city.toUpperCase(), mode: "IP-SCAN" });
                } catch (e) {
                    if(!found) {
                        found = true;
                        resolve({ lat: 38.7, lng: -9.1, city: "LISBOA", mode: "FALLBACK" });
                    }
                }
            }, 4500);
        });
    }

    async function init() {
        document.getElementById('status').innerText = "CALIBRANDO COORDENADAS...";
        const geo = await getDiscovery();
        
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('monitor-rau-v108');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `MODO: ${geo.mode} | ${geo.city}`;
            channel.presence.enter(geo);
            channel.presence.subscribe(['enter', 'present', 'update'], (m) => {
                if(m.data && m.data.lat) {
                    visitors.set(m.clientId, m.data);
                    const nodes = Array.from(visitors.values());
                    document.getElementById('onlineCount').innerText = nodes.length.toString().padStart(2, '0');
                    world.htmlElementsData(nodes);
                }
            });
            channel.presence.subscribe('leave', (m) => {
                visitors.delete(m.clientId);
                const nodes = Array.from(visitors.values());
                document.getElementById('onlineCount').innerText = nodes.length.toString().padStart(2, '0');
                world.htmlElementsData(nodes);
            });
        });

        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.0 }, 2000);
    }

    world.controls().autoRotate = true;
    window.onload = init;
</script>
</body>
</html>
