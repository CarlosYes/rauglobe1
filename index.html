<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR PRECISION</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; }
        
        .hud-rau {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 10, 30, 0.9); border: 1px solid #39ff14;
            padding: 15px; border-radius: 4px; color: #fff; pointer-events: none;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
        }
        .count-big { font-size: 48px; font-weight: bold; color: #39ff14; line-height: 1; }
        
        /* Marcadores Visíveis */
        .rau-marker { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .rau-label {
            background: rgba(0, 0, 0, 0.9); border: 1px solid #39ff14;
            color: #39ff14; padding: 4px 10px; border-radius: 3px;
            font-size: 13px; font-weight: 900; white-space: nowrap; 
            margin-bottom: 6px; text-transform: uppercase;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
        }
        .rau-dot { 
            width: 12px; height: 12px; background: #fff; border-radius: 50%; 
            box-shadow: 0 0 20px #39ff14, 0 0 40px #39ff14;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="hud-rau">
    <div style="font-size: 10px; opacity: 0.8; letter-spacing: 2px;">RADAR DE IP EM DIRETO</div>
    <div id="live-total" class="count-big">0</div>
    <div id="status-msg" style="font-size: 11px; color: #39ff14; margin-top: 5px;">A LOCALIZAR SINAL...</div>
</div>

<div id="globeViz"></div>

<script>
    const fbConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.database();
    const radarRef = db.ref('rau_live_signals'); // Nova tabela para limpar dados antigos

    const myID = "USER_" + Math.random().toString(36).substr(2, 6);
    const myNode = radarRef.child(myID);

    // Configuração do Globo
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'rau-marker';
            el.innerHTML = `
                <div class="rau-label">${d.city}</div>
                <div class="rau-dot"></div>
            `;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    // 1. Captura o IP e a Cidade
    async function getUserIPData() {
        try {
            const response = await fetch('https://ipwho.is/');
            const data = await response.json();
            
            if (data.success) {
                const myPos = {
                    id: myID,
                    lat: data.latitude,
                    lng: data.longitude,
                    city: data.city || "Sinal Ativo",
                    ts: Date.now()
                };

                // Envia para o Firebase e remove ao sair
                myNode.set(myPos);
                myNode.onDisconnect().remove();

                // Move a câmara para a tua cidade instantaneamente
                world.pointOfView({ lat: data.latitude, lng: data.longitude, altitude: 2 }, 2500);
                document.getElementById('status-msg').innerText = "LIGADO: " + data.city.toUpperCase();
            }
        } catch (e) {
            document.getElementById('status-msg').innerText = "ERRO NA REDE";
        }
    }

    // 2. Sincroniza o Globo com o Firebase
    function syncRadar() {
        radarRef.on('value', snap => {
            const users = snap.val() || {};
            const now = Date.now();
            
            // Filtra quem está online nos últimos 40 segundos
            const activeList = Object.values(users).filter(u => (now - u.ts < 40000) && u.lat);
            
            document.getElementById('live-total').innerText = activeList.length;
            
            // Atualiza os pontos no globo
            world.htmlElementsData(activeList);
        });

        // Mantém o teu sinal ativo (Heartbeat)
        setInterval(() => {
            myNode.update({ ts: Date.now() });
        }, 15000);
    }

    window.onload = () => {
        getUserIPData();
        syncRadar();
    };
</script>
</body>
</html>
