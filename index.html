<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v230 - ULTIMATE TRACE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 5, 10, 0.9); border-left: 5px solid #39ff14;
            padding: 15px; color: #fff; pointer-events: none; backdrop-filter: blur(5px);
        }
        .count-on { font-size: 60px; font-weight: 900; line-height: 0.8; color: #39ff14; }
        
        /* Estilo dos Marcadores */
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: rgba(0,0,0,0.95); padding: 6px 14px; border-radius: 4px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 8px;
            white-space: nowrap; transition: all 0.5s;
        }
        
        /* Cores Dinâmicas */
        .status-online { border: 1px solid #39ff14; color: #39ff14; }
        .status-offline { border: 1px solid #8b0000; color: #8b0000; opacity: 0.6; }

        .flag { width: 20px; height: 14px; object-fit: cover; border: 0.5px solid currentColor; }
        
        /* Pontos e Animações */
        .d-rau { width: 12px; height: 12px; border-radius: 50%; margin-top: 5px; }
        .dot-online { background: #39ff14; box-shadow: 0 0 15px #39ff14; animation: p 1.5s infinite; }
        .dot-offline { background: #8b0000; box-shadow: 0 0 5px #8b0000; }

        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div id="onlineCount" class="count-on">0</div>
    <div id="status">SINAL: AGUARDANDO...</div>
</div>

<div id="globeViz"></div>

<script>
    // Armazenamento global dos visitantes para o globo não "esquecer"
    let allVisitors = [];

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const countryCode = (d.countryCode || "un").toLowerCase();
            const statusClass = d.active ? 'status-online' : 'status-offline';
            const dotClass = d.active ? 'dot-online' : 'dot-offline';

            el.innerHTML = `
                <div class="l-rau ${statusClass}">
                    <img src="https://flagcdn.com/w40/${countryCode}.png" class="flag">
                    <span>${d.city}</span>
                </div>
                <div class="d-rau ${dotClass}"></div>
            `;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = -0.8;

    async function startTrace() {
        try {
            const response = await fetch('https://ipwho.is/');
            const data = await response.json();

            if (data.success) {
                renderNewPoint(data.latitude, data.longitude, data.city.toUpperCase(), data.country_code);
            }
        } catch (e) {
            // Fallback para o seu worker do Cloudflare
            const cfRes = await fetch('https://globorau.carlos2022yes.workers.dev/');
            const cf = await cfRes.json();
            renderNewPoint(cf.lat, cf.lon, cf.city.toUpperCase(), cf.countryCode);
        }
    }

    function renderNewPoint(lat, lon, city, countryCode) {
        // 1. Criar novo objeto de visitante ativo
        const newVisitor = { 
            lat: parseFloat(lat), 
            lng: parseFloat(lon), 
            city, 
            countryCode, 
            active: true,
            id: Date.now() 
        };

        // 2. Adicionar à lista histórica
        allVisitors.push(newVisitor);
        
        // 3. Simular que após 15 segundos ele "saiu" (fica vermelho escuro)
        setTimeout(() => {
            newVisitor.active = false;
            updateDisplay();
        }, 15000);

        updateDisplay();
        
        // Focar a câmera no último sinal
        world.pointOfView({ lat: parseFloat(lat), lng: parseFloat(lon), altitude: 1.8 }, 2000);
    }

    function updateDisplay() {
        // Atualiza contador HUD (apenas os ativos)
        const onlineNow = allVisitors.filter(v => v.active).length;
        document.getElementById('onlineCount').innerText = onlineNow;
        
        if(allVisitors.length > 0) {
            document.getElementById('status').innerText = "SINAL: " + allVisitors[allVisitors.length -1].city;
        }

        // Renderiza TODOS os pontos (Verdes e Vermelhos) no globo
        world.htmlElementsData(allVisitors);
    }

    window.onload = () => {
        startTrace();
        // Simulação: Tenta buscar novos acessos periodicamente
        setInterval(startTrace, 60000); 
    };
</script>
</body>
</html>
