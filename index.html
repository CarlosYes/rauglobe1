<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v39 - TRUE TRACKER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.95); border: 2px solid #39ff14;
            padding: 20px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.6);
        }
        .count { font-size: 80px; font-weight: 900; color: #fff; line-height: 0.8; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 4px 10px; border-radius: 2px;
            font-size: 12px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            white-space: nowrap; border: 1px solid #fff; box-shadow: 0 5px 15px #000;
        }
        .l-rau img { width: 22px; height: 15px; object-fit: cover; }
        .d-rau { width: 12px; height: 12px; background: #fff; border-radius: 50%; margin-top: 5px; border: 2px solid #39ff14; animation: pulse 1.2s infinite ease-out; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 3px; margin-bottom: 5px;">LIVE NODES DETECTED</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 11px; color: #fff; margin-top: 8px;">A RASTREAR...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'NODE-' + Math.random().toString(36).substr(2, 9);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            // Puxa a bandeira dinamicamente pelo código do país
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    async function start() {
        try {
            // Busca a localização real via IP (Sem intermediários)
            const res = await fetch('https://ipwho.is/');
            const d = await res.json();
            
            if(!d.success) throw new Error("Falha no IP");

            const myLocation = {
                id: SESSION_ID,
                lat: d.latitude,
                lng: d.longitude,
                city: d.city.toUpperCase(),
                country: d.country_code
            };

            // Conexão direta ao sistema de tempo real
            const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
            const channel = ably.channels.get('rau-live-radar');

            ably.connection.on('connected', () => {
                document.getElementById('status').innerText = "ONLINE: " + myLocation.city;
                
                // Entra no canal para ser visto por todos
                channel.presence.enter(myLocation);

                // Função de sincronização de todos os ouvintes
                const sync = () => {
                    channel.presence.get((err, members) => {
                        if(!err) {
                            const activeNodes = members.map(m => m.data).filter(data => data && data.lat);
                            document.getElementById('count').innerText = activeNodes.length;
                            world.htmlElementsData(activeNodes);
                        }
                    });
                };

                channel.presence.subscribe(['enter', 'leave', 'present', 'update'], sync);
                sync();
            });

            // Move o globo para a TUA posição detetada
            world.pointOfView({ lat: d.latitude, lng: d.longitude, altitude: 2.2 }, 2000);

        } catch (e) {
            document.getElementById('status').innerText = "ERRO DE RASTREIO";
            console.error(e);
        }
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    window.onload = start;
</script>
</body>
</html>
