<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v37.0 - REALTIME</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 10, 0, 0.95); color: #39ff14; padding: 25px;
            border: 2px solid #39ff14; border-radius: 12px; pointer-events: none;
        }
        #count { font-size: 3.5em; font-weight: 900; color: #fff; display: block; }
        #diag { font-size: 11px; margin-top: 10px; font-weight: bold; }
        .mem-box { font-size: 10px; color: #888; margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

<div id="rau-ui">
    <b>RAU COMMAND v37.0</b><br><br>
    OUVINTES ONLINE:
    <span id="count">0</span>
    <div id="diag" style="color: #ff3333;">📡 A LIGAR AO REALTIME...</div>
    
    <div class="mem-box">
        💾 MEMÓRIA ATIVA:<br>
        🔈 <span id="v-mem">--</span> | 🔄 <span id="a-mem">--</span>
    </div>
</div>

<script>
    // 1. MEMÓRIA
    const rauPrefs = {
        save: (v, a) => { localStorage.setItem('rau_v', v); localStorage.setItem('rau_a', a); },
        load: () => ({ v: localStorage.getItem('rau_v') || "0.7", a: localStorage.getItem('rau_a') || "true" })
    };
    const current = rauPrefs.load();
    document.getElementById('v-mem').innerText = "VOL " + Math.round(current.v * 100) + "%";
    document.getElementById('a-mem').innerText = "AUTO " + (current.a === "true" ? "ON" : "OFF");

    // 2. CONFIGURAÇÃO (Realtime Database)
    const _k = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
    const cfg = { 
        apiKey: atob(_k[0]), 
        authDomain: atob(_k[1]), 
        projectId: atob(_k[2]), 
        appId: atob(_k[3]),
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app/" 
    };
    
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    const rdb = firebase.database();
    const myID = "NODE_" + Math.random().toString(36).substr(2, 5);

    // 3. ENGINE 3D
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const world = new THREE.Group(); scene.add(world);
    const globe = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshPhongMaterial({
        map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
        shininess: 5
    }));
    world.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    camera.position.z = 3.5;

    // 4. ATIVAÇÃO REALTIME
    async function start() {
        try {
            const res = await fetch("https://ipinfo.io/json?token=e392744f6845f0").then(r => r.json());
            const [lat, lng] = res.loc.split(',').map(Number);
            
            const nodeRef = rdb.ref('presence/' + myID);
            
            nodeRef.set({
                lat, lng, city: res.city, ts: Date.now(),
                v: current.v, a: current.a
            }).then(() => {
                document.getElementById('diag').innerText = "🟢 REALTIME ONLINE";
                document.getElementById('diag').style.color = "#39ff14";
                nodeRef.onDisconnect().remove();
            }).catch(() => {
                document.getElementById('diag').innerText = "🔴 ERRO: REGRAS DATABASE";
            });

            rdb.ref('presence').on('value', snap => {
                document.getElementById('count').innerText = snap.numChildren();
            });

        } catch (e) { document.getElementById('diag').innerText = "🟡 ERRO DE REDE"; }
    }

    function loop() { requestAnimationFrame(loop); world.rotation.y += 0.0015; renderer.render(scene, camera); }
    start(); loop();

    //window.saveRau(0.5, "true")
    window.saveRau = (v, a) => { rauPrefs.save(v, a); location.reload(); };
</script>
</body>
</html>
