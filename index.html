<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v175.0 - REAL-TIME TRACKER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; user-select: none; }
        
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 10000;
            background: rgba(0, 15, 0, 0.95); border: 2px solid #39ff14;
            padding: 20px; width: 320px; box-shadow: 0 0 30px rgba(0, 255, 0, 0.4);
            pointer-events: auto;
        }

        .status-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        #led { width: 12px; height: 12px; border-radius: 50%; background: #39ff14; box-shadow: 0 0 15px #39ff14; animation: blink 1.5s infinite; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .monitor-display { background: #000; border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        #mon-city { font-size: 20px; color: #fff; font-weight: bold; display: block; text-shadow: 0 0 8px #39ff14; }
        #mon-flag-ui { height: 22px; vertical-align: middle; border: 1px solid #444; display: none; margin-right: 10px; }
        #mon-status { font-size: 11px; color: #39ff14; opacity: 0.8; margin-top: 10px; border-top: 1px dashed #333; padding-top: 10px; }

        #btn-sync {
            width: 100%; background: #020; border: 1px solid #39ff14; color: #39ff14;
            padding: 10px; cursor: pointer; font-family: 'Courier New'; font-size: 11px; font-weight: bold;
            transition: 0.3s; text-transform: uppercase;
        }
        #btn-sync:hover { background: #39ff14; color: #000; }

        canvas { display: block; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="rau-ui">
    <div class="status-row">
        <div id="led"></div>
        <span style="font-weight: bold; font-size: 12px;">RAU GEO-TRACKER v175</span>
    </div>
    <div class="monitor-display">
        <div style="display: flex; align-items: center; margin-bottom: 5px;">
            <img id="mon-flag-ui" src="">
            <span id="mon-city">LOCALIZANDO...</span>
        </div>
        <div id="mon-status">SISTEMA INICIALIZANDO...</div>
    </div>
    <button id="btn-sync" onclick="masterSync()">Atualizar Posição</button>
</div>

<script>
    let scene, camera, renderer, controls, globe, anchorGroup;

    function init() {
        // --- AMBIENTE 3D ---
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.enableDamping = true;
        camera.position.z = 3.5;

        // --- GLOBO ---
        globe = new THREE.Mesh(
            new THREE.SphereGeometry(1, 64, 64), 
            new THREE.MeshPhongMaterial({ 
                color: 0xaaaaaa,
                shininess: 10 
            })
        );
        scene.add(globe);

        // Textura do Globo
        new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
            globe.material.map = tex; 
            globe.material.needsUpdate = true;
        });

        // Iluminação
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 3, 5);
        scene.add(light);

        anchorGroup = new THREE.Group(); 
        scene.add(anchorGroup);
        
        animate();
        masterSync();
        securityLock();
    }

    // --- RASTREAMENTO DE VISITA REAL ---
    async function masterSync() {
        const cityEl = document.getElementById('mon-city');
        const statusEl = document.getElementById('mon-status');
        cityEl.innerText = "BUSCANDO...";

        try {
            // Tentativa via API de geolocalização rápida
            const response = await fetch(`https://ipapi.co/json/`, { cache: 'no-store' });
            const data = await response.json();

            if (data.latitude && data.longitude) {
                const lat = parseFloat(data.latitude);
                const lon = parseFloat(data.longitude);
                const city = data.city || "Desconhecido";
                const country = (data.country_code || "us").toLowerCase();

                updateUI(city, country);
                renderPointer(lat, lon, city, country);
            }
        } catch (error) {
            cityEl.innerText = "OFFLINE";
            statusEl.innerText = "ERRO NA CONEXÃO DE DADOS";
        }
    }

    function updateUI(city, country) {
        document.getElementById('mon-city').innerText = city.toUpperCase();
        const flagImg = document.getElementById('mon-flag-ui');
        flagImg.src = `https://flagcdn.com/w80/${country}.png`;
        flagImg.style.display = 'block';
        document.getElementById('mon-status').innerText = `IP DETECTADO | PAÍS: ${country.toUpperCase()}`;
    }

    function renderPointer(lat, lon, city, country) {
        anchorGroup.clear();

        // Conversão de Lat/Lon para 3D
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        const pos = new THREE.Vector3(
            -(Math.sin(phi) * Math.cos(theta)),
            Math.cos(phi),
            (Math.sin(phi) * Math.sin(theta))
        ).multiplyScalar(1.02);

        // Ponto de Impacto (LED no Globo)
        const dot = new THREE.Mesh(
            new THREE.SphereGeometry(0.025, 16, 16), 
            new THREE.MeshBasicMaterial({ color: 0x39ff14 })
        );
        dot.position.copy(pos);
        anchorGroup.add(dot);

        // Bandeira Flutuante no Globo
        new THREE.TextureLoader().load(`https://flagcdn.com/w160/${country}.png`, (fTex) => {
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: fTex }));
            sprite.position.copy(pos.clone().multiplyScalar(1.15));
            sprite.scale.set(0.25, 0.15, 1);
            anchorGroup.add(sprite);
        });

        // Etiqueta com Nome da Cidade
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512; canvas.height = 128;
        ctx.fillStyle = '#39ff14'; 
        ctx.font = 'bold 50px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(city.toUpperCase(), 256, 80);
        
        const labelTex = new THREE.CanvasTexture(canvas);
        const labelSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: labelTex }));
        labelSprite.position.copy(pos.clone().multiplyScalar(1.3));
        labelSprite.scale.set(0.7, 0.18, 1);
        anchorGroup.add(labelSprite);

        // Focar a câmera na localização
        camera.position.set(pos.x * 3, pos.y * 3, pos.z * 3);
        controls.update();
    }

    function securityLock() {
        document.onkeydown = (e) => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    window.onload = init;
    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
