<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v198.0 - ABSOLUTE STABILITY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; user-select: none; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
            backdrop-filter: blur(8px);
        }
        .monitor-display { background: rgba(0, 5, 0, 0.95); border: 1px solid #1a1a1a; padding: 12px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; text-transform: uppercase; }
        
        /* HUD flutuante para Cidade e Bandeira */
        #visitor-tag {
            position: absolute; display: none; align-items: center; gap: 10px;
            background: rgba(0, 30, 0, 0.9); border: 1px solid #39ff14;
            padding: 6px 12px; border-radius: 4px; color: #fff;
            font-size: 14px; font-weight: bold; z-index: 500;
            transform: translate(-50%, -150%);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        .flag-icon { width: 24px; height: 16px; border: 1px solid #39ff14; object-fit: cover; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; outline: none; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
        <div id="led" style="width: 10px; height: 10px; border-radius: 50%; background: #39ff14; box-shadow: 0 0 10px #39ff14; animation: pulse 1s infinite;"></div>
        <span style="font-size: 11px; letter-spacing: 1px;">RAU CORE v198 | STABLE</span>
    </div>
    <div class="monitor-display">
        <span id="mon-city">SCANNING...</span>
        <div id="mon-status" style="font-size: 10px; opacity: 0.8; margin-top: 5px;">A detetar telemetria...</div>
    </div>
</div>

<div id="visitor-tag">
    <img id="tag-flag" src="" class="flag-icon">
    <span id="tag-city">---</span>
</div>

<script>
    const RAU_SYSTEM = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000),
        renderer: new THREE.WebGLRenderer({ antialias: true }),
        controls: null, globe: null, markers: new THREE.Group(),
        currentIP: null, activeNode: null,

        init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(this.renderer.domElement);

            // Iluminação
            this.scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(5, 3, 5);
            this.scene.add(sun);

            // Criar Globo de Emergência (Visível imediatamente)
            const geo = new THREE.SphereGeometry(1, 40, 40);
            const mat = new THREE.MeshPhongMaterial({ 
                color: 0x001100, 
                wireframe: true, 
                transparent: true, 
                opacity: 0.2 
            });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            this.globe.add(this.markers);

            // Controles de Giro Suave
            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.enableDamping = true;
            this.controls.dampingFactor = 0.05;
            this.controls.autoRotate = true;
            this.controls.autoRotateSpeed = 0.5;
            this.camera.position.z = 3.5;

            this.loadTexture();
            this.animate();
            this.track();
            setInterval(() => this.track(), 10000);
        },

        loadTexture() {
            new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.wireframe = false;
                this.globe.material.opacity = 1;
                this.globe.material.needsUpdate = true;
            });
        },

        async track() {
            try {
                const res = await fetch(`https://ipapi.co/json/?nocache=${Date.now()}`);
                const data = await res.json();
                if (data.ip && data.ip !== this.currentIP) {
                    this.currentIP = data.ip;
                    this.updateVisitor(data);
                }
            } catch (e) { console.log("Erro de rede."); }
        },

        updateVisitor(data) {
            document.getElementById('mon-city').innerText = (data.city || "RAU NODE").toUpperCase();
            
            this.markers.clear();
            const phi = (90 - data.latitude) * (Math.PI / 180);
            const theta = (data.longitude + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.02);

            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.035, 16, 16), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
            dot.position.copy(pos);
            this.markers.add(dot);

            this.activeNode = { mesh: dot, city: data.city, country: data.country_code.toLowerCase() };
            
            const tag = document.getElementById('visitor-tag');
            document.getElementById('tag-flag').src = `https://flagcdn.com/w40/${this.activeNode.country}.png`;
            document.getElementById('tag-city').innerText = this.activeNode.city;
            tag.style.display = 'flex';
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update();

            if (this.activeNode) {
                const vector = this.activeNode.mesh.getWorldPosition(new THREE.Vector3());
                vector.project(this.camera);
                const tag = document.getElementById('visitor-tag');
                if (vector.z > 1) { tag.style.opacity = '0'; } 
                else { 
                    tag.style.opacity = '1';
                    tag.style.left = `${(vector.x * .5 + .5) * window.innerWidth}px`;
                    tag.style.top = `${(vector.y * -.5 + .5) * window.innerHeight}px`;
                }
            }
            this.renderer.render(this.scene, this.camera);
        }
    };

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    window.onload = () => RAU_SYSTEM.init();
</script>
</body>
</html>
