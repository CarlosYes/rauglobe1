<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v210.0 - EMERGENCY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 20, 0, 0.9); border: 1px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
        }
        .monitor-display { background: #000; border: 1px solid #333; padding: 10px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; }
        #visitor-tag {
            position: absolute; display: none; align-items: center; gap: 8px;
            background: #000; border: 1px solid #39ff14; padding: 5px 10px;
            color: #fff; font-size: 12px; z-index: 500; transform: translate(-50%, -150%);
        }
        .flag-icon { width: 20px; border: 1px solid #39ff14; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div style="margin-bottom: 5px; font-size: 10px; font-weight: bold;">[ SYSTEM STATUS: ONLINE ]</div>
    <div class="monitor-display">
        <span id="mon-city">A LOCALIZAR...</span>
        <div id="mon-status" style="font-size: 9px; color: #39ff14; margin-top: 5px;">Protocolo v210 Ativo</div>
    </div>
</div>

<div id="visitor-tag">
    <img id="tag-flag" src="" class="flag-icon">
    <span id="tag-city">---</span>
</div>

<script>
    const RAU = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000),
        renderer: new THREE.WebGLRenderer({ antialias: true, alpha: true }),
        controls: null, globe: null, markers: new THREE.Group(),
        currentIP: null, activeNode: null,

        init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(this.renderer.domElement);

            this.scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            
            // GLOBO COM BACKUP VISUAL (Se a textura falhar, ele fica verde tecnológico)
            const geo = new THREE.SphereGeometry(1, 40, 40);
            const mat = new THREE.MeshPhongMaterial({ 
                color: 0x111111, 
                wireframe: false,
                emissive: 0x002200 
            });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            this.globe.add(this.markers);

            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.autoRotate = true;
            this.camera.position.z = 3;

            this.loadTexture();
            this.track();
            
            setInterval(() => this.track(), 20000);
            this.animate();
        },

        loadTexture() {
            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin('anonymous');
            // Usando o CDN mais rápido disponível
            loader.load('https://unpkg.com/three-globe/example/img/earth-dark.jpg', 
                (tex) => {
                    this.globe.material.map = tex;
                    this.globe.material.emissive.setHex(0x000000);
                    this.globe.material.needsUpdate = true;
                },
                undefined,
                (err) => { console.log("Usando modo Wireframe de emergência"); this.globe.material.wireframe = true; }
            );
        },

        async track() {
            try {
                // Usando IPWHOIS que é 100% compatível com GitHub Pages HTTPS
                const res = await fetch('https://ipwho.is/');
                const data = await res.json();
                if (data.success && data.ip !== this.currentIP) {
                    this.currentIP = data.ip;
                    this.updateVisitor(data);
                }
            } catch (e) { document.getElementById('mon-status').innerText = "Erro de Link"; }
        },

        updateVisitor(data) {
            document.getElementById('mon-city').innerText = (data.city || "NODE").toUpperCase();
            document.getElementById('mon-status').innerText = "UPLINK: " + data.ip;
            
            this.markers.clear();
            const phi = (90 - data.latitude) * (Math.PI / 180);
            const theta = (data.longitude + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.01);

            // BOLINHA 0.01
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.01, 8, 8), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
            dot.position.copy(pos);
            this.markers.add(dot);

            this.activeNode = { mesh: dot, city: data.city, country: data.country_code.toLowerCase() };
            const tag = document.getElementById('visitor-tag');
            document.getElementById('tag-flag').src = `https://flagcdn.com/w40/${this.activeNode.country}.png`;
            document.getElementById('tag-city').innerText = this.activeNode.city;
            tag.style.display = 'flex';
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update();
            if (this.activeNode && this.activeNode.mesh) {
                const vector = new THREE.Vector3();
                this.activeNode.mesh.getWorldPosition(vector);
                vector.project(this.camera);
                const tag = document.getElementById('visitor-tag');
                tag.style.left = `${(vector.x * 0.5 + 0.5) * window.innerWidth}px`;
                tag.style.top = `${(vector.y * -0.5 + 0.5) * window.innerHeight}px`;
                tag.style.opacity = vector.z > 1 ? "0" : "1";
            }
            this.renderer.render(this.scene, this.camera);
        }
    };
    window.onload = () => RAU.init();
</script>
</body>
</html>
