<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; color: #39ff14; font-family: monospace; text-align: center; }
        #emergency-msg { position: absolute; top: 50%; width: 100%; z-index: 100; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="emergency-msg">A CARREGAR RADAR... (Se isto não sumir, o 3D está desligado)</div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        try {
            const scene = new THREE.Scene();
            const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const ren = new THREE.WebGLRenderer({ antialias: true });
            ren.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(ren.domElement);

            const geo = new THREE.SphereGeometry(1, 32, 32);
            const mat = new THREE.MeshBasicMaterial({ color: 0x39ff14, wireframe: true });
            const globe = new THREE.Mesh(geo, mat);
            scene.add(globe);
            cam.position.z = 3;

            document.getElementById('emergency-msg').style.display = 'none';

            function anim() {
                requestAnimationFrame(anim);
                globe.rotation.y += 0.01;
                ren.render(scene, cam);
            }
            anim();
        } catch(e) {
            document.getElementById('emergency-msg').innerHTML = "ERRO: O teu navegador não suporta 3D (WebGL).";
        }
    </script>
</body>
</html>
