<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v183.0 - ULTIMATE STABILITY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; user-select: none; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
            backdrop-filter: blur(10px);
        }
        .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        #led { width: 10px; height: 10px; border-radius: 50%; background: #39ff14; box-shadow: 0 0 10px #39ff14; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .monitor-display { background: rgba(0, 0, 0, 0.85); border: 1px solid #1a1a1a; padding: 12px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; }
        #mon-status { font-size: 10px; color: #39ff14; opacity: 0.8; margin-top: 8px; border-top: 1px solid #39ff1444; padding-top: 8px; white-space: pre-line; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; outline: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="rau-ui">
    <div class="status-row">
        <div id="led"></div>
        <span style="font-size: 11px; letter-spacing: 1px;">CORE v183.0 | STABLE-FLOW</span>
    </div>
    <div class="monitor-display">
        <span id="mon-city">SINCRO...</span>
        <div id="mon-status">Localizando nó de rede...</div>
    </div>
</div>

<script>
    const RAU_SYSTEM = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000),
        renderer: new THREE.WebGLRenderer({ antialias: true, alpha: true }),
        controls: null, globe: null, markers: new THREE.Group(), currentIP: null,

        init() {
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(this.renderer.domElement);

            // 1. CONFIGURAÇÃO DE GIRO SUAVE (ESTILO MANTEIGA)
            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.enableDamping = true; 
            this.controls.dampingFactor = 0.05; 
            this.controls.autoRotate = true;
            this.controls.autoRotateSpeed = 0.6; // Rotação constante elegante
            this.camera.position.z = 3.5;

            // 2. LUZES (Essencial para o globo aparecer sempre)
            this.scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(5, 3, 5);
            this.scene.add(sun);

            // 3. GLOBO (Material sólido primeiro, textura depois)
            const geo = new THREE.SphereGeometry(1, 64, 64);
            const mat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 10 });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            this.scene.add(this.markers);

            // 4. CARREGAR TEXTURA E ESTRELAS
            this.loadAssets();

            this.animate();
            this.checkNetwork();
            setInterval(() => this.checkNetwork(), 8000);
        },

        loadAssets() {
            // Textura da Terra
            new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.needsUpdate = true;
            });

            // Estrelas se for Noite
            const hour = new Date().getHours();
            if (hour < 6 || hour > 18) {
                const starGeo = new THREE.BufferGeometry();
                const coords = [];
                for (let i = 0; i < 5000; i++) {
                    coords.push((Math.random() - 0.5) * 1500, (Math.random() - 0.5) * 1500, (Math.random() - 0.5) * 1500);
                }
                starGeo.setAttribute('position', new THREE.Float32BufferAttribute(coords, 3));
                this.scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 })));
            }
        },

        async checkNetwork() {
            try {
                // Detecção de VPN sem cache
                const res = await fetch(`https://ipapi.co/json/?nocache=${Date.now()}`);
                const data = await res.json();

                if (data.ip !== this.currentIP) {
                    this.currentIP = data.ip;
                    this.updateUI(data);
                }
            } catch (e) {
                document.getElementById('mon-status').innerText = "LINK LAGGING...";
            }
        },

        updateUI(data) {
            document.getElementById('mon-city').innerText = (data.city || "RAU-NODE").toUpperCase();
            document.getElementById('mon-status').innerText = `IP: ${data.ip}\nNODE: ${data.country_code}\nISP: ${data.org}\nSTATUS: TRACKING ACTIVE`;

            this.markers.clear();
            const phi = (90 - data.latitude) * (Math.PI / 180);
            const theta = (data.longitude + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.02);

            // LED de Localização
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.025, 16, 16), new THREE.MeshBasicMaterial({ color: 0x39ff14 }));
            dot.position.copy(pos);
            this.markers.add(dot);

            // Suavizar foco da câmera
            const targetPos = pos.clone().multiplyScalar(3.5);
            this.camera.position.lerp(targetPos, 0.05);
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update(); // GARANTE O GIRO SUAVE
            this.renderer.render(this.scene, this.camera);
        }
    };

    window.onload = () => RAU_SYSTEM.init();
</script>
</body>
</html>
