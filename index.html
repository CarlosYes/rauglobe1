<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v175.0 - GEOLOCATION FOCUS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; user-select: none; }
        
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 10000;
            background: rgba(0, 15, 0, 0.96); border: 2px solid #39ff14;
            padding: 20px; width: 320px; box-shadow: 0 0 40px rgba(0, 255, 0, 0.5);
        }

        .status-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        #led { width: 12px; height: 12px; border-radius: 50%; background: #39ff14; box-shadow: 0 0 15px #39ff14; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .monitor-display { background: #000; border: 1px solid #333; padding: 15px; border-radius: 4px; }
        #mon-city { font-size: 22px; color: #fff; font-weight: bold; display: block; text-shadow: 0 0 10px #39ff14; }
        #mon-flag-ui { height: 24px; vertical-align: middle; border: 1px solid #444; display: none; margin-right: 12px; }
        #mon-status { font-size: 11px; color: #39ff14; opacity: 0.8; margin-top: 10px; border-top: 1px dashed #444; padding-top: 10px; text-transform: uppercase; }

        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="rau-ui">
    <div class="status-row">
        <div id="led"></div>
        <span style="font-weight: bold; font-size: 13px;">RAU GEO-MONITOR v175</span>
    </div>
    <div class="monitor-display">
        <div style="display: flex; align-items: center;">
            <img id="mon-flag-ui" src="">
            <span id="mon-city">LOCALIZANDO...</span>
        </div>
        <div id="mon-status">Aguardando dados de rede...</div>
    </div>
</div>

<script>
    let scene, camera, renderer, controls, globe, anchorGroup;

    function init() {
        // --- CONFIGURAÇÃO DA CENA ---
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.6;
        controls.enableDamping = true;
        camera.position.z = 3.8;

        // --- GLOBO TERRESTRE ---
        globe = new THREE.Mesh(
            new THREE.SphereGeometry(1, 64, 64), 
            new THREE.MeshPhongMaterial({ shininess: 5 })
        );
        scene.add(globe);

        const loader = new THREE.TextureLoader();
        loader.crossOrigin = 'Anonymous';
        loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
            globe.material.map = tex; 
            globe.material.needsUpdate = true;
        });

        // Iluminação
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 3, 5);
        scene.add(dirLight);

        anchorGroup = new THREE.Group(); 
        scene.add(anchorGroup);
        
        animate();
        fetchUserLocation();
        applySecurity();
    }

    // --- RASTREAMENTO REAL ---
    async function fetchUserLocation() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();

            if (data.latitude && data.longitude) {
                const lat = parseFloat(data.latitude);
                const lon = parseFloat(data.longitude);
                const city = data.city || "Sinal Ativo";
                const country = (data.country_code || "us").toLowerCase();

                updateUI(city, country);
                markGlobe(lat, lon, city, country);
            }
        } catch (e) {
            document.getElementById('mon-city').innerText = "ERRO SINAL";
            document.getElementById('mon-status').innerText = "Falha na detecção de IP";
        }
    }

    function updateUI(city, country) {
        document.getElementById('mon-city').innerText = city.toUpperCase();
        const flag = document.getElementById('mon-flag-ui');
        flag.src = `https://flagcdn.com/w80/${country}.png`;
        flag.style.display = 'block';
        document.getElementById('mon-status').innerText = `CONEXÃO ESTABELECIDA: ${country.toUpperCase()}`;
    }

    function markGlobe(lat, lon, city, country) {
        anchorGroup.clear();

        // Conversão Coordenadas
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        const pos = new THREE.Vector3(
            -(Math.sin(phi) * Math.cos(theta)),
            Math.cos(phi),
            (Math.sin(phi) * Math.sin(theta))
        ).multiplyScalar(1.02);

        // Ponto de Localização
        const point = new THREE.Mesh(
            new THREE.SphereGeometry(0.02, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0x39ff14 })
        );
        point.position.copy(pos);
        anchorGroup.add(point);

        // Bandeira no Globo
        const flagLoader = new THREE.TextureLoader();
        flagLoader.crossOrigin = 'Anonymous';
        flagLoader.load(`https://flagcdn.com/w160/${country}.png`, (fTex) => {
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: fTex }));
            sprite.position.copy(pos.clone().multiplyScalar(1.15));
            sprite.scale.set(0.25, 0.15, 1);
            anchorGroup.add(sprite);
        });

        // Nome da Cidade no Globo
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512; canvas.height = 128;
        ctx.fillStyle = '#39ff14'; 
        ctx.font = 'bold 46px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(city.toUpperCase(), 256, 80);
        
        const labelSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
            map: new THREE.CanvasTexture(canvas) 
        }));
        labelSprite.position.copy(pos.clone().multiplyScalar(1.3));
        labelSprite.scale.set(0.7, 0.18, 1);
        anchorGroup.add(labelSprite);

        // Suavizar rotação para o ponto
        camera.position.set(pos.x * 3, pos.y * 3, pos.z * 3);
        controls.update();
    }

    function applySecurity() {
        document.onkeydown = (e) => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    window.onload = init;
    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
