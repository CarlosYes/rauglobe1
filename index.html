<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RAU - GLOBO OFICIAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        .hud { 
            position: absolute; top: 20px; left: 20px; color: #39ff14; 
            font-family: monospace; border: 1px solid #39ff14; padding: 10px;
            background: rgba(0,0,0,0.8); pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="hud"><b>RADIO AMIGOS UNIDOS</b><br>EMISSÃO GLOBAL LIVE</div>
    <div id="canvas-container"></div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(ren.domElement);

        // Criar a Terra com textura (Mapas do NASA/Blue Marble)
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const textureLoader = new THREE.TextureLoader();
        
        // Textura da Terra e do Relevo
        const material = new THREE.MeshPhongMaterial({
            map: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'),
            specularMap: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg'),
            shininess: 5
        });

        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        // Luzes para dar realismo
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 3, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x333333));

        camera.position.z = 3;

        // Rotação Automática e Manual
        let isDragging = false;
        window.onmousedown = () => isDragging = true;
        window.onmouseup = () => isDragging = false;
        window.onmousemove = (e) => {
            if(isDragging) {
                earth.rotation.y += e.movementX * 0.005;
                earth.rotation.x += e.movementY * 0.005;
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            if(!isDragging) earth.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
