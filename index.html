<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU MONITOR v184.0 - VISUAL RECOVERY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; user-select: none; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.9); border-left: 3px solid #39ff14;
            padding: 15px; width: 280px; pointer-events: none;
            backdrop-filter: blur(10px);
        }
        .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        #led { width: 10px; height: 10px; border-radius: 50%; background: #39ff14; box-shadow: 0 0 10px #39ff14; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .monitor-display { background: rgba(5, 5, 5, 0.9); border: 1px solid #1a1a1a; padding: 12px; }
        #mon-city { font-size: 18px; color: #fff; font-weight: 900; display: block; }
        #mon-status { font-size: 10px; color: #39ff14; opacity: 0.8; margin-top: 8px; border-top: 1px solid #39ff1444; padding-top: 8px; white-space: pre-line; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; outline: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="rau-ui">
    <div class="status-row">
        <div id="led"></div>
        <span style="font-size: 11px; letter-spacing: 1px;">CORE v184.0 | TELEMETRY ACTIVE</span>
    </div>
    <div class="monitor-display">
        <span id="mon-city">SINCRO...</span>
        <div id="mon-status">Rastreando sinal de satélite...</div>
    </div>
</div>

<script>
    const RAU_SYSTEM = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000),
        renderer: new THREE.WebGLRenderer({ antialias: true, alpha: false }),
        controls: null, globe: null, markers: new THREE.Group(), currentIP: null,

        init() {
            // Setup base
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setClearColor(0x000000, 1);
            document.body.appendChild(this.renderer.domElement);

            // Suavidade do giro
            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.enableDamping = true;
            this.controls.dampingFactor = 0.05;
            this.controls.autoRotate = true;
            this.controls.autoRotateSpeed = 0.7;
            this.camera.position.z = 3.5;

            // Iluminação potente para acabar com o "escuro"
            const ambient = new THREE.AmbientLight(0xffffff, 1.3);
            this.scene.add(ambient);
            const light = new THREE.DirectionalLight(0xffffff, 0.6);
            light.position.set(5, 3, 5);
            this.scene.add(light);

            // Globo (Criação imediata)
            const geo = new THREE.SphereGeometry(1, 64, 64);
            const mat = new THREE.MeshPhongMaterial({ color: 0x222222, shininess: 15 });
            this.globe = new THREE.Mesh(geo, mat);
            this.scene.add(this.globe);
            this.scene.add(this.markers);

            // Carregar ativos
            this.loadAssets();
            this.animate();
            
            // Loop de rede
            this.checkNetwork();
            setInterval(() => this.checkNetwork(), 8000);
        },

        loadAssets() {
            // Textura
            new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                this.globe.material.map = tex;
                this.globe.material.color.set(0xffffff);
                this.globe.material.needsUpdate = true;
            });

            // Estrelas
            const starGeo = new THREE.BufferGeometry();
            const coords = [];
            for (let i = 0; i < 6000; i++) {
                coords.push((Math.random() - 0.5) * 1500, (Math.random() - 0.5) * 1500, (Math.random() - 0.5) * 1500);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(coords, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 });
            this.scene.add(new THREE.Points(starGeo, starMat));
        },

        async checkNetwork() {
            try {
                const res = await fetch(`https://ipapi.co/json/?nocache=${Date.now()}`);
                const data = await res.json();
                
                if (data.ip && data.ip !== this.currentIP) {
                    this.currentIP = data.ip;
                    this.deployVisitor(data);
                }
            } catch (e) {
                document.getElementById('mon-status').innerText = "LINK LAGGING...";
            }
        },

        deployVisitor(data) {
            const { latitude: lat, longitude: lon, city, country_code: iso, org } = data;
            
            // Update UI
            document.getElementById('mon-city').innerText = (city || "NODE ATIVO").toUpperCase();
            document.getElementById('mon-status').innerText = `IP: ${data.ip}\nNODE: ${iso}\nORG: ${org || 'PRIVATE'}\nSTATUS: TRACKING VISITOR`;

            this.markers.clear();

            // Converter Lat/Lon
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(
                -(Math.sin(phi) * Math.cos(theta)),
                Math.cos(phi),
                (Math.sin(phi) * Math.sin(theta))
            ).multiplyScalar(1.02);

            // Marcador LED Neon
            const dot = new THREE.Mesh(
                new THREE.SphereGeometry(0.03, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0x39ff14 })
            );
            dot.position.copy(pos);
            this.markers.add(dot);

            // Anel de Radar
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32),
                new THREE.MeshBasicMaterial({ color: 0x39ff14, side: THREE.DoubleSide, transparent: true, opacity: 0.5 })
            );
            ring.position.copy(pos.clone().multiplyScalar(1.01));
            ring.lookAt(0,0,0);
            this.markers.add(ring);

            // Giro suave da câmera para o novo visitante
            const targetPos = pos.clone().multiplyScalar(3.5);
            this.camera.position.lerp(targetPos, 0.05);
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.controls) this.controls.update(); // Isso garante a suavidade do giro
            this.renderer.render(this.scene, this.camera);
        }
    };

    window.onload = () => RAU_SYSTEM.init();
</script>
</body>
</html>
