<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU GLOBAL</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        .label {
            background: #fff; color: #000; padding: 2px 6px;
            font-size: 11px; font-weight: bold; border-radius: 2px;
        }
        .dot { width: 8px; height: 8px; background: #00f2ff; border-radius: 50%; box-shadow: 0 0 10px #00f2ff; }
    </style>
</head>
<body>

<div id="globeViz"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/globe.gl@2.26.0/dist/globe.gl.min.js"></script>
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'UID-' + Math.random().toString(36).substr(2, 5);

    // 1. INICIALIZAÇÃO IMEDIATA DO GLOBO
    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#00f2ff')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.style.display = 'flex';
            el.style.flexDirection = 'column';
            el.style.alignItems = 'center';
            el.innerHTML = `<div class="label">${d.city}</div><div class="dot"></div>`;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    // 2. CARREGAMENTO DE DADOS EM SEGUNDO PLANO
    async function loadRealTimeData() {
        let geo = { lat: 0, lng: 0, city: "VISITANTE" };
        
        try {
            // Tentativa rápida de localização
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            if (d.latitude) {
                geo = { lat: d.latitude, lng: d.longitude, city: d.city.toUpperCase() };
                // Foca na tua posição assim que detetada
                world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.5 }, 2000);
            }
        } catch (e) { console.log("Rede lenta, a aguardar..."); }

        // 3. LIGAÇÃO ABLY (Geovisitas)
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('real-geovisits-stream');

        ably.connection.on('connected', () => {
            channel.presence.enter(geo);
            const sync = () => {
                channel.presence.get((err, members) => {
                    if (!err) {
                        const points = members.map(m => m.data).filter(p => p.lat !== 0);
                        world.htmlElementsData(points);
                    }
                });
            };
            channel.presence.subscribe(['enter', 'leave', 'present'], sync);
            sync();
        });
    }

    // Executa a carga de dados sem bloquear o desenho do globo
    loadRealTimeData();
</script>
</body>
</html>
