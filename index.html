<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU RADAR v65.0 - OMEGA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #39ff14; }
        #rau-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 15, 0, 0.95); border: 2px solid #39ff14;
            padding: 20px; width: 280px; box-shadow: 0 0 40px rgba(0, 255, 0, 0.5);
        }
        #count { font-size: 4.5em; font-weight: 900; color: #fff; display: block; line-height: 0.8; }
        .label { font-size: 10px; font-weight: bold; text-transform: uppercase; opacity: 0.7; }
        #monitor { margin-top: 15px; padding: 12px; background: #001a00; border: 1px solid #1a331a; }
        #city-name { font-size: 20px; color: #fff; font-weight: bold; display: block; }
        #net-status { font-size: 9px; color: #39ff14; margin-top: 10px; display: block; opacity: 0.6; }
    </style>
</head>
<body>

<div id="rau-ui">
    <div class="label">RAU COMMAND v65.0</div>
    <span id="count">1</span>
    <div class="label">SINAIS ACTIVOS</div>
    
    <div id="monitor">
        <span id="city-name">RASTREANDO...</span>
        <span id="net-status">SISTEMA OMEGA ATIVO</span>
    </div>
</div>

<script>
    // 🔗 CONFIGURAÇÃO OMEGA:
    const ABLY_KEY = 'SUA_API_KEY_AQUI'; 
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('rau-radar');

    let scene, camera, renderer, controls, globeGroup;
    let peers = {};

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.autoRotate = true; camera.position.z = 3.5;

        globeGroup = new THREE.Group();
        scene.add(globeGroup);

        const globe = new THREE.Mesh(
            new THREE.SphereGeometry(1, 64, 64),
            new THREE.MeshPhongMaterial({
                map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
                shininess: 5
            })
        );
        globeGroup.add(globe);
        scene.add(new THREE.AmbientLight(0xffffff, 2.5));

        animate();
        startTracking();
    }

    async function startTracking() {
        try {
            const res = await fetch(`https://get.geojs.io/v1/ip/geo.json?t=${Date.now()}`);
            const data = await res.json();
            const myData = {
                id: ably.connection.id,
                city: data.city || "SINAL RAU",
                lat: parseFloat(data.latitude),
                lon: parseFloat(data.longitude)
            };
            
            // Publica a sua posição e entra no canal de presença
            channel.presence.enter(myData);
            document.getElementById('city-name').innerText = myData.city.toUpperCase();
        } catch(e) {
            channel.presence.enter({ id: ably.connection.id, city: "OCULTO", lat: 0, lon: 0 });
        }
    }

    // Escuta quem entra e quem sai (Tempo Real)
    channel.presence.subscribe(() => {
        channel.presence.get((err, members) => {
            if(err) return;
            document.getElementById('count').innerText = members.length;
            updateMarkers(members);
        });
    });

    function updateMarkers(members) {
        for(let i = globeGroup.children.length - 1; i > 0; i--) globeGroup.remove(globeGroup.children[i]);

        members.forEach(member => {
            const p = member.data;
            const isLocal = member.connectionId === ably.connection.id;
            
            const phi = (90 - p.lat) * (Math.PI / 180);
            const theta = (p.lon + 180) * (Math.PI / 180);
            const pos = new THREE.Vector3(-(Math.sin(phi)*Math.cos(theta))*1.02, Math.cos(phi)*1.02, (Math.sin(phi)*Math.sin(theta))*1.02);

            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.02, 16, 16), new THREE.MeshBasicMaterial({ color: isLocal ? 0x39ff14 : 0xff3939 }));
            dot.position.copy(pos);
            globeGroup.add(dot);
        });
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    init();
</script>
</body>
</html>
