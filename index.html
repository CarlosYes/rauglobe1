<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v59 - GLOBAL REAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; }
        .hud {
            position: absolute; top: 25px; left: 25px; z-index: 1000;
            background: rgba(0, 0, 0, 0.95); border: 2px solid #39ff14;
            padding: 20px; color: #39ff14; pointer-events: none;
            box-shadow: 0 0 40px #39ff1488; border-radius: 2px;
        }
        .count { font-size: 80px; font-weight: 900; color: #fff; line-height: 0.8; letter-spacing: -5px; }
        .m-rau { display: flex; flex-direction: column; align-items: center; }
        .l-rau {
            background: #39ff14; color: #000; padding: 4px 10px; border-radius: 2px;
            font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            white-space: nowrap; border: 1px solid #fff;
        }
        .l-rau img { width: 20px; height: 13px; object-fit: cover; }
        .d-rau { width: 14px; height: 14px; background: #fff; border-radius: 50%; margin-top: 5px; border: 2px solid #39ff14; animation: p 0.8s infinite alternate; }
        @keyframes p { from { transform: scale(1); opacity: 1; } to { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div class="hud">
    <div style="font-size: 10px; letter-spacing: 5px;">RAU GLOBAL TRACKER</div>
    <div id="count" class="count">0</div>
    <div id="status" style="font-size: 11px; color: #fff; margin-top: 10px; font-family: monospace;">A LOCALIZAR ALVO REAL...</div>
</div>

<div id="globeViz"></div>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'REAL-' + Math.random().toString(36).substr(2, 6);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor('#39ff14')
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'm-rau';
            const flag = d.country ? `<img src="https://flagcdn.com/w40/${d.country.toLowerCase()}.png">` : '';
            el.innerHTML = `<div class="l-rau">${flag}<span>${d.city}</span></div><div class="d-rau"></div>`;
            return el;
        });

    // SISTEMA DE VARRIMENTO GLOBAL
    async function getGlobalLoc() {
        try {
            // Tenta obter coordenadas reais sem cache do navegador
            const res = await fetch(`https://ipapi.co/json/?_=${Date.now()}`);
            const d = await res.json();
            
            if (d && d.latitude) {
                return {
                    lat: d.latitude,
                    lng: d.longitude,
                    city: (d.city || d.region || "REAL-TIME").toUpperCase(),
                    country: (d.country_code || "UN").toLowerCase()
                };
            }
            throw new Error('IP fail');
        } catch (e) {
            // Backup via Cloudflare (detecta o centro de dados mais próximo de ti no mundo)
            const cf = await fetch('https://www.cloudflare.com/cdn-cgi/trace').then(r => r.text());
            const loc = cf.split('\n').find(l => l.startsWith('loc=')).split('=')[1];
            // Se falhar, coloca no centro do mundo para forçar o sistema a ligar
            return { lat: 0, lng: 0, city: "COORDENADA ZERO", country: loc.toLowerCase() };
        }
    }

    async function init() {
        const geo = await getGlobalLoc();
        
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('rau-live-radar');

        ably.connection.on('connected', () => {
            document.getElementById('status').innerText = `LOCALIZADO: ${geo.city}`;
            channel.presence.enter(geo);

            const update = () => {
                channel.presence.get((err, members) => {
                    if (!err) {
                        const nodes = members.map(m => m.data).filter(x => x && x.lat !== undefined);
                        document.getElementById('count').innerText = nodes.length;
                        world.htmlElementsData(nodes);
                    }
                });
            };
            channel.presence.subscribe(['enter', 'leave', 'present', 'update'], update);
            update();
        });

        // Foca na tua posição real com zoom
        world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.0 }, 2000);
    }

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    window.onload = init;
</script>
</body>
</html>
