<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU GLOBAL</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        #globeViz { width: 100vw; height: 100vh; background-color: #000; }
        .label {
            background: #fff; color: #000; padding: 2px 6px;
            font-family: sans-serif; font-size: 11px; font-weight: bold;
            border-radius: 2px; pointer-events: none;
        }
        .dot { width: 8px; height: 8px; background: #00f2ff; border-radius: 50%; box-shadow: 0 0 10px #00f2ff; }
    </style>
</head>
<body>

<div id="globeViz"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/globe.gl@2.26.0/dist/globe.gl.min.js"></script>
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<script>
    const ABLY_KEY = '0XXKIg.kPL-iw:5hRGSGvPZCgUwMNts43-74X7nB9_25r3YlD0s-WE7vs';
    const SESSION_ID = 'NODE-' + Math.random().toString(36).substr(2, 5);

    async function init() {
        // 1. Localização Real via API Direta
        let geo = { lat: 0, lng: 0, city: "VISITANTE" };
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            if (data.latitude) {
                geo = { lat: data.latitude, lng: data.longitude, city: data.city.toUpperCase() };
            }
        } catch (e) { console.log("Erro de localização."); }

        // 2. Montagem do Globo
        const world = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundColor('#000000')
            .showAtmosphere(true)
            .atmosphereColor('#00f2ff')
            .htmlElement(d => {
                const el = document.createElement('div');
                el.style.display = 'flex';
                el.style.flexDirection = 'column';
                el.style.alignItems = 'center';
                el.innerHTML = `<div class="label">${d.city}</div><div class="dot"></div>`;
                return el;
            });

        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.5;

        // 3. Ligação Ably para Geovisitas
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: SESSION_ID });
        const channel = ably.channels.get('global-live-stream');

        ably.connection.on('connected', () => {
            channel.presence.enter(geo);
            const sync = () => {
                channel.presence.get((err, members) => {
                    if (!err) {
                        const active = members.map(m => m.data).filter(p => p.lat !== 0);
                        world.htmlElementsData(active);
                    }
                });
            };
            channel.presence.subscribe(['enter', 'leave', 'present'], sync);
            sync();
        });

        // 4. Posicionamento
        if (geo.lat !== 0) {
            world.pointOfView({ lat: geo.lat, lng: geo.lng, altitude: 2.5 });
        }
    }

    // Só inicia quando as bibliotecas acima estiverem carregadas
    window.addEventListener('load', init);
</script>
</body>
</html>
