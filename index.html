<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR - FINAL FIX</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.26.12/dist/globe.gl.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #globeViz { position: absolute; top: 0; width: 100vw; height: 100vh; }
        
        .hud-rau {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 5, 20, 0.9); border: 1px solid #39ff14;
            padding: 15px; border-radius: 4px; color: #fff; pointer-events: none;
        }
        .count-big { font-size: 48px; font-weight: bold; color: #39ff14; line-height: 1; }
        
        /* Marcadores */
        .marker-rau { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .label-rau {
            background: #000; border: 1px solid #39ff14; color: #39ff14;
            padding: 3px 8px; border-radius: 3px; font-size: 12px; font-weight: bold;
            margin-bottom: 5px; white-space: nowrap; text-transform: uppercase;
        }
        .dot-rau { 
            width: 14px; height: 14px; background: #fff; border-radius: 50%; 
            box-shadow: 0 0 20px #39ff14; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="hud-rau">
    <div style="font-size: 10px; opacity: 0.7; letter-spacing: 2px;">RADAR ATIVO</div>
    <div id="live-total" class="count-big">0</div>
    <div id="status-msg" style="font-size: 11px; color: #39ff14; margin-top: 5px;">A INICIAR...</div>
</div>

<div id="globeViz"></div>

<script>
    const fbConfig = {
        apiKey: "AIzaSyDv0Tf5j9I0FL4iB1voI97tlc3K1bwvm-g",
        databaseURL: "https://radiodosamigosunidos-aadda-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "radiodosamigosunidos-aadda"
    };

    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.database();
    const radarRef = db.ref('rau_radar_v3'); // Tabela limpa para v3

    const myID = "R" + Math.random().toString(36).substr(2, 5);
    const myNode = radarRef.child(myID);

    const world = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('#000000')
        .showAtmosphere(true)
        .atmosphereColor("#39ff14")
        .htmlElement(d => {
            const el = document.createElement('div');
            el.className = 'marker-rau';
            el.innerHTML = `<div class="label-rau">${d.city}</div><div class="dot-rau"></div>`;
            return el;
        });

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    async function startTracking() {
        document.getElementById('status-msg').innerText = "A BUSCAR IP...";
        try {
            // API alternativa via HTTPS
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            if (data.latitude) {
                const myData = {
                    id: myID,
                    lat: parseFloat(data.latitude),
                    lng: parseFloat(data.longitude),
                    city: data.city || "Sinal Ativo",
                    ts: Date.now()
                };

                // Grava no Firebase
                await myNode.set(myData);
                myNode.onDisconnect().remove();

                // Foca a câmara
                world.pointOfView({ lat: myData.lat, lng: myData.lng, altitude: 2 }, 3000);
                document.getElementById('status-msg').innerText = "ONLINE: " + myData.city.toUpperCase();
            }
        } catch (err) {
            document.getElementById('status-msg').innerText = "ERRO DE LIGAÇÃO";
            console.error(err);
        }
    }

    function sync() {
        radarRef.on('value', snap => {
            const users = snap.val() || {};
            const now = Date.now();
            const active = Object.values(users).filter(u => (now - u.ts < 50000) && u.lat);
            
            document.getElementById('live-total').innerText = active.length;
            world.htmlElementsData(active);
        });

        setInterval(() => {
            myNode.update({ ts: Date.now() });
        }, 15000);
    }

    window.onload = () => {
        startTracking();
        sync();
    };
</script>
</body>
</html>
