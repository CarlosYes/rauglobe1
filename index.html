<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAU - OMEGA v20.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #rau-interface {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 20, 0, 0.9); color: #39ff14; padding: 20px;
            border: 2px solid #39ff14; border-radius: 8px; pointer-events: none;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
        }
        .data-line { margin: 5px 0; font-size: 0.9em; }
        #diag-log { position: absolute; bottom: 15px; left: 15px; color: #39ff14; font-size: 10px; opacity: 0.6; }
        canvas { cursor: grab; }
    </style>
</head>
<body>

<div id="rau-interface">
    <div style="font-weight: 900; letter-spacing: 2px; border-bottom: 1px solid #39ff14; padding-bottom: 5px; margin-bottom: 10px;">RAU SYSTEM v20.0</div>
    <div class="data-line">📍 LOCAL: <span id="city" style="color: #fff;">...</span></div>
    <div class="data-line">📡 STATUS: <span id="st" style="color: #fff;">A LIGAR</span></div>
    <div class="data-line" style="margin-top: 15px;">👥 ONLINE: <span id="count" style="font-size: 1.8em; font-weight: 900;">0</span></div>
    <div id="pref-indicator" style="font-size: 0.7em; color: #888; margin-top: 10px;">PREFERÊNCIAS: <span style="color:#39ff14">SYNC OK</span></div>
</div>

<div id="diag-log">SISTEMA PRONTO.</div>

<script>
    // --- GESTÃO DE MEMÓRIA (Volume e Autoplay) ---
    const STORAGE_KEY = 'rau_user_settings';
    let userSettings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { volume: 0.7, autoplay: true };

    const saveSettings = (vol, auto) => {
        userSettings = { volume: vol, autoplay: auto };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(userSettings));
        // Envia para o Firebase para backup
        if (db && myNode) db.collection('RAU_CONFIGS').doc(myNode).set(userSettings, {merge: true});
    };

    // --- CONFIGURAÇÃO FIREBASE ---
    const _k = ["QUl6YVN5RHYwVGY1ajlJMEx0NGlCMXZvSTk3dGxjM0sxYnd2bS1n", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGEuZmlyZWJhc2VhcHAuY29t", "cmFkaW9kb3NhbWlnb3N1bmlkb3MtYWFkZGE=", "MTo0NTE5NDU2MTIwNzE6d2ViOjM4M2M1NTEjYTkyMjc0NGY2ODQ1ZjAy"];
    const cfg = { apiKey: atob(_k[0]), authDomain: atob(_k[1]), projectId: atob(_k[2]), appId: atob(_k[3]) };
    firebase.initializeApp(cfg);
    const db = firebase.firestore();
    const myNode = "NODE_" + Math.random().toString(36).substr(2, 5);

    // --- ENGINE 3D ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const world = new THREE.Group(); scene.add(world);
    const globe = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshPhongMaterial({
        map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
        shininess: 5
    }));
    world.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    camera.position.z = 3.5;

    const markers = new Map();
    function renderNodes(nodes) {
        const ids = new Set(nodes.map(n => n.id));
        nodes.forEach(n => {
            if (!markers.has(n.id)) {
                const phi = (90 - n.lat) * (Math.PI / 180), theta = (n.lng + 180) * (Math.PI / 180);
                const pos = new THREE.Vector3().setFromSphericalCoords(1.02, phi, theta);
                const g = new THREE.Group();
                g.add(new THREE.Mesh(new THREE.SphereGeometry(0.015, 12, 12), new THREE.MeshBasicMaterial({ color: 0x39ff14 })));
                const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                canvas.width = 200; canvas.height = 60; ctx.fillStyle = 'rgba(0,30,0,0.8)'; ctx.fillRect(0,0,200,60);
                ctx.font = 'bold 18px Courier New'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                ctx.fillText(n.city.toUpperCase(), 100, 38);
                const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
                s.position.copy(pos.clone().multiplyScalar(1.15)); s.scale.set(0.4, 0.12, 1);
                g.add(s); world.add(g); markers.set(n.id, g);
            }
        });
        markers.forEach((obj, id) => { if (!ids.has(id)) { world.remove(obj); markers.delete(id); } });
    }

    // --- LÓGICA DE CONTROLO ---
    let isDown = false, lx, ly;
    document.addEventListener('mousedown', (e) => { isDown = true; lx = e.clientX; ly = e.clientY; });
    window.addEventListener('mouseup', () => isDown = false);
    window.addEventListener('mousemove', (e) => { 
        if (isDown) { 
            world.rotation.y += (e.clientX-lx)*0.007; 
            world.rotation.x += (e.clientY-ly)*0.007; 
            lx=e.clientX; ly=e.clientY; 
        } 
    });

    // --- INICIALIZAÇÃO ---
    async function init() {
        try {
            const res = await fetch("https://ipinfo.io/json?token=e392744f6845f0").then(r => r.json());
            document.getElementById('city').innerText = res.city.toUpperCase();
            const [lat, lng] = res.loc.split(',').map(Number);
            
            const uplink = () => db.collection('RAU_LIVE').doc(myNode).set({ 
                lat, lng, city: res.city, ts: firebase.firestore.FieldValue.serverTimestamp(),
                settings: userSettings
            }).then(() => { document.getElementById('st').innerText = "ONLINE"; });

            uplink(); setInterval(uplink, 25000);

            db.collection('RAU_LIVE').where('ts', '>', new Date(Date.now() - 60000)).onSnapshot(snap => {
                const list = []; snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                renderNodes(list); document.getElementById('count').innerText = snap.size;
            });
        } catch (e) { document.getElementById('diag-log').innerText = "ERRO DE LIGAÇÃO"; }
    }

    function animate() { requestAnimationFrame(animate); if(!isDown) world.rotation.y += 0.0015; renderer.render(scene, camera); }
    init(); animate();

    // EXPOSTO PARA O TEU PLAYER: window.saveSettings(0.5, true);
</script>
</body>
</html>
